<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 魔法生字圖卡生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 套件，用於將網頁元素轉為圖片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入 jsPDF 套件，用於產生 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        .serif-font {
            font-family: 'Noto Serif TC', serif;
        }
        
        /* A5 Landscape Preview Container */
        .a5-card {
            width: 210mm;
            height: 148mm;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin: 0 auto 2rem auto;
            border-radius: 0.5rem;
            overflow: hidden;
            position: relative;
            page-break-after: always;
        }

        /* 田字格 CSS */
        .tian-zi-ge {
            width: 86.4px;
            height: 86.4px;
            border: 3px solid #ef4444; /* 紅色外框 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }
        .tian-zi-ge::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 0;
            border-top: 2px dashed #fca5a5; /* 淺紅虛線 */
            z-index: 1;
        }
        .tian-zi-ge::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 0;
            height: 100%;
            border-left: 2px dashed #fca5a5; /* 淺紅虛線 */
            z-index: 1;
        }

        /* 列印設定 */
        @media print {
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .a5-card {
                box-shadow: none;
                margin: 0;
                border-radius: 0;
                width: 210mm;
                height: 147mm; /* 微調以適應列印 */
                page-break-after: always;
            }
            @page {
                size: A5 landscape;
                margin: 0;
            }
        }
        
        /* Loading 旋轉動畫 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 控制面板 (列印時隱藏) -->
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-6 mb-8 no-print border-t-4 border-blue-500">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            AI 魔法生字圖卡生成器
        </h1>
        <p class="text-gray-600 mb-6">請在下方輸入想製作的生字（可輸入多個，每個字將生成一張A5學習單）。</p>
        
        <div class="mb-6">
            <label for="charInput" class="block text-sm font-medium text-gray-700 mb-2">請輸入生字 (例：天 海 樹)</label>
            <textarea id="charInput" rows="3" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow text-lg" placeholder="在此輸入繁體國字..."></textarea>
        </div>

        <div id="statusMsg" class="mb-4 text-sm font-medium text-blue-600 h-6 flex items-center gap-2"></div>

        <div class="flex flex-wrap gap-4">
            <button id="btnGenerate" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                </svg>
                開始生成
            </button>
            <button id="btnDownload" class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
                </svg>
                全部下載 (PNG)
            </button>
            <button id="btnDownloadPdf" class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v3.586l-1.293-1.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V8z" clip-rule="evenodd" />
                </svg>
                全部下載 (PDF)
            </button>
            <button id="btnClear" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl shadow-sm transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                清除重新製作
            </button>
        </div>
    </div>

    <!-- 學習單呈現區 -->
    <div id="cardsContainer" class="flex flex-col items-center">
        <!-- 卡片將由 JavaScript 動態生成並插入此處 -->
    </div>

    <script>
        const apiKey = ""; // API Key 會由執行環境自動提供
        
        // UI 元素
        const btnGenerate = document.getElementById('btnGenerate');
        const btnDownload = document.getElementById('btnDownload');
        const btnDownloadPdf = document.getElementById('btnDownloadPdf'); 
        const btnClear = document.getElementById('btnClear');
        const charInput = document.getElementById('charInput');
        const cardsContainer = document.getElementById('cardsContainer');
        const statusMsg = document.getElementById('statusMsg');

        // 延遲函數 (Exponential Backoff 用)
        const delay = ms => new Promise(res => setTimeout(res, ms));

        // 通用 API Fetch 函數 (含重試機制)
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errText}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    console.warn(`API call failed, retrying in ${delays[i]}ms...`, e);
                    await delay(delays[i]);
                }
            }
        }

        // 1. 取得生字資料 (注音、部首、筆畫、造詞、造句)
        async function fetchWordData(char) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `你是一位專業的台灣國小語文老師。請提供繁體生字「${char}」的教學資訊。`;
            const systemInstruction = `
                請務必以 JSON 格式回傳，必須包含以下欄位：
                {
                    "bopomofo": "該字的注音符號 (含聲調，例如：ㄊㄧㄢ)",
                    "radical": "該字的部首 (例如：大部)",
                    "strokes": "該字的總筆畫數 (僅需數字，例如：4)",
                    "phrases": ["包含該字的第一個造詞", "包含該字的第二個造詞"],
                    "sentence": "一個包含該生字的完整造句，語句須符合台灣國小學生程度。"
                }
                請確保造詞和造句都是常見且正確的繁體中文用法。
            `;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { 
                    responseMimeType: "application/json" 
                }
            };

            const result = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!textResponse) throw new Error("無效的文本回傳格式");
            return JSON.parse(textResponse);
        }

        // 2. 取得生字插圖 (使用 gemini-2.5-flash-image-preview)
        async function fetchWordImage(char) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
            const prompt = `A cute, simple, colorful cartoon illustration for a children's textbook representing the concept of the Chinese word "${char}". Clean white background, flat colors, highly legible, NO text and NO words in the image.`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { 
                    responseModalities: ["TEXT", "IMAGE"] 
                }
            };

            const result = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const parts = result.candidates?.[0]?.content?.parts;
            if (!parts) throw new Error("無效的圖片回傳格式");
            
            const imgPart = parts.find(p => p.inlineData);
            if (imgPart) {
                return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
            }
            throw new Error("API 未回傳圖片資料");
        }

        // 輔助函數：將造詞中的生字替換為空格括號
        function createBlankPhrase(phrase, targetChar) {
            const regex = new RegExp(targetChar, 'g');
            // 如果 API 給的造詞沒有包含該字(異常情況)，就直接顯示
            if (!regex.test(phrase)) return phrase;
            // 加大括號空間：改為三個全形空白，讓學生好寫字
            return phrase.replace(regex, '（　　　）');
        }

        // 輔助函數：將注音與聲調分離，並將聲調定位在右邊中間
        function formatBopomofo(bopomofo) {
            if (!bopomofo) return '';
            // 尋找聲調符號
            const toneMatch = bopomofo.match(/[ˊˇˋ˙]/);
            if (toneMatch) {
                const tone = toneMatch[0];
                const base = bopomofo.replace(tone, '');
                return `
                <div class="flex flex-row">
                    <span class="text-4xl font-sans text-gray-600 font-bold tracking-widest" style="writing-mode: vertical-lr; text-orientation: upright;">${base}</span>
                    <div class="flex flex-col justify-center ml-1">
                        <span class="text-[36px] font-sans text-gray-600 font-bold leading-none">${tone}</span>
                    </div>
                </div>`;
            } else {
                return `<span class="text-4xl font-sans text-gray-600 font-bold tracking-widest" style="writing-mode: vertical-lr; text-orientation: upright;">${bopomofo}</span>`;
            }
        }

        // 建立單張學習單的 DOM
        function createCardElement(char, data, imageUrl) {
            const card = document.createElement('div');
            card.className = 'a5-card flex p-6 box-border border-4 border-gray-100'; // 加上內邊距與邊框模擬紙張質感
            card.setAttribute('data-char', char); // 紀錄生字，供下載檔名使用
            
            const blankPhrase1 = createBlankPhrase(data.phrases[0] || '', char);
            const blankPhrase2 = createBlankPhrase(data.phrases[1] || '', char);

            card.innerHTML = `
                <!-- 左側：佔 40% (2/5) -->
                <div class="w-2/5 border-r-2 border-dashed border-gray-300 pr-6 flex flex-col">
                    <!-- 左上：生字與注音 -->
                    <div class="h-2/5 flex justify-center items-center border-b-2 border-dashed border-gray-300 pb-4 relative">
                        <div class="flex items-center gap-8 pr-6 relative"> <!-- 增加間距避免聲調被切到 -->
                            <!-- 靜態生字 (原本的版本) -->
                            <span class="serif-font text-[110px] leading-none font-bold text-gray-800 relative -top-[10px]">${char}</span>
                            ${formatBopomofo(data.bopomofo)}
                        </div>
                    </div>
                    <!-- 左下：生字意義插圖 -->
                    <div class="h-3/5 flex flex-col items-center pt-4 pb-2">
                        <span class="text-sm text-gray-400 mb-2 font-bold tracking-widest shrink-0">【看圖認字】</span>
                        <div class="w-full flex-1 relative flex items-center justify-center rounded-xl overflow-hidden bg-white">
                            ${imageUrl ? `<img src="${imageUrl}" alt="${char}的插圖" class="absolute inset-0 w-full h-full object-contain" style="transform: scale(1.2);">` : `<div class="text-gray-300">圖片生成失敗</div>`}
                        </div>
                    </div>
                </div>

                <!-- 右側：佔 60% (3/5) -->
                <div class="w-3/5 pl-6 flex flex-col gap-3 justify-between h-full">
                    
                    <!-- 右上：練習寫字與部首筆畫 (加上 flex-1 讓空間變大) -->
                    <div class="flex-1 flex items-center justify-between bg-orange-50 rounded-xl p-4 border border-orange-100">
                        <div class="flex gap-4">
                            <!-- 練習框 1 -->
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-xs text-gray-500 font-bold">練習寫</span>
                                <div class="tian-zi-ge bg-white shadow-inner"></div>
                            </div>
                            <!-- 練習框 2 -->
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-xs text-gray-500 font-bold">練習寫</span>
                                <div class="tian-zi-ge bg-white shadow-inner"></div>
                            </div>
                        </div>
                        <!-- 放大部首與筆畫區域：text-[22px] -> text-[28px], text-[17px] -> text-[22px] -->
                        <div class="flex flex-col gap-3 text-[28px] font-bold text-gray-700 bg-white p-4 rounded-lg shadow-sm border border-gray-100 justify-center">
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded text-[22px]">部首</span>
                                <span>${data.radical}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 bg-green-100 text-green-700 rounded text-[22px]">筆畫</span>
                                <span>${data.strokes} 畫</span>
                            </div>
                        </div>
                    </div>

                    <!-- 右中：造詞填空 (移除 flex-grow，改為同行水平排列) -->
                    <div class="bg-blue-50 rounded-xl p-3 border border-blue-100 flex flex-col justify-center">
                        <h3 class="text-md font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1 inline-block w-max">✏️ 造詞填空</h3>
                        <div class="flex flex-row justify-around items-center text-2xl font-bold text-gray-800 tracking-wider">
                            <div>1. <span class="ml-2">${blankPhrase1}</span></div>
                            <div>2. <span class="ml-2">${blankPhrase2}</span></div>
                        </div>
                    </div>

                    <!-- 右下：造句找字 (加上 flex-1 讓空間變大，稍微放大字體) -->
                    <div class="flex-1 bg-green-50 rounded-xl p-4 border border-green-100 flex flex-col justify-center">
                        <h3 class="text-md font-bold text-green-800 mb-2 border-b border-green-200 pb-1 inline-block w-max">🔍 找出句子中的「${char}」</h3>
                        <p class="text-2xl font-medium text-gray-800 leading-relaxed tracking-wide pt-2">
                            ${data.sentence}
                        </p>
                    </div>

                </div>
            `;
            return card;
        }

        // 提取並過濾輸入的生字
        function getUniqueChars(input) {
            // 移除空白，並轉為陣列，過濾非中文字符，最後去重
            const chars = input.replace(/\s+/g, '').split('');
            const chineseRegex = /^[\u4e00-\u9fa5]+$/;
            const validChars = chars.filter(c => chineseRegex.test(c));
            return [...new Set(validChars)];
        }

        function setStatus(msg, isLoading = false) {
            if (isLoading) {
                statusMsg.innerHTML = `<div class="loader mr-2"></div> ${msg}`;
            } else {
                statusMsg.innerHTML = msg;
            }
        }

        // 主要生成流程
        btnGenerate.addEventListener('click', async () => {
            const chars = getUniqueChars(charInput.value);
            
            if (chars.length === 0) {
                alert("請輸入至少一個繁體中文字！");
                return;
            }

            // 鎖定按鈕
            btnGenerate.disabled = true;
            btnClear.disabled = true;
            btnDownload.disabled = true;
            btnDownloadPdf.disabled = true; // 鎖定 PDF 按鈕
            cardsContainer.innerHTML = ''; // 清空先前結果
            
            try {
                for (let i = 0; i < chars.length; i++) {
                    const char = chars[i];
                    setStatus(`正在製作「${char}」的魔法圖卡... (${i+1}/${chars.length})`, true);

                    // 平行發送 Text 與 Image API 請求以加速
                    const [wordData, imageUrl] = await Promise.all([
                        fetchWordData(char).catch(e => {
                            console.error(`Text API error for ${char}:`, e);
                            return { bopomofo: "讀音", radical: "未知", strokes: "?", phrases: ["造詞失敗", "造詞失敗"], sentence: "造句生成失敗，請稍後再試。" };
                        }),
                        fetchWordImage(char).catch(e => {
                            console.error(`Image API error for ${char}:`, e);
                            return null; // 回傳 null 讓 UI 顯示替代文字
                        })
                    ]);

                    const cardDom = createCardElement(char, wordData, imageUrl);
                    cardsContainer.appendChild(cardDom);
                }
                
                setStatus(`🎉 製作完成！共生成 ${chars.length} 張學習單。`);
                btnDownload.disabled = false; // 啟用 PNG 下載
                btnDownloadPdf.disabled = false; // 啟用 PDF 下載
                
            } catch (error) {
                console.error(error);
                setStatus(`<span class="text-red-600">發生錯誤：${error.message}</span>`);
            } finally {
                // 解鎖按鈕
                btnGenerate.disabled = false;
                btnClear.disabled = false;
            }
        });

        // 下載：將網頁上的圖卡轉為獨立 PNG 並下載
        btnDownload.addEventListener('click', async () => {
            const cards = document.querySelectorAll('.a5-card');
            if (cards.length === 0) return;

            // 鎖定按鈕並顯示 Loading
            const originalContent = btnDownload.innerHTML;
            btnDownload.disabled = true;
            btnDownload.innerHTML = `<div class="loader mr-2" style="width: 20px; height: 20px; border-width: 3px;"></div> 處理圖檔中...`;
            setStatus(`正在準備下載 ${cards.length} 張圖卡...`, true);

            try {
                for (let i = 0; i < cards.length; i++) {
                    const card = cards[i];
                    const char = card.getAttribute('data-char');
                    
                    setStatus(`正在下載「${char}」的圖卡... (${i+1}/${cards.length})`, true);

                    // 使用 html2canvas 將 DOM 轉為 Canvas (放大 2 倍確保高畫質)
                    const canvas = await html2canvas(card, {
                        scale: 2, 
                        backgroundColor: '#ffffff',
                        useCORS: true 
                    });

                    // 將 Canvas 轉為 Base64 圖片資料
                    const imgData = canvas.toDataURL('image/png');
                    
                    // 建立一個虛擬的連結 (a tag) 來自動觸發檔案下載
                    const link = document.createElement('a');
                    link.download = `生字圖卡_${char}.png`; // 自動命名檔案
                    link.href = imgData;
                    link.click();
                    
                    // 暫停 0.5 秒，避免瀏覽器以為是惡意彈窗而阻擋多個檔案下載
                    await delay(500);
                }
                setStatus(`✅ 成功下載 ${cards.length} 張圖卡！每個生字已儲存為獨立的 PNG 檔案。`);
            } catch (error) {
                console.error("下載圖片發生錯誤:", error);
                setStatus(`<span class="text-red-600">下載失敗：請稍後再試。</span>`);
                alert("圖片下載失敗，請重試！");
            } finally {
                // 還原按鈕狀態
                btnDownload.disabled = false;
                btnDownload.innerHTML = originalContent;
            }
        });

        // 下載 (PDF/列印) 功能
        btnDownloadPdf.addEventListener('click', async () => {
            const cards = document.querySelectorAll('.a5-card');
            if (cards.length === 0) return;

            // 鎖定按鈕並顯示 Loading
            const originalContent = btnDownloadPdf.innerHTML;
            btnDownloadPdf.disabled = true;
            btnDownloadPdf.innerHTML = `<div class="loader mr-2" style="width: 20px; height: 20px; border-width: 3px;"></div> 產生 PDF 中...`;
            setStatus(`正在製作 PDF 文件，請稍候...`, true);

            try {
                // 確保 jsPDF 已載入
                const { jsPDF } = window.jspdf;
                // 建立 A5 橫向 PDF (Landscape, mm單位, A5格式)
                const doc = new jsPDF('l', 'mm', 'a5');
                const pageWidth = 210;
                const pageHeight = 148;

                for (let i = 0; i < cards.length; i++) {
                    const card = cards[i];
                    setStatus(`正在處理第 ${i+1}/${cards.length} 頁...`, true);

                    // 將 DOM 轉為 Canvas (維持 scale: 2 確保清晰度)
                    const canvas = await html2canvas(card, {
                        scale: 2, 
                        backgroundColor: '#ffffff',
                        useCORS: true 
                    });

                    const imgData = canvas.toDataURL('image/png');

                    // 如果不是第一頁，就新增一頁
                    if (i > 0) {
                        doc.addPage();
                    }

                    // 將圖片貼到 PDF 上 (x:0, y:0, 寬:210, 高:148)
                    doc.addImage(imgData, 'PNG', 0, 0, pageWidth, pageHeight);
                }

                // 直接下載檔案
                doc.save('生字魔法圖卡_全.pdf');
                setStatus(`✅ PDF 下載完成！`);

            } catch (error) {
                console.error("PDF 產生失敗:", error);
                setStatus(`<span class="text-red-600">PDF 下載失敗，請稍後再試。</span>`);
                alert("PDF 製作失敗，請重試！");
            } finally {
                // 還原按鈕狀態
                btnDownloadPdf.disabled = false;
                btnDownloadPdf.innerHTML = originalContent;
            }
        });

        // 清除功能
        btnClear.addEventListener('click', () => {
            charInput.value = '';
            cardsContainer.innerHTML = '';
            statusMsg.innerHTML = '';
            btnDownload.disabled = true;
            btnDownloadPdf.disabled = true; // 停用 PDF 按鈕
        });

    </script>
</body>
</html>
