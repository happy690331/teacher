<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生字圖卡產生器</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入中文字體 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>

    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel (用來在瀏覽器中直接解析 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- React 應用程式的掛載點 -->
    <div id="root"></div>

    <!-- 核心 React 程式碼 -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 內建 SVG 圖示元件
        const BookOpen = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>);
        const Sparkles = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>);
        const Loader2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
        const Trash2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const Download = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
        const ImageIcon = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>);
        const Pencil = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>);
        const Type = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>);
        const Search = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>);

        const App = () => {
          const apiKey = ""; 
          
          const [inputText, setInputText] = useState('第一課\n障礙');
          const [lessonName, setLessonName] = useState('第一課');
          const [cards, setCards] = useState([]);
          const [isGenerating, setIsGenerating] = useState(false);
          const [loadingStep, setLoadingStep] = useState('');
          const [html2canvasLoaded, setHtml2canvasLoaded] = useState(false);

          useEffect(() => {
            const script = document.createElement('script');
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
            script.async = true;
            script.onload = () => setHtml2canvasLoaded(true);
            document.body.appendChild(script);

            return () => {
              if (document.body.contains(script)) {
                document.body.removeChild(script);
              }
            };
          }, []);

          // 加入指數退避機制的 API 呼叫函式
          const fetchDictionaryData = async (char) => {
            const prompt = `
              你是一個專業的繁體中文小學國語字典。
              請針對生字：「${char}」提供以下資訊，用於製作教學學習單。
              
              請嚴格按照以下 JSON 格式回傳，不要有其他 markdown 標記：
              {
                "character": "${char}",
                "zhuyin": "注音符號 (例如 ㄓㄤˋ)",
                "radical": "部首 (例如 阜)",
                "strokes": "總筆畫數 (數字，例如 14)",
                "definition": "簡單定義",
                "words": ["詞語1", "詞語2"], // 必須是包含該生字且長度為「兩個字」的詞語
                "sentence": "一個適合小學生閱讀，且包含「${char}」這個字的完整造句 (長度適中，約15-20字)。",
                "imagePrompt": "產生圖片用的英文提示詞。請用英文描述一個具體、簡單、沒有文字的畫面來表達這個字的意思。例如：'A boy jumping over a rock'。絕對不要提到 character, word, sign, text 等字眼。"
              }
            `;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { responseMimeType: "application/json" }
            };

            let delay = 1000;
            for (let i = 0; i <= 5; i++) {
              try {
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });

                if (response.ok) {
                  const data = await response.json();
                  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                  return JSON.parse(text);
                }
              } catch (error) {
                // 不在 console 顯示重複嘗試的錯誤
              }
              
              if (i < 5) {
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2; 
              }
            }
            throw new Error(`無法取得「${char}」的文字資訊，伺服器可能繁忙中。`);
          };

          // 全新設計的圖片生成邏輯：強制使用純英文情境描述，保證無字
          const generateImage = async (imagePrompt, char) => {
            const promptText = `A simple, cute, flat vector style children's book illustration of: ${imagePrompt}. Clean white background, highly visual. ABSOLUTELY NO TEXT, NO LETTERS, NO WORDS, NO NUMBERS ALLOWED.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = {
              instances: [{ prompt: promptText }], 
              parameters: { sampleCount: 1 }
            };

            let delay = 1000;
            for (let i = 0; i <= 3; i++) {
              try {
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });

                if (response.ok) {
                  const data = await response.json();
                  const base64Image = data.predictions?.[0]?.bytesBase64Encoded;
                  if (base64Image) {
                    return `data:image/png;base64,${base64Image}`;
                  }
                } else {
                  console.warn(`Imagen API warning for ${char}:`, await response.text());
                }
              } catch (error) {
                console.warn("Imagen API network error");
              }
              
              if (i < 3) {
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2; 
              }
            }
            
            // 如果連試幾次都失敗（通常是遇到無法具象化的抽象詞彙或被安全機制阻擋），
            // 回傳 null 讓 UI 顯示無法生成的圖示，保證程式不崩潰。
            console.error(`產生「${char}」的圖片完全失敗。`);
            return null;
          };

          const handleGenerate = async () => {
            const lines = inputText.trim().split('\n').filter(line => line.trim() !== '');
            
            if (lines.length === 0) return;

            let parsedLessonName = "自訂生字";
            let charsToProcess = inputText;

            if (lines.length > 1) {
              parsedLessonName = lines[0].trim();
              charsToProcess = lines.slice(1).join('');
            } else {
              charsToProcess = lines[0];
            }

            const charList = charsToProcess.replace(/\s+/g, '').split('');
            
            if (charList.length === 0) return;

            setLessonName(parsedLessonName);
            setIsGenerating(true);
            setCards([]); 

            const newCards = [];

            for (const char of charList) {
              const cleanChar = char;
              
              try {
                setLoadingStep(`正在分析生字：「${cleanChar}」...`);
                const dictData = await fetchDictionaryData(cleanChar);
                
                setLoadingStep(`正在繪製插圖：「${cleanChar}」...`);
                // 使用 AI 分析出來的純英文情境描述來畫圖
                const safeImagePrompt = dictData.imagePrompt || `A simple object related to the concept of ${dictData.definition}`;
                const imageUrl = await generateImage(safeImagePrompt, cleanChar);

                newCards.push({
                  id: Date.now() + Math.random(),
                  ...dictData,
                  imageUrl: imageUrl
                });
                
                setCards([...newCards]);

              } catch (err) {
                console.error(err);
                alert(`處理生字「${cleanChar}」時發生問題：\n${err.message}`);
              }
            }

            setIsGenerating(false);
            setLoadingStep('');
          };

          const handleClear = () => {
            setInputText('');
            setCards([]);
          };

          const downloadAll = async () => {
            if (!window.html2canvas) {
              alert("下載元件尚未載入，請稍後再試。");
              return;
            }

            const cardElements = document.querySelectorAll('.flashcard-container');
            
            if (cardElements.length === 0) {
              alert("沒有可下載的卡片");
              return;
            }

            await new Promise(resolve => setTimeout(resolve, 300));

            for (let i = 0; i < cardElements.length; i++) {
              const element = cardElements[i];
              const char = element.dataset.char || `card_${i}`;
              
              try {
                const canvas = await window.html2canvas(element, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    onclone: (clonedDoc) => {
                       const textElements = clonedDoc.querySelectorAll('.tian-zi-ge-text-span');
                       textElements.forEach(el => {
                           el.style.transform = 'translateY(-35%)'; 
                           el.style.display = 'block';
                       });

                       const sentenceParagraphs = clonedDoc.querySelectorAll('.sentence-container p');
                       sentenceParagraphs.forEach(el => {
                           el.style.lineHeight = '1.3'; 
                           el.style.paddingBottom = '0px';
                           el.style.marginBottom = '0px';
                       });
                    }
                });
                
                const link = document.createElement('a');
                link.download = `${lessonName}生字圖卡_${char}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link); 
                link.click();
                document.body.removeChild(link);
              } catch (e) {
                console.error("Download failed", e);
                alert(`下載「${char}」時發生錯誤，請重試`);
              }
            }
          };

          return (
            <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
              <div className="max-w-6xl mx-auto mb-8 space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <h1 className="text-3xl font-bold text-gray-800 mb-2 flex items-center gap-2">
                    <BookOpen className="text-blue-600" />
                    AI 生字學習單產生器
                  </h1>
                  <p className="text-gray-500 mb-6">
                    依照指定格式生成：包含筆畫練習、語詞填空與句子練習 (15:9 窄版格式)
                  </p>

                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">輸入內容 (第一行為課數，第二行起為生字)</label>
                      <textarea
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        placeholder="第一課&#10;障礙"
                        className="w-full h-24 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all resize-none text-xl"
                      />
                    </div>

                    <div className="flex gap-3">
                      <button
                        onClick={handleGenerate}
                        disabled={isGenerating}
                        className={`flex-1 flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-white font-medium transition-all ${
                          isGenerating
                            ? 'bg-gray-300 cursor-not-allowed' 
                            : 'bg-blue-600 hover:bg-blue-700 shadow-lg hover:shadow-xl'
                        }`}
                      >
                        {isGenerating ? (
                          <><Loader2 className="animate-spin" /> {loadingStep}</>
                        ) : (
                          <><Sparkles size={20} /> 開始製作</>
                        )}
                      </button>

                      <button 
                        onClick={handleClear}
                        className="flex items-center justify-center gap-2 px-6 py-3 rounded-xl bg-gray-500 text-white font-medium hover:bg-gray-600 shadow-lg hover:shadow-xl transition-all"
                      >
                        <Trash2 size={20} /> 清除內容
                      </button>

                      {cards.length > 0 && (
                        <button
                          onClick={downloadAll}
                          disabled={!html2canvasLoaded}
                          className={`flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-white font-medium shadow-lg hover:shadow-xl transition-all ${
                            html2canvasLoaded 
                              ? 'bg-green-600 hover:bg-green-700' 
                              : 'bg-gray-400 cursor-not-allowed'
                          }`}
                        >
                          <Download size={20} /> {html2canvasLoaded ? '全部下載' : '載入中...'}
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              </div>

              <div className="max-w-6xl mx-auto grid grid-cols-1 gap-8 pb-20">
                {cards.map((card) => (
                  <Flashcard key={card.id} data={card} />
                ))}
              </div>
            </div>
          );
        };

        const TianZiGe = ({ char, size = "large", showChar = true, noBorder = false, customFontSize, showCross = true }) => { 
          const borderColor = size === 'small' ? 'border-red-300' : 'border-red-400';
          
          if (noBorder) {
            return (
              <div className="relative box-border flex items-center justify-center w-full h-full">
                <div 
                  className="flex items-center justify-center text-black font-serif"
                  style={{ 
                    fontSize: 'clamp(100px, 18vw, 220px)', 
                    fontFamily: '"Noto Serif TC", "PMingLiU", "MingLiU", serif', 
                    lineHeight: 1, 
                  }}
                >
                  <span className="tian-zi-ge-text-span" style={{ display: 'block' }}>{char}</span>
                </div>
              </div>
            );
          }

          const fontSize = customFontSize || (size === 'small' ? '24px' : 'clamp(100px, 18vw, 200px)');

          return (
            <div className={`relative border border-red-600 bg-white box-border ${size === 'small' ? 'border-[1px]' : 'border-[3px]'}`} 
                 style={{ aspectRatio: '1/1', width: '100%' }}>
              
              {showCross && (
                <div className={`absolute top-1/2 left-0 w-full h-px border-t ${borderColor} border-dashed transform -translate-y-1/2`}></div>
              )}
              {showCross && (
                <div className={`absolute left-1/2 top-0 h-full w-px border-l ${borderColor} border-dashed transform -translate-x-1/2`}></div>
              )}
              
              <div className="absolute inset-0 flex items-center justify-center z-10 w-full h-full">
                {showChar && char && (
                  <span
                    className="tian-zi-ge-text-span"
                    style={{ 
                      fontSize: fontSize, 
                      fontFamily: '"Noto Serif TC", "PMingLiU", "MingLiU", serif',
                      lineHeight: 1,
                      display: 'block',
                      textAlign: 'center',
                    }}
                  >
                    {char}
                  </span>
                )}
              </div>
            </div>
          );
        };

        const ZhuyinDisplay = ({ zhuyin }) => {
          const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
          let tone = '';
          let symbols = '';

          for (const char of zhuyin) {
            if (tones.includes(char)) {
              tone = char;
            } else {
              symbols += char;
            }
          }

          return (
            <div className="relative h-full flex items-center">
              <div className="text-4xl font-serif font-medium tracking-widest text-black" style={{writingMode: 'vertical-rl'}}>
                {symbols}
              </div>
              {tone && (
                <div className="absolute left-full top-1/2 transform -translate-y-1/2 ml-1 text-3xl font-serif text-black">
                  {tone}
                </div>
              )}
            </div>
          );
        };

        const Flashcard = ({ data }) => {
          const boxStyle = { width: '5.5rem', height: '5.5rem' }; 

          return (
            <div className="flex justify-center">
              <div 
                className="flashcard-container bg-white shadow-xl overflow-hidden flex border-2 border-gray-800"
                data-char={data.character}
                style={{
                  width: '100%',
                  maxWidth: '800px',
                  aspectRatio: '15/9', 
                }}
              >
                <div className="w-[40%] flex flex-col border-r-2 border-gray-800">
                  <div className="h-[50%] flex items-center justify-center p-4 border-b-2 border-gray-800 relative bg-white">
                    <div className="flex items-center gap-2 w-full justify-center pl-2">
                       <div className="w-[65%] flex items-center justify-center aspect-square">
                         <TianZiGe char={data.character} size="large" noBorder={true} />
                       </div>
                       <ZhuyinDisplay zhuyin={data.zhuyin} />
                    </div>
                  </div>

                  <div className="h-[50%] p-4 bg-white flex items-center justify-center overflow-hidden">
                     {data.imageUrl ? (
                       <img 
                          src={data.imageUrl} 
                          alt="illustration" 
                          className="w-full h-full" 
                          style={{ 
                            objectFit: 'contain',
                            transform: 'scale(1.2)', 
                            transformOrigin: 'center center'
                          }}
                       />
                     ) : (
                       <div className="flex flex-col items-center text-gray-300">
                         <ImageIcon size={40} />
                         <span className="text-xs mt-2 text-center px-2">無法生成圖片<br/>(概念抽象或含敏感詞)</span>
                       </div>
                     )}
                  </div>
                </div>

                <div className="w-[60%] flex flex-col">
                  <div className="h-[36%] border-b-2 border-gray-800 p-4 flex flex-col justify-center">
                     <div className="flex items-center gap-2 mb-2">
                       <Pencil size={18} className="text-gray-700" />
                       <span className="font-bold text-gray-800 text-sm">練習寫生字</span>
                     </div>
                     <div className="flex items-center justify-between">
                        <div className="flex justify-start w-[55%] pl-4 gap-2">
                          <div style={boxStyle}>
                            <TianZiGe size="small" showChar={false} />
                          </div>
                          <div style={boxStyle}>
                            <TianZiGe size="small" showChar={false} />
                          </div>
                        </div>
                        <div className="flex flex-col justify-center gap-2 text-black font-serif border-l border-gray-300 pl-6 w-[40%]">
                           <div className="flex items-baseline gap-2">
                              <span className="text-xl text-gray-600">部首:</span>
                              <span className="font-bold text-3xl">{data.radical}</span>
                           </div>
                           <div className="flex items-baseline gap-2">
                              <span className="text-xl text-gray-600">筆畫:</span>
                              <span className="font-bold text-3xl">{data.strokes}</span>
                           </div>
                        </div>
                     </div>
                  </div>

                  <div className="h-[32%] border-b-2 border-gray-800 p-4 flex flex-col justify-center bg-gray-50/30">
                     <div className="flex items-center gap-2 mb-3">
                       <Type size={18} className="text-gray-700" />
                       <span className="font-bold text-gray-800 text-sm">語詞填空</span>
                     </div>
                     <div className="flex justify-around items-center">
                       {data.words && data.words.filter(word => word.length <= 2).slice(0, 2).map((word, idx) => {
                         return (
                           <div key={idx} className="flex items-center">
                             {word.split('').map((char, charIdx) => {
                               const isTarget = char === data.character;
                               return (
                                 <div key={charIdx} style={boxStyle}>
                                   <TianZiGe 
                                     size="small" 
                                     char={char} 
                                     showChar={!isTarget} 
                                     customFontSize="3.5rem"
                                     showCross={false} 
                                   />
                                 </div>
                               );
                             })}
                           </div>
                         );
                       })}
                     </div>
                  </div>

                  <div className="h-[32%] p-3 flex flex-col justify-start pt-2 sentence-container relative" style={{ zIndex: 50 }}>
                     <div className="flex items-center gap-2 mb-1">
                       <Search size={16} className="text-gray-700" />
                       <span className="font-bold text-gray-800 text-xs">找出句子中的「{data.character}」字</span>
                     </div>
                     <div className="flex-1 flex items-start"> 
                       <p className="text-lg font-serif leading-normal text-gray-800 tracking-wide">
                         {data.sentence || "造句生成中..."}
                       </p>
                     </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
