<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>騎士數學防禦戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            touch-action: none; /* 防止手機瀏覽器預設手勢 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* 防止選取文字影響遊戲體驗 */
        }
        canvas {
            display: block;
        }
        /* UI 覆蓋層共用樣式 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 30;
        }
        .hidden {
            display: none !important;
        }
        .panel {
            background: #2d3748;
            border: 4px solid #4a5568;
            border-radius: 1rem;
            padding: 2rem;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 400px;
        }
        /* 虛擬搖桿畫布 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 讓點擊可以穿透，但在 JS 中動態調整 */
            z-index: 5;
        }
        /* 客製化核取方塊樣式 */
        .checkbox-label {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .checkbox-label input {
            margin-right: 0.75rem;
            width: 1.2rem;
            height: 1.2rem;
        }
        /* 數字按鈕點擊效果 */
        .num-btn:active {
            transform: scale(0.95);
            background-color: #4B5563;
        }
    </style>
</head>
<body>

    <!-- 遊戲主要畫布 -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- UI 畫布 (用於畫搖桿等不隨鏡頭移動的元素) -->
    <canvas id="ui-layer"></canvas>

    <!-- 遊戲內抬頭顯示器 -->
    <div id="hud" class="absolute top-0 left-0 w-full p-4 pointer-events-none z-10 hidden flex justify-between items-start text-white font-bold drop-shadow-md">
        <div class="text-xl">
            <div class="text-red-400">HP: <span id="hp-display">100</span></div>
            <div class="text-yellow-400">武器數: <span id="weapon-display">1</span></div>
        </div>
        
        <!-- 上方控制按鈕 -->
        <div class="flex gap-3 pointer-events-auto">
            <button id="pause-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full font-bold shadow-lg border-2 border-blue-400 transition transform active:scale-95">
                暫停
            </button>
            <button id="reselect-btn" class="bg-purple-600 hover:bg-purple-500 text-white px-5 py-2 rounded-full font-bold shadow-lg border-2 border-purple-400 transition transform active:scale-95">
                重選題型
            </button>
        </div>

        <div class="text-right text-xl">
            <div class="text-green-400">關卡: <span id="level-display">1</span></div>
            <div>擊殺: <span id="score-display">0</span> <span id="level-target" class="text-sm text-gray-300">/ 30</span></div>
        </div>
    </div>

    <!-- 開始選單 -->
    <div id="start-menu" class="overlay">
        <div class="panel flex flex-col max-h-screen overflow-y-auto">
            <h1 class="text-3xl font-bold text-center mb-6 text-yellow-400 tracking-wider">騎士數學防禦戰</h1>
            <p class="text-gray-300 mb-4 text-center">選擇你要挑戰的知識節點類型：</p>
            
            <div class="flex flex-col mb-6 bg-gray-800 p-4 rounded-lg">
                <label class="checkbox-label">
                    <input type="checkbox" value="add1" checked> 一位數加一位數
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" value="add2"> 二位數加一位數
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" value="sub2"> 二位數減一位數
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" value="mul"> 九九乘法
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" value="div"> 二位數除以一位數 (整除)
                </label>
            </div>

            <!-- 新增上傳圖片功能 -->
            <div class="mb-6 bg-gray-800 p-4 rounded-lg flex flex-col items-center">
                <p class="text-gray-300 mb-2">專屬騎士頭像 (拍照或上傳，選填)：</p>
                <div class="flex items-center gap-4">
                    <label class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg cursor-pointer transition transform active:scale-95">
                        選擇照片 / 拍照
                        <input type="file" id="player-img-upload" accept="image/*" class="hidden">
                    </label>
                    <img id="player-img-preview" class="w-16 h-16 rounded-full object-cover hidden border-2 border-yellow-400">
                </div>
            </div>

            <p id="start-error" class="text-red-400 text-sm mb-2 text-center hidden">請至少選擇一種題目類型！</p>
            
            <button id="start-btn" class="bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-3 px-6 rounded-lg text-xl transition transform hover:scale-105 active:scale-95">
                開始戰鬥
            </button>
        </div>
    </div>

    <!-- 暫停選單 -->
    <div id="pause-modal" class="overlay hidden">
        <div class="panel flex flex-col items-center">
            <h2 class="text-3xl font-bold text-white mb-6">遊戲暫停</h2>
            <button id="resume-btn" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold py-3 px-4 rounded-lg text-xl mb-4 transition transform active:scale-95">
                繼續遊戲
            </button>
            <button id="restart-from-pause-btn" class="w-full bg-red-500 hover:bg-red-400 text-white font-bold py-3 px-4 rounded-lg text-xl transition transform active:scale-95">
                放棄並重新開始
            </button>
        </div>
    </div>

    <!-- 數學問題彈窗 (數字九宮格) -->
    <div id="math-modal" class="overlay hidden">
        <div class="panel flex flex-col items-center p-4">
            <h2 class="text-xl font-bold text-blue-400 mb-1">觸發知識節點！</h2>
            <p class="text-gray-300 mb-4 text-sm">答對即可增加一個旋轉武器</p>
            
            <div id="question-text" class="text-4xl font-mono font-bold text-white mb-2 tracking-widest text-center">
                5 + 5 = ?
            </div>

            <!-- 顯示玩家輸入的答案 -->
            <div id="answer-display" class="w-3/4 h-12 flex items-center justify-center text-3xl font-bold bg-gray-700 text-yellow-300 border-2 border-blue-500 rounded mb-4">
            </div>

            <!-- 九宮格數字鍵盤 -->
            <div class="grid grid-cols-3 gap-2 w-full max-w-xs mb-4">
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(1)">1</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(2)">2</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(3)">3</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(4)">4</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(5)">5</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(6)">6</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(7)">7</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(8)">8</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(9)">9</button>
                <button class="bg-red-500 hover:bg-red-400 text-white font-bold py-3 text-lg rounded active:scale-95" onclick="clearInput()">清除</button>
                <button class="num-btn bg-gray-600 text-white font-bold py-3 text-2xl rounded" onclick="inputNum(0)">0</button>
                <button class="bg-green-500 hover:bg-green-400 text-white font-bold py-3 text-lg rounded active:scale-95" onclick="submitAnswer()">確定</button>
            </div>
            
            <button id="skip-btn" class="w-full bg-gray-500 hover:bg-gray-400 text-white font-bold py-2 rounded-lg transition">
                放棄此題
            </button>
            <p id="math-feedback" class="mt-2 text-lg font-bold h-6"></p>
        </div>
    </div>

    <!-- 遊戲結束彈窗 -->
    <div id="game-over-modal" class="overlay hidden">
        <div class="panel flex flex-col items-center">
            <h1 class="text-4xl font-bold text-red-500 mb-4">騎士陣亡</h1>
            <p class="text-xl mb-2">生存時間: <span id="time-survived" class="text-yellow-400">0</span> 秒</p>
            <p class="text-xl mb-2">抵達關卡: <span id="final-level" class="text-yellow-400">1</span></p>
            <p class="text-xl mb-6">擊敗敵人: <span id="final-score" class="text-yellow-400">0</span></p>
            
            <button id="restart-btn" class="bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 px-8 rounded-lg text-xl transition transform hover:scale-105">
                重新開始
            </button>
        </div>
    </div>

<script>
    // --- 遊戲核心變數 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiCanvas = document.getElementById('ui-layer');
    const uiCtx = uiCanvas.getContext('2d');

    // 無盡模式生成參數
    const SPAWN_DIST = 1500;
    const MAX_DIST = 2000;

    // UI 元素
    const startMenu = document.getElementById('start-menu');
    const mathModal = document.getElementById('math-modal');
    const gameOverModal = document.getElementById('game-over-modal');
    const pauseModal = document.getElementById('pause-modal');
    const hud = document.getElementById('hud');
    
    // 遊戲狀態
    let gameState = 'menu'; // menu, playing, paused, paused_math, gameover
    let lastTime = 0;
    let gameTimer = 0;
    let score = 0;
    let level = 1;
    let selectedMathTypes = [];
    let userAnswerString = ""; // 九宮格輸入字串
    let playerImage = null; // 儲存玩家上傳的圖片

    // 環境物件
    let rocks = [];
    let trees = [];

    // 虛擬搖桿狀態
    const joystick = {
        active: false, touchId: null,
        baseX: 120, baseY: 0, // baseY會在resize中計算
        currentX: 120, currentY: 0,
        dirX: 0, dirY: 0,
        radius: 60, handleRadius: 30
    };

    // 視窗大小調整
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        uiCanvas.width = window.innerWidth;
        uiCanvas.height = window.innerHeight;
        
        // 更新搖桿位置 (更靠右下角邊緣，減少畫面遮擋)
        joystick.baseX = window.innerWidth - 80;
        joystick.baseY = window.innerHeight - 80;
        joystick.currentX = joystick.baseX;
        joystick.currentY = joystick.baseY;
    }
    window.addEventListener('resize', resize);
    resize();

    // 攝影機 (跟隨玩家)
    const camera = { x: 0, y: 0 };

    // --- 遊戲實體 ---
    let player = {
        x: 0, y: 0, // 改從 0,0 開始，無盡地圖
        radius: 20,
        speed: 200,
        hp: 100, maxHp: 100,
        color: '#3B82F6',
        weaponCount: 1,
        weaponRadius: 80,
        weaponSpeed: 3,
        weaponAngle: 0
    };

    let enemies = [];
    let treasures = [];
    let damageTexts = [];

    // 輸入控制 (使用單一按鍵狀態，避免中文輸入法干擾)
    const keys = { w: false, a: false, s: false, d: false };

    // 數學題目相關變數
    let currentQuestion = null;
    let currentTreasureIndex = -1;

    // --- 處理玩家上傳圖片 ---
    document.getElementById('player-img-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    playerImage = img;
                    const preview = document.getElementById('player-img-preview');
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // --- 產生環境物件 ---
    function createRock(x, y) {
        let r = 30 + Math.random() * 40;
        let numVertices = 6 + Math.floor(Math.random() * 5); // 6 到 10 邊
        let vertices = [];
        for (let i = 0; i < numVertices; i++) {
            let angle = (i / numVertices) * Math.PI * 2;
            let dist = r * (0.7 + Math.random() * 0.6); // 產生不規則邊緣
            vertices.push({x: Math.cos(angle)*dist, y: Math.sin(angle)*dist});
        }
        return { x, y, radius: r, vertices };
    }

    function createTree(x, y) {
        return {
            x, y,
            radius: 30 + Math.random() * 30, // 樹木大小
            colorType: Math.random() > 0.5 ? '#166534' : '#14532D' // 兩種深綠色
        };
    }

    function generateEnvironment() {
        rocks = [];
        trees = [];
        // 初始產生玩家附近的環境
        for (let i = 0; i < 80; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.random() * SPAWN_DIST;
            rocks.push(createRock(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
        for (let i = 0; i < 150; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.random() * SPAWN_DIST;
            trees.push(createTree(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
    }

    // --- 初始化與重置 ---
    function initGame() {
        player.x = 0;
        player.y = 0;
        generateEnvironment();
        player.hp = player.maxHp;
        player.weaponCount = 1;
        player.weaponAngle = 0;
        enemies = [];
        treasures = [];
        damageTexts = [];
        score = 0;
        level = 1;
        gameTimer = 0;
        document.getElementById('level-target').textContent = "/ 30";
        updateHUD();
        
        uiCanvas.style.pointerEvents = 'auto';
    }

    // --- 輸入監聽 (支援鍵盤與觸控搖桿) ---
    // 使用 e.code 避免中文輸入法卡鍵問題
    window.addEventListener('keydown', e => { 
        if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
    });
    window.addEventListener('keyup', e => { 
        if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
    });

    // 虛擬搖桿控制綁定
    uiCanvas.addEventListener('touchstart', e => {
        if (gameState !== 'playing') return;
        Array.from(e.changedTouches).forEach(touch => {
            // 只要觸控在右半邊螢幕即啟動搖桿
            if (touch.clientX > window.innerWidth / 2) {
                joystick.active = true;
                joystick.touchId = touch.identifier;
                updateJoystickPos(touch.clientX, touch.clientY);
            }
        });
    }, { passive: false });

    uiCanvas.addEventListener('touchmove', e => {
        if (!joystick.active) return;
        e.preventDefault(); // 防止滾動
        Array.from(e.changedTouches).forEach(touch => {
            if (touch.identifier === joystick.touchId) {
                updateJoystickPos(touch.clientX, touch.clientY);
            }
        });
    }, { passive: false });

    const endJoystick = (e) => {
        Array.from(e.changedTouches).forEach(touch => {
            if (touch.identifier === joystick.touchId) {
                joystick.active = false;
                joystick.dirX = 0;
                joystick.dirY = 0;
                joystick.currentX = joystick.baseX;
                joystick.currentY = joystick.baseY;
            }
        });
    };
    uiCanvas.addEventListener('touchend', endJoystick);
    uiCanvas.addEventListener('touchcancel', endJoystick);

    function updateJoystickPos(x, y) {
        let dx = x - joystick.baseX;
        let dy = y - joystick.baseY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        // 限制把手移動範圍
        if (dist > joystick.radius) {
            joystick.currentX = joystick.baseX + (dx / dist) * joystick.radius;
            joystick.currentY = joystick.baseY + (dy / dist) * joystick.radius;
        } else {
            joystick.currentX = x;
            joystick.currentY = y;
        }

        // 設置方向向量，加入一點死區避免微小晃動
        if (dist > 10) {
            joystick.dirX = dx / dist;
            joystick.dirY = dy / dist;
        } else {
            joystick.dirX = 0;
            joystick.dirY = 0;
        }
    }

    // --- 數學邏輯 ---
    function generateMathQuestion() {
        const type = selectedMathTypes[Math.floor(Math.random() * selectedMathTypes.length)];
        let q = '', a = 0;
        switch (type) {
            case 'add1':
                q = `${Math.floor(Math.random()*9)+1} + ${Math.floor(Math.random()*9)+1}`; a = eval(q); break;
            case 'add2':
                q = `${Math.floor(Math.random()*90)+10} + ${Math.floor(Math.random()*9)+1}`; a = eval(q); break;
            case 'sub2':
                const a3 = Math.floor(Math.random()*90)+10, b3 = Math.floor(Math.random()*9)+1;
                q = `${a3} - ${b3}`; a = a3 - b3; break;
            case 'mul':
                q = `${Math.floor(Math.random()*8)+2} × ${Math.floor(Math.random()*8)+2}`; a = eval(q.replace('×', '*')); break;
            case 'div':
                const divisor = Math.floor(Math.random()*8)+2, ans = Math.floor(Math.random()*11)+2;
                q = `${divisor*ans} ÷ ${divisor}`; a = ans; break;
        }
        return { text: q, answer: a };
    }

    // --- 九宮格輸入控制 ---
    function updateAnswerDisplay() {
        document.getElementById('answer-display').textContent = userAnswerString;
    }
    function inputNum(num) {
        if(userAnswerString.length < 5) { // 限制長度
            userAnswerString += num;
            updateAnswerDisplay();
        }
    }
    function clearInput() {
        userAnswerString = "";
        updateAnswerDisplay();
    }
    function submitAnswer() {
        if(userAnswerString === "") return;
        const userAns = parseInt(userAnswerString, 10);
        if (userAns === currentQuestion.answer) {
            closeMathModal(true);
        } else {
            const fb = document.getElementById('math-feedback');
            fb.textContent = "答錯了！請再試一次或放棄。";
            fb.className = "mt-2 text-lg font-bold text-red-400 h-6 animate-pulse";
            clearInput();
        }
    }

    // --- UI 互動 ---
    document.getElementById('start-btn').addEventListener('click', () => {
        const checkboxes = document.querySelectorAll('#start-menu input[type="checkbox"]:checked');
        selectedMathTypes = Array.from(checkboxes).map(cb => cb.value);
        if (selectedMathTypes.length === 0) {
            document.getElementById('start-error').classList.remove('hidden');
            return;
        }
        document.getElementById('start-error').classList.add('hidden');
        startMenu.classList.add('hidden');
        hud.classList.remove('hidden');
        
        initGame();
        gameState = 'playing';
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    });

    document.getElementById('pause-btn').addEventListener('click', () => {
        if(gameState === 'playing') {
            gameState = 'paused';
            pauseModal.classList.remove('hidden');
            uiCanvas.style.pointerEvents = 'none';
        }
    });

    document.getElementById('resume-btn').addEventListener('click', () => {
        gameState = 'playing';
        pauseModal.classList.add('hidden');
        uiCanvas.style.pointerEvents = 'auto';
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    });

    document.getElementById('restart-from-pause-btn').addEventListener('click', () => {
        pauseModal.classList.add('hidden');
        initGame();
        gameState = 'playing';
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    });

    document.getElementById('reselect-btn').addEventListener('click', () => {
        gameState = 'menu';
        hud.classList.add('hidden');
        startMenu.classList.remove('hidden');
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        gameOverModal.classList.add('hidden');
        hud.classList.remove('hidden');
        initGame();
        gameState = 'playing';
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    });

    function closeMathModal(success) {
        const fb = document.getElementById('math-feedback');
        if (success) {
            fb.textContent = "正確！獲得新武器！";
            fb.className = "mt-2 text-lg font-bold text-green-400 h-6";
            player.weaponCount++;
            updateHUD();
        } else {
            fb.textContent = "放棄。寶物消失。";
            fb.className = "mt-2 text-lg font-bold text-gray-400 h-6";
        }

        setTimeout(() => {
            mathModal.classList.add('hidden');
            fb.textContent = "";
            clearInput();
            if (currentTreasureIndex > -1) treasures.splice(currentTreasureIndex, 1);
            uiCanvas.style.pointerEvents = 'auto';
            gameState = 'playing';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }, 800);
    }

    document.getElementById('skip-btn').addEventListener('click', () => closeMathModal(false));

    function triggerMathQuestion(treasureIndex) {
        gameState = 'paused_math';
        currentTreasureIndex = treasureIndex;
        currentQuestion = generateMathQuestion();
        clearInput();
        document.getElementById('question-text').textContent = currentQuestion.text + ' = ?';
        mathModal.classList.remove('hidden');
        uiCanvas.style.pointerEvents = 'none';
        
        // 釋放所有按鍵，避免卡住
        for(let k in keys) keys[k] = false;
    }

    // --- 敵人血量顏色對應 ---
    function getEnemyColorByHP(hp) {
        // 血量除以關卡，取得基礎色階對應 (1白, 2淡藍, 3黃, 4淺綠, 5橘, 6紫, 7青, 8粉, 9紅)
        const base = Math.ceil(hp / level);
        if (base <= 1) return '#FFFFFF'; // 白 (血量 1)
        if (base === 2) return '#BAE6FD'; // 淡藍
        if (base === 3) return '#FDE047'; // 黃 (血量 3)
        if (base === 4) return '#A3E635'; // 淺綠
        if (base === 5) return '#FB923C'; // 橘
        if (base === 6) return '#C084FC'; // 紫
        if (base === 7) return '#22D3EE'; // 青
        if (base === 8) return '#F472B6'; // 粉
        return '#EF4444'; // 紅 (血量 9+)
    }

    function levelUp() {
        level = 2;
        addDamageText(player.x, player.y - 50, "進入第二關！難度倍增！", "#EAB308", 3);
        document.getElementById('level-target').textContent = " (無盡模式)";
        updateHUD();
    }

    // --- 遊戲邏輯更新 ---
    function update(dt) {
        // 1. 玩家移動
        let dx = 0, dy = 0;
        if (keys.w) dy -= 1;
        if (keys.s) dy += 1;
        if (keys.a) dx -= 1;
        if (keys.d) dx += 1;

        if (dx === 0 && dy === 0 && joystick.active) {
            dx = joystick.dirX;
            dy = joystick.dirY;
        }

        if (dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            player.x += (dx / length) * player.speed * dt;
            player.y += (dy / length) * player.speed * dt;
        }

        // 動態生成與移除環境物件 (無盡地圖機制)
        rocks = rocks.filter(r => Math.hypot(r.x - player.x, r.y - player.y) < MAX_DIST);
        trees = trees.filter(t => Math.hypot(t.x - player.x, t.y - player.y) < MAX_DIST);

        while (rocks.length < 80) {
            let angle = Math.random() * Math.PI * 2;
            let dist = SPAWN_DIST + Math.random() * 200;
            rocks.push(createRock(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
        while (trees.length < 150) {
            let angle = Math.random() * Math.PI * 2;
            let dist = SPAWN_DIST + Math.random() * 200;
            trees.push(createTree(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }

        // 玩家與石頭碰撞檢測
        for (let r of rocks) {
            let rdx = player.x - r.x;
            let rdy = player.y - r.y;
            let dist = Math.sqrt(rdx*rdx + rdy*rdy);
            if (dist < player.radius + r.radius) {
                // 推擠出去
                let overlap = (player.radius + r.radius) - dist;
                player.x += (rdx / dist) * overlap;
                player.y += (rdy / dist) * overlap;
            }
        }

        // 攝影機跟隨
        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        // 2. 武器旋轉更新
        player.weaponAngle += player.weaponSpeed * dt;

        // 3. 生成敵人
        gameTimer += dt;
        const spawnRate = Math.max(0.2, 1.2 - gameTimer * 0.01); 
        if (Math.random() < dt / spawnRate) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(canvas.width, canvas.height) * 0.7;
            const ex = player.x + Math.cos(angle) * dist;
            const ey = player.y + Math.sin(angle) * dist;
            
            // 基礎血量 1~9，第二關血量翻倍
            let baseHp = Math.floor(Math.random() * 9) + 1;
            let finalHp = level === 2 ? baseHp * 2 : baseHp;

            enemies.push({
                x: ex, y: ey,
                radius: 15 + baseHp, // 血越多稍微大一點
                speed: 70 + Math.random() * 40,
                hp: finalHp,
                hitCooldown: 0 // 被擊中後的無敵時間
            });
        }

        // 4. 生成寶物 (增加頻率)
        if (Math.random() < dt / 3) { // 平均 3 秒一顆
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 400;
            // 無盡地圖直接生成在相對位置
            const tx = player.x + Math.cos(angle) * dist;
            const ty = player.y + Math.sin(angle) * dist;
            treasures.push({ x: tx, y: ty, radius: 15, timeCreated: gameTimer });
        }
        // 清除過期的寶物
        treasures = treasures.filter(t => gameTimer - t.timeCreated < 15);

        // 5. 更新敵人與碰撞檢測
        const currentWeapons = [];
        for (let i = 0; i < player.weaponCount; i++) {
            const angle = player.weaponAngle + (Math.PI * 2 / player.weaponCount) * i;
            currentWeapons.push({
                x: player.x + Math.cos(angle) * player.weaponRadius,
                y: player.y + Math.sin(angle) * player.weaponRadius,
                radius: 12
            });
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if(e.hitCooldown > 0) e.hitCooldown -= dt;

            // 敵人移向玩家
            const ex = player.x - e.x;
            const ey = player.y - e.y;
            const distToPlayer = Math.sqrt(ex*ex + ey*ey);
            
            // 簡單防止敵人重疊 (群聚效應)
            for(let j=0; j<enemies.length; j++){
                if(i!==j){
                    const other = enemies[j];
                    const oDx = e.x - other.x;
                    const oDy = e.y - other.y;
                    const oDist = Math.sqrt(oDx*oDx + oDy*oDy);
                    if(oDist < e.radius + other.radius) {
                        e.x += (oDx/oDist) * 1;
                        e.y += (oDy/oDist) * 1;
                    }
                }
            }

            if (distToPlayer > player.radius + e.radius) {
                e.x += (ex / distToPlayer) * e.speed * dt;
                e.y += (ey / distToPlayer) * e.speed * dt;
            } else {
                // 撞到玩家
                player.hp -= 10;
                enemies.splice(i, 1);
                updateHUD();
                addDamageText(player.x, player.y - 20, "-10", "#EF4444");
                
                if (player.hp <= 0) {
                    gameState = 'gameover';
                    document.getElementById('time-survived').textContent = Math.floor(gameTimer);
                    document.getElementById('final-score').textContent = score;
                    document.getElementById('final-level').textContent = level;
                    hud.classList.add('hidden');
                    gameOverModal.classList.remove('hidden');
                    uiCanvas.style.pointerEvents = 'none';
                    return;
                }
                continue;
            }

            // 檢查武器擊中
            let hit = false;
            for (let w of currentWeapons) {
                const wx = w.x - e.x;
                const wy = w.y - e.y;
                if (Math.sqrt(wx*wx + wy*wy) < w.radius + e.radius) {
                    hit = true; break;
                }
            }

            if (hit && e.hitCooldown <= 0) {
                e.hp -= 1;
                e.hitCooldown = 0.4; // 0.4秒無敵，產生持續打擊感
                // 擊退效果
                e.x -= (ex / distToPlayer) * 20;
                e.y -= (ey / distToPlayer) * 20;
                
                addDamageText(e.x, e.y, "-1", "#FFFFFF", 0.5);

                if (e.hp <= 0) {
                    score++;
                    updateHUD();
                    addDamageText(e.x, e.y, "擊破", "#FBBF24");
                    enemies.splice(i, 1);
                    
                    // 升級判定
                    if (level === 1 && score >= 30) {
                        levelUp();
                    }
                }
            }
        }

        // 6. 檢查碰到寶物
        for (let i = 0; i < treasures.length; i++) {
            const t = treasures[i];
            const dx = player.x - t.x;
            const dy = player.y - t.y;
            if (Math.sqrt(dx*dx + dy*dy) < player.radius + t.radius) {
                triggerMathQuestion(i);
                break;
            }
        }

        // 更新文字特效
        for (let i = damageTexts.length - 1; i >= 0; i--) {
            damageTexts[i].life -= dt;
            damageTexts[i].y -= 20 * dt; // 向上飄
            if (damageTexts[i].life <= 0) damageTexts.splice(i, 1);
        }
    }

    function addDamageText(x, y, text, color, life=0.8) {
        damageTexts.push({ x, y, text, color, life, maxLife: life });
    }

    function updateHUD() {
        document.getElementById('hp-display').textContent = Math.max(0, player.hp);
        document.getElementById('weapon-display').textContent = player.weaponCount;
        document.getElementById('score-display').textContent = score;
        document.getElementById('level-display').textContent = level;
    }

    // --- 繪圖邏輯 ---
    function draw() {
        // 背景草地
        ctx.fillStyle = '#4ade80'; // 鮮綠色草地
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 畫網格/草地紋理感
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        const gridSize = 150;
        const startX = Math.floor(camera.x / gridSize) * gridSize;
        const startY = Math.floor(camera.y / gridSize) * gridSize;
        for (let x = startX; x < camera.x + canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + canvas.height); ctx.stroke();
        }
        for (let y = startY; y < camera.y + canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + canvas.width, y); ctx.stroke();
        }

        // 畫石頭 (障礙物)
        for (let r of rocks) {
            // 只畫視窗內的以優化效能
            if(r.x > camera.x - 100 && r.x < camera.x + canvas.width + 100 &&
               r.y > camera.y - 100 && r.y < camera.y + canvas.height + 100) {
                
                ctx.save();
                ctx.translate(r.x, r.y);
                
                // 石頭主體
                ctx.fillStyle = '#6B7280'; // 石頭灰
                ctx.beginPath();
                ctx.moveTo(r.vertices[0].x, r.vertices[0].y);
                for(let i=1; i<r.vertices.length; i++) {
                    ctx.lineTo(r.vertices[i].x, r.vertices[i].y);
                }
                ctx.closePath();
                ctx.fill();
                
                // 石頭高光/紋理 (縮小的不規則多邊形)
                ctx.fillStyle = '#9CA3AF';
                ctx.beginPath();
                ctx.moveTo(r.vertices[0].x * 0.5 - r.radius * 0.2, r.vertices[0].y * 0.5 - r.radius * 0.2);
                for(let i=1; i<r.vertices.length; i++) {
                    ctx.lineTo(r.vertices[i].x * 0.5 - r.radius * 0.2, r.vertices[i].y * 0.5 - r.radius * 0.2);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // 畫寶物
        const pulse = 1 + Math.sin(performance.now() * 0.005) * 0.2;
        for (let t of treasures) {
            ctx.save();
            ctx.translate(t.x, t.y);
            ctx.scale(pulse, pulse);
            ctx.shadowColor = '#60A5FA';
            ctx.shadowBlur = 20;
            // 鑽石外型
            ctx.fillStyle = '#3B82F6';
            ctx.beginPath(); ctx.moveTo(0, -t.radius); ctx.lineTo(t.radius, 0); ctx.lineTo(0, t.radius); ctx.lineTo(-t.radius, 0); ctx.fill();
            // 發光中心
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.moveTo(0, -t.radius/2); ctx.lineTo(t.radius/2, 0); ctx.lineTo(0, t.radius/2); ctx.lineTo(-t.radius/2, 0); ctx.fill();
            ctx.restore();
        }

        // 畫敵人
        for (let e of enemies) {
            ctx.fillStyle = getEnemyColorByHP(e.hp);
            
            // 受傷閃爍白光
            if(e.hitCooldown > 0.2) ctx.fillStyle = 'white';
            
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 畫眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(e.x - e.radius*0.3, e.y - e.radius*0.2, e.radius*0.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.x + e.radius*0.3, e.y - e.radius*0.2, e.radius*0.2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(e.x - e.radius*0.3, e.y - e.radius*0.2, e.radius*0.1, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.x + e.radius*0.3, e.y - e.radius*0.2, e.radius*0.1, 0, Math.PI*2); ctx.fill();
            
            // 顯示血量數字 (幫助辨識)
            ctx.fillStyle = 'black';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(e.hp, e.x, e.y + e.radius*0.7);
        }

        // 畫玩家
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(0, player.radius, player.radius, player.radius/2, 0, 0, Math.PI*2); ctx.fill();
        
        if (playerImage) {
            // 如果有上傳照片，使用照片當作頭像
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip(); // 裁切成圓形
            // 將圖片畫在中心點
            ctx.drawImage(playerImage, -player.radius, -player.radius, player.radius * 2, player.radius * 2);
            ctx.restore();
            // 加個金邊
            ctx.strokeStyle = '#EAB308';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            // 預設騎士外觀
            ctx.fillStyle = '#D1D5DB'; 
            ctx.fillRect(-15, -15, 30, 30);
            ctx.fillStyle = '#EAB308'; 
            ctx.fillRect(-15, -15, 30, 8);
            ctx.fillStyle = '#1F2937'; 
            ctx.fillRect(-10, -5, 20, 4);
        }

        // 畫血條
        ctx.fillStyle = '#DC2626'; ctx.fillRect(-20, -25, 40, 5);
        ctx.fillStyle = '#22C55E'; ctx.fillRect(-20, -25, 40 * (Math.max(0, player.hp) / player.maxHp), 5);
        ctx.restore();

        // 畫武器
        ctx.fillStyle = '#FBBF24'; 
        for (let i = 0; i < player.weaponCount; i++) {
            const angle = player.weaponAngle + (Math.PI * 2 / player.weaponCount) * i;
            const wx = player.x + Math.cos(angle) * player.weaponRadius;
            const wy = player.y + Math.sin(angle) * player.weaponRadius;
            ctx.save();
            ctx.translate(wx, wy);
            ctx.rotate(player.weaponAngle * 2);
            ctx.beginPath();
            for(let j=0; j<4; j++) { ctx.rotate(Math.PI/2); ctx.lineTo(14, 0); ctx.lineTo(4, 4); }
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FBBF24';
            ctx.restore();
        }

        // 畫樹木 (蓋在人物上方當作環境層)
        for (let tr of trees) {
            if(tr.x > camera.x - 100 && tr.x < camera.x + canvas.width + 100 &&
               tr.y > camera.y - 100 && tr.y < camera.y + canvas.height + 100) {
                // 樹幹
                ctx.fillStyle = '#78350F';
                ctx.fillRect(tr.x - 8, tr.y - 10, 16, tr.radius * 0.8 + 10);
                
                // 樹葉 (三層三角形組成松樹狀)
                ctx.fillStyle = tr.colorType;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    let yOffset = tr.y - 10 - i * (tr.radius * 0.35);
                    let width = tr.radius - i * 8;
                    ctx.moveTo(tr.x, yOffset - tr.radius); // 頂點
                    ctx.lineTo(tr.x - width, yOffset);     // 左下
                    ctx.lineTo(tr.x + width, yOffset);     // 右下
                    ctx.closePath();
                    ctx.fill();
                    
                    // 簡單亮部
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.beginPath();
                    ctx.moveTo(tr.x, yOffset - tr.radius);
                    ctx.lineTo(tr.x - width*0.5, yOffset);
                    ctx.lineTo(tr.x, yOffset);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = tr.colorType; // 恢復顏色
                }
            }
        }

        // 畫文字特效
        for (let dt of damageTexts) {
            ctx.fillStyle = dt.color;
            ctx.font = 'bold 22px sans-serif';
            ctx.textAlign = 'center';
            ctx.globalAlpha = dt.life / dt.maxLife;
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeText(dt.text, dt.x, dt.y);
            ctx.fillText(dt.text, dt.x, dt.y);
            ctx.globalAlpha = 1;
        }

        ctx.restore();

        // --- 畫 UI 疊加層 (搖桿) ---
        uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
        
        if (gameState === 'playing') {
            // 畫搖桿底座
            uiCtx.fillStyle = 'rgba(100, 116, 139, 0.4)'; // 半透明灰
            uiCtx.beginPath();
            uiCtx.arc(joystick.baseX, joystick.baseY, joystick.radius, 0, Math.PI * 2);
            uiCtx.fill();
            uiCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            uiCtx.lineWidth = 2;
            uiCtx.stroke();
            
            // 畫搖桿把手
            uiCtx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            uiCtx.beginPath();
            uiCtx.arc(joystick.currentX, joystick.currentY, joystick.handleRadius, 0, Math.PI * 2);
            uiCtx.fill();
            uiCtx.shadowColor = 'rgba(0,0,0,0.5)';
            uiCtx.shadowBlur = 10;
            uiCtx.shadowColor = 'transparent'; // 恢復
        }
    }

    // --- 主迴圈 ---
    function gameLoop(timestamp) {
        if (gameState !== 'playing' && gameState !== 'paused_math' && gameState !== 'paused') return;

        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; 
        lastTime = timestamp;

        if (gameState === 'playing') {
            update(dt);
        }
        
        draw();

        if (gameState === 'playing' || gameState === 'paused_math' || gameState === 'paused') {
            requestAnimationFrame(gameLoop);
        }
    }

</script>
