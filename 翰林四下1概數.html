<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>概數大師：捨去、進入與四捨五入</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { touch-action: manipulation; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .animate-wiggle { animation: wiggle 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Lucide) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const Calculator = (props) => <IconWrapper {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconWrapper>;
        const CheckCircle = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const Trophy = (props) => <IconWrapper {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconWrapper>;
        const RotateCcw = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
        const Scissors = (props) => <IconWrapper {...props}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></IconWrapper>;
        const ArrowUpCircle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><polyline points="16 12 12 8 8 12"/><line x1="12" y1="16" x2="12" y2="8"/></IconWrapper>;
        const Target = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;

        // --- Main App Component ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('learn');
            const [score, setScore] = useState(0);
            const [animateScore, setAnimateScore] = useState(false);

            useEffect(() => {
                if (score > 0) {
                    setAnimateScore(true);
                    const timer = setTimeout(() => setAnimateScore(false), 300);
                    return () => clearTimeout(timer);
                }
            }, [score]);

            const renderTabContent = () => {
                switch (currentTab) {
                    case 'learn': return <LearnSection onComplete={() => setCurrentTab('practice_1')} />;
                    case 'practice_1': return <RoundingGame1 score={score} setScore={setScore} onComplete={() => setCurrentTab('practice_2')} />;
                    case 'practice_2': return <RoundingGame2 score={score} setScore={setScore} onComplete={() => setCurrentTab('quiz')} />;
                    case 'quiz': return <QuizMode score={score} setScore={setScore} onRestart={() => { setScore(0); setCurrentTab('learn'); }} />;
                    default: return <LearnSection />;
                }
            };

            return (
                <div className="h-screen flex flex-col bg-blue-50 font-sans text-slate-800 overflow-hidden select-none">
                    <header className="bg-white shadow-sm p-3 z-10 flex-none border-b border-blue-100">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <div className="bg-blue-500 p-2 rounded-xl text-white shadow-sm"><Calculator size={20} /></div>
                                <h1 className="text-lg font-bold text-blue-700 tracking-wide">概數大師</h1>
                            </div>
                            <div className={`flex items-center bg-yellow-100 px-3 py-1.5 rounded-full border border-yellow-300 transition-transform duration-200 ${animateScore ? 'scale-110 ring-4 ring-yellow-200' : ''}`}>
                                <Trophy className={`text-yellow-600 mr-1.5 ${animateScore ? 'animate-spin' : ''}`} size={16} />
                                <span className="font-bold text-yellow-700">{score} 分</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24 scroll-smooth">
                        <div className="max-w-2xl mx-auto bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/50 p-5 min-h-[400px] animate-in fade-in slide-in-from-bottom-4 duration-500">
                            {renderTabContent()}
                        </div>
                    </main>

                    <nav className="bg-white border-t border-slate-200 pb-safe pt-2 px-2 fixed bottom-0 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                        <div className="max-w-2xl mx-auto flex justify-around items-end pb-2">
                            <NavButton active={currentTab === 'learn'} onClick={() => setCurrentTab('learn')} icon={<BookOpen size={22} />} label="學習" />
                            <NavButton active={currentTab === 'practice_1'} onClick={() => setCurrentTab('practice_1')} icon={<Scissors size={22} />} label="捨與進" />
                            <NavButton active={currentTab === 'practice_2'} onClick={() => setCurrentTab('practice_2')} icon={<Target size={22} />} label="四捨五入" />
                            <NavButton active={currentTab === 'quiz'} onClick={() => setCurrentTab('quiz')} icon={<CheckCircle size={22} />} label="大挑戰" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavButton = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`flex flex-col items-center justify-center w-full py-2 px-1 transition-all duration-300 rounded-xl active:scale-95 touch-manipulation ${active ? 'text-blue-600 -translate-y-2' : 'text-slate-400 hover:text-slate-600'}`}>
                <div className={`p-1.5 rounded-full transition-all duration-300 ${active ? 'bg-blue-100 shadow-sm' : ''}`}>{icon}</div>
                <span className={`text-[10px] font-medium mt-1 ${active ? 'opacity-100' : 'opacity-70'}`}>{label}</span>
                {active && <div className="w-1 h-1 bg-blue-500 rounded-full mt-1"></div>}
            </button>
        );

        // --- 1. Learning Section ---
        const LearnSection = ({ onComplete }) => (
            <div className="space-y-6">
                <div className="flex items-center justify-between">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center"><Play className="mr-2 text-blue-500" style={{fill: 'currentColor'}} size={24} /> 觀念學習</h2>
                    <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded border border-slate-200">四年級 CH1 概數</span>
                </div>
                
                {/* Video Container */}
                <div className="aspect-video w-full bg-slate-900 rounded-2xl overflow-hidden shadow-lg ring-4 ring-blue-50" style={{position:'relative', paddingBottom: '56.25%', height: 0}}>
                    <iframe src="https://www.youtube.com/embed/C2qH_uhk9E8" title="概數教學影片" style={{position:'absolute', top:0, left:0, width:'100%', height:'100%'}} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                </div>

                {/* Notes */}
                <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-5 rounded-2xl border border-blue-100 mt-4 shadow-sm">
                    <h3 className="text-lg font-bold text-blue-800 mb-3 flex items-center"><BookOpen className="w-5 h-5 mr-2" />重點筆記</h3>
                    <div className="space-y-3 text-sm text-slate-700">
                        <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                            <div className="bg-red-100 text-red-700 font-bold rounded-lg w-12 h-12 flex items-center justify-center mr-3 flex-shrink-0 text-xs text-center leading-tight">無條件<br/>捨去</div>
                            <div>指定位數後面的數字「全部變成0」！<br/><span className="text-slate-500 text-xs">例：2345 取到百位 ➔ 2300</span></div>
                        </div>
                        <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                            <div className="bg-green-100 text-green-700 font-bold rounded-lg w-12 h-12 flex items-center justify-center mr-3 flex-shrink-0 text-xs text-center leading-tight">無條件<br/>進入</div>
                            <div>指定位數後面的數字「只要不是0，就進位」！<br/><span className="text-slate-500 text-xs">例：2345 取到百位 ➔ 2400</span></div>
                        </div>
                        <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                            <div className="bg-purple-100 text-purple-700 font-bold rounded-lg w-12 h-12 flex items-center justify-center mr-3 flex-shrink-0 text-xs text-center leading-tight">四捨<br/>五入</div>
                            <div>看指定位數的「下一位數字」，0~4捨去，5~9進位。<br/><span className="text-slate-500 text-xs">例：2345 取到百位(看十位4) ➔ 2300</span></div>
                        </div>
                    </div>
                </div>
                <button onClick={onComplete} className="w-full bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center shadow-lg shadow-blue-500/20 active:scale-95 transition-all">我學會了，開始練習！ <ArrowRight className="ml-2" /></button>
            </div>
        );

        // --- 2. Practice 1: 捨去與進入 (6 questions) ---
        const RoundingGame1 = ({ score, setScore, onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [feedback, setFeedback] = useState('');

            const questions = [
                { type: '捨去', num: 4321, target: '百', text: "將 4321 用「無條件捨去法」取概數到百位", ans: "4300", options: ["4300", "4400", "4320"] },
                { type: '捨去', num: 5899, target: '十', text: "將 5899 用「無條件捨去法」取概數到十位", ans: "5890", options: ["5800", "5890", "5900"] },
                { type: '進入', num: 2345, target: '百', text: "將 2345 用「無條件進入法」取概數到百位", ans: "2400", options: ["2300", "2400", "2350"] },
                { type: '進入', num: 7012, target: '千', text: "將 7012 用「無條件進入法」取概數到千位", ans: "8000", options: ["7000", "7100", "8000"] },
                { type: '進入', text: "阿公買一台 8750 元的冰箱，如果全用「千元鈔票」付錢，最少要付幾張才夠？", ans: "9張", options: ["8張", "9張", "10張"] },
                { type: '捨去', text: "蘋果每 100 顆裝成一盒，果農採收了 5342 顆蘋果，最多可以裝滿幾盒？", ans: "53盒", options: ["53盒", "54盒", "50盒"] }
            ];

            const handleAnswer = (opt) => {
                if (feedback) return;
                const correctAns = questions[progress].ans;
                if (opt === correctAns) {
                    setFeedback('correct');
                    setScore(s => s + 10);
                    setTimeout(() => {
                        setFeedback('');
                        setProgress(p => p + 1);
                    }, 1000);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 1000);
                }
            };

            if (progress >= 6) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-blue-100 rounded-full mb-4 ring-8 ring-blue-50"><Trophy className="text-blue-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">太棒了！</h2>
                    <p className="text-slate-600 mb-8">你已經學會無條件捨去和進入了！</p>
                    <button onClick={onComplete} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">前往下一關</button>
                </div>
            );

            const q = questions[progress];

            return (
                <div className="text-center space-y-6 animate-in fade-in">
                    <div className="flex justify-between items-center border-b border-blue-100 pb-4">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center">
                            <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-sm">1</span>
                            捨去與進入
                        </h2>
                        <div className="flex space-x-1">
                            {[...Array(6)].map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i < progress ? 'bg-blue-500' : 'bg-slate-200'}`}></div>)}
                        </div>
                    </div>

                    <div className="bg-blue-50 p-6 rounded-2xl border-2 border-blue-100 relative overflow-hidden mb-6 text-left shadow-sm">
                        <div className="absolute -right-4 -top-4 opacity-10 rotate-12">
                            {q.type === '捨去' ? <Scissors size={120}/> : <ArrowUpCircle size={120}/>}
                        </div>
                        <div className="text-sm font-bold text-blue-600 mb-2 flex items-center">
                            {q.type === '捨去' ? <><Scissors size={16} className="mr-1" /> 無條件捨去法</> : <><ArrowUpCircle size={16} className="mr-1" /> 無條件進入法</>}
                        </div>
                        <h3 className="text-lg font-bold text-slate-800 leading-snug">{q.text}</h3>
                        {q.num && (
                            <div className="mt-6 text-center bg-white rounded-xl py-4 shadow-sm">
                                <div className="text-4xl font-black text-slate-700 tracking-widest">{q.num}</div>
                                <div className="text-sm text-slate-500 mt-2">取概數到 <span className="text-blue-600 font-bold text-base">{q.target}</span> 位</div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 gap-3">
                        {q.options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} 
                                className={`py-4 rounded-xl text-xl font-bold border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && opt === q.ans ? 'bg-green-100 border-green-500 text-green-700' : 
                                feedback === 'incorrect' && opt === q.ans ? 'bg-green-100 border-green-500 text-green-700 opacity-50' : 
                                'bg-white border-slate-200 hover:border-blue-300 text-slate-700'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    
                    <div className="h-6 flex justify-center mt-2">
                        {feedback === 'correct' && <span className="text-green-600 font-bold flex items-center"><CheckCircle className="mr-1" size={20}/> 答對了！</span>}
                        {feedback === 'incorrect' && <span className="text-red-500 font-bold animate-wiggle">再想一下喔！尾數該怎麼處理？</span>}
                    </div>
                </div>
            );
        };

        // --- 3. Practice 2: 四捨五入 (6 questions) ---
        const RoundingGame2 = ({ score, setScore, onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [feedback, setFeedback] = useState('');

            const questions = [
                { num: 6432, target: '百', text: "將 6432 用「四捨五入法」取概數到百位", ans: "6400", options: ["6400", "6500", "6000"], tip: "看十位數字 3，小於5，所以捨去。" },
                { num: 8571, target: '千', text: "將 8571 用「四捨五入法」取概數到千位", ans: "9000", options: ["8000", "8500", "9000"], tip: "看百位數字 5，剛好等於5，所以進入。" },
                { num: 9099, target: '十', text: "將 9099 用「四捨五入法」取概數到十位", ans: "9100", options: ["9090", "9100", "9000"], tip: "看個位數字 9，大於5，所以進入。" },
                { num: 3449, target: '百', text: "將 3449 用「四捨五入法」取概數到百位", ans: "3400", options: ["3400", "3500", "3450"], tip: "看十位數字 4，小於5，所以捨去。(不要被個位的9騙囉！)" },
                { num: 5555, target: '千', text: "將 5555 用「四捨五入法」取概數到千位", ans: "6000", options: ["5000", "5500", "6000"], tip: "看百位數字 5，所以進入。" },
                { text: "台灣最高峰玉山高度約 3952 公尺，用「四捨五入法」取概數到百位大約是多少公尺？", ans: "4000公尺", options: ["3900公尺", "4000公尺", "3950公尺"], tip: "看十位數字 5，所以向前進位。" }
            ];

            const handleAnswer = (opt) => {
                if (feedback) return;
                const correctAns = questions[progress].ans;
                if (opt === correctAns) {
                    setFeedback('correct');
                    setScore(s => s + 15);
                    setTimeout(() => {
                        setFeedback('');
                        setProgress(p => p + 1);
                    }, 1000);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 3000);
                }
            };

            if (progress >= 6) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-purple-100 rounded-full mb-4 ring-8 ring-purple-50"><Target className="text-purple-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">神準無比！</h2>
                    <p className="text-slate-600 mb-8">你已經完全掌握四捨五入的技巧了</p>
                    <button onClick={onComplete} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">挑戰最終測驗</button>
                </div>
            );

            const q = questions[progress];

            return (
                <div className="text-center space-y-6 animate-in fade-in">
                    <div className="flex justify-between items-center border-b border-purple-100 pb-4">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center">
                            <span className="bg-purple-100 text-purple-600 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-sm">2</span>
                            四捨五入
                        </h2>
                        <div className="flex space-x-1">
                            {[...Array(6)].map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i < progress ? 'bg-purple-500' : 'bg-slate-200'}`}></div>)}
                        </div>
                    </div>

                    <div className="bg-purple-50 p-6 rounded-2xl border-2 border-purple-100 relative overflow-hidden mb-6 text-left shadow-sm">
                        <div className="absolute -right-4 -top-4 opacity-10 rotate-12">
                            <Target size={120}/>
                        </div>
                        <div className="text-sm font-bold text-purple-600 mb-2 flex items-center">
                            <Target size={16} className="mr-1" /> 四捨五入法
                        </div>
                        <h3 className="text-lg font-bold text-slate-800 leading-snug">{q.text}</h3>
                        {q.num && (
                            <div className="mt-6 text-center bg-white rounded-xl py-4 shadow-sm border border-purple-100">
                                <div className="text-4xl font-black text-slate-700 tracking-widest">{q.num}</div>
                                <div className="text-sm text-slate-500 mt-2">取概數到 <span className="text-purple-600 font-bold text-base">{q.target}</span> 位</div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 gap-3">
                        {q.options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} 
                                className={`py-4 rounded-xl text-xl font-bold border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && opt === q.ans ? 'bg-green-100 border-green-500 text-green-700' : 
                                'bg-white border-slate-200 hover:border-purple-300 text-slate-700'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    
                    <div className="h-10 flex flex-col justify-center items-center mt-2">
                        {feedback === 'correct' && <span className="text-green-600 font-bold flex items-center"><CheckCircle className="mr-1" size={20}/> 答對了！</span>}
                        {feedback === 'incorrect' && <span className="text-red-500 font-bold text-sm bg-red-50 px-3 py-1.5 rounded-lg border border-red-200 animate-wiggle shadow-sm">💡 提示：{q.tip}</span>}
                    </div>
                </div>
            );
        };

        // --- 4. Quiz Mode: 綜合大挑戰 (6 questions) ---
        const QuizMode = ({ score, setScore, onRestart }) => {
            const [idx, setIdx] = useState(0);
            const [finished, setFinished] = useState(false);
            const [feedback, setFeedback] = useState(null);
            
            const questions = [
                { q: "小花有 1234 元，想買每個 100 元的玩具，她最多可以買幾個？(相當於無條件捨去法)", options: ["12個", "13個", "10個"], ans: 0 },
                { q: "一件外套 2880 元，媽媽只帶了千元鈔票，她最少要拿出幾張千元鈔票才夠買？(相當於無條件進入法)", options: ["2張", "3張", "4張"], ans: 1 },
                { q: "將 9999 用「四捨五入法」取概數到百位是多少？", options: ["9900", "10000", "9000"], ans: 1 },
                { q: "「無條件捨去法」、「無條件進入法」和「四捨五入法」，哪一種方法取出來的概數通常最接近原來的數字？", options: ["無條件捨去法", "無條件進入法", "四捨五入法"], ans: 2 },
                { q: "如果 8口52 用四捨五入法取概數到千位是 9000，口 裡面可能是哪個數字？", options: ["4", "5", "3"], ans: 1 },
                { q: "體育館可容納 15850 人，如果用「四捨五入法」取概數到千位，大約可容納多少人？", options: ["15000人", "15800人", "16000人"], ans: 2 }
            ];

            const handleAnswer = (optIdx) => {
                if (feedback) return;
                if (optIdx === questions[idx].ans) {
                    setFeedback('correct');
                    setScore(s => s + 20);
                } else {
                    setFeedback('incorrect');
                }
                setTimeout(() => {
                    if (idx + 1 < questions.length) {
                        setIdx(i => i + 1);
                        setFeedback(null);
                    } else {
                        setFinished(true);
                    }
                }, 1500);
            };

            if (finished) return (
                <div className="text-center py-10 space-y-6 animate-in slide-in-from-bottom">
                    <div className="inline-block p-6 bg-teal-100 rounded-full mb-4 shadow-inner"><Trophy size={80} className="text-teal-600" /></div>
                    <h2 className="text-4xl font-bold text-slate-800">恭喜過關！</h2>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p className="text-sm text-slate-400 uppercase tracking-widest mb-2">總得分</p>
                        <p className="text-6xl font-black text-teal-500 mb-4">{score}</p>
                        <p className="text-lg text-slate-600 font-medium">你是最強的概數大師！</p>
                    </div>
                    <button onClick={onRestart} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 flex items-center justify-center shadow-lg active:scale-95 transition-all"><RotateCcw className="mr-2" size={20} /> 再玩一次</button>
                </div>
            );

            return (
                <div className="py-2 animate-in fade-in">
                    <div className="mb-6 flex justify-between items-center text-sm font-medium text-slate-400">
                        <span className="bg-slate-100 px-3 py-1 rounded-full text-slate-600">第 {idx + 1} / {questions.length} 題</span>
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-6 leading-relaxed">{questions[idx].q}</h3>
                    <div className="space-y-3">
                        {questions[idx].options.map((opt, i) => (
                            <button key={i} onClick={() => handleAnswer(i)} disabled={!!feedback}
                                className={`w-full text-left p-4 rounded-xl text-lg font-medium border-2 transition-all active:scale-98 
                                ${feedback === 'correct' && i === questions[idx].ans ? 'bg-green-100 border-green-500 text-green-800 shadow-sm' : 
                                feedback === 'incorrect' && i !== questions[idx].ans && feedback ? 'bg-red-50 border-red-200 text-red-800 opacity-50' : 
                                'bg-white border-slate-200 hover:border-teal-400'}`}>
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-bold ${feedback === 'correct' && i === questions[idx].ans ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-500'}`}>{String.fromCharCode(65+i)}</div>
                                    {opt}
                                    {feedback === 'correct' && i === questions[idx].ans && <CheckCircle className="ml-auto text-green-600" />}
                                </div>
                            </button>
                        ))}
                    </div>
                    {feedback && <div className={`mt-6 text-center font-bold text-xl ${feedback === 'correct' ? 'text-green-500' : 'text-red-500 animate-wiggle'}`}>{feedback === 'correct' ? '正確！' : '答錯囉...'}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
