<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cycle of the Fallen - 數學戰鬥版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            touch-action: none; /* 防止手機端滑動與縮放 */
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #aspect-ratio-box {
            position: relative;
            width: 100%;
            /* 修正畫面尺寸：確保在任何螢幕下都不會超過 100vh 高度，避免下方被切掉 */
            max-width: min(1200px, calc(100vh * 16 / 9));
            aspect-ratio: 16 / 9;
            background: #111;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            image-rendering: pixelated;
        }
        /* 復古掃描線特效 */
        #aspect-ratio-box::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
        }
        /* 自訂核取方塊樣式 */
        .math-checkbox:checked + div {
            background-color: #2563eb;
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 0 15px rgba(37,99,235,0.6);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="aspect-ratio-box">
            <!-- 遊戲畫布 -->
            <canvas id="gameCanvas" width="800" height="450"></canvas>

            <!-- 主選單介面 (第一頁) -->
            <div id="menu-ui" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm pointer-events-auto z-20 transition-opacity duration-300">
                <h1 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-b from-purple-400 to-blue-600 drop-shadow-[0_0_15px_rgba(37,99,235,0.8)] mb-2 tracking-tighter italic text-center">Cycle of the Fallen</h1>
                <p class="text-gray-300 text-lg md:text-xl mb-6 tracking-widest text-center px-4">數學戰鬥版</p>
                
                <div class="bg-gray-900/90 border-2 border-blue-500 rounded-xl p-6 w-11/12 max-w-2xl shadow-2xl">
                    <h2 class="text-2xl font-bold text-yellow-400 mb-4 text-center">選擇數學單元 (可複選)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                        <label class="cursor-pointer relative">
                            <input type="checkbox" class="math-checkbox sr-only" value="1">
                            <div class="border-2 border-gray-600 bg-gray-800 text-gray-300 rounded-lg p-3 text-center font-bold transition-all">一位數加一位數</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" class="math-checkbox sr-only" value="2">
                            <div class="border-2 border-gray-600 bg-gray-800 text-gray-300 rounded-lg p-3 text-center font-bold transition-all">同分母分數加法</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" class="math-checkbox sr-only" value="3">
                            <div class="border-2 border-gray-600 bg-gray-800 text-gray-300 rounded-lg p-3 text-center font-bold transition-all">同分母分數減法</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" class="math-checkbox sr-only" value="4">
                            <div class="border-2 border-gray-600 bg-gray-800 text-gray-300 rounded-lg p-3 text-center font-bold transition-all">帶分數的加法</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" class="math-checkbox sr-only" value="5">
                            <div class="border-2 border-gray-600 bg-gray-800 text-gray-300 rounded-lg p-3 text-center font-bold transition-all">帶分數的減法</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" class="math-checkbox sr-only" value="6">
                            <div class="border-2 border-gray-600 bg-gray-800 text-gray-300 rounded-lg p-3 text-center font-bold transition-all">九九乘法</div>
                        </label>
                    </div>
                    <div class="flex justify-center">
                        <button id="start-btn" class="px-12 py-3 bg-gradient-to-r from-blue-700 to-blue-500 hover:from-blue-600 hover:to-blue-400 text-white font-black rounded-lg text-2xl shadow-[0_0_20px_rgba(37,99,235,0.8)] transition-all active:scale-95 border-2 border-blue-300 disabled:opacity-50 disabled:cursor-not-allowed">
                            開始遊戲
                        </button>
                    </div>
                    <p id="menu-warning" class="text-red-400 text-center mt-3 hidden font-bold">請至少選擇一個單元！</p>
                </div>
            </div>

            <!-- 遊戲內 UI 覆蓋層 (第二頁) -->
            <div id="game-ui" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-10 hidden opacity-0 transition-opacity duration-300">
                <!-- 頂部資訊列 -->
                <div class="flex justify-between items-start pointer-events-auto">
                    <div class="flex flex-col gap-1">
                        <div class="flex items-center gap-3">
                            <div class="text-white font-black text-2xl drop-shadow-[0_2px_2px_rgba(0,0,0,1)] italic tracking-wider">PLAYER 1</div>
                            <button id="home-btn" class="px-3 py-1 bg-gray-800 border-2 border-gray-500 hover:bg-gray-700 text-white font-bold rounded shadow-lg transition-colors text-sm">
                                🏠 回主選單
                            </button>
                        </div>
                        <div class="w-48 md:w-64 h-6 bg-gray-900 border-2 border-gray-400 rounded-sm shadow-[0_0_10px_rgba(255,0,0,0.5)]">
                            <div id="health-bar" class="h-full bg-yellow-400 w-full transition-all duration-200"></div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-white font-black text-2xl md:text-3xl drop-shadow-[0_2px_2px_rgba(0,0,0,1)] italic">
                            LEVEL: <span id="level-display" class="text-red-400">1</span>
                        </div>
                        <div class="text-white font-black text-xl drop-shadow-[0_2px_2px_rgba(0,0,0,1)] italic">
                            KILLS: <span id="kill-count" class="text-yellow-400">0</span> / 20
                        </div>
                    </div>
                </div>

                <!-- 手機/平板端虛擬控制 (搖桿與攻擊鍵) -->
                <div class="flex justify-between items-end pointer-events-none w-full absolute bottom-4 left-0 px-4 md:px-12 h-40" id="touch-controls">
                    <!-- 左側搖桿 -->
                    <div class="relative w-32 h-32 md:w-40 md:h-40 opacity-70 pointer-events-auto" id="joystick-zone">
                        <div class="absolute inset-0 bg-gray-800 border-4 border-gray-600 rounded-full shadow-lg"></div>
                        <div id="joystick-stick" class="absolute top-1/2 left-1/2 -mt-6 -ml-6 md:-mt-8 md:-ml-8 w-12 h-12 md:w-16 md:h-16 bg-gray-300 border-2 border-white rounded-full shadow-[0_0_15px_rgba(0,0,0,0.5)] transition-transform duration-75"></div>
                    </div>
                    <!-- 右側攻擊鍵 -->
                    <div class="opacity-80 pointer-events-auto pb-4">
                        <div id="btn-attack" class="w-20 h-20 md:w-28 md:h-28 bg-red-700 rounded-full flex justify-center items-center text-white font-black text-2xl md:text-3xl active:bg-red-500 shadow-[0_0_20px_rgba(220,38,38,1)] border-4 border-red-400">ATK</div>
                    </div>
                </div>
            </div>

            <!-- 數學題目彈出視窗 -->
            <div id="math-modal" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md pointer-events-auto z-30 hidden opacity-0 transition-opacity duration-200">
                <div class="bg-blue-900/90 border-4 border-yellow-400 rounded-2xl p-6 md:p-8 w-11/12 max-w-lg shadow-[0_0_30px_rgba(250,204,21,0.5)] text-center transform scale-95 transition-transform duration-200" id="math-box">
                    <h2 class="text-xl md:text-2xl text-yellow-300 font-bold mb-2">打破木箱發現了數學挑戰！</h2>
                    <p class="text-gray-200 mb-6 text-sm md:text-base">答對可恢復 5 滴血量</p>
                    <div id="math-question" class="text-4xl md:text-5xl font-black text-white tracking-widest mb-8 drop-shadow-md">
                        1/4 + 2/4 = ?
                    </div>
                    <div id="math-options" class="grid grid-cols-2 gap-4">
                        <!-- 選項按鈕會由 JS 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 遊戲結束/過關 訊息 -->
            <div id="status-msg" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-sm pointer-events-auto z-20 hidden opacity-0 transition-opacity duration-300">
                <h1 id="status-title" class="text-5xl md:text-7xl font-black text-red-500 drop-shadow-[0_0_15px_rgba(220,38,38,0.8)] mb-4 italic text-center">GAME OVER</h1>
                <button id="retry-btn" class="px-10 py-4 bg-gradient-to-r from-red-700 to-red-500 hover:from-red-600 hover:to-red-400 text-white font-black rounded text-2xl shadow-[0_0_20px_rgba(220,38,38,0.8)] border-2 border-red-300 mt-4">重新挑戰</button>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_W = 800;
        const CANVAS_H = 450;

        // --- 音效系統 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'attack') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'heal') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.setValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'break') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // --- 遊戲狀態與變數 ---
        let gameState = 'MENU'; // MENU, PLAYING, MATH, GAMEOVER
        let player, enemies, props, particles;
        let cameraX = 0;
        let shakeTime = 0;
        
        let killCount = 0;
        let currentLevel = 1;
        let bossSpawnedThisLevel = false;
        let selectedMathTypes = []; // 預設不選任何單元

        // --- 輸入控制 (鍵盤與虛擬搖桿) ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // 防呆：防止按下空白鍵時觸發已選取的按鈕或造成網頁捲動
            if(e.code === 'Space') e.preventDefault();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // 虛擬搖桿邏輯
        const joyZone = document.getElementById('joystick-zone');
        const joyStick = document.getElementById('joystick-stick');
        let joyActive = false;
        let joyDx = 0, joyDy = 0;
        const maxJoyDist = 40;

        function updateJoystick(e) {
            if (!joyActive) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            let dist = Math.hypot(dx, dy);
            
            if (dist > maxJoyDist) {
                dx = (dx / dist) * maxJoyDist;
                dy = (dy / dist) * maxJoyDist;
            }
            
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            joyDx = dx / maxJoyDist; // -1 ~ 1
            joyDy = dy / maxJoyDist; // -1 ~ 1
        }

        joyZone.addEventListener('touchstart', e => { e.preventDefault(); joyActive = true; updateJoystick(e); }, {passive: false});
        joyZone.addEventListener('touchmove', e => { e.preventDefault(); updateJoystick(e); }, {passive: false});
        const stopJoy = () => {
            joyActive = false; joyDx = 0; joyDy = 0;
            joyStick.style.transform = `translate(0px, 0px)`;
        };
        joyZone.addEventListener('touchend', stopJoy);
        joyZone.addEventListener('touchcancel', stopJoy);

        // 攻擊按鈕 (滑鼠或觸控)
        const btnAtk = document.getElementById('btn-attack');
        const triggerAtk = (e) => { e.preventDefault(); keys['Space'] = true; };
        const releaseAtk = (e) => { e.preventDefault(); keys['Space'] = false; };
        btnAtk.addEventListener('touchstart', triggerAtk); btnAtk.addEventListener('touchend', releaseAtk);
        btnAtk.addEventListener('mousedown', triggerAtk); btnAtk.addEventListener('mouseup', releaseAtk);

        // --- 數學出題系統 ---
        function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        
        function generateSingleQ(type) {
            if (type == 1) {
                let a = rnd(1, 9), b = rnd(1, 9);
                return { q: `${a} + ${b} = ?`, a: `${a + b}` };
            } else if (type == 2) {
                let d = rnd(3, 9), a = rnd(1, d-1), b = rnd(1, d-1);
                return { q: `${a}/${d} + ${b}/${d} = ?`, a: `${a+b}/${d}` };
            } else if (type == 3) {
                let d = rnd(3, 9);
                let val1 = rnd(1, d-1), val2 = rnd(1, d-1);
                let a = Math.max(val1, val2);
                let b = Math.min(val1, val2);
                let ans = a - b;
                let ansStr = ans === 0 ? "0" : `${ans}/${d}`;
                return { q: `${a}/${d} - ${b}/${d} = ?`, a: ansStr };
            } else if (type == 4) {
                let d = rnd(3, 9), w1 = rnd(1, 5), a = rnd(1, d-1), w2 = rnd(1, 5), b = rnd(1, d-1);
                let totalW = w1 + w2, totalNum = a + b;
                if (totalNum >= d) { totalW++; totalNum -= d; }
                let ansStr = totalNum === 0 ? `${totalW}` : `${totalW}又${totalNum}/${d}`;
                return { q: `${w1}又${a}/${d} + ${w2}又${b}/${d} = ?`, a: ansStr };
            } else if (type == 5) {
                let d = rnd(3, 9), w1 = rnd(3, 8), a = rnd(1, d-1), w2 = rnd(1, w1-1), b = rnd(1, d-1);
                let totalW = w1 - w2, totalNum = a - b;
                if (totalNum < 0) { totalW--; totalNum += d; }
                let ansStr = totalNum === 0 ? `${totalW}` : (totalW===0 ? `${totalNum}/${d}` : `${totalW}又${totalNum}/${d}`);
                return { q: `${w1}又${a}/${d} - ${w2}又${b}/${d} = ?`, a: ansStr };
            } else if (type == 6) {
                let a = rnd(2, 9), b = rnd(2, 9);
                return { q: `${a} x ${b} = ?`, a: `${a * b}` };
            }
        }

        function createMathQuestion() {
            const type = selectedMathTypes[Math.floor(Math.random() * selectedMathTypes.length)];
            let correctData = generateSingleQ(type);
            
            // 產生三個不同的錯誤答案
            let options = new Set([correctData.a]);
            let failSafe = 0;
            while(options.size < 4 && failSafe < 100) {
                options.add(generateSingleQ(type).a);
                failSafe++;
            }
            // 若防呆機制觸發仍不足，硬塞數字
            while(options.size < 4) { options.add(String(rnd(1, 99))); }
            
            let optArr = Array.from(options).sort(() => Math.random() - 0.5);
            return { question: correctData.q, options: optArr, answer: correctData.a };
        }

        // --- 將純文字分數轉換為 HTML 上下版型的函數 ---
        function formatMathText(str) {
            let res = str;
            // 1. 將 x 轉換為標準乘號
            res = res.replace(/ x /g, ' &times; ');
            
            // 2. 處理帶分數 (例如: 1又2/3)
            res = res.replace(/(\d+)又(\d+)\/(\d+)/g, (match, w, n, d) => {
                return `<span class="inline-flex items-center align-middle mx-1">
                            <span class="mr-1">${w}</span>
                            <span class="inline-flex flex-col items-center justify-center">
                                <span class="leading-none text-[0.85em] pb-[2px]">${n}</span>
                                <span class="leading-none text-[0.85em] pt-[2px] border-t-2 border-current w-full text-center">${d}</span>
                            </span>
                        </span>`;
            });
            
            // 3. 處理純分數 (例如: 1/4)
            res = res.replace(/(\d+)\/(\d+)/g, (match, n, d) => {
                return `<span class="inline-flex flex-col items-center justify-center align-middle mx-1">
                            <span class="leading-none text-[0.85em] pb-[2px]">${n}</span>
                            <span class="leading-none text-[0.85em] pt-[2px] border-t-2 border-current w-full text-center">${d}</span>
                        </span>`;
            });
            
            return res;
        }

        function triggerMathEvent() {
            gameState = 'MATH';
            const modal = document.getElementById('math-modal');
            const qObj = createMathQuestion();
            
            // 使用 innerHTML 來渲染 HTML 格式的分數
            document.getElementById('math-question').innerHTML = formatMathText(qObj.question);
            const optionsDiv = document.getElementById('math-options');
            optionsDiv.innerHTML = '';
            
            qObj.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'bg-blue-700 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg border-2 border-blue-400 text-xl transition-all active:scale-95 flex items-center justify-center';
                // 使用 innerHTML 來渲染按鈕上的分數
                btn.innerHTML = formatMathText(opt);
                btn.onclick = (e) => {
                    e.currentTarget.blur(); // 清除焦點，防止空白鍵誤觸
                    handleMathAnswer(opt === qObj.answer);
                };
                optionsDiv.appendChild(btn);
            });

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('math-box').classList.remove('scale-95');
            }, 10);
        }

        function handleMathAnswer(isCorrect) {
            const modal = document.getElementById('math-modal');
            modal.classList.add('opacity-0');
            document.getElementById('math-box').classList.add('scale-95');
            
            if (isCorrect) {
                playSound('heal');
                player.hp = Math.min(player.maxHp, player.hp + 5);
                updateUI();
                // 產生補血綠色粒子
                for(let i=0; i<15; i++) {
                    particles.push(new Particle(player.x, player.y - 40, (Math.random()-0.5)*4, -1 - Math.random()*3, '#22c55e'));
                }
            } else {
                playSound('wrong');
                // 答錯螢幕微震
                shakeTime = 10;
            }

            setTimeout(() => {
                modal.classList.add('hidden');
                gameState = 'PLAYING';
            }, 200);
        }

        // --- 實體類別 ---
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color;
                this.life = 15 + Math.random() * 10;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; }
            draw(ctx) { ctx.fillStyle = this.color; ctx.fillRect(this.x - cameraX, this.y, 4, 4); }
        }

        class Enemy {
            constructor(x, y, type) {
                this.tag = 'enemy'; this.type = type;
                this.x = x; this.y = y; this.z = 250;
                this.vx = 0; this.vy = 0; this.vz = 0;
                this.dir = -1; this.state = 'idle';
                this.attackCooldown = 0; this.attackTimer = 0; this.hurtTimer = 0;
                this.counted = false;
                
                if (type === 'boss') {
                    this.maxHp = 30; this.speed = 1.5; this.damage = 15;
                    this.typeColor = '#9f1239'; // 深紅背心
                    this.scale = 2.0; // 巨大化
                } else {
                    this.maxHp = 20; this.speed = 1.2 + Math.random(); this.damage = 10;
                    this.typeColor = ['#dc2626', '#16a34a', '#ca8a04', '#6b7280'][Math.floor(Math.random()*4)];
                    this.scale = 1;
                }
                this.hp = this.maxHp;
            }
        }

        class Prop {
            constructor(x, y) {
                this.tag = 'prop'; this.type = 'box';
                this.x = x; this.y = y; this.z = 0;
                this.hp = 10; this.hurtTimer = 0;
            }
        }

        // --- 核心邏輯 ---
        function initGame() {
            player = {
                tag: 'player', x: 200, y: 350, z: 0, vx: 0, vy: 0, vz: 0,
                speed: 4.5, hp: 100, maxHp: 100, damage: 10,
                dir: 1, state: 'idle', attackCooldown: 0, attackTimer: 0, hurtTimer: 0
            };
            enemies = []; props = []; particles = [];
            cameraX = 0; killCount = 0; currentLevel = 1; bossSpawnedThisLevel = false;
            shakeTime = 0;
            
            // 初始生成幾個敵人和木箱
            for(let i=0; i<3; i++) enemies.push(new Enemy(600 + i*150, 300 + Math.random()*100, 'enemy'));
            props.push(new Prop(500, 320));

            updateUI();
        }

        function updateUI() {
            const bar = document.getElementById('health-bar');
            if(bar && player) {
                let pct = Math.max(0, (player.hp / player.maxHp) * 100);
                bar.style.width = pct + '%';
                bar.className = `h-full transition-all duration-200 ${pct <= 30 ? 'bg-red-600' : 'bg-yellow-400'}`;
            }
            document.getElementById('kill-count').innerText = killCount;
            document.getElementById('level-display').innerText = currentLevel;
        }

        function showStatus(title) {
            gameState = 'GAMEOVER';
            const msg = document.getElementById('status-msg');
            document.getElementById('status-title').innerText = title;
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.remove('opacity-0'), 10);
        }

        // 按鈕事件綁定
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.currentTarget.blur(); // 清除焦點，防止空白鍵誤觸

            const checkboxes = document.querySelectorAll('.math-checkbox:checked');
            if (checkboxes.length === 0) {
                document.getElementById('menu-warning').classList.remove('hidden');
                return;
            }
            document.getElementById('menu-warning').classList.add('hidden');
            selectedMathTypes = Array.from(checkboxes).map(cb => parseInt(cb.value));
            
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            document.getElementById('menu-ui').classList.add('opacity-0', 'pointer-events-none');
            const gameUI = document.getElementById('game-ui');
            gameUI.classList.remove('hidden');
            setTimeout(() => gameUI.classList.remove('opacity-0'), 10);
            
            initGame();
            gameState = 'PLAYING';
        });

        document.getElementById('home-btn').addEventListener('click', (e) => {
            e.currentTarget.blur(); // 清除焦點
            gameState = 'MENU';
            document.getElementById('game-ui').classList.add('opacity-0', 'pointer-events-none');
            const menuUI = document.getElementById('menu-ui');
            menuUI.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => document.getElementById('game-ui').classList.add('hidden'), 300);
        });

        document.getElementById('retry-btn').addEventListener('click', (e) => {
            e.currentTarget.blur(); // 清除焦點
            document.getElementById('status-msg').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('status-msg').classList.add('hidden');
                initGame();
                gameState = 'PLAYING';
            }, 300);
        });

        // 碰撞與打擊判定
        function checkHit(attacker, isEnemy = false) {
            let hitboxW = 60 * (attacker.scale || 1);
            let hitboxX = attacker.dir === 1 ? attacker.x : attacker.x - hitboxW;
            let targets = isEnemy ? [player] : [...enemies, ...props];
            let hitSomething = false;

            targets.forEach(t => {
                if (t.state === 'dead' || t.hp <= 0) return;
                let tHitboxW = 40 * (t.scale || 1);
                let tHitboxX = t.x - tHitboxW/2;
                
                if (hitboxX < tHitboxX + tHitboxW && hitboxX + hitboxW > tHitboxX && Math.abs(attacker.y - t.y) < 30) {
                    hitSomething = true;
                    t.hp -= attacker.damage || 10;
                    t.hurtTimer = 15;
                    
                    if(t.tag !== 'prop') {
                        t.state = 'hurt'; t.vx = attacker.dir * 4; // 擊退
                        playSound('hit');
                    } else {
                        playSound('break');
                    }
                    shakeTime = 5;

                    let color = t.tag === 'enemy' ? '#ef4444' : '#a16207';
                    for(let i=0; i<6; i++) {
                        particles.push(new Particle(t.x, t.y - 40, (Math.random()-0.5)*5 + attacker.dir*2, -2 - Math.random()*4, color));
                    }

                    if (t.hp <= 0) {
                        if (t.tag === 'prop') {
                            // 木箱被打破，觸發數學題！
                            triggerMathEvent();
                        } else {
                            t.state = 'dead';
                            if (t === player) {
                                showStatus('GAME OVER');
                            }
                        }
                    } else if (t === player) {
                        updateUI();
                    }
                }
            });
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // --- 重力與 Z 軸 ---
            let renderables = [player, ...enemies, ...props];
            renderables.forEach(r => {
                if (r.z > 0 || r.vz !== 0) {
                    r.vz -= 0.5; r.z += r.vz;
                    if (r.z <= 0) { r.z = 0; r.vz = 0; }
                }
            });

            // --- 玩家行為 ---
            if (player.state !== 'hurt' && player.state !== 'dead') {
                let isMoving = false;
                
                // 搖桿輸入優先，否則用鍵盤
                if (joyActive) {
                    player.vx = joyDx * player.speed;
                    player.vy = joyDy * player.speed * 0.65;
                    if (Math.abs(joyDx) > 0.1) player.dir = joyDx > 0 ? 1 : -1;
                    if (Math.abs(joyDx) > 0.1 || Math.abs(joyDy) > 0.1) isMoving = true;
                } else {
                    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -player.speed; player.dir = -1; isMoving = true; }
                    else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = player.speed; player.dir = 1; isMoving = true; }
                    else { player.vx = 0; }

                    if (keys['ArrowUp'] || keys['KeyW']) { player.vy = -player.speed * 0.65; isMoving = true; }
                    else if (keys['ArrowDown'] || keys['KeyS']) { player.vy = player.speed * 0.65; isMoving = true; }
                    else { player.vy = 0; }
                }

                if (isMoving && player.state !== 'attack') player.state = 'walk';
                else if (player.state !== 'attack') player.state = 'idle';

                // 攻擊 (電腦版改為空白鍵)
                if (keys['Space'] && player.attackCooldown <= 0) {
                    player.state = 'attack'; player.attackTimer = 15; player.attackCooldown = 25;
                    player.vx = 0; player.vy = 0;
                    playSound('attack'); checkHit(player, false);
                }
            }

            // 冷卻與邊界
            if (player.attackCooldown > 0) player.attackCooldown--;
            if (player.attackTimer > 0) { player.attackTimer--; if (player.attackTimer <= 0) player.state = 'idle'; }
            if (player.hurtTimer > 0) { player.hurtTimer--; if (player.hurtTimer <= 0 && player.state !== 'dead') player.state = 'idle'; }

            player.x += player.vx; player.y += player.vy;
            player.y = Math.max(260, Math.min(440, player.y));
            player.x = Math.max(cameraX + 20, player.x); // 左視角邊界

            // --- 視角跟隨 (無盡右移) ---
            let targetCameraX = player.x - CANVAS_W * 0.4;
            cameraX = Math.max(cameraX, targetCameraX); 

            // --- 無盡生成系統與升級邏輯 ---
            // 計算剛被殺死的敵人
            enemies.forEach(e => {
                if (e.state === 'dead' && !e.counted) {
                    e.counted = true;
                    killCount++;
                    updateUI();
                }
            });

            // 關卡進度：每 20 殺升一級並出 Boss
            let neededKillsForNextLevel = currentLevel * 20;
            if (killCount >= neededKillsForNextLevel && !bossSpawnedThisLevel) {
                bossSpawnedThisLevel = true;
                // 出 Boss
                enemies.push(new Enemy(cameraX + CANVAS_W + 100, 350, 'boss'));
                // 升級特效
                for(let i=0; i<30; i++) particles.push(new Particle(player.x, player.y, (Math.random()-0.5)*10, (Math.random()-0.5)*10, '#facc15'));
            }
            
            // 如果 Boss 被打死，進入下一關的常規迴圈
            if (bossSpawnedThisLevel) {
                let bossAlive = enemies.some(e => e.type === 'boss' && e.state !== 'dead');
                if (!bossAlive && killCount >= neededKillsForNextLevel) {
                    currentLevel++;
                    bossSpawnedThisLevel = false;
                    updateUI();
                }
            }

            // 一般生怪邏輯 (維持場上一定數量的敵人)
            let activeEnemies = enemies.filter(e => e.state !== 'dead').length;
            let maxEnemies = 2 + Math.floor(currentLevel / 2); // 關卡越高敵人越多
            if (activeEnemies < maxEnemies && !bossSpawnedThisLevel && Math.random() < 0.02) {
                enemies.push(new Enemy(cameraX + CANVAS_W + 100, 280 + Math.random()*140, 'enemy'));
            }
            // 偶爾生成木箱
            if (Math.random() < 0.005 && props.length < 2) {
                props.push(new Prop(cameraX + CANVAS_W + 50, 280 + Math.random()*140));
            }

            // --- 敵人更新 ---
            enemies.forEach(e => {
                if (e.state === 'dead') return;
                if (e.hurtTimer > 0) { e.hurtTimer--; if (e.hurtTimer <= 0) e.state = 'idle'; }

                if (e.state !== 'hurt' && e.state !== 'attack' && e.z === 0) {
                    let dx = player.x - e.x; let dy = player.y - e.y;
                    let dist = Math.hypot(dx, dy);

                    if (dist < 60 * e.scale && Math.abs(dy) < 20) {
                        if (e.attackCooldown <= 0) {
                            e.state = 'attack'; e.attackTimer = 20; e.attackCooldown = 60 + Math.random() * 40;
                            e.vx = 0; e.vy = 0; e.dir = dx > 0 ? 1 : -1;
                            playSound('attack'); checkHit(e, true);
                        }
                    } else if (dist < 500) {
                        e.state = 'walk'; e.vx = (dx / dist) * e.speed; e.vy = (dy / dist) * e.speed;
                        e.dir = dx > 0 ? 1 : -1;
                    } else {
                        e.state = 'idle'; e.vx = 0; e.vy = 0;
                    }
                }
                
                if (e.attackCooldown > 0) e.attackCooldown--;
                if (e.attackTimer > 0) { e.attackTimer--; if (e.attackTimer <= 0) e.state = 'idle'; }

                e.x += e.vx; e.y += e.vy;
                e.y = Math.max(260, Math.min(440, e.y));
            });

            // 清理屍體與被打破的木箱 (離開畫面太遠也清掉)
            enemies = enemies.filter(e => (e.state !== 'dead' || e.hurtTimer > 0) && e.x > cameraX - 200);
            props.forEach(p => { if (p.hurtTimer > 0) p.hurtTimer--; });
            props = props.filter(p => p.hp > 0 && p.x > cameraX - 200);
            
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);

            if (shakeTime > 0) shakeTime--;
        }

        // --- 渲染邏輯 ---
        function drawParallax(ctx, color, width, gap, heightBase, speedMulti, yBase, hasWindows) {
            ctx.fillStyle = color;
            let totalW = width + gap;
            let offset = (cameraX * speedMulti) % totalW;
            let startIdx = Math.floor((cameraX * speedMulti) / totalW);
            for(let i=0; i<15; i++) {
                let idx = startIdx + i;
                let h = heightBase + (Math.sin(idx * 12.34) * 40);
                let x = (i * totalW) - offset;
                ctx.fillRect(x, yBase - h, width, h);
                if (hasWindows && idx % 2 === 0) {
                    let winColor = (idx % 3 === 0) ? '#e11d48' : '#0891b2';
                    ctx.fillStyle = winColor;
                    ctx.fillRect(x + 10, yBase - h + 20, 10, 15);
                    ctx.fillRect(x + width - 20, yBase - h + 20, 10, 15);
                    ctx.fillStyle = color;
                }
            }
        }

        function drawBackground(ctx) {
            let grad = ctx.createLinearGradient(0, 0, 0, 250);
            grad.addColorStop(0, '#020014'); grad.addColorStop(1, '#170b2e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            drawParallax(ctx, '#0a0a1a', 70, 15, 110, 0.1, 250, false);
            drawParallax(ctx, '#110b29', 50, 25, 80, 0.25, 250, true);

            ctx.fillStyle = '#1e1b4b'; ctx.fillRect(0, 200, CANVAS_W, 50);
            ctx.fillStyle = '#2e2b5e';
            let wallOffset = (cameraX * 0.5) % 40;
            for(let i=-1; i<25; i++) {
                let x = i * 40 - wallOffset;
                ctx.fillRect(x, 210, 35, 12); ctx.fillRect(x - 20, 228, 35, 12);
            }

            ctx.fillStyle = '#1c1917'; ctx.fillRect(0, 250, CANVAS_W, 200);
            ctx.fillStyle = '#ca8a04';
            let lineOffset = cameraX % 150;
            for(let i=-1; i<8; i++) ctx.fillRect(i * 150 - lineOffset, 340, 70, 4);
        }

        function drawCharacter(ctx, c) {
            ctx.save();
            ctx.translate(c.x - cameraX, c.y - c.z);
            let scale = c.scale || 1;
            ctx.scale(c.dir === -1 ? -scale : scale, scale);

            // 影子
            ctx.save(); ctx.translate(0, c.z);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 8, 0, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            if (c.state === 'hurt' && Math.floor(Date.now() / 50) % 2 === 0) {
                ctx.fillStyle = c.tag === 'enemy' ? 'red' : 'white';
                ctx.fillRect(-15, -60, 30, 60);
                ctx.restore(); return;
            }

            let walkOffset = (c.state === 'walk' ? Math.sin(Date.now() / 80) * 10 : 0);

            if (c.tag === 'player') {
                ctx.fillStyle = '#374151'; ctx.fillRect(-10 + walkOffset, -30, 12, 30); ctx.fillRect(0 - walkOffset, -30, 12, 30);
                ctx.fillStyle = '#111827'; ctx.fillRect(-12 + walkOffset, -5, 16, 6); ctx.fillRect(-2 - walkOffset, -5, 16, 6);
                ctx.fillStyle = '#1e40af'; ctx.fillRect(-16, -60, 32, 32);
                ctx.fillStyle = '#f3f4f6'; ctx.fillRect(-6, -60, 16, 26);
                ctx.fillStyle = '#fca5a5'; ctx.fillRect(-10, -82, 22, 22);
                ctx.fillStyle = '#1f2937'; ctx.fillRect(-12, -86, 26, 8); 

                ctx.fillStyle = '#2563eb';
                if (c.state === 'attack') {
                    ctx.fillRect(5, -55, 30, 10);
                    ctx.fillStyle = '#fca5a5'; ctx.fillRect(35, -55, 12, 12);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath(); ctx.arc(45, -49, 18 + Math.random()*5, -Math.PI/3, Math.PI/3); ctx.fill();
                } else {
                    ctx.fillRect(-6, -55, 12, 25);
                    ctx.fillStyle = '#fca5a5'; ctx.fillRect(-6, -30, 12, 10);
                }
            } else {
                ctx.fillStyle = '#111111'; ctx.fillRect(-10 + walkOffset, -30, 10, 30); ctx.fillRect(0 - walkOffset, -30, 10, 30);
                ctx.fillStyle = c.typeColor; ctx.fillRect(-15, -60, 30, 30);
                ctx.fillStyle = '#fca5a5'; ctx.fillRect(-10, -80, 20, 20);
                ctx.fillStyle = c.type === 'boss' ? '#ef4444' : '#eab308'; ctx.fillRect(-5, -95, 10, 15);

                if (c.state === 'attack') {
                    ctx.fillStyle = '#fca5a5'; ctx.fillRect(5, -55, 25, 10);
                } else {
                    ctx.fillStyle = '#fca5a5'; ctx.fillRect(-5, -55, 10, 25);
                }

                if (c.hp < c.maxHp && c.state !== 'dead') {
                    ctx.fillStyle = 'red'; ctx.fillRect(-15, -105, 30, 4);
                    ctx.fillStyle = '#22c55e'; ctx.fillRect(-15, -105, 30 * (c.hp/c.maxHp), 4);
                }
            }
            ctx.restore();
        }

        function drawProp(ctx, p) {
            ctx.save(); ctx.translate(p.x - cameraX, p.y);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 8, 0, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = '#92400e'; ctx.fillRect(-20, -40, 40, 40);
            ctx.strokeStyle = '#713f12'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-20, -40); ctx.lineTo(20, 0); ctx.moveTo(20, -40); ctx.lineTo(-20, 0); ctx.stroke();
            ctx.strokeRect(-20, -40, 40, 40);
            
            // 數學符號提示
            ctx.fillStyle = '#fef08a'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center'; ctx.fillText('?', 0, -15);

            if (p.hurtTimer > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(-20, -40, 40, 40);
            }
            ctx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.save();
            if (shakeTime > 0) ctx.translate((Math.random()-0.5)*12, (Math.random()-0.5)*12);

            drawBackground(ctx);

            if (gameState === 'MENU') {
                drawCharacter(ctx, { tag: 'player', x: 400 + cameraX, y: 360, z: 0, state: 'idle', dir: 1, scale: 1 });
                ctx.restore(); return;
            }

            let renderables = [player, ...enemies, ...props];
            renderables.sort((a, b) => a.y - b.y);

            renderables.forEach(r => {
                if (r.hp <= 0 && r.tag === 'enemy') return; 
                if (r.tag === 'player' || r.tag === 'enemy') drawCharacter(ctx, r);
                else if (r.tag === 'prop') drawProp(ctx, r);
            });

            particles.forEach(p => p.draw(ctx));
            ctx.restore();
        }

        // --- 主迴圈 ---
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
