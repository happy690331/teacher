    // --- 產生環境物件 ---
    function createRock(x, y) {
        let r = 30 + Math.random() * 40;
        let numVertices = 6 + Math.floor(Math.random() * 5);
        let vertices = [];
        for (let i = 0; i < numVertices; i++) {
            let angle = (i / numVertices) * Math.PI * 2;
            let dist = r * (0.7 + Math.random() * 0.6);
            vertices.push({x: Math.cos(angle)*dist, y: Math.sin(angle)*dist});
        }
        return { x, y, radius: r, vertices };
    }

    function createTree(x, y) {
        return {
            x, y,
            radius: 30 + Math.random() * 30,
            colorType: Math.random() > 0.5 ? '#166534' : '#14532D'
        };
    }

    function generateEnvironment() {
        rocks = [];
        trees = [];
        for (let i = 0; i < 30; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.random() * SPAWN_DIST;
            rocks.push(createRock(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
        for (let i = 0; i < 60; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.random() * SPAWN_DIST;
            trees.push(createTree(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
    }

            }
        });

    uiCanvas.addEventListener('touchmove', e => {
        if (!joystick.active) return;
        e.preventDefault(); 
        Array.from(e.changedTouches).forEach(touch => {
            if (touch.identifier === joystick.touchId) {
                updateJoystickPos(touch.clientX, touch.clientY);
            }
        });
    }, { passive: false });

    const endJoystick = (e) => {
        Array.from(e.changedTouches).forEach(touch => {
            if (touch.identifier === joystick.touchId) {
                joystick.active = false;
                joystick.dirX = 0;
                joystick.dirY = 0;
                joystick.currentX = joystick.baseX;
                joystick.currentY = joystick.baseY;

        });
    };
    uiCanvas.addEventListener('touchend', endJoystick);

    function updateJoystickPos(x, y) {
        let dx = x - joystick.baseX;
        let dy = y - joystick.baseY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > joystick.radius) {
            joystick.currentX = joystick.baseX + (dx / dist) * joystick.radius;
            joystick.currentY = joystick.baseY + (dy / dist) * joystick.radius;
        } else {
            joystick.currentX = x;
            joystick.currentY = y;
        }

        if (dist > 10) {
            joystick.dirX = dx / dist;
            joystick.dirY = dy / dist;
        } else {
            joystick.dirX = 0;
            joystick.dirY = 0;
        }
    }

    // --- 國語題目邏輯 ---
    function generateQuizQuestion() {
        // 如果目前題庫已經空了，就利用勾選的課文語詞，自動產生新的造句題目
        if (activePool.length === 0) {
            let availableWords = [];
            selectedLessons.forEach(lesson => {
                if(dictionary[lesson]) {
                    dictionary[lesson].forEach(item => {
                        if(!availableWords.includes(item.w)) availableWords.push(item.w);
                    });
                }
            });
            
            // 隨機生成 5 題新題目加入題庫
            for(let i=0; i<5; i++) {
                let randomWord = availableWords[Math.floor(Math.random() * availableWords.length)];
                let randomTemplate = genericTemplates[Math.floor(Math.random() * genericTemplates.length)];
                activePool.push({
                    w: randomWord,
                    s: randomTemplate
                });
            }
        }

        // 從題庫最前方取出一題 (如果有答錯的題目，會被推到最後面，所以不會連續問)
        currentQuestionData = activePool.shift();
        let correctAnswer = currentQuestionData.w;

        // 產生4個選項 (包含正確答案與3個不重複的錯誤答案)
        let options = [correctAnswer];
        while(options.length < 4) {
            let randomWord = allWordsGlobal[Math.floor(Math.random() * allWordsGlobal.length)];
            if(!options.includes(randomWord)) {
                options.push(randomWord);
            }
        }

        // 打亂選項順序
        options.sort(() => Math.random() - 0.5);

        return {
            text: currentQuestionData.s,
            answer: correctAnswer,
            options: options
        };
    }

    function update(dt) {
        let dx = 0, dy = 0;
        if (keys.w) dy -= 1;
        if (keys.s) dy += 1;
        if (keys.a) dx -= 1;
        if (keys.d) dx += 1;

        if (dx === 0 && dy === 0 && joystick.active) {
            dx = joystick.dirX;
            dy = joystick.dirY;
        }

        if (dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            player.x += (dx / length) * player.speed * dt;
            player.y += (dy / length) * player.speed * dt;
        }

        rocks = rocks.filter(r => Math.hypot(r.x - player.x, r.y - player.y) < MAX_DIST);
        trees = trees.filter(t => Math.hypot(t.x - player.x, t.y - player.y) < MAX_DIST);

        while (rocks.length < 30) {
            let angle = Math.random() * Math.PI * 2;
            let dist = SPAWN_DIST + Math.random() * 200;
            rocks.push(createRock(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
        while (trees.length < 60) {
            let angle = Math.random() * Math.PI * 2;
            let dist = SPAWN_DIST + Math.random() * 200;
            trees.push(createTree(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }

        for (let r of rocks) {
            let rdx = player.x - r.x;
            let rdy = player.y - r.y;
            let dist = Math.sqrt(rdx*rdx + rdy*rdy);
            if (dist < player.radius + r.radius) {
                let overlap = (player.radius + r.radius) - dist;
                player.x += (rdx / dist) * overlap;
                player.y += (rdy / dist) * overlap;
            }
        }

        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        player.weaponAngle += player.weaponSpeed * dt;

        gameTimer += dt;
        const spawnRate = Math.max(0.2, 1.2 - gameTimer * 0.01); 
        if (enemies.length < 60 && Math.random() < dt / spawnRate) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(canvas.width, canvas.height) * 0.7;
            const ex = player.x + Math.cos(angle) * dist;
            const ey = player.y + Math.sin(angle) * dist;
            
            let baseHp = Math.floor(Math.random() * 9) + 1;
            let finalHp = level === 2 ? baseHp * 2 : baseHp;

            enemies.push({
                x: ex, y: ey,
                radius: 15 + baseHp,
                speed: 70 + Math.random() * 40,
                hp: finalHp,
                hitCooldown: 0 
            });
        }

        if (Math.random() < dt / 3) { 
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 400;
            const tx = player.x + Math.cos(angle) * dist;
            const ty = player.y + Math.sin(angle) * dist;
            treasures.push({ x: tx, y: ty, radius: 15, timeCreated: gameTimer });
        }
        treasures = treasures.filter(t => gameTimer - t.timeCreated < 15);

        const currentWeapons = [];
        for (let i = 0; i < player.weaponCount; i++) {
            const angle = player.weaponAngle + (Math.PI * 2 / player.weaponCount) * i;
            currentWeapons.push({
                x: player.x + Math.cos(angle) * player.weaponRadius,
                y: player.y + Math.sin(angle) * player.weaponRadius,
                radius: 12
            });
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if(e.hitCooldown > 0) e.hitCooldown -= dt;

            const ex = player.x - e.x;
            const ey = player.y - e.y;
            const distToPlayer = Math.sqrt(ex*ex + ey*ey);
            
            for(let j=0; j<enemies.length; j++){
                if(i!==j){
                    const other = enemies[j];
                    const oDx = e.x - other.x;
                    const oDy = e.y - other.y;
                    const oDist = Math.sqrt(oDx*oDx + oDy*oDy);
                    if(oDist < e.radius + other.radius) {
                        e.x += (oDx/oDist) * 1;
                        e.y += (oDy/oDist) * 1;
                    }
                }
            }

            if (distToPlayer > player.radius + e.radius) {
                e.x += (ex / distToPlayer) * e.speed * dt;
                e.y += (ey / distToPlayer) * e.speed * dt;
            } else {
                player.hp -= 10;
                enemies.splice(i, 1);
                updateHUD();
                addDamageText(player.x, player.y - 20, "-10", "#EF4444");
                
                if (player.hp <= 0) {
                    gameState = 'gameover';
                    document.getElementById('time-survived').textContent = Math.floor(gameTimer);
                    document.getElementById('final-score').textContent = score;
                    document.getElementById('final-level').textContent = level;
                    hud.classList.add('hidden');
                    gameOverModal.classList.remove('hidden');
                    uiCanvas.style.pointerEvents = 'none';
                    return;
                }
                continue;
            }

            let hit = false;
            for (let w of currentWeapons) {
                const wx = w.x - e.x;
                const wy = w.y - e.y;
                if (Math.sqrt(wx*wx + wy*wy) < w.radius + e.radius) {
                    hit = true; break;
                }
            }

            if (hit && e.hitCooldown <= 0) {
                e.hp -= 1;
                e.hitCooldown = 0.4; 
                e.x -= (ex / distToPlayer) * 20;
                e.y -= (ey / distToPlayer) * 20;
                
                addDamageText(e.x, e.y, "-1", "#FFFFFF", 0.5);

                if (e.hp <= 0) {
                    score++;
                    updateHUD();
                    addDamageText(e.x, e.y, "擊破", "#FBBF24");
                    enemies.splice(i, 1);
                    
                    if (level === 1 && score >= 30) {
                        levelUp();
                    }
                }
            }
        }

        for (let i = 0; i < treasures.length; i++) {
            const t = treasures[i];
            const dx = player.x - t.x;
            const dy = player.y - t.y;
            if (Math.sqrt(dx*dx + dy*dy) < player.radius + t.radius) {
                triggerQuiz(i);
                break;
            }
        }

        for (let i = damageTexts.length - 1; i >= 0; i--) {
            damageTexts[i].life -= dt;
            damageTexts[i].y -= 20 * dt; 
            if (damageTexts[i].life <= 0) damageTexts.splice(i, 1);
        }
    }

    function addDamageText(x, y, text, color, life=0.8) {
        damageTexts.push({ x, y, text, color, life, maxLife: life });
    }

    function updateHUD() {
        document.getElementById('hp-display').textContent = Math.max(0, player.hp);
        document.getElementById('weapon-display').textContent = player.weaponCount;
        document.getElementById('score-display').textContent = score;
        document.getElementById('level-display').textContent = level;
    }

    // --- 繪圖邏輯 ---
    function draw() {
        ctx.fillStyle = '#4ade80'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        const gridSize = 150;
        const startX = Math.floor(camera.x / gridSize) * gridSize;
        const startY = Math.floor(camera.y / gridSize) * gridSize;
        for (let x = startX; x < camera.x + canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + canvas.height); ctx.stroke();
        }
        for (let y = startY; y < camera.y + canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + canvas.width, y); ctx.stroke();
        }

        for (let r of rocks) {
            if(r.x > camera.x - 100 && r.x < camera.x + canvas.width + 100 &&
               r.y > camera.y - 100 && r.y < camera.y + canvas.height + 100) {
                ctx.save();
                ctx.translate(r.x, r.y);
                
                ctx.fillStyle = '#6B7280'; 
                ctx.beginPath();
                ctx.moveTo(r.vertices[0].x, r.vertices[0].y);
                for(let i=1; i<r.vertices.length; i++) {
                    ctx.lineTo(r.vertices[i].x, r.vertices[i].y);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#9CA3AF';
                ctx.beginPath();
                ctx.moveTo(r.vertices[0].x * 0.5 - r.radius * 0.2, r.vertices[0].y * 0.5 - r.radius * 0.2);
                for(let i=1; i<r.vertices.length; i++) {
                    ctx.lineTo(r.vertices[i].x * 0.5 - r.radius * 0.2, r.vertices[i].y * 0.5 - r.radius * 0.2);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        const pulse = 1 + Math.sin(performance.now() * 0.005) * 0.2;
        for (let t of treasures) {
            ctx.save();
            ctx.translate(t.x, t.y);
            ctx.scale(pulse, pulse);
            ctx.shadowColor = '#60A5FA';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#3B82F6';
            ctx.beginPath(); ctx.moveTo(0, -t.radius); ctx.lineTo(t.radius, 0); ctx.lineTo(0, t.radius); ctx.lineTo(-t.radius, 0); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.moveTo(0, -t.radius/2); ctx.lineTo(t.radius/2, 0); ctx.lineTo(0, t.radius/2); ctx.lineTo(-t.radius/2, 0); ctx.fill();
            ctx.restore();
        }

        for (let e of enemies) {
            ctx.fillStyle = getEnemyColorByHP(e.hp);
            if(e.hitCooldown > 0.2) ctx.fillStyle = 'white';
            
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(e.x - e.radius*0.3, e.y - e.radius*0.2, e.radius*0.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.x + e.radius*0.3, e.y - e.radius*0.2, e.radius*0.2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(e.x - e.radius*0.3, e.y - e.radius*0.2, e.radius*0.1, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.x + e.radius*0.3, e.y - e.radius*0.2, e.radius*0.1, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(e.hp, e.x, e.y + e.radius*0.7);
        }

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(0, player.radius, player.radius, player.radius/2, 0, 0, Math.PI*2); ctx.fill();
        
        if (playerImage) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip(); 
            ctx.drawImage(playerImage, -player.radius, -player.radius, player.radius * 2, player.radius * 2);
            ctx.restore();
            ctx.strokeStyle = '#EAB308';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            ctx.fillStyle = '#D1D5DB'; 
            ctx.fillRect(-15, -15, 30, 30);
            ctx.fillStyle = '#EAB308'; 
            ctx.fillRect(-15, -15, 30, 8);
            ctx.fillStyle = '#1F2937'; 
            ctx.fillRect(-10, -5, 20, 4);
        }

        ctx.fillStyle = '#DC2626'; ctx.fillRect(-20, -25, 40, 5);
        ctx.fillStyle = '#22C55E'; ctx.fillRect(-20, -25, 40 * (Math.max(0, player.hp) / player.maxHp), 5);
        ctx.restore();

        ctx.fillStyle = '#FBBF24'; 
        for (let i = 0; i < player.weaponCount; i++) {
            const angle = player.weaponAngle + (Math.PI * 2 / player.weaponCount) * i;
            const wx = player.x + Math.cos(angle) * player.weaponRadius;
            const wy = player.y + Math.sin(angle) * player.weaponRadius;
            ctx.save();
            ctx.translate(wx, wy);
            ctx.rotate(player.weaponAngle * 2);
            ctx.beginPath();
            for(let j=0; j<4; j++) { ctx.rotate(Math.PI/2); ctx.lineTo(14, 0); ctx.lineTo(4, 4); }
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FBBF24';
            ctx.restore();
        }

        for (let tr of trees) {
            if(tr.x > camera.x - 100 && tr.x < camera.x + canvas.width + 100 &&
               tr.y > camera.y - 100 && tr.y < camera.y + canvas.height + 100) {
                ctx.fillStyle = '#78350F';
                ctx.fillRect(tr.x - 8, tr.y - 10, 16, tr.radius * 0.8 + 10);
                
                ctx.fillStyle = tr.colorType;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    let yOffset = tr.y - 10 - i * (tr.radius * 0.35);
                    let width = tr.radius - i * 8;
                    ctx.moveTo(tr.x, yOffset - tr.radius); 
                    ctx.lineTo(tr.x - width, yOffset);     
                    ctx.lineTo(tr.x + width, yOffset);     
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.beginPath();
                    ctx.moveTo(tr.x, yOffset - tr.radius);
                    ctx.lineTo(tr.x - width*0.5, yOffset);
                    ctx.lineTo(tr.x, yOffset);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = tr.colorType; 
                }
            }
        }

        for (let dt of damageTexts) {
            ctx.fillStyle = dt.color;
            ctx.font = 'bold 22px sans-serif';
            ctx.textAlign = 'center';
            ctx.globalAlpha = dt.life / dt.maxLife;
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeText(dt.text, dt.x, dt.y);
            ctx.fillText(dt.text, dt.x, dt.y);
            ctx.globalAlpha = 1;
        }

        ctx.restore();

        uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
        
        if (gameState === 'playing') {
            uiCtx.fillStyle = 'rgba(100, 116, 139, 0.4)'; 
            uiCtx.beginPath();
            uiCtx.arc(joystick.baseX, joystick.baseY, joystick.radius, 0, Math.PI * 2);
            uiCtx.fill();
            uiCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            uiCtx.lineWidth = 2;
            uiCtx.stroke();
            
            uiCtx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            uiCtx.beginPath();
            uiCtx.arc(joystick.currentX, joystick.currentY, joystick.handleRadius, 0, Math.PI * 2);
            uiCtx.fill();
        }
    }

    function gameLoop(timestamp) {
        if (gameState !== 'playing' && gameState !== 'paused_quiz' && gameState !== 'paused') return;

        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; 
        lastTime = timestamp;

        if (gameState === 'playing') {
            update(dt);
        }
        
        draw();

        if (gameState === 'playing' || gameState === 'paused_quiz' || gameState === 'paused') {
            requestAnimationFrame(gameLoop);
        }
    }

</script>
