    function App() {
      const canvasRef = useRef(null);
      const [gameState, setGameState] = useState('start');
      const [finalScore, setFinalScore] = useState(0);
      const [selectedLessons, setSelectedLessons] = useState([1]);
      const [showQuestion, setShowQuestion] = useState(null);
      const [popupFeedback, setPopupFeedback] = useState(null);
      const [isManualPause, setIsManualPause] = useState(false);

      const state = useRef({
        hp: 10,
        lives: 3,
        score: 0,
        gameSpeed: 1.0,
        player: { x: 185, y: 160, width: 30, height: 30, vx: 0, vy: 0, color: '#fcd34d', hurtTimer: 0 },
        platforms: [],
        floatingTexts: [],
        keys: { left: false, right: false },
        currentQuestionIndex: 0,
        questionsPool: [],
        currentQuestion: null,
        isPaused: false,
        isManualPaused: false,
      });

      const toggleLesson = (lessonNum) => {
        setSelectedLessons(prev => {
          if (prev.includes(lessonNum)) {
            return prev.filter(n => n !== lessonNum);
          } else {
            return [...prev, lessonNum].sort((a, b) => a - b);
          }
        });
      };

      const buildQuestionPool = () => {
        let rawWords = [];
        selectedLessons.forEach(num => {
          if (LESSON_DATA[num]) {
            rawWords = rawWords.concat(LESSON_DATA[num]);
          }
        });

        const pool = rawWords.map(item => {
          let availableWrongs = rawWords.filter(w => w.word !== item.word);
          availableWrongs.sort(() => Math.random() - 0.5);
          let wrongs = availableWrongs.slice(0, 3).map(w => w.word);

          while(wrongs.length < 3) {
            wrongs.push("干擾詞" + Math.floor(Math.random()*100));
          }

          return {
            q: item.desc,
            a: item.word,
            wrong: wrongs
          };
        });

        pool.sort(() => Math.random() - 0.5);
        return pool;
      };

      const initGame = () => {
        const newPool = buildQuestionPool();
        
        state.current = {
          hp: 10,
          lives: 3,
          score: 0,
          gameSpeed: 1.0,
          player: { x: 185, y: 160, width: 30, height: 30, vx: 0, vy: 0, color: '#fcd34d', hurtTimer: 0 },
          platforms: [
            { x: 150, y: 280, width: 120, height: 18, text: "", type: 'normal', consumed: false, broken: false, color: null },
            { x: 30, y: 400, width: 100, height: 18, text: "", type: 'normal', consumed: false, broken: false, color: null },
            { x: 230, y: 400, width: 100, height: 18, text: "", type: 'normal', consumed: false, broken: false, color: null },
            { x: 60, y: 520, width: 100, height: 18, text: "", type: 'normal', consumed: false, broken: false, color: null },
            { x: 260, y: 520, width: 100, height: 18, text: "", type: 'normal', consumed: false, broken: false, color: null },
          ],
          floatingTexts: [],
          keys: { left: false, right: false },
          currentQuestionIndex: 0,
          questionsPool: newPool,
          currentQuestion: newPool[0],
          isPaused: false,
          isManualPaused: false,
        };
        setIsManualPause(false);
      };

      const startGame = () => {
        if (selectedLessons.length === 0) {
            alert("請至少選擇一課題庫！");
            return;
        }
        initGame();
        setGameState('playing');
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowLeft') state.current.keys.left = true;
          if (e.key === 'ArrowRight') state.current.keys.right = true;
        };
        const handleKeyUp = (e) => {
          if (e.key === 'ArrowLeft') state.current.keys.left = false;
          if (e.key === 'ArrowRight') state.current.keys.right = false;
        };

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
        };
      }, []);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const dpr = window.devicePixelRatio || 1;
          canvas.width = 400 * dpr;
          canvas.height = 600 * dpr;
          const ctx = canvas.getContext('2d');
          ctx.scale(dpr, dpr);
        }
      }, [gameState]); // Re-run when canvas is mounted

      useEffect(() => {
        if (gameState !== 'playing') return;

        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        const gameLoop = () => {
          updatePhysics();
          draw(ctx);
          animationFrameId = requestAnimationFrame(gameLoop);
        };

        gameLoop();

        return () => cancelAnimationFrame(animationFrameId);
      }, [gameState]);

      const togglePause = () => {
        if (gameState !== 'playing' || showQuestion) return;
        const nextPauseState = !isManualPause;
        setIsManualPause(nextPauseState);
        state.current.isManualPaused = nextPauseState;
      };

      const handleAnswer = (selectedOption) => {
        const s = state.current;
        if (selectedOption === showQuestion.a) {
          s.score += 5;
          s.hp = Math.min(10, s.hp + 1);
          setPopupFeedback({ type: 'correct', text: '答對了！ +5分' });
        } else {
          s.score -= 3;
          setPopupFeedback({ type: 'wrong', text: `答錯了！ -3分 (正確: ${showQuestion.a})` });
        }
        
        setTimeout(() => {
          setPopupFeedback(null);
          setShowQuestion(null);
          
          s.currentQuestionIndex++;
          if (s.currentQuestionIndex >= s.questionsPool.length) {
            s.currentQuestionIndex = 0; 
            s.gameSpeed = Math.min(2.5, s.gameSpeed + 0.15);
          }
          s.currentQuestion = s.questionsPool[s.currentQuestionIndex];
          
          s.isPaused = false;
        }, 1500);
      };

      const updatePhysics = () => {
        const s = state.current;
        if (s.isPaused || s.isManualPaused) return;

        const canvasWidth = 400;
        const canvasHeight = 600;
        const topLimit = 80;

        if (s.keys.left) s.player.vx -= 1;
        else if (s.keys.right) s.player.vx += 1;
        else s.player.vx *= 0.8;

        if (s.player.vx > 6) s.player.vx = 6;
        if (s.player.vx < -6) s.player.vx = -6;

        s.player.x += s.player.vx;

        if (s.player.x < 0) {
          s.player.x = 0;
          s.player.vx = 0;
        } else if (s.player.x + s.player.width > canvasWidth) {
          s.player.x = canvasWidth - s.player.width;
          s.player.vx = 0;
        }

        s.player.vy += 0.4;
        if (s.player.vy > 12) s.player.vy = 12;
        s.player.y += s.player.vy;

        let lowestY = 0;
        s.platforms.forEach(p => {
          p.y -= s.gameSpeed;
          if (p.y > lowestY) lowestY = p.y;
          
          if (p.type === 'temporary' && p.activated && !p.broken) {
            p.tempTimer--;
            if (p.tempTimer <= 0) {
              p.broken = true;
            }
          }
        });

        for (let i = s.floatingTexts.length - 1; i >= 0; i--) {
          s.floatingTexts[i].y -= 1;
          s.floatingTexts[i].life--;
          if (s.floatingTexts[i].life <= 0) {
            s.floatingTexts.splice(i, 1);
          }
        }

        s.platforms = s.platforms.filter(p => p.y > 0);

        if (lowestY < canvasHeight - 75) {
          const numPlatforms = Math.random() < 0.75 ? 2 : 1; 

          for (let i = 0; i < numPlatforms; i++) {
            const typeRoll = Math.random();
            let pType = 'normal';
            
            if (typeRoll < 0.30) pType = 'node';
            else if (typeRoll < 0.50) pType = 'temporary';
            else if (typeRoll < 0.60) pType = 'spike';

            let pWidth, px;
            if (numPlatforms === 2) {
                pWidth = 80 + Math.random() * 30;
                if (i === 0) {
                    px = Math.random() * (190 - pWidth);
                } else {
                    px = 210 + Math.random() * (190 - pWidth);
                }
            } else {
                pWidth = 100 + Math.random() * 40;
                px = Math.random() * (canvasWidth - pWidth);
            }

            s.platforms.push({
              x: px,
              y: canvasHeight + 20,
              width: pWidth,
              height: 18,
              text: pType === 'node' ? "知識節點" : "",
              type: pType,
              consumed: false,
              broken: false,
              activated: false,
              tempTimer: 120,
              color: pType === 'node' ? '#f59e0b' : null
            });
          }
        }

        if (s.player.vy > 0) {
          for (let p of s.platforms) {
            if (p.broken) continue;

            if (s.player.x + s.player.width > p.x &&
                s.player.x < p.x + p.width &&
                s.player.y + s.player.height >= p.y &&
                s.player.y + s.player.height <= p.y + s.player.vy + 3) {
                
                if (p.type === 'spike') {
                   if (s.player.hurtTimer <= 0) {
                       s.score -= 2;
                       s.hp -= 0.5;
                       s.player.hurtTimer = 30;
                       s.player.vy = -5;
                       s.player.y = p.y - s.player.height;
                       s.floatingTexts.push({ x: s.player.x + 10, y: s.player.y, text: "-2", life: 40, color: '#ef4444' });
                   } else {
                       s.player.vy = -5;
                       s.player.y = p.y - s.player.height;
                   }
                   break;
                }

                s.player.y = p.y - s.player.height;
                s.player.vy = -s.gameSpeed;
                
                if (p.type === 'node' && !p.consumed) {
                  p.consumed = true;
                  p.text = "✔️"; 
                  p.color = '#22c55e'; 
                  
                  s.isPaused = true;
                  
                  const currentQ = s.currentQuestion;
                  const options = [currentQ.a, ...currentQ.wrong].sort(() => Math.random() - 0.5);
                  
                  setShowQuestion({
                    q: currentQ.q,
                    a: currentQ.a,
                    options: options
                  });
                }
                else if (p.type === 'temporary' && !p.activated) {
                  p.activated = true;
                }

                break; 
            }
          }
        }

        if (s.player.y < topLimit) {
          s.player.y = topLimit;
          s.player.vy = 2;
          if (s.player.hurtTimer <= 30) {
            s.hp -= 0.2;
            s.player.hurtTimer = 10;
          }
        }

        if (s.player.y > canvasHeight) {
          s.hp = 0;
        }

        if (s.hp <= 0) {
          s.lives -= 1;
          if (s.lives > 0) {
            s.hp = 10;
            s.player.x = 185;
            s.player.y = 150;
            s.player.vy = 0;
            s.player.vx = 0;
            s.player.hurtTimer = 150;
            
            s.platforms.push({
              x: 140,
              y: 280,
              width: 120,
              height: 18,
              text: "",
              type: 'normal',
              consumed: false,
              broken: false,
              activated: false,
              tempTimer: 120,
              color: null
            });
          } else {
            setFinalScore(s.score);
            setGameState('end');
          }
        }
      };

      const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => {
        const chars = text.split('');
        let line = '';
        let lines = [];
        
        for(let n = 0; n < chars.length; n++) {
          let testLine = line + chars[n];
          let metrics = ctx.measureText(testLine);
          let testWidth = metrics.width;
          if (testWidth > maxWidth && n > 0) {
            lines.push(line);
            line = chars[n];
          }
          else {
            line = testLine;
          }
        }
        lines.push(line);
        
        let totalHeight = lines.length * lineHeight;
        let startY = y - totalHeight / 2 + (lineHeight / 2);
        
        for(let i=0; i<lines.length; i++) {
          ctx.fillText(lines[i], x, startY + (i * lineHeight));
        }
      };

      const draw = (ctx) => {
        const s = state.current;
        const canvasWidth = 400;
        const canvasHeight = 600;

        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        ctx.fillStyle = '#334155';
        ctx.fillRect(0, 0, canvasWidth, 60);
        ctx.fillStyle = '#f8fafc';
        ctx.font = 'bold 18px "Microsoft JhengHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("往下跳躍尋找【知識節點】！", canvasWidth / 2, 30);

        ctx.fillStyle = '#94a3b8';
        for (let i = 0; i < canvasWidth; i += 20) {
          ctx.beginPath();
          ctx.moveTo(i, 60);
          ctx.lineTo(i + 10, 80);
          ctx.lineTo(i + 20, 60);
          ctx.fill();
        }

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        s.platforms.forEach(p => {
          if (p.broken) return;
          
          if (p.type === 'temporary' && p.activated) {
            if (Math.floor(p.tempTimer / 10) % 2 === 0) {
              ctx.globalAlpha = 0.4;
            }
          }

          ctx.fillStyle = p.color ? p.color : (
            p.type === 'temporary' ? '#38bdf8' :
            p.type === 'spike' ? '#64748b' :
            '#8b5cf6'
          );

          ctx.beginPath();
          if(ctx.roundRect) {
            ctx.roundRect(p.x, p.y, p.width, p.height, 6);
          } else {
            ctx.fillRect(p.x, p.y, p.width, p.height);
          }
          ctx.fill();
          ctx.globalAlpha = 1.0;

          if (p.type === 'spike') {
            ctx.fillStyle = '#ef4444';
            for (let i = 4; i < p.width - 4; i += 14) {
              ctx.beginPath();
              ctx.moveTo(p.x + i, p.y);
              ctx.lineTo(p.x + i + 7, p.y - 12);
              ctx.lineTo(p.x + i + 14, p.y);
              ctx.fill();
            }
          }
          
          if (p.text) {
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 16px "Microsoft JhengHei", sans-serif';
            ctx.fillText(p.text, p.x + p.width / 2, p.y + p.height / 2);
          }
        });

        if (s.player.hurtTimer > 0) {
          ctx.fillStyle = s.player.hurtTimer % 10 < 5 ? '#ef4444' : s.player.color;
          s.player.hurtTimer--;
        } else {
          ctx.fillStyle = s.player.color;
        }
        
        ctx.beginPath();
        if(ctx.roundRect) {
            ctx.roundRect(s.player.x, s.player.y, s.player.width, s.player.height, 8);
        } else {
            ctx.fillRect(s.player.x, s.player.y, s.player.width, s.player.height);
        }
        ctx.fill();

        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(s.player.x + 8, s.player.y + 10, 3, 0, Math.PI * 2);
        ctx.arc(s.player.x + 22, s.player.y + 10, 3, 0, Math.PI * 2);
        ctx.fill();

        s.floatingTexts.forEach(ft => {
          ctx.fillStyle = ft.color;
          ctx.font = 'bold 24px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(ft.text, ft.x, ft.y);
        });

        const uiY = 90;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(10, uiY, 100, 12);
        ctx.fillStyle = s.hp > 3 ? '#22c55e' : '#ef4444';
        ctx.fillRect(10, uiY, (Math.max(0, s.hp) / 10) * 100, 12);
        
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'left';
        ctx.font = '14px "Microsoft JhengHei", sans-serif';
        ctx.fillText(`命: ${'❤️'.repeat(Math.max(0, s.lives))}`, 10, uiY + 28);
        
        ctx.fillStyle = '#fcd34d';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`分數: ${s.score}`, canvasWidth - 10, uiY + 8);
      };

      return (
        <div className="min-h-screen bg-gray-900 flex items-center justify-center p-2 sm:p-4 touch-none select-none">
          <div className="relative w-full max-w-[400px] aspect-[2/3] bg-black rounded-xl overflow-hidden shadow-2xl shadow-indigo-500/20 ring-4 ring-slate-700">
            
            {/* Canvas 畫布 */}
            <canvas 
              ref={canvasRef}
              style={{ width: '100%', height: '100%', display: 'block' }}
            />

            {/* 回到主選單按鈕 */}
            {gameState === 'playing' && !showQuestion && (
              <button 
                onClick={() => setGameState('start')}
                className="absolute top-3 left-3 z-30 p-2.5 bg-slate-800/80 hover:bg-rose-600/90 text-slate-200 hover:text-white rounded-full shadow-lg backdrop-blur-sm border border-slate-500/50 transition-colors pointer-events-auto active:scale-95 flex items-center justify-center"
                title="回到主選單"
              >
                <IconHome size={22} />
              </button>
            )}

            {/* 手機觸控隱形按鈕區 */}
            {gameState === 'playing' && !showQuestion && !isManualPause && (
              <div className="absolute inset-0 z-10 flex pointer-events-auto">
                <div 
                  className="w-1/2 h-full opacity-0 hover:bg-white/5 active:bg-white/10 transition-colors"
                  onTouchStart={(e) => { e.preventDefault(); state.current.keys.left = true; }}
                  onTouchEnd={(e) => { e.preventDefault(); state.current.keys.left = false; }}
                  onMouseDown={() => state.current.keys.left = true}
                  onMouseUp={() => state.current.keys.left = false}
                  onMouseLeave={() => state.current.keys.left = false}
                />
                <div 
                  className="w-1/2 h-full opacity-0 hover:bg-white/5 active:bg-white/10 transition-colors"
                  onTouchStart={(e) => { e.preventDefault(); state.current.keys.right = true; }}
                  onTouchEnd={(e) => { e.preventDefault(); state.current.keys.right = false; }}
                  onMouseDown={() => state.current.keys.right = true}
                  onMouseUp={() => state.current.keys.right = false}
                  onMouseLeave={() => state.current.keys.right = false}
                />
              </div>
            )}

            {/* 底部實體操作按鈕區 */}
            {gameState === 'playing' && !showQuestion && (
              <div className="absolute bottom-6 left-0 w-full flex justify-between items-center px-6 z-20 pointer-events-none">
                <button 
                  className="pointer-events-auto bg-slate-800/70 hover:bg-slate-700/80 active:bg-slate-600 text-white p-4 rounded-full backdrop-blur-sm transition-colors shadow-lg shadow-black/40 border border-slate-500/50 flex justify-center items-center"
                  onMouseDown={() => state.current.keys.left = true}
                  onMouseUp={() => state.current.keys.left = false}
                  onMouseLeave={() => state.current.keys.left = false}
                  onTouchStart={(e) => { e.preventDefault(); state.current.keys.left = true; }}
                  onTouchEnd={(e) => { e.preventDefault(); state.current.keys.left = false; }}
                >
                  <IconArrowLeft size={32} />
                </button>
                
                <button 
                  className={`pointer-events-auto text-white p-4 rounded-full backdrop-blur-sm transition-colors shadow-lg shadow-black/40 border flex justify-center items-center ${isManualPause ? 'bg-emerald-600/80 border-emerald-400/50 hover:bg-emerald-500/90' : 'bg-indigo-600/80 border-indigo-400/50 hover:bg-indigo-500/90'}`}
                  onClick={togglePause}
                >
                  {isManualPause ? <IconPlay size={32} /> : <IconPause size={32} />}
                </button>

                <button 
                  className="pointer-events-auto bg-slate-800/70 hover:bg-slate-700/80 active:bg-slate-600 text-white p-4 rounded-full backdrop-blur-sm transition-colors shadow-lg shadow-black/40 border border-slate-500/50 flex justify-center items-center"
                  onMouseDown={() => state.current.keys.right = true}
                  onMouseUp={() => state.current.keys.right = false}
                  onMouseLeave={() => state.current.keys.right = false}
                  onTouchStart={(e) => { e.preventDefault(); state.current.keys.right = true; }}
                  onTouchEnd={(e) => { e.preventDefault(); state.current.keys.right = false; }}
                >
                  <IconArrowRight size={32} />
                </button>
              </div>
            )}

            {/* 手動暫停時的遮罩畫面 */}
            {isManualPause && !showQuestion && (
              <div className="absolute inset-0 z-15 bg-slate-900/60 flex flex-col items-center justify-center backdrop-blur-sm pointer-events-none">
                <h2 className="text-5xl font-black text-white tracking-widest drop-shadow-lg mb-4 animate-pulse">遊戲暫停</h2>
                <p className="text-slate-200 text-lg font-bold">點擊下方播放鍵繼續</p>
              </div>
            )}

            {/* 問答彈出視窗 */}
            {showQuestion && (
              <div className="absolute inset-0 z-30 bg-slate-900/90 flex flex-col items-center justify-center p-4">
                <div className="bg-slate-800 border-2 border-indigo-500 rounded-xl p-6 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in duration-200">
                  <h3 className="text-xl font-black text-indigo-400 mb-4 text-center">語詞解釋</h3>
                  <p className="text-slate-100 text-lg font-medium mb-6 leading-relaxed text-center">
                    {showQuestion.q}
                  </p>
                  
                  {!popupFeedback ? (
                    <div className="grid grid-cols-2 gap-3">
                      {showQuestion.options.map((opt, idx) => (
                        <button 
                          key={idx}
                          onClick={() => handleAnswer(opt)}
                          className="bg-slate-700 hover:bg-indigo-600 text-slate-100 py-3 px-2 rounded-lg font-bold transition-colors shadow-md active:scale-95 text-sm sm:text-base break-words"
                        >
                          {opt}
                        </button>
                      ))}
                    </div>
                  ) : (
                    <div className={`text-2xl font-black text-center py-6 animate-pulse ${popupFeedback.type === 'correct' ? 'text-green-400' : 'text-red-400'}`}>
                      {popupFeedback.text}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* 首頁開始畫面 - 課數選擇 */}
            {gameState === 'start' && (
              <div className="absolute inset-0 z-20 bg-slate-900 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
                <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-2 drop-shadow-md tracking-wider">
                  六下一到九課語詞解釋
                </h1>
                <p className="text-slate-400 text-sm mb-6">點擊左右兩側移動，找出解釋對應的語詞</p>
                
                <div className="w-full bg-slate-800 p-4 rounded-xl mb-6 border border-slate-700 shadow-inner">
                  <p className="text-slate-200 font-bold mb-3 flex items-center justify-center">
                    <IconList size={18} className="mr-2 text-indigo-400"/> 請選擇測驗課數 (可複選)
                  </p>
                  <div className="grid grid-cols-3 gap-2">
                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                      <button
                        key={num}
                        onClick={() => toggleLesson(num)}
                        className={`py-2 rounded-lg font-bold transition-all ${
                          selectedLessons.includes(num)
                            ? 'bg-indigo-500 text-white shadow-md shadow-indigo-500/30 ring-2 ring-indigo-300'
                            : 'bg-slate-700 text-slate-400 hover:bg-slate-600'
                        }`}
                      >
                        第 {num} 課
                      </button>
                    ))}
                  </div>
                </div>

                <button 
                  onClick={startGame}
                  disabled={selectedLessons.length === 0}
                  className={`flex items-center px-10 py-3 font-bold rounded-full text-lg transition-transform shadow-lg ${
                      selectedLessons.length > 0 
                      ? 'bg-emerald-600 hover:bg-emerald-500 text-white active:scale-95 shadow-emerald-600/50' 
                      : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                  }`}
                >
                  <IconPlay className="mr-2" size={24} /> 進入遊戲
                </button>
              </div>
            )}

            {/* 遊戲結束畫面 */}
            {gameState === 'end' && (
              <div className="absolute inset-0 z-20 bg-slate-900/95 flex flex-col items-center justify-center p-6 text-center animate-in fade-in zoom-in duration-300">
                <h2 className="text-4xl font-black text-red-500 mb-2 drop-shadow-md">測驗結束</h2>
                
                <div className="bg-slate-800 rounded-2xl p-6 mb-8 mt-4 border border-slate-700 w-full max-w-xs shadow-xl">
                  <p className="text-slate-400 text-sm mb-1">最終分數</p>
                  <p className="text-6xl font-black text-yellow-400">{finalScore}</p>
                </div>

                <div className="flex flex-col space-y-3 w-full max-w-[250px]">
                    <button 
                    onClick={startGame}
                    className="flex items-center justify-center px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-full transition-transform active:scale-95 shadow-lg shadow-emerald-600/50"
                    >
                    <IconRotateCcw className="mr-2" size={20} /> 再試一次
                    </button>

                    <button 
                    onClick={() => setGameState('start')}
                    className="flex items-center justify-center px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-full transition-transform active:scale-95 shadow-lg shadow-indigo-600/50"
                    >
                    <IconList className="mr-2" size={20} /> 重新選擇語詞課數
                    </button>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // 將 App 元件渲染到 HTML 中的 root 節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
