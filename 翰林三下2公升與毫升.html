<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小測量師：公升與毫升</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { touch-action: manipulation; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes wave {
            0% { transform: translateX(0) translateZ(0) scaleY(1); }
            50% { transform: translateX(-25%) translateZ(0) scaleY(1.05); }
            100% { transform: translateX(-50%) translateZ(0) scaleY(1); }
        }
        .animate-wave { animation: wave 3s linear infinite; }
        .liquid-transition { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        
        // 替換為容量相關的 Icon
        const Droplet = (props) => <IconWrapper {...props}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></IconWrapper>;
        const Beaker = (props) => <IconWrapper {...props}><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></IconWrapper>;
        const GlassWater = (props) => <IconWrapper {...props}><path d="M15.2 22H8.8a2 2 0 0 1-2-1.79L5 3h14l-1.81 17.21A2 2 0 0 1 15.2 22Z"/><path d="M6 12h12"/></IconWrapper>;
        
        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const CheckCircle = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const Trophy = (props) => <IconWrapper {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconWrapper>;
        const RotateCcw = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;

        // --- Reusable Measuring Cup Component ---
        const MeasuringCup = ({ volumeMl, maxVolume = 2000 }) => {
            const ticks = [];
            const totalTicks = maxVolume / 100; // 每個刻度 100ml
            
            for (let i = 0; i <= totalTicks; i++) {
                const isLiter = i % 10 === 0; // 0, 1000, 2000
                const is500 = i % 5 === 0 && !isLiter; // 500, 1500
                const bottomPercent = (i / totalTicks) * 100;
                
                if (i === 0) continue; // 不畫底部的 0
                
                ticks.push(
                    <div key={i} className="absolute left-0 border-b border-slate-600" 
                         style={{ 
                             bottom: `${bottomPercent}%`, 
                             width: isLiter ? '30px' : is500 ? '20px' : '10px',
                             borderBottomWidth: isLiter ? '2px' : '1px'
                         }}>
                        {isLiter && (
                            <span className="absolute left-8 -top-3 text-xs font-bold text-slate-700 bg-white/50 px-1 rounded">
                                {i / 10}L
                            </span>
                        )}
                        {is500 && (
                            <span className="absolute left-6 -top-2 text-[10px] text-slate-500">
                                {i * 100}
                            </span>
                        )}
                    </div>
                );
            }

            const fillPercentage = Math.min((volumeMl / maxVolume) * 100, 100);

            return (
                <div className="relative flex justify-center items-end py-6">
                    {/* Cup Container */}
                    <div className="relative w-32 h-64 border-4 border-t-0 border-slate-300 rounded-b-2xl bg-white/50 overflow-hidden shadow-inner flex items-end justify-center z-10">
                        
                        {/* Tick Marks Layer */}
                        <div className="absolute inset-0 z-20 pointer-events-none">
                            {ticks}
                        </div>

                        {/* Liquid Layer */}
                        <div className="relative w-full bg-blue-400/90 liquid-transition flex items-start justify-center overflow-hidden"
                             style={{ height: `${fillPercentage}%` }}>
                            {/* Wave effect at top of liquid */}
                            <div className="absolute top-0 w-[200%] h-4 bg-blue-300/50 rounded-[100%] -translate-y-1/2 animate-wave"></div>
                            
                            {/* Bubbles */}
                            <div className="absolute bottom-2 left-4 w-2 h-2 bg-white/40 rounded-full animate-bounce"></div>
                            <div className="absolute bottom-8 right-6 w-3 h-3 bg-white/30 rounded-full animate-bounce" style={{animationDelay: '0.5s'}}></div>
                        </div>
                        
                    </div>
                    {/* Shadow under cup */}
                    <div className="absolute -bottom-2 w-40 h-4 bg-slate-200 rounded-[100%] blur-sm -z-10"></div>
                </div>
            );
        };

        // --- Main App Component ---
        const VolumeGame = () => {
          const [currentTab, setCurrentTab] = useState('learn');
          const [score, setScore] = useState(0);
          const [animateScore, setAnimateScore] = useState(false);

          useEffect(() => {
            if (score > 0) {
              setAnimateScore(true);
              const timer = setTimeout(() => setAnimateScore(false), 300);
              return () => clearTimeout(timer);
            }
          }, [score]);

          const renderTabContent = () => {
            switch (currentTab) {
              case 'learn': return <LearnSection onComplete={() => setCurrentTab('practice_1')} />;
              case 'practice_1': return <ReadingScaleGame score={score} setScore={setScore} onComplete={() => setCurrentTab('practice_2')} />;
              case 'practice_2': return <ConversionGame score={score} setScore={setScore} onComplete={() => setCurrentTab('quiz')} />;
              case 'quiz': return <QuizMode score={score} setScore={setScore} onRestart={() => { setScore(0); setCurrentTab('learn'); }} />;
              default: return <LearnSection />;
            }
          };

          return (
            <div className="h-screen flex flex-col bg-blue-50 font-sans text-slate-800 overflow-hidden select-none">
              <header className="bg-white shadow-sm p-3 z-10 flex-none border-b border-blue-100">
                <div className="max-w-2xl mx-auto flex justify-between items-center">
                  <div className="flex items-center space-x-2">
                    <div className="bg-blue-500 p-2 rounded-xl text-white shadow-sm"><Droplet size={20} /></div>
                    <h1 className="text-lg font-bold text-blue-800 tracking-wide">小小測量師</h1>
                  </div>
                  <div className={`flex items-center bg-yellow-100 px-3 py-1.5 rounded-full border border-yellow-300 transition-transform duration-200 ${animateScore ? 'scale-110 ring-4 ring-yellow-200' : ''}`}>
                    <Trophy className={`text-yellow-600 mr-1.5 ${animateScore ? 'animate-spin' : ''}`} size={16} />
                    <span className="font-bold text-yellow-700">{score} 分</span>
                  </div>
                </div>
              </header>

              <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24 scroll-smooth">
                <div className="max-w-2xl mx-auto bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/50 p-5 min-h-[400px] animate-in fade-in slide-in-from-bottom-4 duration-500">
                  {renderTabContent()}
                </div>
              </main>

              <nav className="bg-white border-t border-slate-200 pb-safe pt-2 px-2 fixed bottom-0 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                <div className="max-w-2xl mx-auto flex justify-around items-end pb-2">
                  <NavButton active={currentTab === 'learn'} onClick={() => setCurrentTab('learn')} icon={<BookOpen size={22} />} label="學習" activeColor="text-blue-600" activeBg="bg-blue-100" activeDot="bg-blue-500" />
                  <NavButton active={currentTab === 'practice_1'} onClick={() => setCurrentTab('practice_1')} icon={<Beaker size={22} />} label="看量杯" activeColor="text-blue-600" activeBg="bg-blue-100" activeDot="bg-blue-500" />
                  <NavButton active={currentTab === 'practice_2'} onClick={() => setCurrentTab('practice_2')} icon={<GlassWater size={22} />} label="飲料店" activeColor="text-cyan-600" activeBg="bg-cyan-100" activeDot="bg-cyan-500" />
                  <NavButton active={currentTab === 'quiz'} onClick={() => setCurrentTab('quiz')} icon={<CheckCircle size={22} />} label="測驗" activeColor="text-green-600" activeBg="bg-green-100" activeDot="bg-green-500" />
                </div>
              </nav>
            </div>
          );
        };

        const NavButton = ({ active, onClick, icon, label, activeColor, activeBg, activeDot }) => (
          <button onClick={onClick} className={`flex flex-col items-center justify-center w-full py-2 px-1 transition-all duration-300 rounded-xl active:scale-95 touch-manipulation ${active ? `${activeColor} -translate-y-2` : 'text-slate-400 hover:text-slate-600'}`}>
            <div className={`p-1.5 rounded-full transition-all duration-300 ${active ? `${activeBg} shadow-sm` : ''}`}>{icon}</div>
            <span className={`text-[10px] font-medium mt-1 ${active ? 'opacity-100' : 'opacity-70'}`}>{label}</span>
            {active && <div className={`w-1 h-1 ${activeDot} rounded-full mt-1`}></div>}
          </button>
        );

        // --- 1. Learning Section ---
        const LearnSection = ({ onComplete }) => (
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-bold text-slate-800 flex items-center"><Play className="mr-2 text-blue-500" style={{fill: 'currentColor'}} size={24} /> 觀念學習</h2>
              <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded">CH2 公升與毫升</span>
            </div>
            
            {/* Video Container - 使用均一教育平台或康軒等常見的公升毫升教學影片 */}
            <div className="aspect-video w-full bg-slate-900 rounded-2xl overflow-hidden shadow-lg ring-4 ring-blue-50" style={{position:'relative', paddingBottom: '56.25%', height: 0}}>
              <iframe src="https://www.youtube.com/embed/zH0P1Q9_1H4" title="公升與毫升教學" style={{position:'absolute', top:0, left:0, width:'100%', height:'100%'}} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen className="pointer-events-auto"></iframe>
            </div>

            {/* Notes */}
            <div className="bg-gradient-to-br from-blue-50 to-cyan-50 p-5 rounded-2xl border border-blue-100 mt-4 shadow-sm">
              <h3 className="text-lg font-bold text-blue-800 mb-3 flex items-center"><BookOpen className="w-5 h-5 mr-2" />重點筆記</h3>
              <div className="space-y-3 text-base text-slate-700">
                <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                  <div className="bg-blue-100 text-blue-700 font-bold rounded-lg w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-sm">公式</div>
                  <div className="text-lg">1 公升 (L) = <strong className="text-blue-600">1000</strong> 毫升 (ml)</div>
                </div>
                <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                   <div className="bg-cyan-100 text-cyan-700 font-bold rounded-lg w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-sm">刻度</div>
                   <div>
                      <p>量杯上每一大格通常是 1 公升。</p>
                      <p className="text-sm text-slate-500">注意水面切齊哪一個刻度喔！</p>
                   </div>
                </div>
              </div>
            </div>
            <button onClick={onComplete} className="w-full bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center shadow-lg shadow-blue-500/20 active:scale-95 transition-all">我學會了，開始練習！ <ArrowRight className="ml-2" /></button>
          </div>
        );

        // --- 2. Reading Scale Game ---
        const ReadingScaleGame = ({ score, setScore, onComplete }) => {
            const [targetVolume, setTargetVolume] = useState(500);
            const [options, setOptions] = useState([]);
            const [feedback, setFeedback] = useState('');
            const [progress, setProgress] = useState(0);
            const TOTAL_QUESTIONS = 6;
            
            useEffect(() => {
                if(progress < TOTAL_QUESTIONS) generateQuestion();
            }, [progress]);

            const generateQuestion = () => {
                setFeedback('');
                // 隨機生成 100ml 到 1900ml 的容量
                const volume = Math.floor(Math.random() * 19 + 1) * 100;
                setTargetVolume(volume);
                
                // 產生選項
                const correct = formatVolume(volume);
                
                let opts = new Set([correct]);
                while(opts.size < 3) {
                    // 隨機產生混淆選項 (+- 100ml, +- 500ml，或者完全錯誤的單位概念)
                    let errorShift = (Math.floor(Math.random() * 3) + 1) * 100; 
                    if (Math.random() > 0.5) errorShift *= -1;
                    
                    let wrongVol = volume + errorShift;
                    if (wrongVol <= 0) wrongVol = volume + 500;
                    if (wrongVol > 2000) wrongVol = volume - 500;
                    
                    let wrongText = formatVolume(wrongVol);
                    
                    // 製造單位看錯的陷阱 (例如 1200ml 看成 1L 20ml)
                    if (Math.random() > 0.7 && volume > 1000 && (volume % 1000 !== 0)) {
                        const l = Math.floor(volume/1000);
                        const m = volume % 1000;
                        wrongText = `${l}公升 ${m/10}毫升`; 
                    }
                    
                    opts.add(wrongText);
                }
                
                setOptions(Array.from(opts).sort(() => Math.random() - 0.5));
            };

            const formatVolume = (ml) => {
                const l = Math.floor(ml / 1000);
                const remMl = ml % 1000;
                if (l > 0 && remMl > 0) return `${l}公升 ${remMl}毫升`;
                if (l > 0) return `${l}公升`;
                return `${remMl}毫升`;
            };

            const handleAnswer = (ans) => {
                if (feedback) return;
                const correctAns = formatVolume(targetVolume);
                if (ans === correctAns) {
                    setFeedback('correct');
                    setScore(s => s + 10);
                    setTimeout(() => setProgress(p => p + 1), 1000);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 1000);
                }
            };

            if (progress >= TOTAL_QUESTIONS) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-yellow-100 rounded-full mb-4 ring-8 ring-yellow-50"><Trophy className="text-yellow-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">眼力真好！</h2>
                    <p className="text-slate-600 mb-8">你已經學會看量杯了</p>
                    <button onClick={onComplete} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">前往下一關</button>
                </div>
            );

            return (
                <div className="text-center space-y-6">
                    <div className="flex justify-between items-center border-b border-blue-100 pb-4">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center"><span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-sm">1</span>讀出容量</h2>
                        <div className="flex space-x-1">{[...Array(TOTAL_QUESTIONS)].map((_, i) => <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i < progress ? 'bg-blue-500' : 'bg-slate-200'}`}></div>)}</div>
                    </div>

                    <div className="flex flex-col items-center py-4 bg-white rounded-xl shadow-sm border border-slate-100">
                        <MeasuringCup volumeMl={targetVolume} />
                        <p className="mt-4 text-slate-500 text-sm">水面切齊哪一個刻度呢？</p>
                    </div>

                    <div className="grid grid-cols-1 gap-3">
                        {options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} 
                                className={`py-4 rounded-xl text-xl font-bold border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && opt === formatVolume(targetVolume) ? 'bg-blue-100 border-blue-500 text-blue-700' : 
                                  feedback === 'incorrect' && opt === formatVolume(targetVolume) ? 'bg-blue-100 border-blue-500 text-blue-700 opacity-50' : 
                                  feedback === 'incorrect' && opt !== formatVolume(targetVolume) ? 'bg-red-50 border-red-200 text-red-500 opacity-80' :
                                  'bg-white border-slate-200 hover:border-blue-300 text-slate-700'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    
                    <div className="h-6 flex justify-center">
                        {feedback === 'correct' && <span className="text-blue-600 font-bold flex items-center"><CheckCircle className="mr-1" size={20}/> 答對了！</span>}
                        {feedback === 'incorrect' && <span className="text-red-500 font-bold">再看仔細一點喔！水在哪一條線上？</span>}
                    </div>
                </div>
            );
        };

        // --- 3. Conversion Game (Drink Shop) ---
        const ConversionGame = ({ score, setScore, onComplete }) => {
            const [q, setQ] = useState({ l: 1, ml: 500 });
            const [mode, setMode] = useState('toMl'); // 'toMl' or 'toL'
            const [options, setOptions] = useState([]);
            const [feedback, setFeedback] = useState('');
            const [progress, setProgress] = useState(0);
            const TOTAL_QUESTIONS = 6;

            useEffect(() => {
                if (progress < TOTAL_QUESTIONS) setupRound();
            }, [progress]);

            const setupRound = () => {
                setFeedback('');
                const isToMl = Math.random() > 0.5;
                setMode(isToMl ? 'toMl' : 'toL');
                
                const l = Math.floor(Math.random() * 3) + 1; // 1-3 L
                // 加入 50 這種容易算錯的陷阱數字
                const mlOptions = [50, 80, 150, 200, 500, 800];
                const ml = mlOptions[Math.floor(Math.random() * mlOptions.length)];
                setQ({l, ml});

                const totalMl = l * 1000 + ml;
                
                let correct, wrong1, wrong2;
                if (isToMl) {
                    correct = `${totalMl}毫升`;
                    // 陷阱 1：1公升50毫升 -> 150毫升 (少加0)
                    wrong1 = `${l * 100 + ml}毫升`; 
                    if (ml < 100) wrong1 = `${l}${ml}毫升`; // 1, 50 -> 150
                    // 陷阱 2：多一千
                    wrong2 = `${totalMl + 1000}毫升`;
                } else {
                    correct = `${l}公升 ${ml}毫升`;
                    if (ml < 100) {
                        // totalMl 例如 1050
                        wrong1 = `${l}公升 ${ml*10}毫升`; // 1050 -> 1公升500毫升
                        wrong2 = `${Math.floor(totalMl/100)}公升 ${ml}毫升`; // 亂算
                    } else {
                        wrong1 = `${l+1}公升 ${ml}毫升`;
                        wrong2 = `${l}公升 ${ml-100}毫升`;
                    }
                }
                
                // 去重複並打亂
                let opts = new Set([correct, wrong1, wrong2]);
                while(opts.size < 3) {
                    opts.add(isToMl ? `${totalMl + 500}毫升` : `${l+2}公升 0毫升`);
                }
                setOptions(Array.from(opts).sort(() => Math.random() - 0.5));
            };

            const handleOptionClick = (opt) => {
                if(feedback) return;
                const totalMl = q.l * 1000 + q.ml;
                const correct = mode === 'toMl' ? `${totalMl}毫升` : `${q.l}公升 ${q.ml}毫升`;
                
                if (opt === correct) {
                    setFeedback('correct');
                    setScore(s => s + 15);
                    setTimeout(() => setProgress(p => p + 1), 1000);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 1000);
                }
            };

            if (progress >= TOTAL_QUESTIONS) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-cyan-100 rounded-full mb-4 ring-8 ring-cyan-50"><GlassWater className="text-cyan-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">飲料店小店長！</h2>
                    <p className="text-slate-600 mb-8">容量換算難不倒你</p>
                    <button onClick={onComplete} className="w-full bg-cyan-500 text-white py-4 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">挑戰總測驗</button>
                </div>
            );

            return (
                 <div className="text-center space-y-6">
                    <div className="flex justify-between items-center border-b border-cyan-100 pb-4">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center"><span className="bg-cyan-100 text-cyan-600 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-sm">2</span>飲料店換算</h2>
                        <div className="flex space-x-1">{[...Array(TOTAL_QUESTIONS)].map((_, i) => <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i < progress ? 'bg-cyan-500' : 'bg-slate-200'}`}></div>)}</div>
                    </div>
                    
                    <div className="bg-cyan-50 p-6 rounded-2xl border-2 border-cyan-100 relative overflow-hidden">
                        <div className="absolute -right-4 -top-4 opacity-10 rotate-12 text-cyan-500"><GlassWater size={120}/></div>
                        <p className="text-slate-500 mb-2 relative z-10">客人點了...</p>
                        <div className="text-3xl font-black text-slate-800 relative z-10">
                            {mode === 'toMl' 
                                ? <>{q.l}公升 {q.ml}毫升 <br/><span className="text-cyan-600 text-xl">= ? 毫升</span></>
                                : <>{q.l * 1000 + q.ml}毫升 <br/><span className="text-cyan-600 text-xl">= ? 公升 ? 毫升</span></>
                            }
                        </div>
                    </div>

                    <div className="space-y-3">
                        {options.map((opt, i) => (
                            <button key={i} onClick={() => handleOptionClick(opt)} disabled={!!feedback}
                            className={`w-full py-4 rounded-xl text-lg font-bold border-2 transition-all active:scale-95 flex items-center justify-center
                                ${feedback === 'correct' && (mode === 'toMl' ? opt === `${q.l * 1000 + q.ml}毫升` : opt === `${q.l}公升 ${q.ml}毫升`) 
                                    ? 'bg-green-100 border-green-500 text-green-700' 
                                    : feedback === 'incorrect' && opt !== (mode === 'toMl' ? `${q.l * 1000 + q.ml}毫升` : `${q.l}公升 ${q.ml}毫升`) && feedback
                                    ? 'bg-red-50 border-red-200 text-red-500 opacity-80'
                                    : 'bg-white border-slate-200 hover:border-cyan-300'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    {feedback === 'incorrect' && <div className="text-red-500 font-bold animate-pulse">算錯囉，記得 1公升 = 1000毫升，注意有沒有少一個零！</div>}
                </div>
            );
        };

        // --- 4. Quiz Mode ---
        const QuizMode = ({ score, setScore, onRestart }) => {
            const [idx, setIdx] = useState(0);
            const [finished, setFinished] = useState(false);
            const [feedback, setFeedback] = useState(null);
            
            // 包含 6 題符合三年級下學期子單元內容的題目
            const questions = [
                {
                    q: "1 公升等於幾毫升？",
                    options: ["10 毫升", "100 毫升", "1000 毫升"],
                    ans: 2
                },
                {
                    q: "媽媽買了一瓶家庭號鮮奶，容量大約是多少比較合理？",
                    options: ["20 毫升", "2 公升", "20 公升"],
                    ans: 1
                },
                {
                    q: "3000 毫升的水，也可以說是多少？",
                    options: ["3 公升", "30 公升", "300 公升"],
                    ans: 0
                },
                {
                    q: "這瓶果汁有 2公升50毫升，請問是多少毫升？",
                    options: ["250 毫升", "2050 毫升", "2005 毫升"],
                    ans: 1 // 測試補零陷阱
                },
                {
                    q: "爸爸喝了 500 毫升的水，還差多少毫升才是一公升？",
                    options: ["50 毫升", "500 毫升", "1500 毫升"],
                    ans: 1
                },
                {
                    q: "量杯上，1公升和2公升之間如果有10個小格，每一小格代表多少？",
                    options: ["10 毫升", "100 毫升", "500 毫升"],
                    ans: 1
                }
            ];

            const handleAnswer = (optIdx) => {
                if (feedback) return;
                if (optIdx === questions[idx].ans) {
                    setFeedback('correct');
                    setScore(s => s + 20);
                } else {
                    setFeedback('incorrect');
                }
                setTimeout(() => {
                    if (idx + 1 < questions.length) {
                        setIdx(i => i + 1);
                        setFeedback(null);
                    } else {
                        setFinished(true);
                    }
                }, 1500);
            };

            if (finished) return (
                <div className="text-center py-10 space-y-6 animate-in slide-in-from-bottom">
                    <div className="inline-block p-6 bg-yellow-100 rounded-full mb-4 shadow-inner"><Trophy size={80} className="text-yellow-600" /></div>
                    <h2 className="text-4xl font-bold text-slate-800">恭喜過關！</h2>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p className="text-sm text-slate-400 uppercase tracking-widest mb-2">總得分</p>
                        <p className="text-6xl font-black text-blue-500 mb-4">{score}</p>
                        <p className="text-lg text-slate-600">你是小小容量計算專家！</p>
                    </div>
                    <button onClick={onRestart} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 flex items-center justify-center shadow-lg active:scale-95 transition-all"><RotateCcw className="mr-2" size={20} /> 再玩一次</button>
                </div>
            );

            return (
                <div className="py-2">
                    <div className="mb-6 flex justify-between items-center text-sm font-medium text-slate-400"><span className="bg-slate-100 px-3 py-1 rounded-full">第 {idx + 1} / {questions.length} 題</span><span>分數: {score}</span></div>
                    <h3 className="text-xl font-bold text-slate-800 mb-6 leading-relaxed">{questions[idx].q}</h3>
                    <div className="space-y-3">
                        {questions[idx].options.map((opt, i) => (
                            <button key={i} onClick={() => handleAnswer(i)} disabled={!!feedback}
                             className={`w-full text-left p-4 rounded-xl text-lg font-medium border-2 transition-all active:scale-98 
                             ${feedback === 'correct' && i === questions[idx].ans ? 'bg-green-100 border-green-500 text-green-800' : 
                               feedback === 'incorrect' && i !== questions[idx].ans && feedback ? 'bg-red-50 border-red-200 text-red-800 opacity-50' : 
                               'bg-white border-slate-200 hover:border-blue-400'}`}>
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-bold ${feedback === 'correct' && i === questions[idx].ans ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-500'}`}>{String.fromCharCode(65+i)}</div>
                                    {opt}
                                    {feedback === 'correct' && i === questions[idx].ans && <CheckCircle className="ml-auto text-green-600" />}
                                </div>
                            </button>
                        ))}
                    </div>
                    {feedback && <div className={`mt-6 text-center font-bold text-xl ${feedback === 'correct' ? 'text-green-500' : 'text-red-500'}`}>{feedback === 'correct' ? '正確！' : '答錯囉...'}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VolumeGame />);
    </script>
</body>
</html>
