<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大家來找碴 - 圖卡生成器</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTML2Canvas for downloading images -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
        }

        /* Card Styles to ensure print quality look */
        .game-card {
            aspect-ratio: 3/4;
            border: 3px solid #ef4444; /* red-500 */
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-image-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: #fff;
            height: 75%; /* Roughly top 3/4 */
            overflow: hidden; /* Ensure scaled image doesn't overflow container logic */
        }

        .card-image-area img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transform: scale(1.45); /* 放大1.45倍，讓圖案更清楚 */
            transition: transform 0.3s ease;
        }

        .card-text-area {
            height: 25%; /* Roughly bottom 1/4 */
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #fee2e2;
            padding: 5px;
            z-index: 10; /* Ensure text stays on top */
            background: white;
        }

        .card-text {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 500;
            color: #1f2937;
            text-align: center;
            line-height: 1;
            transform: translateY(-12px);
        }
        
        /* Animation for Toast */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // API key is handled automatically by the environment
        const apiKey = "";

        // --- Icons defined as components ---
        const Sparkles = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
            </svg>
        );

        const Loader2 = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </svg>
        );

        const Plus = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M5 12h14" />
                <path d="M12 5v14" />
            </svg>
        );

        const ImageIcon = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                <circle cx="9" cy="9" r="2" />
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
            </svg>
        );

        const Download = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" x2="12" y1="15" y2="3" />
            </svg>
        );

        const Trash2 = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M3 6h18" />
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
        );

        const Bot = (props) => (
             <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M12 8V4H8" />
                <rect width="16" height="12" x="4" y="8" rx="2" />
                <path d="M2 14h2" />
                <path d="M20 14h2" />
                <path d="M15 13v2" />
                <path d="M9 13v2" />
            </svg>
        );

        const Settings = (props) => (
             <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        );

        // --- Custom Components ---
        const Modal = ({ isOpen, onClose, onConfirm, title, message }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-xl p-6 max-w-sm w-full mx-4 shadow-2xl transform transition-all">
                        <h3 className="text-xl font-bold text-gray-900 mb-2">{title}</h3>
                        <p className="text-gray-600 mb-6">{message}</p>
                        <div className="flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium">取消</button>
                            <button onClick={onConfirm} className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium">確定</button>
                        </div>
                    </div>
                </div>
            );
        };

        const Toast = ({ message, type = 'info' }) => {
            if (!message) return null;
            const bgClass = type === 'error' ? 'bg-red-600' : 'bg-gray-800';
            return (
                <div className={`fixed bottom-6 right-6 ${bgClass} text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 toast-enter z-50`}>
                    {type === 'info' && <Loader2 className="w-4 h-4 animate-spin" />}
                    <span>{message}</span>
                </div>
            );
        };

        // Helper function: fetch with exponential backoff and text parsing check
        const fetchWithRetry = async (url, options) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < delays.length + 1; i++) {
                try {
                    const response = await fetch(url, options);
                    const text = await response.text();
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${text}`);
                    }
                    if (!text) {
                        throw new SyntaxError("Empty response from server");
                    }
                    return JSON.parse(text);
                } catch (error) {
                    if (i === delays.length) {
                        throw error;
                    }
                    // Wait before retrying
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        function App() {
            const [inputText, setInputText] = useState("");
            const [generatedCards, setGeneratedCards] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [logs, setLogs] = useState([]);
            
            // UI States
            const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [toastMsg, setToastMsg] = useState(null);
            
            // Edit Options
            const [diffOptions, setDiffOptions] = useState({
                color: true,
                direction: true,
                part: true
            });

            // --- Helper: Flip Image Programmatically ---
            const flipImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        // Flip horizontally
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.src = base64;
                });
            };

            // --- API Logic ---
            const addLog = (msg) => setLogs(prev => [...prev, msg]);

            const generateImage = async (prompt) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                
                const payload = {
                    instances: [{ prompt: prompt }],
                    parameters: { sampleCount: 1, aspectRatio: "3:4" } 
                };

                try {
                    const data = await fetchWithRetry(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (data.predictions && data.predictions[0]) {
                        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    }
                    throw new Error(data.error?.message || "No image generated");
                } catch (error) {
                    console.error("Gen Error:", error);
                    throw error;
                }
            };

            const editImage = async (base64Image, word, strategy) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
                
                const base64Data = base64Image.replace(/^data:image\/(png|jpeg|jpg);base64,/, "");

                let strategyPrompt = "";
                let logMsg = "";

                switch (strategy) {
                    case "color":
                        strategyPrompt = `Change the main color of the ${word} to a completely different, highly contrasting color (e.g., if it's red, make it bright blue or neon green). The color change MUST be dramatic and extremely obvious.`;
                        logMsg = "正在應用：顏色差異";
                        break;
                    case "part":
                        strategyPrompt = `Add a completely new, large, and obvious accessory (like a huge hat, thick glasses, or a big bow) to the ${word}, OR completely remove a major visible feature. The difference MUST be huge and impossible to miss.`;
                        logMsg = "正在應用：部件差異";
                        break;
                    default:
                        strategyPrompt = `Make one massive, glaringly obvious change to the ${word}.`;
                        logMsg = "正在應用：自動差異";
                }
                
                addLog(logMsg);

                const prompt = `You are a Spot the Difference puzzle creator. I provided an image of the concept "${word}". You MUST generate a modified version.\n\nINSTRUCTION: ${strategyPrompt}\n\nCRITICAL: The generated image MUST have a clear, highly visible difference from the original. IMPORTANT: Do NOT include any text, letters, words, or Chinese characters. Visuals only.`;

                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/png", data: base64Data } }
                        ]
                    }],
                    generationConfig: {
                        responseModalities: ["TEXT", "IMAGE"], // 允許返回圖片格式
                    }
                };

                try {
                    const data = await fetchWithRetry(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (data.error) {
                         throw new Error(data.error.message);
                    }

                    const parts = data.candidates?.[0]?.content?.parts;
                    
                    // 如果被安全機制阻擋或返回了純文字解釋，記錄下來
                    const textPart = parts?.find(p => p.text);
                    if (textPart && !parts?.find(p => p.inlineData)) {
                        console.warn("AI 回應了文字而不是圖片:", textPart.text);
                    }

                    const imagePart = parts?.find(p => p.inlineData);
                    
                    if (imagePart) {
                        return {
                            url: `data:${imagePart.inlineData.mimeType || 'image/png'};base64,${imagePart.inlineData.data}`,
                            strategy: strategy
                        };
                    }
                    
                    throw new Error("模型未返回圖片");
                } catch (error) {
                    console.error("Edit Error:", error);
                    return null; // 回傳 null，觸發後備生成機制
                }
            };

            const processWords = async () => {
                if (!inputText.trim()) return;
                
                const strategies = Object.keys(diffOptions).filter(k => diffOptions[k]);
                if (strategies.length === 0) {
                    showToast("請至少選擇一種差異類型！", 'error');
                    return;
                }

                const lines = inputText.split('\n').filter(line => line.trim() !== "");
                if (lines.length < 2) {
                    showToast("請確保第一行為課數與課名，第二行起為語詞！", 'error');
                    return;
                }

                // 解析第一行，取得課數 (取第一個空白或標點符號前的文字作為前綴)
                // 例如: "第一課 冰箱" -> prefix 提取出 "第一課"
                const firstLine = lines[0].trim();
                const lessonPrefix = firstLine.split(/[\s,，、_]+/)[0]; 

                // 從第二行開始解析需要生成的語詞
                const remainingText = lines.slice(1).join('\n');
                const words = remainingText.split(/[\s,，、]+/).filter(w => w.trim() !== "");
                
                if (words.length === 0) {
                    showToast("請在第二行之後輸入有效的語詞！", 'error');
                    return;
                }

                setIsProcessing(true);
                setGeneratedCards([]);
                setLogs(["開始處理..."]);

                for (const cleanWord of words) {
                    const cardId = Date.now() + Math.random();
                    const selectedStrategy = strategies[Math.floor(Math.random() * strategies.length)];

                    addLog(`正在生成「${cleanWord}」的原始圖片...`);

                    try {
                        const basePrompt = `Cute cartoon vector illustration of the concept "${cleanWord}", simple thick outlines, flat colors, isolated on white background. No background scenery, only the object. Child-friendly style. IMPORTANT: Do NOT include any text, letters, words, or Chinese characters in the image. Visuals only.`;
                        const img1 = await generateImage(basePrompt);
                        
                        let img2 = null;
                        let appliedStrategy = selectedStrategy;

                        // --- 方向差異特殊處理 (數位鏡像) ---
                        if (selectedStrategy === 'direction') {
                            addLog(`正在應用：方向差異 (數位鏡像)`);
                            img2 = await flipImage(img1);
                        } else {
                            // 其他差異交給 AI 處理
                            const result = await editImage(img1, cleanWord, selectedStrategy);
                            img2 = result ? result.url : null;
                        }

                        // 容錯備用邏輯
                        if (!img2) {
                            addLog(`差異生成重試 (Fallback)...`);
                            const altPrompt = `Cute cartoon vector illustration of the concept "${cleanWord}" with a different color scheme, simple thick outlines, flat colors, isolated on white background. IMPORTANT: Do NOT include any text, letters, words, or Chinese characters in the image. Visuals only.`;
                            img2 = await generateImage(altPrompt);
                            appliedStrategy = "color (fallback)";
                        }

                        const strategyLabels = {
                            color: "顏色差異",
                            direction: "方向差異",
                            part: "部件差異"
                        };
                        const label = strategyLabels[appliedStrategy] || appliedStrategy;

                        setGeneratedCards(prev => [...prev, {
                            id: cardId,
                            word: cleanWord,
                            prefix: lessonPrefix, // 儲存課數前綴
                            img1: img1,
                            img2: img2,
                            strategyLabel: label
                        }]);

                    } catch (err) {
                        addLog(`錯誤: 無法生成「${cleanWord}」- 伺服器異常，請稍後再試。`);
                        console.error(err);
                    }
                }

                setIsProcessing(false);
                addLog("任務處理完畢！");
            };

            // --- Download Logic ---
            const showToast = (msg, type='info') => {
                setToastMsg({ text: msg, type });
                setTimeout(() => setToastMsg(null), 3000);
            };

            const downloadCard = async (elementId, filename) => {
                const element = document.getElementById(elementId);
                if (!element) return;
                
                try {
                    const canvas = await html2canvas(element, { 
                        scale: 2,
                        backgroundColor: null,
                        useCORS: true
                    });
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = dataUrl;
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                } catch (err) {
                    console.error("Download failed", err);
                    showToast(`下載失敗: ${filename}`, 'error');
                }
            };

            const downloadAll = async () => {
                if (generatedCards.length === 0) return;
                showToast("開始下載所有圖片...");

                for (let i = 0; i < generatedCards.length; i++) {
                    const card = generatedCards[i];
                    const prefix = card.prefix ? `${card.prefix}_` : '';
                    
                    await downloadCard(`card-${card.id}-1`, `${prefix}${card.word}_原圖.png`);
                    await new Promise(r => setTimeout(r, 800));
                    await downloadCard(`card-${card.id}-2`, `${prefix}${card.word}_找碴版_${card.strategyLabel}.png`);
                    await new Promise(r => setTimeout(r, 800));
                }
                showToast("下載完成！");
            };

            // --- Clear Logic ---
            const clearAllTrigger = () => {
                if (generatedCards.length === 0) return;
                setModalConfig({
                    isOpen: true,
                    title: '確認清空',
                    message: '確定要清空所有生成的圖卡嗎？此動作無法復原。',
                    onConfirm: () => {
                        setGeneratedCards([]);
                        setLogs([]);
                        setModalConfig({ ...modalConfig, isOpen: false });
                        showToast("已清空所有圖卡");
                    }
                });
            };

            const toggleOption = (key) => {
                setDiffOptions(prev => ({ ...prev, [key]: !prev[key] }));
            };

            return (
                <div className="min-h-screen pb-20 relative">
                    {/* Header */}
                    <div className="bg-red-500 text-white p-6 shadow-md">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <Sparkles className="w-8 h-8" />
                                <div>
                                    <h1 className="text-2xl font-bold tracking-wider">大家來找碴 - 圖卡生成工廠</h1>
                                    <p className="text-xs text-red-100 opacity-90 font-mono">Model: Gemini 2.5 Flash Image & Imagen 4</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 text-sm bg-red-600 px-3 py-1 rounded-full border border-red-400">
                                <Bot className="w-4 h-4" />
                                <span>Gemini Powered</span>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-5xl mx-auto p-6 space-y-8">

                        {/* Input & Settings Section */}
                        <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 mt-4">
                            
                            {/* Text Input */}
                            <label className="block text-gray-700 font-bold mb-2 flex items-center gap-2">
                                <Plus className="w-5 h-5 text-red-500" />
                                1. 輸入語詞 (第一行為課數與課名，第二行起輸入語詞)
                            </label>
                            <textarea
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                className="w-full border-2 border-gray-200 rounded-xl p-4 focus:outline-none focus:border-red-400 focus:ring-4 focus:ring-red-50 transition-all text-lg mb-6"
                                rows="5"
                                placeholder={"例如：\n第一課 冰箱\n冰箱\n蘋果 香蕉"}
                            />

                            {/* Difference Settings */}
                            <label className="block text-gray-700 font-bold mb-3 flex items-center gap-2">
                                <Settings className="w-5 h-5 text-red-500" />
                                2. 設定差異類型 (每組圖片將隨機使用其中一種)
                            </label>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                                <div 
                                    onClick={() => toggleOption('color')}
                                    className={`cursor-pointer p-4 rounded-xl border-2 transition-all flex items-center gap-3 select-none
                                        ${diffOptions.color ? 'border-red-500 bg-red-50' : 'border-gray-200 hover:border-red-200'}`}
                                >
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${diffOptions.color ? 'bg-red-500 border-red-500' : 'border-gray-300'}`}>
                                        {diffOptions.color && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7" /></svg>}
                                    </div>
                                    <span className={diffOptions.color ? 'text-red-700 font-bold' : 'text-gray-600'}>顏色差異</span>
                                </div>

                                <div 
                                    onClick={() => toggleOption('direction')}
                                    className={`cursor-pointer p-4 rounded-xl border-2 transition-all flex items-center gap-3 select-none
                                        ${diffOptions.direction ? 'border-red-500 bg-red-50' : 'border-gray-200 hover:border-red-200'}`}
                                >
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${diffOptions.direction ? 'bg-red-500 border-red-500' : 'border-gray-300'}`}>
                                        {diffOptions.direction && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7" /></svg>}
                                    </div>
                                    <span className={diffOptions.direction ? 'text-red-700 font-bold' : 'text-gray-600'}>方向差異</span>
                                </div>

                                <div 
                                    onClick={() => toggleOption('part')}
                                    className={`cursor-pointer p-4 rounded-xl border-2 transition-all flex items-center gap-3 select-none
                                        ${diffOptions.part ? 'border-red-500 bg-red-50' : 'border-gray-200 hover:border-red-200'}`}
                                >
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${diffOptions.part ? 'bg-red-500 border-red-500' : 'border-gray-300'}`}>
                                        {diffOptions.part && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7" /></svg>}
                                    </div>
                                    <span className={diffOptions.part ? 'text-red-700 font-bold' : 'text-gray-600'}>部件差異</span>
                                </div>
                            </div>
                            
                            {/* Action Button */}
                            <div className="flex flex-col sm:flex-row gap-4 items-center justify-between border-t pt-6">
                                <div className="text-gray-500 text-sm italic">
                                    {isProcessing ? (
                                        <span className="flex items-center gap-2 text-red-500 animate-pulse">
                                            <Loader2 className="w-4 h-4 animate-spin" />
                                            {logs[logs.length - 1] || "處理中..."}
                                        </span>
                                    ) : (
                                        "系統將自動使用 Gemini 視覺模型生成差異圖卡"
                                    )}
                                </div>
                                <button
                                    onClick={processWords}
                                    disabled={isProcessing || !inputText.trim()}
                                    className={`px-8 py-3 rounded-xl font-bold text-white shadow-lg transition-all flex items-center gap-2
                                        ${isProcessing 
                                            ? 'bg-gray-400 cursor-not-allowed' 
                                            : 'bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 hover:shadow-xl transform hover:-translate-y-0.5'
                                        }`}
                                >
                                    {isProcessing ? 'AI 生成中...' : '開始製作圖卡'}
                                    {!isProcessing && <Sparkles className="w-5 h-5" />}
                                </button>
                            </div>
                        </div>

                        {/* Results Section */}
                        {generatedCards.length > 0 && (
                            <div className="space-y-8">
                                <div className="flex items-center justify-between border-b pb-4">
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                        <ImageIcon className="w-6 h-6 text-red-500" />
                                        生成結果
                                    </h2>
                                    
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={clearAllTrigger}
                                            className="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors"
                                        >
                                            <Trash2 className="w-4 h-4" />
                                            一鍵清空
                                        </button>
                                        <button 
                                            onClick={downloadAll}
                                            className="bg-gray-800 hover:bg-black text-white px-5 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors"
                                        >
                                            <Download className="w-4 h-4" />
                                            下載全部圖片
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    {generatedCards.map((card, idx) => (
                                        <div key={card.id} className="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                                            <div className="flex justify-between items-center mb-4 px-2">
                                                <h3 className="text-xl font-bold text-gray-700">
                                                    #{idx + 1} : {card.word}
                                                </h3>
                                                <span className="text-xs font-mono bg-white border border-red-200 text-red-600 px-2 py-1 rounded-md shadow-sm">
                                                    類型: {card.strategyLabel}
                                                </span>
                                            </div>
                                            
                                            <div className="flex gap-4 justify-center">
                                                {/* Card 1: Original */}
                                                <div className="flex flex-col gap-2">
                                                    <div id={`card-${card.id}-1`} className="game-card w-40 sm:w-56 md:w-64">
                                                        <div className="card-image-area">
                                                            <img src={card.img1} alt={card.word} />
                                                        </div>
                                                        <div className="card-text-area">
                                                            <span className="card-text">{card.word}</span>
                                                        </div>
                                                    </div>
                                                    <p className="text-center text-sm text-gray-500 font-medium">原圖</p>
                                                </div>

                                                {/* Card 2: Difference */}
                                                <div className="flex flex-col gap-2">
                                                    <div id={`card-${card.id}-2`} className="game-card w-40 sm:w-56 md:w-64">
                                                        <div className="card-image-area">
                                                            <img src={card.img2} alt={`${card.word} diff`} />
                                                        </div>
                                                        <div className="card-text-area">
                                                            <span className="card-text">{card.word}</span>
                                                        </div>
                                                    </div>
                                                    <p className="text-center text-sm text-gray-500 font-medium text-red-500">找碴版</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {!isProcessing && generatedCards.length === 0 && (
                            <div className="text-center py-20 text-gray-400">
                                <div className="bg-gray-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <ImageIcon className="w-10 h-10 text-gray-300" />
                                </div>
                                <p>輸入語詞後，預覽將顯示於此</p>
                            </div>
                        )}
                    </div>
                    
                    {/* UI Components */}
                    <Modal 
                        isOpen={modalConfig.isOpen}
                        title={modalConfig.title}
                        message={modalConfig.message}
                        onConfirm={modalConfig.onConfirm}
                        onClose={() => setModalConfig({ ...modalConfig, isOpen: false })}
                    />
                    
                    {toastMsg && <Toast message={toastMsg.text} type={toastMsg.type} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
