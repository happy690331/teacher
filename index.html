<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI教學遊戲天地 - Minecraft 版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- Minecraft 核心風格設定 --- */
        body {
            font-family: '標楷體', 'BiauKai', 'DFKai-SB', serif;
            /* 泥土方塊背景紋理 */
            background-color: #7a5c43;
            background-image:
                linear-gradient(45deg, #70533c 25%, transparent 25%),
                linear-gradient(-45deg, #70533c 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #70533c 75%),
                linear-gradient(-45deg, transparent 75%, #70533c 75%);
            background-size: 32px 32px;
            background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
            image-rendering: pixelated;
        }

        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 經典 MC 灰色面板 (例如物品欄、選單背景) */
        .mc-panel {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
        }

        /* 經典 MC 按鈕 */
        .mc-btn {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            color: #222;
            cursor: pointer;
        }
        .mc-btn:hover {
            background-color: #85aee5; /* 懸停時的藍色高亮 */
            color: white;
        }
        .mc-btn:active, .mc-btn.active {
            /* 點擊下去的凹陷效果 */
            border-top-color: #555555;
            border-left-color: #555555;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
            background-color: #8b8b8b;
            color: #ffffff;
            text-shadow: 2px 2px 0px #333;
        }
        .mc-btn:disabled {
            background-color: #a0a0a0;
            color: #666;
            border-top-color: #c0c0c0;
            border-left-color: #c0c0c0;
            border-bottom-color: #777;
            border-right-color: #777;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 遊戲卡片 (草地方塊風格) */
        .mc-card {
            background-color: #7ebf50;
            border: 4px solid;
            border-top-color: #a4e86f;
            border-left-color: #a4e86f;
            border-bottom-color: #4b7a2b;
            border-right-color: #4b7a2b;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            transition: transform 0.1s, border-color 0.1s;
        }
        .mc-card:hover {
            transform: translateY(-4px);
            border-color: #ffffff; /* 摸到時邊框發白光 */
            z-index: 10;
        }

        /* 文字特效 */
        .mc-title {
            color: #ffff55; /* MC 經典黃色標題 */
            text-shadow: 4px 4px 0px #3f3f15;
            letter-spacing: 2px;
        }
        .mc-text-shadow {
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }
        .mc-text-dark-shadow {
            text-shadow: 2px 2px 0px #a0a0a0;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- 頂部標題列 -->
    <header class="pt-8 pb-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mc-title">AI 教學遊戲天地</h1>
        </div>
    </header>

    <!-- 主要內容區：左欄與右欄 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row gap-8 mt-4">
        
        <!-- 左欄：分類選單與腳色裝飾 -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="mc-panel p-4 sticky top-6 relative mt-10 md:mt-0">
                <!-- 常見腳色裝飾 (懸浮於選單邊緣，當作純裝飾) -->
                <!-- 史蒂夫 Steve (站在選單頂部) -->
                <svg viewBox="0 0 8 8" class="hidden md:block absolute -top-12 right-4 w-14 h-14 hover:scale-110 transition-transform cursor-pointer drop-shadow-md z-20" shape-rendering="crispEdges" title="史蒂夫">
                    <rect width="8" height="8" fill="#c18a66"/>
                    <rect width="8" height="2" fill="#3d2616"/>
                    <rect x="0" y="2" width="1" height="1" fill="#3d2616"/>
                    <rect x="7" y="2" width="1" height="1" fill="#3d2616"/>
                    <rect x="1" y="4" width="1" height="1" fill="white"/>
                    <rect x="2" y="4" width="1" height="1" fill="#4d49a4"/>
                    <rect x="5" y="4" width="1" height="1" fill="#4d49a4"/>
                    <rect x="6" y="4" width="1" height="1" fill="white"/>
                    <rect x="3" y="5" width="2" height="1" fill="#9d6a46"/>
                    <rect x="2" y="6" width="4" height="1" fill="#513621"/>
                </svg>
                <!-- 苦力怕 Creeper (在左側邊緣探頭) -->
                <svg viewBox="0 0 8 8" class="hidden md:block absolute -left-8 bottom-8 w-14 h-14 hover:scale-110 transition-transform cursor-pointer drop-shadow-md z-20" shape-rendering="crispEdges" title="苦力怕">
                    <rect width="8" height="8" fill="#55cc55"/>
                    <rect x="1" y="2" width="2" height="2" fill="black"/>
                    <rect x="5" y="2" width="2" height="2" fill="black"/>
                    <rect x="3" y="4" width="2" height="3" fill="black"/>
                    <rect x="2" y="5" width="1" height="3" fill="black"/>
                    <rect x="5" y="5" width="1" height="3" fill="black"/>
                </svg>
                <!-- 終界使者 Enderman (在右側邊緣探頭) -->
                <svg viewBox="0 0 8 8" class="hidden md:block absolute -right-8 top-1/3 w-14 h-14 hover:scale-110 transition-transform cursor-pointer drop-shadow-md z-20" shape-rendering="crispEdges" title="終界使者">
                    <rect width="8" height="8" fill="#161616"/>
                    <rect x="0" y="4" width="3" height="1" fill="#e079fa"/>
                    <rect x="1" y="4" width="1" height="1" fill="#f9c6ff"/>
                    <rect x="5" y="4" width="3" height="1" fill="#e079fa"/>
                    <rect x="6" y="4" width="1" height="1" fill="#f9c6ff"/>
                </svg>

                <h2 class="text-2xl font-bold text-gray-800 mb-4 border-b-4 border-gray-400 pb-2 mc-text-dark-shadow relative z-30">
                    🛠️ 項目分類
                </h2>
                <ul id="category-list" class="space-y-3 relative z-30">
                    <!-- 分類選項會由 JS 自動產生在這裡 -->
                </ul>
            </div>
        </aside>

        <!-- 右欄：內容項目與分頁 -->
        <main class="flex-1">
            <!-- 載入中提示 -->
            <div id="loading" class="text-center py-12 hidden">
                <div class="inline-block w-8 h-8 bg-white border-4 border-gray-800 animate-pulse mb-4"></div>
                <p class="text-white mc-text-shadow text-xl">正在生成世界...</p>
            </div>

            <!-- 4x4 遊戲網格 -->
            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- 遊戲卡片會由 JS 動態產生 -->
            </div>

            <!-- 分頁控制 -->
            <div id="pagination" class="mt-10 flex justify-center items-center space-x-4">
                <!-- 分頁按鈕 -->
            </div>
        </main>
    </div>

    <script>
        // --- 核心設定 ---
        const repoInfo = { username: 'happy690331', repo: 'teacher', path: '' };
        const itemsPerPage = 16; // 維持剛好 4x4 排列
        
        let allFiles = [];      // 存放所有抓取到的遊戲
        let filteredFiles = []; // 存放目前分類下的遊戲
        let currentPage = 1;
        let currentCategory = '全部'; // 預設顯示全部

        // --- 分類與關鍵字設定 ---
        const categoryConfig = {
            '全部': [],
            '國語': ['國語', '語文', '注音', '拼音', '字', '詞', '句', '閱讀', '寫作', '國文'],
            '數學': ['數學', '算數', '加', '減', '乘', '除', '幾何', '分數', '數字', '九九', '時鐘'],
            '學習策略': ['策略', '學習', '記憶', '筆記', '專注', '心智圖', '複習'],
            '考試報讀': ['報讀', '考試', '測驗', '語音', '聽讀', '朗讀', '發聲'],
            '學生輔導': ['輔導', '情緒', '特教', '心理', '人際', '資源', '班級經營', '社交'],
            '其他': []
        };
        const categoryList = Object.keys(categoryConfig);

        // --- 初始化執行 ---
        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            fetchFileList();
        });

        // --- 自動分類判斷邏輯 ---
        function getCategoryForName(name) {
            const lowerName = name.toLowerCase();
            for (let i = 1; i < categoryList.length - 1; i++) { 
                const cat = categoryList[i];
                const keywords = categoryConfig[cat];
                if (keywords.some(kw => lowerName.includes(kw))) {
                    return cat;
                }
            }
            return '其他';
        }

        // --- 產生左欄分類選項 ---
        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';

            categoryList.forEach(cat => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.textContent = cat;
                
                // 套用 Minecraft 按鈕風格 (加入 text-xl 放大文字)
                const baseClasses = "mc-btn w-full text-left px-4 py-3 text-xl font-medium focus:outline-none block";
                if (currentCategory === cat) {
                    btn.className = `${baseClasses} active`;
                } else {
                    btn.className = `${baseClasses}`;
                }

                btn.onclick = () => {
                    currentCategory = cat;
                    currentPage = 1; 
                    renderCategories(); 
                    filterAndRender();  
                };
                
                li.appendChild(btn);
                container.appendChild(li);
            });
        }

        // --- 透過 GitHub API 獲取資料 ---
        async function fetchFileList() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('game-grid');
            
            loading.classList.remove('hidden');
            grid.innerHTML = '';

            const url = `https://api.github.com/repos/${repoInfo.username}/${repoInfo.repo}/contents/${repoInfo.path}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();

                if (Array.isArray(data)) {
                    allFiles = data
                        .filter(item => item.type === 'file' && item.name.endsWith('.html') && item.name !== 'index.html' && !item.name.startsWith('.'))
                        .map(item => {
                            let itemUrl = `https://${repoInfo.username}.github.io/${repoInfo.repo}/${item.name}`;
                            let displayName = item.name.replace('.html', '');
                            // 取得 GitHub 原始檔案的下載連結，並將 .html 替換成 .jpg
                            let rawImgUrl = item.download_url ? item.download_url.replace('.html', '.jpg') : `https://raw.githubusercontent.com/${repoInfo.username}/${repoInfo.repo}/main/${item.name.replace('.html', '.jpg')}`;
                            
                            return {
                                name: displayName,
                                url: itemUrl,
                                imgUrl: rawImgUrl,
                                category: getCategoryForName(displayName)
                            };
                        });
                    
                    filterAndRender();
                }
            } catch (error) {
                console.error('讀取 GitHub 檔案失敗:', error);
                grid.innerHTML = '<div class="col-span-full text-center text-red-300 py-8 mc-panel">讀取失敗！伺服器連線中斷。</div>';
            } finally {
                loading.classList.add('hidden');
            }
        }

        // --- 過濾當前分類並更新畫面 ---
        function filterAndRender() {
            if (currentCategory === '全部') {
                filteredFiles = allFiles;
            } else {
                filteredFiles = allFiles.filter(item => item.category === currentCategory);
            }
            renderGames();
            renderPagination();
        }

        // --- 渲染右側 4x4 遊戲網格 ---
        function renderGames() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredFiles.slice(start, end);

            if (pageItems.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center mc-panel text-gray-800 flex flex-col items-center justify-center">
                        <span class="text-4xl mb-4 text-gray-600">🕸️</span>
                        <p class="text-xl">這裡空空的，就像沒有挖到鑽石的礦坑...</p>
                    </div>`;
                return;
            }

            pageItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.target = "_blank";
                // 套用 Minecraft 草地卡片風格
                a.className = "mc-card flex flex-col items-center justify-start h-auto p-4 group text-center cursor-pointer";
                
                // 圖片路徑自動使用從 GitHub 原始庫抓取的 JPG 連結
                const imgSrc = item.imgUrl;
                
                // 找不到圖片時的預設替代圖案
                // 將所有單引號改為 URL 編碼的雙引號 %22，避免與 onerror 屬性衝突
                const fallbackImg = "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%234b7a2b%22/%3E%3Ctext x=%2250%22 y=%2250%22 font-family=%22sans-serif%22 font-size=%2214%22 text-anchor=%22middle%22 alignment-baseline=%22middle%22 fill=%22white%22%3E無預覽圖%3C/text%3E%3C/svg%3E";

                a.innerHTML = `
                    <div class="w-full h-32 sm:h-40 mb-3 border-2 border-[#4b7a2b] bg-[#a4e86f] overflow-hidden relative shadow-inner flex-shrink-0">
                        <img src="${imgSrc}" onerror="this.onerror=null; this.src='${fallbackImg}';" class="w-full h-full object-cover" alt="${item.name}">
                    </div>
                    <span class="text-2xl font-bold text-[#222] w-full line-clamp-2 leading-tight group-hover:text-white group-hover:mc-text-shadow">${item.name}</span>
                `;
                grid.appendChild(a);
            });
        }

        // --- 渲染分頁按鈕 ---
        function renderPagination() {
            const totalPages = Math.ceil(filteredFiles.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            if (totalPages <= 1) return;

            // 上一頁按鈕
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '◄ 上一頁';
            prevBtn.disabled = currentPage === 1;
            prevBtn.className = `mc-btn px-4 py-2 font-medium text-lg`;
            prevBtn.onclick = () => { 
                if (currentPage > 1) { 
                    currentPage--; 
                    renderGames(); 
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } 
            };
            paginationContainer.appendChild(prevBtn);

            // 頁碼顯示
            const info = document.createElement('span');
            info.className = 'px-4 py-2 text-white font-medium text-xl mc-text-shadow';
            info.textContent = `${currentPage} / ${totalPages}`;
            paginationContainer.appendChild(info);

            // 下一頁按鈕
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '下一頁 ►';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.className = `mc-btn px-4 py-2 font-medium text-lg`;
            nextBtn.onclick = () => { 
                if (currentPage < totalPages) { 
                    currentPage++; 
                    renderGames(); 
                    renderPagination(); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } 
            };
            paginationContainer.appendChild(nextBtn);
        }
    </script>
</body>
</html>
