<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI教學遊戲天地 - Minecraft 版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- Minecraft 核心風格設定 --- */
        body {
            font-family: '標楷體', 'BiauKai', 'DFKai-SB', serif;
            /* 避免背景角色或造景造成水平捲動 */
            overflow-x: hidden;
        }

        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 經典 MC 灰色面板 (例如物品欄、選單背景) */
        .mc-panel {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
        }

        /* 經典 MC 按鈕 */
        .mc-btn {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            color: #222;
            cursor: pointer;
        }
        .mc-btn:hover {
            background-color: #85aee5; /* 懸停時的藍色高亮 */
            color: white;
        }
        .mc-btn:active, .mc-btn.active {
            /* 點擊下去的凹陷效果 */
            border-top-color: #555555;
            border-left-color: #555555;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
            background-color: #8b8b8b;
            color: #ffffff;
            text-shadow: 2px 2px 0px #333;
        }
        .mc-btn:disabled {
            background-color: #a0a0a0;
            color: #666;
            border-top-color: #c0c0c0;
            border-left-color: #c0c0c0;
            border-bottom-color: #777;
            border-right-color: #777;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 遊戲卡片 (草地方塊風格) */
        .mc-card {
            background-color: #7ebf50;
            border: 4px solid;
            border-top-color: #a4e86f;
            border-left-color: #a4e86f;
            border-bottom-color: #4b7a2b;
            border-right-color: #4b7a2b;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            transition: transform 0.1s, border-color 0.1s;
        }
        .mc-card:hover {
            transform: translateY(-4px);
            border-color: #ffffff; /* 摸到時邊框發白光 */
            z-index: 10;
        }

        /* 文字特效 */
        .mc-text-shadow {
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }
        .mc-text-dark-shadow {
            text-shadow: 2px 2px 0px #a0a0a0;
        }

        /* 頭部追蹤過渡效果，讓轉頭更自然 */
        .head-tracking {
            transition: transform 0.1s ease-out;
            /* 將旋轉中心設定在頭部的正中心 (8px, 4px) */
            transform-origin: 8px 4px;
        }
        /* 臉部五官的獨立過渡效果 (用於製造 3D 視差) */
        .face-tracking {
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body class="min-h-screen pb-12 relative">

    <!-- Minecraft 像素風景背景層 (固定在背後不隨捲軸移動) -->
    <div id="minecraft-bg" class="fixed inset-0 z-[-1] pointer-events-none" style="image-rendering: pixelated;">
        <!-- 天空 (70%) -->
        <div class="absolute inset-0 bg-[#78a7ff]"></div>
        <!-- 像素雲朵圖案 -->
        <div class="absolute inset-0 opacity-80" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22256%22 height=%22128%22%3E%3Crect x=%2232%22 y=%2232%22 width=%2296%22 height=%2232%22 fill=%22%23ffffff%22/%3E%3Crect x=%2264%22 y=%2216%22 width=%2264%22 height=%2264%22 fill=%22%23ffffff%22/%3E%3Crect x=%22180%22 y=%2270%22 width=%2248%22 height=%2224%22 fill=%22%23ffffff%22 opacity=%220.7%22/%3E%3C/svg%3E'); background-size: 256px 128px;"></div>
        
        <!-- 像素樹木 (左側大樹) -->
        <svg class="absolute bottom-[30%] left-[10%] md:left-[20%] w-24 h-32 md:w-32 md:h-40" viewBox="0 0 16 20" shape-rendering="crispEdges">
            <!-- 陰影 -->
            <rect x="3" y="19" width="10" height="1" fill="#448833" opacity="0.6"/>
            <!-- 樹幹 -->
            <rect x="6" y="10" width="4" height="10" fill="#5c4033"/>
            <rect x="6" y="10" width="1" height="10" fill="#3c2a20"/>
            <!-- 樹葉 -->
            <rect x="2" y="4" width="12" height="8" fill="#52a03c"/>
            <rect x="4" y="2" width="8" height="2" fill="#52a03c"/>
            <rect x="2" y="12" width="12" height="2" fill="#3c7a25"/>
        </svg>

        <!-- 像素樹木 (右側遠方小樹) -->
        <svg class="absolute bottom-[30%] right-[15%] md:right-[25%] w-16 h-20 md:w-20 md:h-28" viewBox="0 0 16 20" shape-rendering="crispEdges">
            <rect x="6" y="10" width="4" height="10" fill="#5c4033"/>
            <rect x="6" y="10" width="1" height="10" fill="#3c2a20"/>
            <rect x="2" y="4" width="12" height="8" fill="#52a03c"/>
            <rect x="4" y="2" width="8" height="2" fill="#52a03c"/>
            <rect x="2" y="12" width="12" height="2" fill="#3c7a25"/>
        </svg>

        <!-- 綠地與河流 (底部 30%) -->
        <div class="absolute bottom-0 w-full h-[30%] bg-[#5db245] border-t-8 border-[#85db6a]" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22%3E%3Crect x=%220%22 y=%220%22 width=%2232%22 height=%2232%22 fill=%22%2352a03c%22/%3E%3Crect x=%2232%22 y=%2232%22 width=%2232%22 height=%2232%22 fill=%22%2352a03c%22/%3E%3C/svg%3E'); background-size: 64px 64px;">
            <!-- 具有透視感的河流 -->
            <div class="absolute top-0 left-[50%] w-[30%] h-full bg-[#3f76e4]" style="clip-path: polygon(30% 0, 50% 0, 100% 100%, 0% 100%);"></div>
            <!-- 河水波紋邊緣 -->
            <div class="absolute top-0 left-[50%] w-[30%] h-full bg-[#2b55b3]" style="clip-path: polygon(30% 0, 35% 0, 15% 100%, 0% 100%);"></div>
        </div>
    </div>

    <!-- 頂部標題列 (包含互動角色) -->
    <header class="relative w-full h-48 md:h-64 flex justify-center items-end pb-4 z-10">
        
        <!-- 左側：全身史蒂夫 Steve -->
        <div class="absolute left-2 md:left-24 bottom-0 z-20">
            <svg viewBox="0 0 16 32" class="w-16 md:w-20 h-auto drop-shadow-xl" shape-rendering="crispEdges">
                <!-- 左手 -->
                <rect x="0" y="8" width="4" height="4" fill="#00a8ff"/>
                <rect x="0" y="12" width="4" height="8" fill="#c18a66"/>
                <!-- 右手 -->
                <rect x="12" y="8" width="4" height="4" fill="#00a8ff"/>
                <rect x="12" y="12" width="4" height="8" fill="#c18a66"/>
                <!-- 左腳 -->
                <rect x="4" y="20" width="4" height="10" fill="#4a366b"/>
                <rect x="4" y="30" width="4" height="2" fill="#333"/>
                <!-- 右腳 -->
                <rect x="8" y="20" width="4" height="10" fill="#4a366b"/>
                <rect x="8" y="30" width="4" height="2" fill="#333"/>
                <!-- 身體 -->
                <rect x="4" y="8" width="8" height="12" fill="#00a8ff"/>
                <!-- 頸部與頭部 (加入五官獨立群組) -->
                <g id="steve-head" class="head-tracking">
                    <rect x="4" y="0" width="8" height="8" fill="#c18a66"/>
                    <rect x="4" y="0" width="8" height="2" fill="#3d2616"/>
                    <rect x="4" y="2" width="1" height="1" fill="#3d2616"/>
                    <rect x="11" y="2" width="1" height="1" fill="#3d2616"/>
                    <!-- 臉部五官 -->
                    <g id="steve-face" class="face-tracking">
                        <rect x="5" y="4" width="1" height="1" fill="white"/>
                        <rect x="6" y="4" width="1" height="1" fill="#4d49a4"/>
                        <rect x="9" y="4" width="1" height="1" fill="#4d49a4"/>
                        <rect x="10" y="4" width="1" height="1" fill="white"/>
                        <rect x="7" y="5" width="2" height="1" fill="#9d6a46"/>
                        <rect x="6" y="6" width="4" height="1" fill="#513621"/>
                    </g>
                </g>
            </svg>
        </div>

        <!-- 中間：文字標題 -->
        <h1 class="text-4xl md:text-5xl font-bold text-black z-30 drop-shadow-md bg-white/40 px-6 py-2 rounded-xl backdrop-blur-sm">AI 教學遊戲天地</h1>

        <!-- 右側近處：全身苦力怕 Creeper -->
        <div class="absolute right-20 md:right-48 bottom-0 z-20">
            <svg viewBox="0 0 16 26" class="w-16 md:w-20 h-auto drop-shadow-xl" shape-rendering="crispEdges">
                <!-- 後腳 -->
                <rect x="4" y="20" width="8" height="6" fill="#3b853b"/>
                <!-- 前左腳 -->
                <rect x="2" y="20" width="4" height="6" fill="#55cc55"/>
                <!-- 前右腳 -->
                <rect x="10" y="20" width="4" height="6" fill="#55cc55"/>
                <!-- 身體 -->
                <rect x="4" y="8" width="8" height="12" fill="#55cc55"/>
                <rect x="4" y="8" width="1" height="12" fill="#6deb6d"/> <!-- 亮部 -->
                <!-- 頭部 (加入五官獨立群組) -->
                <g id="creeper-head" class="head-tracking">
                    <rect x="4" y="0" width="8" height="8" fill="#55cc55"/>
                    <!-- 臉部五官 -->
                    <g id="creeper-face" class="face-tracking">
                        <rect x="5" y="2" width="2" height="2" fill="black"/>
                        <rect x="9" y="2" width="2" height="2" fill="black"/>
                        <rect x="7" y="4" width="2" height="3" fill="black"/>
                        <rect x="6" y="5" width="1" height="3" fill="black"/>
                        <rect x="9" y="5" width="1" height="3" fill="black"/>
                    </g>
                </g>
            </svg>
        </div>

        <!-- 右側遠處：高瘦全身終界使者 Enderman -->
        <div class="absolute right-2 md:right-20 bottom-0 z-10">
            <svg viewBox="0 0 16 50" class="w-16 md:w-20 h-auto drop-shadow-xl" shape-rendering="crispEdges">
                <!-- 左手 -->
                <rect x="2" y="8" width="2" height="30" fill="#161616"/>
                <!-- 右手 -->
                <rect x="12" y="8" width="2" height="30" fill="#161616"/>
                <!-- 左腳 -->
                <rect x="5" y="20" width="2" height="30" fill="#161616"/>
                <!-- 右腳 -->
                <rect x="9" y="20" width="2" height="30" fill="#161616"/>
                <!-- 身體 -->
                <rect x="4" y="8" width="8" height="12" fill="#161616"/>
                <!-- 頭部 (加入五官獨立群組) -->
                <g id="enderman-head" class="head-tracking">
                    <rect x="4" y="0" width="8" height="8" fill="#161616"/>
                    <!-- 臉部五官 -->
                    <g id="enderman-face" class="face-tracking">
                        <rect x="4" y="4" width="3" height="1" fill="#e079fa"/>
                        <rect x="5" y="4" width="1" height="1" fill="#f9c6ff"/>
                        <rect x="9" y="4" width="3" height="1" fill="#e079fa"/>
                        <rect x="10" y="4" width="1" height="1" fill="#f9c6ff"/>
                    </g>
                </g>
            </svg>
        </div>
    </header>

    <!-- 主要內容區：左欄與右欄 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row gap-8 mt-4 relative z-20">
        
        <!-- 左欄：分類選單 -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="mc-panel p-4 sticky top-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 border-b-4 border-gray-400 pb-2 mc-text-dark-shadow">
                    🛠️ 項目分類
                </h2>
                <ul id="category-list" class="space-y-3">
                    <!-- 分類選項會由 JS 自動產生在這裡 -->
                </ul>
            </div>
        </aside>

        <!-- 右欄：內容項目與分頁 -->
        <main class="flex-1">
            <!-- 載入中提示 -->
            <div id="loading" class="text-center py-12 hidden">
                <div class="inline-block w-8 h-8 bg-white border-4 border-gray-800 animate-pulse mb-4"></div>
                <p class="text-white mc-text-shadow text-xl">正在生成世界...</p>
            </div>

            <!-- 4x4 遊戲網格 -->
            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- 遊戲卡片會由 JS 動態產生 -->
            </div>

            <!-- 分頁控制 -->
            <div id="pagination" class="mt-10 flex justify-center items-center space-x-4">
                <!-- 分頁按鈕 -->
            </div>
        </main>
    </div>

    <script>
        // --- 頭部追蹤滑鼠邏輯 (加入 3D 視差效果) ---
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 包含所有需要追蹤滑鼠的頭部與臉部 ID
            const characters = [
                { head: 'steve-head', face: 'steve-face' },
                { head: 'creeper-head', face: 'creeper-face' },
                { head: 'enderman-head', face: 'enderman-face' }
            ];
            
            characters.forEach(char => {
                const head = document.getElementById(char.head);
                const face = document.getElementById(char.face);
                if (!head) return;

                // 取得角色頭部在網頁上的實際中心座標
                const rect = head.getBoundingClientRect();
                const headCenterX = rect.left + rect.width / 2;
                const headCenterY = rect.top + rect.height / 2;

                // 計算滑鼠與頭部的距離
                const dx = mouseX - headCenterX;
                const dy = mouseY - headCenterY;

                // 限制最大轉動角度與位移 (-1 到 1 之間)
                const normX = Math.max(-1, Math.min(1, dx / (window.innerWidth / 2)));
                const normY = Math.max(-1, Math.min(1, dy / (window.innerHeight / 2)));

                // 整個頭部的轉動與微幅平移
                const headRot = normX * 25; // 左右看時的傾斜角度
                const headTx = normX * 1;   // 頭部輕微位移
                const headTy = normY * 1;   

                // 五官的進階平移 (位移幅度大於頭部，製造出 3D 轉頭的視差感)
                const faceTx = normX * 2;
                const faceTy = normY * 1.5;

                // 使用 CSS transform 套用效果 (效能比 setAttribute 更好)
                head.style.transform = `translate(${headTx}px, ${headTy}px) rotate(${headRot}deg)`;
                
                // 套用五官視差
                if (face) {
                    face.style.transform = `translate(${faceTx}px, ${faceTy}px)`;
                }
            });
        });

        // --- 核心設定 ---
        const repoInfo = { username: 'happy690331', repo: 'teacher', path: '' };
        const itemsPerPage = 16; // 維持剛好 4x4 排列
        
        let allFiles = [];      // 存放所有抓取到的遊戲
        let filteredFiles = []; // 存放目前分類下的遊戲
        let currentPage = 1;
        let currentCategory = '全部'; // 預設顯示全部

        // --- 分類與關鍵字設定 ---
        const categoryConfig = {
            '全部': [],
            '國語': ['國語', '語文', '注音', '拼音', '字', '詞', '句', '閱讀', '寫作', '國文'],
            '數學': ['數學', '算數', '加', '減', '乘', '除', '幾何', '分數', '數字', '九九', '時鐘', '翰林'],
            '學習策略': ['策略', '學習', '記憶', '筆記', '專注', '心智圖', '複習'],
            '考試報讀': ['報讀', '考試', '測驗', '語音', '聽讀', '朗讀', '發聲'],
            '學生輔導': ['輔導', '情緒', '特教', '心理', '人際', '資源', '班級經營', '社交'],
            '其他': []
        };
        const categoryList = Object.keys(categoryConfig);

        // --- 初始化執行 ---
        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            fetchFileList();
        });

        // --- 自動分類判斷邏輯 ---
        function getCategoryForName(name) {
            const lowerName = name.toLowerCase();
            for (let i = 1; i < categoryList.length - 1; i++) { 
                const cat = categoryList[i];
                const keywords = categoryConfig[cat];
                if (keywords.some(kw => lowerName.includes(kw))) {
                    return cat;
                }
            }
            return '其他';
        }

        // --- 產生左欄分類選項 ---
        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';

            categoryList.forEach(cat => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.textContent = cat;
                
                // 套用 Minecraft 按鈕風格 (加入 text-xl 放大文字)
                const baseClasses = "mc-btn w-full text-left px-4 py-3 text-xl font-medium focus:outline-none block";
                if (currentCategory === cat) {
                    btn.className = `${baseClasses} active`;
                } else {
                    btn.className = `${baseClasses}`;
                }

                btn.onclick = () => {
                    currentCategory = cat;
                    currentPage = 1; 
                    renderCategories(); 
                    filterAndRender();  
                };
                
                li.appendChild(btn);
                container.appendChild(li);
            });
        }

        // --- 透過 GitHub API 獲取資料 ---
        async function fetchFileList() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('game-grid');
            
            loading.classList.remove('hidden');
            grid.innerHTML = '';

            const url = `https://api.github.com/repos/${repoInfo.username}/${repoInfo.repo}/contents/${repoInfo.path}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();

                if (Array.isArray(data)) {
                    allFiles = data
                        .filter(item => item.type === 'file' && item.name.endsWith('.html') && item.name !== 'index.html' && !item.name.startsWith('.'))
                        .map(item => {
                            let itemUrl = `https://${repoInfo.username}.github.io/${repoInfo.repo}/${item.name}`;
                            let displayName = item.name.replace('.html', '');
                            // 取得 GitHub 原始檔案的下載連結，並將 .html 替換成 .jpg
                            let rawImgUrl = item.download_url ? item.download_url.replace('.html', '.jpg') : `https://raw.githubusercontent.com/${repoInfo.username}/${repoInfo.repo}/main/${item.name.replace('.html', '.jpg')}`;
                            
                            return {
                                name: displayName,
                                url: itemUrl,
                                imgUrl: rawImgUrl,
                                category: getCategoryForName(displayName)
                            };
                        });
                    
                    filterAndRender();
                }
            } catch (error) {
                console.error('讀取 GitHub 檔案失敗:', error);
                grid.innerHTML = '<div class="col-span-full text-center text-red-300 py-8 mc-panel">讀取失敗！伺服器連線中斷。</div>';
            } finally {
                loading.classList.add('hidden');
            }
        }

        // --- 過濾當前分類並更新畫面 ---
        function filterAndRender() {
            if (currentCategory === '全部') {
                filteredFiles = allFiles;
            } else {
                filteredFiles = allFiles.filter(item => item.category === currentCategory);
            }
            renderGames();
            renderPagination();
        }

        // --- 渲染右側 4x4 遊戲網格 ---
        function renderGames() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredFiles.slice(start, end);

            if (pageItems.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center mc-panel text-gray-800 flex flex-col items-center justify-center">
                        <span class="text-4xl mb-4 text-gray-600">🕸️</span>
                        <p class="text-xl">這裡空空的，就像沒有挖到鑽石的礦坑...</p>
                    </div>`;
                return;
            }

            pageItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.target = "_blank";
                // 套用 Minecraft 草地卡片風格
                a.className = "mc-card flex flex-col items-center justify-start h-auto p-4 group text-center cursor-pointer";
                
                // 圖片路徑自動使用從 GitHub 原始庫抓取的 JPG 連結
                const imgSrc = item.imgUrl;
                
                // 找不到圖片時的預設替代圖案
                // 將所有單引號改為 URL 編碼的雙引號 %22，避免與 onerror 屬性衝突
                const fallbackImg = "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%234b7a2b%22/%3E%3Ctext x=%2250%22 y=%2250%22 font-family=%22sans-serif%22 font-size=%2214%22 text-anchor=%22middle%22 alignment-baseline=%22middle%22 fill=%22white%22%3E無預覽圖%3C/text%3E%3C/svg%3E";

                a.innerHTML = `
                    <div class="w-full h-32 sm:h-40 mb-3 border-2 border-[#4b7a2b] bg-[#a4e86f] overflow-hidden relative shadow-inner flex-shrink-0">
                        <img src="${imgSrc}" onerror="this.onerror=null; this.src='${fallbackImg}';" class="w-full h-full object-cover" alt="${item.name}">
                    </div>
                    <span class="text-2xl font-bold text-[#222] w-full line-clamp-2 leading-tight group-hover:text-white group-hover:mc-text-shadow">${item.name}</span>
                `;
                grid.appendChild(a);
            });
        }

        // --- 渲染分頁按鈕 ---
        function renderPagination() {
            const totalPages = Math.ceil(filteredFiles.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            if (totalPages <= 1) return;

            // 上一頁按鈕
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '◄ 上一頁';
            prevBtn.disabled = currentPage === 1;
            prevBtn.className = `mc-btn px-4 py-2 font-medium text-lg`;
            prevBtn.onclick = () => { 
                if (currentPage > 1) { 
                    currentPage--; 
                    renderGames(); 
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } 
            };
            paginationContainer.appendChild(prevBtn);

            // 頁碼顯示
            const info = document.createElement('span');
            info.className = 'px-4 py-2 text-white font-medium text-xl mc-text-shadow';
            info.textContent = `${currentPage} / ${totalPages}`;
            paginationContainer.appendChild(info);

            // 下一頁按鈕
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '下一頁 ►';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.className = `mc-btn px-4 py-2 font-medium text-lg`;
            nextBtn.onclick = () => { 
                if (currentPage < totalPages) { 
                    currentPage++; 
                    renderGames(); 
                    renderPagination(); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } 
            };
            paginationContainer.appendChild(nextBtn);
        }
    </script>
</body>
</html>
