<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學小達人：四則運算</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { touch-action: manipulation; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .animate-wiggle { animation: wiggle 0.5s ease-in-out; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Calculator = (props) => <IconWrapper {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconWrapper>;
        const Crosshair = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/></IconWrapper>;
        const Pencil = (props) => <IconWrapper {...props}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></IconWrapper>;
        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const CheckCircle = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const Trophy = (props) => <IconWrapper {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconWrapper>;
        const RotateCcw = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;

        // --- Visual Equation Component ---
        const EquationDisplay = ({ equation, highlight = null }) => (
            <div className="bg-white py-8 px-4 rounded-2xl border-4 border-blue-100 shadow-sm relative overflow-hidden my-6">
                <div className="absolute -right-4 -top-4 opacity-5 rotate-12"><Calculator size={100}/></div>
                <div className="text-4xl font-black text-slate-700 tracking-wider text-center relative z-10 flex justify-center items-center flex-wrap gap-2">
                    {equation.split(' ').map((part, i) => {
                        const isOperator = ['+', '-', '×', '÷'].includes(part);
                        return (
                            <span key={i} className={`${isOperator ? 'text-blue-500 mx-1' : ''} ${highlight === part ? 'bg-yellow-200 px-2 rounded-lg' : ''}`}>
                                {part}
                            </span>
                        );
                    })}
                </div>
            </div>
        );

        // --- Main App Component ---
        const MathGame = () => {
          const [currentTab, setCurrentTab] = useState('learn');
          const [score, setScore] = useState(0);
          const [animateScore, setAnimateScore] = useState(false);

          useEffect(() => {
            if (score > 0) {
              setAnimateScore(true);
              const timer = setTimeout(() => setAnimateScore(false), 300);
              return () => clearTimeout(timer);
            }
          }, [score]);

          const renderTabContent = () => {
            switch (currentTab) {
              case 'learn': return <LearnSection onComplete={() => setCurrentTab('practice_1')} />;
              case 'practice_1': return <FirstStepGame score={score} setScore={setScore} onComplete={() => setCurrentTab('practice_2')} />;
              case 'practice_2': return <CalculationGame score={score} setScore={setScore} onComplete={() => setCurrentTab('quiz')} />;
              case 'quiz': return <QuizMode score={score} setScore={setScore} onRestart={() => { setScore(0); setCurrentTab('learn'); }} />;
              default: return <LearnSection />;
            }
          };

          return (
            <div className="h-screen flex flex-col bg-blue-50 font-sans text-slate-800 overflow-hidden select-none">
              <header className="bg-white shadow-sm p-3 z-10 flex-none border-b border-blue-100">
                <div className="max-w-2xl mx-auto flex justify-between items-center">
                  <div className="flex items-center space-x-2">
                    <div className="bg-blue-500 p-2 rounded-xl text-white shadow-sm"><Calculator size={20} /></div>
                    <h1 className="text-lg font-bold text-blue-700 tracking-wide">四則運算大師</h1>
                  </div>
                  <div className={`flex items-center bg-yellow-100 px-3 py-1.5 rounded-full border border-yellow-300 transition-transform duration-200 ${animateScore ? 'scale-110 ring-4 ring-yellow-200' : ''}`}>
                    <Trophy className={`text-yellow-600 mr-1.5 ${animateScore ? 'animate-spin' : ''}`} size={16} />
                    <span className="font-bold text-yellow-700">{score} 分</span>
                  </div>
                </div>
              </header>

              <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24 scroll-smooth">
                <div className="max-w-2xl mx-auto bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/50 p-5 min-h-[400px] animate-in fade-in slide-in-from-bottom-4 duration-500">
                  {renderTabContent()}
                </div>
              </main>

              <nav className="bg-white border-t border-slate-200 pb-safe pt-2 px-2 fixed bottom-0 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                <div className="max-w-2xl mx-auto flex justify-around items-end pb-2">
                  <NavButton active={currentTab === 'learn'} onClick={() => setCurrentTab('learn')} icon={<BookOpen size={22} />} label="教學" />
                  <NavButton active={currentTab === 'practice_1'} onClick={() => setCurrentTab('practice_1')} icon={<Crosshair size={22} />} label="找一找" />
                  <NavButton active={currentTab === 'practice_2'} onClick={() => setCurrentTab('practice_2')} icon={<Pencil size={22} />} label="算算看" />
                  <NavButton active={currentTab === 'quiz'} onClick={() => setCurrentTab('quiz')} icon={<CheckCircle size={22} />} label="測驗" />
                </div>
              </nav>
            </div>
          );
        };

        const NavButton = ({ active, onClick, icon, label }) => (
          <button onClick={onClick} className={`flex flex-col items-center justify-center w-full py-2 px-1 transition-all duration-300 rounded-xl active:scale-95 touch-manipulation ${active ? 'text-blue-600 -translate-y-2' : 'text-slate-400 hover:text-slate-600'}`}>
            <div className={`p-1.5 rounded-full transition-all duration-300 ${active ? 'bg-blue-100 shadow-sm' : ''}`}>{icon}</div>
            <span className={`text-[10px] font-medium mt-1 ${active ? 'opacity-100' : 'opacity-70'}`}>{label}</span>
            {active && <div className="w-1 h-1 bg-blue-500 rounded-full mt-1"></div>}
          </button>
        );

        // --- 1. Learning Section ---
        const LearnSection = ({ onComplete }) => (
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-bold text-slate-800 flex items-center"><Play className="mr-2 text-blue-500" style={{fill: 'currentColor'}} size={24} /> 觀念教學</h2>
              <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded">CH2 四則運算</span>
            </div>
            
            {/* Video Container */}
            <div className="aspect-video w-full bg-slate-900 rounded-2xl overflow-hidden shadow-lg ring-4 ring-blue-50" style={{position:'relative', paddingBottom: '56.25%', height: 0}}>
              <iframe src="https://www.youtube.com/embed/FxJGCRMVKj0" title="四則運算教學" style={{position:'absolute', top:0, left:0, width:'100%', height:'100%'}} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
            </div>

            {/* Notes */}
            <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-5 rounded-2xl border border-blue-100 mt-4 shadow-sm">
              <h3 className="text-lg font-bold text-blue-800 mb-3 flex items-center"><BookOpen className="w-5 h-5 mr-2" />運算三秘訣</h3>
              <div className="space-y-3 text-base text-slate-700">
                <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                  <div className="bg-blue-100 text-blue-700 font-bold rounded-lg w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-sm">秘訣 1</div>
                  <div>如果算式只有加減，或只有乘除，要<strong className="text-blue-600"> 由左而右算</strong>。</div>
                </div>
                <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                   <div className="bg-indigo-100 text-indigo-700 font-bold rounded-lg w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-sm">秘訣 2</div>
                   <div>如果算式有加減也有乘除，要<strong className="text-indigo-600"> 先乘除後加減</strong>。</div>
                </div>
                <div className="flex bg-white p-3 rounded-xl shadow-sm border border-blue-50 items-center">
                   <div className="bg-purple-100 text-purple-700 font-bold rounded-lg w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-sm">秘訣 3</div>
                   <div>算式中如果有括號 ( )，<strong className="text-purple-600"> 括號裡面的要先算</strong>！</div>
                </div>
              </div>
            </div>
            <button onClick={onComplete} className="w-full bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center shadow-lg shadow-blue-500/20 active:scale-95 transition-all">我學會了，開始練習！ <ArrowRight className="ml-2" /></button>
          </div>
        );

        // --- 2. Practice 1: Identify First Step ---
        const FirstStepGame = ({ score, setScore, onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [feedback, setFeedback] = useState('');
            const [options, setOptions] = useState([]);
            
            const [questions] = useState(() => {
                const pool = [
                    { eq: "24 + 6 × 3", ans: "6 × 3", options: ["24 + 6", "6 × 3", "24 + 3"] },
                    { eq: "( 30 - 10 ) ÷ 5", ans: "30 - 10", options: ["30 - 10", "10 ÷ 5", "30 ÷ 5"] },
                    { eq: "48 ÷ 6 - 2", ans: "48 ÷ 6", options: ["48 ÷ 6", "6 - 2", "48 - 2"] },
                    { eq: "15 + 25 - 10", ans: "15 + 25", options: ["15 + 25", "25 - 10", "15 - 10"] },
                    { eq: "9 × ( 4 + 6 )", ans: "4 + 6", options: ["9 × 4", "4 + 6", "9 + 6"] },
                    { eq: "100 - 40 ÷ 8", ans: "40 ÷ 8", options: ["100 - 40", "40 ÷ 8", "100 ÷ 8"] },
                    { eq: "12 × 3 + 8", ans: "12 × 3", options: ["12 × 3", "3 + 8", "12 + 8"] },
                    { eq: "50 - ( 12 + 8 )", ans: "12 + 8", options: ["50 - 12", "12 + 8", "50 + 8"] },
                    { eq: "36 ÷ ( 9 - 5 )", ans: "9 - 5", options: ["36 ÷ 9", "9 - 5", "36 - 5"] },
                    { eq: "7 + 8 × 4", ans: "8 × 4", options: ["7 + 8", "8 × 4", "7 + 4"] },
                    { eq: "64 ÷ 8 ÷ 2", ans: "64 ÷ 8", options: ["64 ÷ 8", "8 ÷ 2", "64 ÷ 2"] },
                    { eq: "25 - 5 × 4", ans: "5 × 4", options: ["25 - 5", "5 × 4", "25 - 4"] },
                    { eq: "( 15 + 5 ) × 2", ans: "15 + 5", options: ["15 + 5", "5 × 2", "15 × 2"] },
                    { eq: "80 ÷ 10 + 5", ans: "80 ÷ 10", options: ["80 ÷ 10", "10 + 5", "80 + 5"] },
                    { eq: "100 - 50 + 20", ans: "100 - 50", options: ["100 - 50", "50 + 20", "100 + 20"] }
                ];
                return pool.sort(() => Math.random() - 0.5).slice(0, 8);
            });

            useEffect(() => {
                if(progress < 8) {
                    setFeedback('');
                    // Shuffle options for current question
                    const shuffled = [...questions[progress].options].sort(() => Math.random() - 0.5);
                    setOptions(shuffled);
                }
            }, [progress, questions]);

            const handleAnswer = (ans) => {
                if (feedback) return;
                const correctAns = questions[progress].ans;
                if (ans === correctAns) {
                    setFeedback('correct');
                    setScore(s => s + 10);
                    setTimeout(() => setProgress(p => p + 1), 1000);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 1000);
                }
            };

            if (progress >= 8) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-yellow-100 rounded-full mb-4 ring-8 ring-yellow-50"><Trophy className="text-yellow-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">眼力真好！</h2>
                    <p className="text-slate-600 mb-8">你已經學會找出第一步了</p>
                    <button onClick={onComplete} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">前往計算挑戰</button>
                </div>
            );

            return (
                <div className="text-center space-y-4">
                    <div className="flex justify-between items-center border-b border-blue-100 pb-4">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center"><span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-sm">1</span>先算哪一步？</h2>
                        <div className="flex space-x-1">{[...Array(8)].map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i < progress ? 'bg-blue-500' : 'bg-slate-200'}`}></div>)}</div>
                    </div>

                    <p className="text-slate-500 font-medium pt-2">請找出算式中<strong className="text-blue-600">最先計算</strong>的部分：</p>
                    
                    <EquationDisplay equation={questions[progress]?.eq || ""} />

                    <div className="grid grid-cols-1 gap-3">
                        {options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} 
                                className={`py-4 rounded-xl text-xl font-bold border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && opt === questions[progress].ans ? 'bg-green-100 border-green-500 text-green-700' : 
                                  feedback === 'incorrect' && opt === questions[progress].ans ? 'bg-green-100 border-green-500 text-green-700 opacity-50' : 
                                  'bg-white border-slate-200 hover:border-blue-300 text-slate-700'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    
                    <div className="h-6 flex justify-center mt-2">
                        {feedback === 'correct' && <span className="text-green-600 font-bold flex items-center"><CheckCircle className="mr-1" size={20}/> 答對了！</span>}
                        {feedback === 'incorrect' && <span className="text-red-500 font-bold">再想一下秘訣喔！</span>}
                    </div>
                </div>
            );
        };

        // --- 3. Practice 2: Calculation Game ---
        const CalculationGame = ({ score, setScore, onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [feedback, setFeedback] = useState('');
            const [options, setOptions] = useState([]);

            const [questions] = useState(() => {
                const pool = [
                    { eq: "20 + 5 × 4", ans: "40", options: ["40", "100", "29"] },
                    { eq: "( 50 - 20 ) ÷ 6", ans: "5", options: ["5", "46", "30"] },
                    { eq: "36 ÷ 9 + 4", ans: "8", options: ["8", "4", "1"] },
                    { eq: "100 - 20 × 3", ans: "40", options: ["40", "240", "80"] },
                    { eq: "8 × ( 10 - 3 )", ans: "56", options: ["56", "77", "24"] },
                    { eq: "60 ÷ 2 × 3", ans: "90", options: ["90", "10", "30"] },
                    { eq: "15 + 3 × 5", ans: "30", options: ["30", "90", "23"] },
                    { eq: "( 24 + 16 ) ÷ 8", ans: "5", options: ["5", "26", "4"] },
                    { eq: "50 - 12 × 2", ans: "26", options: ["26", "76", "38"] },
                    { eq: "48 ÷ ( 10 - 2 )", ans: "6", options: ["6", "4", "46"] },
                    { eq: "7 × 8 + 4", ans: "60", options: ["60", "84", "19"] },
                    { eq: "100 - ( 30 + 20 )", ans: "50", options: ["50", "90", "10"] },
                    { eq: "30 ÷ 5 × 2", ans: "12", options: ["12", "3", "10"] },
                    { eq: "25 + 15 - 10", ans: "30", options: ["30", "15", "50"] },
                    { eq: "9 × ( 15 - 10 )", ans: "45", options: ["45", "125", "5"] }
                ];
                return pool.sort(() => Math.random() - 0.5).slice(0, 8);
            });

            useEffect(() => {
                if (progress < 8) {
                    setFeedback('');
                    const shuffled = [...questions[progress].options].sort(() => Math.random() - 0.5);
                    setOptions(shuffled);
                }
            }, [progress, questions]);

            const handleAnswer = (opt) => {
                if(feedback) return;
                const correct = questions[progress].ans;
                
                if (opt === correct) {
                    setFeedback('correct');
                    setScore(s => s + 15);
                    setTimeout(() => setProgress(p => p + 1), 1000);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 1000);
                }
            };

            if (progress >= 8) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-indigo-100 rounded-full mb-4 ring-8 ring-indigo-50"><Pencil className="text-indigo-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">計算高手！</h2>
                    <p className="text-slate-600 mb-8">四則運算難不倒你</p>
                    <button onClick={onComplete} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">挑戰最終測驗</button>
                </div>
            );

            return (
                 <div className="text-center space-y-4">
                    <div className="flex justify-between items-center border-b border-indigo-100 pb-4">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center"><span className="bg-indigo-100 text-indigo-600 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-sm">2</span>步步高升計算挑戰</h2>
                        <div className="flex space-x-1">{[...Array(8)].map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i < progress ? 'bg-indigo-500' : 'bg-slate-200'}`}></div>)}</div>
                    </div>
                    
                    <p className="text-slate-500 font-medium pt-2">請算出這題的正確答案：</p>
                    <EquationDisplay equation={questions[progress]?.eq || ""} />

                    <div className="grid grid-cols-3 gap-3">
                        {options.map((opt, i) => (
                            <button key={i} onClick={() => handleAnswer(opt)} disabled={!!feedback}
                            className={`w-full py-5 rounded-xl text-2xl font-bold border-2 transition-all active:scale-95 flex items-center justify-center
                                ${feedback === 'correct' && opt === questions[progress].ans 
                                    ? 'bg-green-100 border-green-500 text-green-700' 
                                    : 'bg-white border-slate-200 hover:border-indigo-300'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    {feedback === 'incorrect' && <div className="text-red-500 font-bold animate-pulse mt-4">算錯囉，再檢查一下順序！</div>}
                </div>
            );
        };

        // --- 4. Quiz Mode ---
        const QuizMode = ({ score, setScore, onRestart }) => {
            const [idx, setIdx] = useState(0);
            const [finished, setFinished] = useState(false);
            const [feedback, setFeedback] = useState(null);
            
            const [questions] = useState(() => {
                const pool = [
                    { q: "算式中如果「只有加和減」，我們應該怎麼算？", options: ["由左而右算", "由右而左算", "先算減法再算加法"], ansText: "由左而右算" },
                    { q: "算式「 50 - 10 × 2 」中，哪一個部分要先算？", options: ["50 - 10", "10 × 2", "從左邊開始算"], ansText: "10 × 2" },
                    { q: "小明買了一瓶 40 元的果汁，和 3 包 15 元的餅乾，總共要付多少錢？", options: ["40 + 15 × 3", "( 40 + 15 ) × 3", "40 × 3 + 15"], ansText: "40 + 15 × 3" },
                    { q: "一本筆記本 25 元，小紅買了 4 本，給老闆 500 元，要找回多少元？算式是？", options: ["500 - 25 + 4", "500 - ( 25 × 4 )", "( 500 - 25 ) × 4"], ansText: "500 - ( 25 × 4 )" },
                    { q: "算式中如果有「括號 ( )」，哪一部分要先算？", options: ["括號外面的先算", "括號裡面的先算", "都可以，看心情"], ansText: "括號裡面的先算" },
                    { q: "計算「 ( 15 + 5 ) × 3 」的答案是多少？", options: ["60", "30", "45"], ansText: "60" },
                    { q: "算式「 24 ÷ 6 + 2 」中，哪一個部分要先算？", options: ["24 ÷ 6", "6 + 2", "都可以"], ansText: "24 ÷ 6" },
                    { q: "小華有 100 元，買了 2 個 35 元的漢堡，還剩下多少元？算式是？", options: ["100 - 35 × 2", "( 100 - 35 ) × 2", "100 - 35 + 2"], ansText: "100 - 35 × 2" },
                    { q: "哥哥和弟弟各有 50 元，他們合買了一個 80 元的玩具，還剩下多少元？算式是？", options: ["( 50 + 50 ) - 80", "50 + 50 - 80", "80 - 50 + 50"], ansText: "( 50 + 50 ) - 80" },
                    { q: "算式中有加、減、乘、除時，如果沒有括號，應該怎麼算？", options: ["由左而右算", "先乘除後加減", "先加減後乘除"], ansText: "先乘除後加減" },
                    { q: "計算「 100 - 20 ÷ 4 」的答案是多少？", options: ["95", "20", "80"], ansText: "95" },
                    { q: "計算「 8 × 7 - 10 」的答案是多少？", options: ["46", "56", "24"], ansText: "46" },
                    { q: "算式「 ( 100 - 40 ) ÷ 5 」的第一步要算什麼？", options: ["100 - 40", "40 ÷ 5", "從右邊算"], ansText: "100 - 40" }
                ];
                // 隨機挑選 8 題，並且打亂每個選項，記錄正確答案的新位置
                return pool.sort(() => Math.random() - 0.5).slice(0, 8).map(q => {
                    const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
                    return { ...q, options: shuffledOptions, ans: shuffledOptions.indexOf(q.ansText) };
                });
            });

            const handleAnswer = (optIdx) => {
                if (feedback) return;
                if (optIdx === questions[idx].ans) {
                    setFeedback('correct');
                    setScore(s => s + 20);
                } else {
                    setFeedback('incorrect');
                }
                setTimeout(() => {
                    if (idx + 1 < questions.length) {
                        setIdx(i => i + 1);
                        setFeedback(null);
                    } else {
                        setFinished(true);
                    }
                }, 1500);
            };

            if (finished) return (
                <div className="text-center py-10 space-y-6 animate-in slide-in-from-bottom">
                    <div className="inline-block p-6 bg-yellow-100 rounded-full mb-4 shadow-inner"><Trophy size={80} className="text-yellow-600" /></div>
                    <h2 className="text-4xl font-bold text-slate-800">恭喜過關！</h2>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p className="text-sm text-slate-400 uppercase tracking-widest mb-2">總得分</p>
                        <p className="text-6xl font-black text-blue-500 mb-4">{score}</p>
                        <p className="text-lg text-slate-600">你是最強的四則運算大師！</p>
                    </div>
                    <button onClick={onRestart} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 flex items-center justify-center shadow-lg active:scale-95 transition-all"><RotateCcw className="mr-2" size={20} /> 再玩一次</button>
                </div>
            );

            return (
                <div className="py-2">
                    <div className="mb-6 flex justify-between items-center text-sm font-medium text-slate-400"><span className="bg-slate-100 px-3 py-1 rounded-full">第 {idx + 1} / {questions.length} 題</span><span>分數: {score}</span></div>
                    <h3 className="text-xl font-bold text-slate-800 mb-6 leading-relaxed">{questions[idx].q}</h3>
                    <div className="space-y-3">
                        {questions[idx].options.map((opt, i) => (
                            <button key={i} onClick={() => handleAnswer(i)} disabled={!!feedback}
                             className={`w-full text-left p-4 rounded-xl text-lg font-medium border-2 transition-all active:scale-98 
                             ${feedback === 'correct' && i === questions[idx].ans ? 'bg-green-100 border-green-500 text-green-800' : 
                               feedback === 'incorrect' && i !== questions[idx].ans && feedback ? 'bg-red-50 border-red-200 text-red-800 opacity-50' : 
                               'bg-white border-slate-200 hover:border-blue-400'}`}>
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-bold ${feedback === 'correct' && i === questions[idx].ans ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-500'}`}>{String.fromCharCode(65+i)}</div>
                                    {opt}
                                    {feedback === 'correct' && i === questions[idx].ans && <CheckCircle className="ml-auto text-green-600" />}
                                </div>
                            </button>
                        ))}
                    </div>
                    {feedback && <div className={`mt-6 text-center font-bold text-xl ${feedback === 'correct' ? 'text-green-500' : 'text-red-500'}`}>{feedback === 'correct' ? '正確！' : '答錯囉...'}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MathGame />);
    </script>
</body>
</html>
