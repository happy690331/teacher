<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語詞聽力遊戲</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    
    @keyframes celebrate {
      0% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.1) rotate(-5deg); }
      50% { transform: scale(1.2) rotate(5deg); }
      75% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .bounce-in { animation: bounce-in 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    .shake { animation: shake 0.5s ease-in-out; }
    .float { animation: float 3s ease-in-out infinite; }
    .celebrate { animation: celebrate 0.6s ease-in-out; }
    .slide-in { animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .card-grid { 
      display: grid; 
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      width: 100%;
      padding: 0 16px;
      max-width: 100%;
      align-content: center;
      justify-content: center;
    }
    
    .word-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      writing-mode: vertical-rl;
      text-orientation: upright;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 3/4;
      min-height: 120px;
      min-width: 90px;
      container-type: size;
    }

    .dynamic-word-text {
      font-size: clamp(2.5rem, 40cqmin, 7rem);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
    
    .word-card:hover:not(.correct):not(.wrong) {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 24px -8px rgba(251, 146, 60, 0.4);
    }
    
    .word-card.correct {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%) !important;
      transform: scale(1.05);
      pointer-events: none;
    }
    
    .word-card.wrong {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
    }
    
    .play-btn {
      position: relative;
      overflow: hidden;
    }
    
    .play-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.5s;
    }
    
    .play-btn:active::before {
      transform: translate(-50%, -50%) scale(2);
    }
    
    .progress-bar {
      background: linear-gradient(90deg, #f97316 0%, #fb923c 50%, #fdba74 100%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50">
  <div id="app" class="h-full overflow-auto"><!-- Page 1: Input Words -->
   <div id="page1" class="min-h-full flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-2xl">
     <div class="text-center mb-8">
      <div class="inline-block p-4 bg-gradient-to-br from-orange-400 to-amber-500 rounded-3xl shadow-xl mb-4 float"><span class="text-5xl">📚</span>
      </div>
      <h1 id="main-title" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600 mb-2">康軒六下語詞聽力遊戲</h1>
      <p class="text-orange-700/80 text-lg">選擇課程，開始挑戰！</p>
     </div>
     <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl p-6 border border-orange-100">
      <label class="block text-orange-800 font-bold text-lg mb-4"> <span class="mr-2">📖</span>請選擇課程（可複選） </label>
      <div id="chapters-container" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
       <!-- Chapters will be generated here -->
      </div>
      <div class="mb-4 p-4 bg-orange-50 rounded-2xl border border-orange-200">
       <p class="text-orange-800 font-medium"><span class="mr-2">✓</span>已選擇: <span id="selected-summary" class="text-orange-600 font-bold">未選擇任何課程</span></p>
       <p id="total-words-count" class="text-orange-700 text-sm mt-1">共 0 個語詞</p>
      </div><button id="next-to-page2" class="w-full py-4 px-8 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white text-xl font-bold rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none" disabled> 下一步 <span class="ml-2">→</span> </button>
     </div>
    </div>
   </div><!-- Page 2: Select Card Count and Question Count -->
   <div id="page2" class="min-h-full flex flex-col items-center justify-center p-6 hidden">
    <div class="w-full max-w-2xl">
     <div class="text-center mb-8">
      <div class="inline-block p-4 bg-gradient-to-br from-orange-400 to-amber-500 rounded-3xl shadow-xl mb-4"><span class="text-5xl">🎴</span>
      </div>
      <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600 mb-2">遊戲設定</h2>
      <p id="available-count" class="text-orange-700/80 text-lg"></p>
     </div>
     <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl p-6 border border-orange-100 space-y-8">
      
      <!-- Difficulty Selection -->
      <div>
       <h3 class="text-xl font-bold text-orange-800 mb-4 flex items-center"><span class="mr-2">⭐</span>選擇遊戲難度</h3>
       <div id="difficulty-options" class="grid grid-cols-3 gap-3">
        <button class="diff-option py-4 px-2 border-2 rounded-2xl text-center transition-all duration-300 border-green-500 bg-green-100 ring-4 ring-green-200" data-diff="1">
         <span class="text-xl font-bold text-green-700 block mb-1">低</span>
         <span class="text-xs text-green-600 font-medium">唸讀 1 個語詞</span>
        </button>
        <button class="diff-option py-4 px-2 border-2 border-yellow-200 bg-yellow-50 hover:bg-yellow-100 hover:border-yellow-400 rounded-2xl text-center transition-all duration-300" data-diff="2">
         <span class="text-xl font-bold text-yellow-700 block mb-1">中</span>
         <span class="text-xs text-yellow-600 font-medium">唸讀 2 個語詞</span>
        </button>
        <button class="diff-option py-4 px-2 border-2 border-red-200 bg-red-50 hover:bg-red-100 hover:border-red-400 rounded-2xl text-center transition-all duration-300" data-diff="3">
         <span class="text-xl font-bold text-red-700 block mb-1">高</span>
         <span class="text-xs text-red-600 font-medium">唸讀 3 個語詞</span>
        </button>
       </div>
      </div>

      <!-- Card Count Selection -->
      <div>
       <h3 class="text-xl font-bold text-orange-800 mb-4 flex items-center"><span class="mr-2">🎴</span>選擇畫面卡片數量</h3>
       <div id="count-options" class="grid grid-cols-2 md:grid-cols-5 gap-3"><!-- Options will be generated dynamically -->
       </div>
      </div>
      
      <!-- Question Count Selection -->
      <div>
       <h3 class="text-xl font-bold text-orange-800 mb-4 flex items-center"><span class="mr-2">❓</span>選擇總題目數量</h3>
       <div id="question-count-options" class="grid grid-cols-2 md:grid-cols-5 gap-3"><!-- Options will be generated dynamically -->
       </div>
      </div>
      <div class="flex gap-4">
       <button id="back-to-page1" class="flex-1 py-4 px-6 bg-gray-100 hover:bg-gray-200 text-gray-700 text-lg font-bold rounded-2xl transition-all duration-300"> <span class="mr-2">←</span> 返回 </button> <button id="start-game" class="flex-1 py-4 px-6 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white text-lg font-bold rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none" disabled> 開始遊戲 <span class="ml-2">🎮</span> </button>
      </div>
     </div>
    </div>
   </div><!-- Page 3: Game -->
   <div id="page3" class="h-full flex flex-col p-4 hidden overflow-hidden"><!-- Header Bar - All Info in One Row -->
    <div class="flex-shrink-0 bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-3 mb-4 border border-orange-100 overflow-x-auto">
     <div class="flex items-center justify-between gap-3 whitespace-nowrap">
      <div class="flex items-center gap-2 flex-shrink-0"><span class="text-xl">🎯</span> <span id="progress-text" class="text-orange-800 font-bold text-sm">第 1 題 / 共 4 題</span>
      </div>
      <div class="h-2 bg-orange-100 rounded-full overflow-hidden w-20 flex-shrink-0">
       <div id="progress-bar" class="h-full progress-bar rounded-full transition-all duration-500" style="width: 0%"></div>
      </div><button id="play-sound-btn" class="play-btn w-14 h-14 bg-gradient-to-br from-orange-400 to-amber-500 hover:from-orange-500 hover:to-amber-600 rounded-full shadow-lg flex items-center justify-center transform hover:scale-105 active:scale-95 transition-all duration-300 flex-shrink-0"> <span class="text-xl">🔊</span> </button>
      <div class="flex items-center gap-1 flex-shrink-0"><label class="text-orange-700 font-medium text-xs">語速</label> <input type="range" id="speed-slider" min="0.1" max="1.6" step="0.1" value="0.7" class="h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer w-14" style="accent-color: #fb923c;"> <span id="speed-display" class="text-orange-700 font-bold text-sm w-7 text-center">0.7x</span>
      </div>
      <div class="text-center flex-shrink-0">
       <div id="elapsed-time" class="text-orange-700 font-bold text-sm">
        00:00
       </div>
       <p class="text-orange-600 text-xs leading-tight">已用時間</p>
      </div><button id="restart-btn" class="py-2 px-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium text-xs rounded-xl transition-all flex-shrink-0"> 🔄 重新設置 </button>
     </div>
    </div><!-- Cards Container - Full Remaining Space -->
    <div class="flex-1 flex items-center justify-center overflow-auto">
     <div id="cards-container" class="card-grid"><!-- Cards will be generated dynamically -->
     </div>
    </div><!-- Feedback Overlay -->
    <div id="feedback-overlay" class="fixed inset-0 flex items-center justify-center pointer-events-none z-50 hidden">
     <div id="feedback-icon" class="text-9xl bounce-in"></div>
    </div>
   </div><!-- Page 4: Complete -->
   <div id="page4" class="min-h-full flex flex-col items-center justify-center p-6 hidden">
    <div class="text-center">
     <div class="inline-block p-6 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full shadow-2xl mb-6 celebrate"><span class="text-7xl">🏆</span>
     </div>
     <h2 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600 mb-4">太棒了！</h2>
     <p class="text-orange-700 text-xl mb-6">你完成了所有題目！</p>
     
     <!-- 比賽成績看板 -->
     <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl p-6 mb-8 border border-orange-100 flex justify-center gap-6">
      <div class="text-center p-4 bg-orange-50 rounded-2xl w-32 border border-orange-100 shadow-inner">
       <div class="text-sm text-orange-600 font-bold mb-1">⏱️ 完成時間</div>
       <div id="final-time" class="text-3xl font-black text-orange-600">00:00</div>
      </div>
      <div class="text-center p-4 bg-red-50 rounded-2xl w-32 border border-red-100 shadow-inner">
       <div class="text-sm text-red-600 font-bold mb-1">❌ 答錯次數</div>
       <div id="final-mistakes" class="text-3xl font-black text-red-500">0</div>
      </div>
     </div>

     <div class="flex gap-4 justify-center"><button id="play-again-btn" class="py-4 px-8 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white text-xl font-bold rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300"> 🔄 再玩一次 </button> <button id="new-words-btn" class="py-4 px-8 bg-white hover:bg-gray-50 text-orange-600 text-xl font-bold rounded-2xl shadow-lg border-2 border-orange-200 hover:border-orange-300 transition-all duration-300"> 📝 換新語詞 </button>
     </div>
    </div>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      game_title: '康軒六下語詞聽力遊戲'
    };
    
    // Chapter data
    const chaptersData = [
      { id: 1, name: '第一課　馬達加斯加，出發！', words: ['島嶼', '獨立', '心馳神往', '輾轉', '櫛比鱗次', '錢幣', '村莊', '瀕危', '撒旦', '掠食者', '覓食', '紳士', '迷濛', '高亢', '凌駕', '岌岌可危'] },
      { id: 2, name: '第二課　沉睡的天空之城', words: ['遺址', '屏息', '秘魯', '璀璨', '愜意', '振奮', '氛圍', '井然有序', '澎湃', '堆砌', '梯田', '玄妙', '拴日石', '興味盎然', '回眸'] },
      { id: 3, name: '第三課　走進太陽之城', words: ['佛萊堡', '瑞士', '名列前茅', '唯一', '爆發', '供應', '政府', '收購', '騎士', '駕駛', '冰箱', '嬉戲', '乒乓球', '輕鬆自在', '護欄'] },
      { id: 4, name: '第四課　送友人', words: ['蕭蕭', '清澈', '辭別', '橫臥', '行蹤', '重逢', '抒發', '漂泊', '餘暉', '真摯', '情誼'] },
      { id: 5, name: '第五課　蚵鄉風情', words: ['靠攏', '笨拙', '疲憊', '鈔票', '包裹', '巡視', '甦醒', '豎立', '媒體', '沸騰', '宛如'] },
      { id: 6, name: '第六課　童年˙夏日˙棉花糖', words: ['扶疏', '鳳凰木', '山巔', '戀戀不捨', '綠蔭', '紡車', '經緯', '纖纖', '裊裊', '袖珍', '工廠', '喜孜孜', '猶在', '光陰', '飛逝', '雀斑'] },
      { id: 7, name: '第七課　我的少年夢', words: ['閣樓', '匱乏', '舊書攤', '冥冥之中', '帳篷', '徒步', '籌備', '埡口', '山脈', '紮營', '窸窸窣窣', '背誦', '宇宙', '浩瀚'] },
      { id: 8, name: '第八課　如何張開追夢的翅膀', words: ['瞻前顧後', '汲取', '富庶', '鍥而不捨', '嶄新', '一輩子', '全力以赴', '構築', '諺語', '羊羹', '公斤', '全神貫注', '拓展'] },
      { id: 9, name: '第九課　成為人生的開拓者', words: ['恭喜', '荊棘', '俗話', '窘境', '溝通', '生涯', '曙光'] }
    ];
    
    // Game state
    let allWords = [];
    let selectedWords = []; // 全部的語詞庫
    let currentTargetWords = []; // 根據難度一次選出的 1~3 個目標語詞
    let currentSequenceIndex = 0; // 目前答題進入到序列的哪一個
    let answeredCorrectly = new Set(); // 記錄已被選作過目標的語詞
    let questionsAnswered = 0; // 記錄答對的題數
    let totalAttempts = 0;
    let wrongAttempts = 0;
    
    let selectedChapters = new Set();
    let selectedCardCount = 0;
    let selectedQuestionCount = 0;
    let selectedDifficulty = 1; // 預設難度: 低
    
    // DOM Elements
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    const page4 = document.getElementById('page4');
    const chaptersContainer = document.getElementById('chapters-container');
    const selectedSummary = document.getElementById('selected-summary');
    const totalWordsCount = document.getElementById('total-words-count');
    const countOptions = document.getElementById('count-options');
    const questionCountOptions = document.getElementById('question-count-options');
    const cardsContainer = document.getElementById('cards-container');
    const progressText = document.getElementById('progress-text');
    const progressBar = document.getElementById('progress-bar');
    const feedbackOverlay = document.getElementById('feedback-overlay');
    const feedbackIcon = document.getElementById('feedback-icon');
    const availableCount = document.getElementById('available-count');
    const mainTitle = document.getElementById('main-title');
    
    let currentSpeed = 0.7;
    let successAudioContext = null;
    let gameStartTime = null;
    let gameTimer = null;
    let gamePaused = false;
    
    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const title = config.game_title || defaultConfig.game_title;
          mainTitle.textContent = title;
          document.title = title;
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title]
        ])
      });
    }
    
    // Generate chapter buttons
    function generateChapterButtons() {
      chaptersContainer.innerHTML = '';
      chaptersData.forEach((chapter) => {
        const btn = document.createElement('button');
        const isSelected = selectedChapters.has(chapter.id);
        btn.type = 'button';
        const baseClasses = 'chapter-btn p-4 rounded-2xl text-center transition-all duration-300 border-2';
        const selectedClasses = isSelected
          ? 'border-orange-500 bg-orange-100 ring-4 ring-orange-200 shadow-lg'
          : 'border-orange-200 bg-white hover:border-orange-400 hover:bg-orange-50';
        btn.className = `${baseClasses} ${selectedClasses}`;
        btn.innerHTML = `<span class="text-2xl block mb-1">${chapter.id}</span><span class="text-xs font-medium text-orange-700 line-clamp-2">${chapter.name}</span>`;
        btn.dataset.chapterId = chapter.id;
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          toggleChapter(chapter.id);
        });
        chaptersContainer.appendChild(btn);
      });
    }
    
    // Toggle chapter selection
    function toggleChapter(chapterId) {
      if (selectedChapters.has(chapterId)) {
        selectedChapters.delete(chapterId);
      } else {
        selectedChapters.add(chapterId);
      }
      updateChapterDisplay();
      generateChapterButtons();
    }
    
    // Update chapter display summary
    function updateChapterDisplay() {
      if (selectedChapters.size === 0) {
        selectedSummary.textContent = '未選擇任何課程';
        totalWordsCount.textContent = '共 0 個語詞';
        document.getElementById('next-to-page2').disabled = true;
      } else {
        const chapterNames = Array.from(selectedChapters)
          .sort((a, b) => a - b)
          .map(id => chaptersData[id - 1].name.split('　')[0])
          .join(', ');
        selectedSummary.textContent = chapterNames;
        
        // Count total words
        let totalWords = 0;
        selectedChapters.forEach(id => {
          totalWords += chaptersData[id - 1].words.length;
        });
        totalWordsCount.textContent = `共 ${totalWords} 個語詞`;
        document.getElementById('next-to-page2').disabled = false;
      }
    }
    
    // Show page
    function showPage(pageNum) {
      [page1, page2, page3, page4].forEach((p, i) => {
        p.classList.toggle('hidden', i !== pageNum - 1);
      });
    }
    
    // 選擇難度
    function selectDifficulty(diff) {
      selectedDifficulty = diff;
      document.querySelectorAll('.diff-option').forEach(btn => {
        const d = parseInt(btn.dataset.diff);
        const isSelected = d === diff;
        
        if (d === 1) {
          btn.className = `diff-option py-4 px-2 border-2 rounded-2xl text-center transition-all duration-300 ${isSelected ? 'border-green-500 bg-green-100 ring-4 ring-green-200' : 'border-green-200 bg-green-50 hover:bg-green-100 hover:border-green-400'}`;
        } else if (d === 2) {
          btn.className = `diff-option py-4 px-2 border-2 rounded-2xl text-center transition-all duration-300 ${isSelected ? 'border-yellow-500 bg-yellow-100 ring-4 ring-yellow-200' : 'border-yellow-200 bg-yellow-50 hover:bg-yellow-100 hover:border-yellow-400'}`;
        } else if (d === 3) {
          btn.className = `diff-option py-4 px-2 border-2 rounded-2xl text-center transition-all duration-300 ${isSelected ? 'border-red-500 bg-red-100 ring-4 ring-red-200' : 'border-red-200 bg-red-50 hover:bg-red-100 hover:border-red-400'}`;
        }
      });
      
      const minCards = Math.max(2, selectedDifficulty);
      if (selectedCardCount < minCards && selectedCardCount !== 0) {
        selectCardCount(minCards);
      }
      generateCountOptions(allWords.length, minCards);
      checkPageReadiness();
    }
    
    // 產生卡片數量選項 (動態根據難度設定下限)
    function generateCountOptions(maxCount, minCards = 2) {
      countOptions.innerHTML = '';
      const options = [];
      
      for (let i = minCards; i <= Math.min(10, maxCount); i++) {
        options.push(i);
      }
      
      if (options.length === 0) {
        options.push(Math.min(maxCount, minCards)); // fallback
      }
      
      options.forEach(count => {
        const btn = document.createElement('button');
        btn.className = 'count-option py-4 px-3 bg-orange-50 hover:bg-orange-100 border-2 border-orange-200 hover:border-orange-400 rounded-2xl text-center transition-all duration-300';
        btn.innerHTML = `
          <span class="text-2xl block mb-1">🎴</span>
          <span class="text-xl font-bold text-orange-700">${count}</span>
        `;
        btn.dataset.count = count;
        btn.addEventListener('click', () => selectCardCount(count));
        
        // 若當前選擇數量被重建，保留選取狀態
        if (selectedCardCount === count) {
            btn.classList.add('border-orange-500', 'bg-orange-100', 'ring-4', 'ring-orange-200');
        }
        countOptions.appendChild(btn);
      });
    }
    
    // Generate question count options
    function generateQuestionCountOptions(maxCount) {
      questionCountOptions.innerHTML = '';
      const options = [];
      
      for (let i = 2; i <= Math.min(10, maxCount); i++) {
        options.push(i);
      }
      
      options.forEach(count => {
        const btn = document.createElement('button');
        btn.className = 'question-option py-4 px-3 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 hover:border-blue-400 rounded-2xl text-center transition-all duration-300';
        btn.innerHTML = `
          <span class="text-2xl block mb-1">❓</span>
          <span class="text-xl font-bold text-blue-700">${count}</span>
        `;
        btn.dataset.count = count;
        btn.addEventListener('click', () => selectQuestionCount(count));
        questionCountOptions.appendChild(btn);
      });
    }
    
    // Select card count
    function selectCardCount(count) {
      selectedCardCount = count;
      document.querySelectorAll('.count-option').forEach(btn => {
        const isSelected = parseInt(btn.dataset.count) === count;
        btn.classList.toggle('border-orange-500', isSelected);
        btn.classList.toggle('bg-orange-100', isSelected);
        btn.classList.toggle('ring-4', isSelected);
        btn.classList.toggle('ring-orange-200', isSelected);
      });
      checkPageReadiness();
    }
    
    // Select question count
    function selectQuestionCount(count) {
      selectedQuestionCount = count;
      document.querySelectorAll('.question-option').forEach(btn => {
        const isSelected = parseInt(btn.dataset.count) === count;
        btn.classList.toggle('border-blue-500', isSelected);
        btn.classList.toggle('bg-blue-100', isSelected);
        btn.classList.toggle('ring-4', isSelected);
        btn.classList.toggle('ring-blue-200', isSelected);
      });
      checkPageReadiness();
    }
    
    // Check if both options are selected
    function checkPageReadiness() {
      document.getElementById('start-game').disabled = selectedCardCount === 0 || selectedQuestionCount === 0;
    }
    
    // Shuffle array
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
    
    // 產生畫面中的卡片 (包含洗牌重置)
    function generateCards() {
      cardsContainer.innerHTML = '';
      
      // 確保畫面必須包含該題的目標語詞
      let cardsToShow = [...currentTargetWords];
      
      // 其他空間填滿從 selectedWords 抽出的隨機干擾語詞
      let distractors = selectedWords.filter(w => !currentTargetWords.includes(w));
      distractors = shuffleArray(distractors);
      
      while(cardsToShow.length < selectedCardCount && distractors.length > 0) {
        cardsToShow.push(distractors.pop());
      }
      
      // 將卡片重新隨機洗牌顯示
      cardsToShow = shuffleArray(cardsToShow);
      
      cardsToShow.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = `word-card p-4 rounded-2xl shadow-lg border-2 slide-in bg-gradient-to-br from-white to-orange-50 border-orange-200 hover:border-orange-400`;
        card.innerHTML = `<span class="dynamic-word-text font-bold text-orange-800">${word}</span>`;
        card.dataset.word = word;
        card.style.animationDelay = `${index * 0.05}s`;
        
        card.addEventListener('click', () => handleCardClick(word, card));
        cardsContainer.appendChild(card);
      });
      
      // 等待卡片翻轉動畫結束後，自動播放語音
      setTimeout(() => speakWords(), 600);
    }
    
    // 選取下一題的目標語詞
    function selectNextTarget() {
      if (questionsAnswered >= selectedQuestionCount) {
        showCompletePage();
        return false;
      }
      
      currentTargetWords = [];
      // 盡量挑選尚未當過目標的語詞
      let untested = selectedWords.filter(w => !answeredCorrectly.has(w));
      const wordsToPick = Math.min(selectedDifficulty, selectedWords.length);
      
      for(let i=0; i<wordsToPick; i++) {
        if (untested.length === 0) {
          // 若全部都測過了，則從所有字庫中(排除此序列已選的字)重新隨機選取
          untested = selectedWords.filter(w => !currentTargetWords.includes(w));
        }
        const idx = Math.floor(Math.random() * untested.length);
        const word = untested.splice(idx, 1)[0];
        currentTargetWords.push(word);
        answeredCorrectly.add(word);
      }
      
      currentSequenceIndex = 0; // 重置答題進度
      return true;
    }
    
    // Update progress display
    function updateProgress() {
      const total = selectedQuestionCount;
      progressText.textContent = `第 ${questionsAnswered + 1} 題 / 共 ${total} 題`;
      progressBar.style.width = `${(questionsAnswered / total) * 100}%`;
    }
    
    // 依序唸出陣列中的語詞
    function speakWords() {
      if (!currentTargetWords || currentTargetWords.length === 0) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        
        // 透過加入逗號來讓語音產生自然的停頓感
        const textToSpeak = currentTargetWords.join('，');
        
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'zh-TW';
        utterance.rate = currentSpeed;
        utterance.pitch = 1;
        
        const voices = window.speechSynthesis.getVoices();
        const chineseVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('cmn'));
        if (chineseVoice) {
          utterance.voice = chineseVoice;
        }
        
        window.speechSynthesis.speak(utterance);
      }
    }
    
    // Play success sound
    function playSuccessSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        
        const osc1 = audioContext.createOscillator();
        const osc2 = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioContext.destination);
        
        osc1.frequency.value = 523.25; // C5
        osc1.start(now);
        osc1.stop(now + 0.1);
        
        osc2.frequency.value = 659.25; // E5
        osc2.start(now + 0.15);
        osc2.stop(now + 0.25);
        
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.setValueAtTime(0, now + 0.3);
      } catch (e) {
        console.error('Failed to play sound:', e);
      }
    }
    
    // Show feedback overlay
    function showFeedback(isCorrect) {
      feedbackIcon.textContent = isCorrect ? '⭕' : '❌';
      feedbackIcon.className = 'text-9xl bounce-in';
      feedbackOverlay.classList.remove('hidden');
      
      // 連擊序列時需要較短的回饋時間，避免干擾下一次點擊
      setTimeout(() => {
        feedbackOverlay.classList.add('hidden');
      }, 400);
    }
    
    // Create confetti
    function createConfetti() {
      const colors = ['#f97316', '#fbbf24', '#22c55e', '#3b82f6', '#ec4899'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.cssText = `
          position: fixed;
          width: 10px;
          height: 10px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          left: ${Math.random() * 100}vw;
          top: -10px;
          border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
          animation: fall ${2 + Math.random() * 2}s linear forwards;
        `;
        document.body.appendChild(confetti);
        
        setTimeout(() => confetti.remove(), 4000);
      }
      
      if (!document.getElementById('confetti-style')) {
        const style = document.createElement('style');
        style.id = 'confetti-style';
        style.textContent = `
          @keyframes fall {
            to {
              transform: translateY(100vh) rotate(720deg);
              opacity: 0;
            }
          }
        `;
        document.head.appendChild(style);
      }
    }
    
    // 處理卡片點擊 (支援多個語詞順序點擊)
    function handleCardClick(word, card) {
      if (card.classList.contains('correct')) return; // 略過已經點擊正確的卡片
      
      totalAttempts++;
      const expectedWord = currentTargetWords[currentSequenceIndex];
      
      if (word === expectedWord) {
        // 序列中的這一個點擊正確！
        showFeedback(true);
        card.classList.add('correct');
        currentSequenceIndex++;
        
        // 檢查是否該題的目標都點擊完畢了
        if (currentSequenceIndex >= currentTargetWords.length) {
          playSuccessSound();
          questionsAnswered++;
          
          setTimeout(() => {
            if (questionsAnswered >= selectedQuestionCount) {
              showCompletePage();
            } else {
              selectNextTarget();
              updateProgress();
              generateCards(); // 此處會重新隨機抽選干擾卡，並更換所有卡片位置
            }
          }, 600);
        }
      } else {
        // 點錯了！顯示打叉並重置序列
        wrongAttempts++;
        showFeedback(false);
        card.classList.add('wrong', 'shake');
        
        // 重置該題序列
        currentSequenceIndex = 0;
        document.querySelectorAll('.word-card.correct').forEach(c => {
          c.classList.remove('correct');
        });
        
        setTimeout(() => {
          card.classList.remove('wrong', 'shake');
        }, 500);
      }
    }
    
    // Show complete page
    function showCompletePage() {
      gamePaused = true;
      clearInterval(gameTimer);
      
      const elapsedMs = Date.now() - gameStartTime;
      const elapsedSeconds = Math.floor(elapsedMs / 1000);
      const minutes = Math.floor(elapsedSeconds / 60);
      const seconds = elapsedSeconds % 60;
      const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      document.getElementById('final-time').textContent = timeStr;
      document.getElementById('final-mistakes').textContent = wrongAttempts;
      
      showPage(4);
      createConfetti();
    }
    
    // Start game
    function startGame() {
      selectedWords = shuffleArray(allWords); 
      questionsAnswered = 0;
      answeredCorrectly = new Set();
      totalAttempts = 0;
      wrongAttempts = 0;
      gameStartTime = Date.now();
      gamePaused = false;
      
      selectNextTarget();
      updateProgress();
      generateCards();
      startTimer();
      showPage(3);
    }
    
    // Reset game
    function resetGame() {
      startGame();
    }
    
    // Event Listeners
    document.getElementById('next-to-page2').addEventListener('click', () => {
      allWords = [];
      selectedChapters.forEach(id => {
        const chapter = chaptersData[id - 1];
        allWords = allWords.concat(chapter.words);
      });
      
      availableCount.textContent = `共有 ${allWords.length} 個語詞可選`;
      
      const minCards = Math.max(2, selectedDifficulty);
      generateCountOptions(allWords.length, minCards);
      generateQuestionCountOptions(allWords.length);
      selectedCardCount = 0;
      selectedQuestionCount = 0;
      
      // 如果已經設定過難度，保留難度顯示
      selectDifficulty(selectedDifficulty); 
      
      document.getElementById('start-game').disabled = true;
      showPage(2);
    });
    
    // 設定難度按鈕監聽
    document.querySelectorAll('.diff-option').forEach(btn => {
      btn.addEventListener('click', () => selectDifficulty(parseInt(btn.dataset.diff)));
    });
    
    document.getElementById('back-to-page1').addEventListener('click', () => {
      showPage(1);
    });
    
    document.getElementById('start-game').addEventListener('click', startGame);
    
    // 點擊喇叭可以完整重讀一次序列
    document.getElementById('play-sound-btn').addEventListener('click', () => {
      const btn = document.getElementById('play-sound-btn');
      btn.classList.add('scale-90');
      setTimeout(() => btn.classList.remove('scale-90'), 150);
      speakWords();
    });
    
    document.getElementById('speed-slider').addEventListener('input', (e) => {
      currentSpeed = parseFloat(e.target.value);
      document.getElementById('speed-display').textContent = currentSpeed.toFixed(1) + 'x';
    });
    
    // 原本的重新開始改為回設定頁
    document.getElementById('restart-btn').addEventListener('click', () => {
      gamePaused = true;
      clearInterval(gameTimer);
      showPage(2);
    });
    
    document.getElementById('play-again-btn').addEventListener('click', resetGame);
    
    document.getElementById('new-words-btn').addEventListener('click', () => {
      gamePaused = true;
      clearInterval(gameTimer);
      selectedChapters = new Set();
      updateChapterDisplay();
      generateChapterButtons();
      showPage(1);
    });
    
    // Start timer function
    function startTimer() {
      if (gameTimer) clearInterval(gameTimer);
      
      gameTimer = setInterval(() => {
        if (!gamePaused) {
          const elapsedMs = Date.now() - gameStartTime;
          const elapsedSeconds = Math.floor(elapsedMs / 1000);
          const minutes = Math.floor(elapsedSeconds / 60);
          const seconds = elapsedSeconds % 60;
          document.getElementById('elapsed-time').textContent = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
      }, 100);
    }
    
    // Load voices
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }
    
    // Initialize chapter buttons
    generateChapterButtons();
    updateChapterDisplay();
  </script>
 </body>
