        }

            font-weight: bold;
        }

            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 20px;
        }

        .stage-info {
            background: #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            color: #2d3748;
        }

        .game-area {
            background: #f7fafc;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            height: 300px;
            position: relative;
            border: 3px dashed #cbd5e0;
        }

        .component {
            display: inline-block;
            font-size: 4rem;
            font-weight: bold;
            color: #2b6cb0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .component.rotating {
            animation: rotate 3s linear infinite;
        }

        .component:hover {
            transform: scale(1.1);
            color: #1a365d;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .answer-display {
            text-align: center;
            font-size: 6rem;
            font-weight: bold;
            color: #38a169;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .controls {
            text-align: center;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
        }

        .next-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }

        .question-counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a5568;
            margin: 0 20px 20px 20px;
            padding: 15px;
            background: #e2e8f0;
            border-radius: 10px;
            display: inline-block;
        }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
            border: 2px solid #38a169;
        }

            color: #742a2a;

        }

        function startLesson(lessonNum) {
            currentLesson = lessonNum;
            const lessonData = lessonsData[lessonNum];
            
            // 使用已定義的問題
            questions = lessonData.questions.map(q => ({
                answer: q.answer,
                components: q.components,
                positions: [
                    generatePositions(q.components.length, 0),
                    generatePositions(q.components.length, 1),
                    'complete'
                ]
            }));

            questions = shuffleArray(questions);
            
            document.getElementById('gameTitle').textContent = lessonData.title;
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            
            currentQuestion = 0;
            currentStage = 0;
            gameCompleted = false;
            initGame();

        function generatePositions(componentCount, stage) {
            const positions = [];
            
            if (stage === 0) {
                // 第一階段：分散且避免嚴重重疊，限制在虛線框內
                // 建立 4x2 的網格 (共 8 個位置選項)
                const cells = [
                    {x: 10, y: 10}, {x: 35, y: 10}, {x: 60, y: 10}, {x: 80, y: 10},
                    {x: 10, y: 50}, {x: 35, y: 50}, {x: 60, y: 50}, {x: 80, y: 50}
                ];
                // 隨機打亂格子並選取前 componentCount 個
                const shuffledCells = cells.sort(() => 0.5 - Math.random()).slice(0, componentCount);
                
                for (let i = 0; i < componentCount; i++) {
                    // 在選定的格子中心加上微小隨機偏移 (±5%)
                    positions.push({
                        x: shuffledCells[i].x + (Math.random() * 10 - 5),
                        y: shuffledCells[i].y + (Math.random() * 10 - 5)
                    });
                }
            } else {
                // 第二階段：靠攏在中間區域 (改為水平排列以避免重疊)
                const spacing = componentCount >= 4 ? 16 : 22; // 根據部件多寡決定間隔比例
                // 計算置中的起始 X 座標 (預扣除一些自身的寬度偏移)
                const startX = 45 - ((componentCount - 1) * spacing) / 2;
                
                for (let i = 0; i < componentCount; i++) {
                    positions.push({
                        x: startX + (i * spacing) + (Math.random() * 4 - 2), // 水平間隔加上微小隨機錯位
                        y: 35 + (Math.random() * 8 - 4)  // Y 軸維持在中央，加入微小高低差會更自然
                    });
                }
            }
            
            return positions;
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initGame() {
            currentStage = 0;
            gameCompleted = false;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('hintBtn').disabled = false;
            updateStageInfo();
            updateQuestionCounter();
            displayComponents();
        }

        function updateStageInfo() {
            const stageTexts = [
                '第一階段：觀察散落的部件，猜猜看是什麼字？',
                '第二階段：部件稍微靠近了一些，再猜猜看！',
                '第三階段：完整答案揭曉！'
            ];
            document.getElementById('stageInfo').textContent = stageTexts[currentStage];
        }

        function updateQuestionCounter() {
            document.getElementById('questionCounter').textContent = `第 ${currentQuestion + 1} 題 / 共 ${questions.length} 題`;
        }

        function displayComponents() {
            const gameArea = document.getElementById('gameArea');
            const question = questions[currentQuestion];
            
            gameArea.innerHTML = '';

            if (currentStage === 2) {
                gameArea.innerHTML = `<div class="answer-display">${question.answer}</div>`;
                return;
            }

            const positions = question.positions[currentStage];
            const componentsToShow = question.components;
            
            componentsToShow.forEach((component, index) => {
                const componentDiv = document.createElement('div');
                componentDiv.className = currentStage === 0 ? 'component rotating' : 'component';
                componentDiv.textContent = component;
                componentDiv.style.left = positions[index].x + '%';
                componentDiv.style.top = positions[index].y + '%';
                gameArea.appendChild(componentDiv);
            });
        }

        function nextHint() {
            if (gameCompleted) return;
            
            if (currentStage < 2) {
                currentStage++;
                updateStageInfo();
                displayComponents();
                
                if (currentStage === 2) {
                    showFeedback(`答案是：${questions[currentQuestion].answer}`, 'correct');
                    gameCompleted = true;
                    document.getElementById('hintBtn').disabled = true;
                }
            }
        }

        function nextQuestion() {
            currentQuestion = (currentQuestion + 1) % questions.length;
            initGame();
        }

        function prevQuestion() {
            currentQuestion = (currentQuestion - 1 + questions.length) % questions.length;
            initGame();
        }

        function backToMenu() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            currentLesson = null;
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
            feedback.style.display = 'block';
        }

        // 初始化選單
        initMenu();
    </script>
 </body>
