<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學魔法對戰</title>
    <!-- 引入 Tailwind CSS 用於樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 基礎動畫 */
        .animate-bounce-slow {
          animation: bounce 2s infinite;
        }
        @keyframes bounce {
          0%, 100% { transform: translateY(0); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
          50% { transform: translateY(-15%); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        @keyframes fade-in {
          from { opacity: 0; transform: translateY(-10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
          animation: fade-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes pop-in {
          0% { transform: scale(0.8); opacity: 0; }
          100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
          animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- 華麗魔法球攻擊動畫 --- */
        @keyframes magic-shoot-right {
          0% { left: 15%; opacity: 0; transform: scale(0.2) rotate(0deg); }
          15% { opacity: 1; transform: scale(1.5) rotate(45deg); filter: brightness(1.5); }
          85% { left: 75%; opacity: 1; transform: scale(1.2) rotate(180deg); }
          100% { left: 80%; opacity: 0; transform: scale(3) rotate(220deg); }
        }
        @keyframes magic-shoot-left {
          0% { right: 15%; opacity: 0; transform: scale(0.2) rotate(0deg); }
          15% { opacity: 1; transform: scale(1.5) rotate(-45deg); filter: brightness(1.5); }
          85% { right: 75%; opacity: 1; transform: scale(1.2) rotate(-180deg); }
          100% { right: 80%; opacity: 0; transform: scale(3) rotate(-220deg); }
        }
        .magic-ball-right {
          animation: magic-shoot-right 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
          background: radial-gradient(circle, #ffffff 0%, #60a5fa 30%, transparent 70%);
          box-shadow: 0 0 20px #60a5fa, 0 0 40px #3b82f6, 0 0 60px #ffffff;
          border-radius: 50%;
        }
        .magic-ball-left {
          animation: magic-shoot-left 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
          background: radial-gradient(circle, #ffffff 0%, #d946ef 30%, transparent 70%);
          box-shadow: 0 0 20px #d946ef, 0 0 40px #c026d3, 0 0 60px #ffffff;
          border-radius: 50%;
        }

        /* 擊中爆破特效 */
        @keyframes hit-flash {
          0% { opacity: 0; transform: scale(0.5); }
          30% { opacity: 1; transform: scale(2.5); background: white; filter: blur(2px); }
          100% { opacity: 0; transform: scale(4); filter: blur(8px); }
        }
        .hit-effect {
          position: absolute;
          width: 50px;
          height: 50px;
          border-radius: 50%;
          animation: hit-flash 0.4s ease-out forwards;
          pointer-events: none;
        }

        /* 擊中震動特效 */
        @keyframes shake-impact {
          0%, 100% { transform: translate(0, 0) rotate(0deg); filter: brightness(1); }
          15% { transform: translate(-10px, 5px) rotate(-10deg); filter: brightness(1.5) drop-shadow(0 0 10px rgba(255, 0, 0, 0.6)); }
          30% { transform: translate(8px, -5px) rotate(8deg); filter: brightness(1.3); }
          45% { transform: translate(-6px, 3px) rotate(-6deg); }
          60% { transform: translate(4px, -3px) rotate(6deg); }
          75% { transform: translate(-2px, 2px) rotate(-2deg); }
        }
        .animate-shake {
          animation: shake-impact 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 簡易音效合成器 (Web Audio API) ---
        // 利用瀏覽器原生功能發聲，避免外部資源載入失敗
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        };

        const playSound = (type) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'shoot') {
                // 發射魔法的聲音 (高頻下降)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.3);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'hit') {
                // 擊中的聲音 (低頻爆破)
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        };

        // --- 常數定義 ---
        const MODES = {
            ADD_1_1: { id: 'add_1_1', label: '一位數 + 一位數' },
            ADD_2_1: { id: 'add_2_1', label: '二位數 + 一位數' },
            SUB_1_1: { id: 'sub_1_1', label: '一位數 - 一位數' },
            SUB_2_1: { id: 'sub_2_1', label: '二位數 - 一位數' },
            MUL_9_9: { id: 'mul_9_9', label: '九九乘法' },
            DIV_2_1: { id: 'div_2_1', label: '二位數 ÷ 一位數' },
        };

        // --- 圖示元件 ---
        const Trophy = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                <path d="M4 22h16" />
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 21" />
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 21" />
                <path d="M12 2a7 7 0 0 0-7 7v1h14v-1a7 7 0 0 0-7-7z" />
            </svg>
        );

        const RefreshCcw = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                <path d="M16 16h5v5" />
            </svg>
        );

        const Play = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
        );

        const Pause = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        );

        const TimerIcon = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );

        const HomeIcon = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        );

        const Check = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        // --- 數字鍵盤元件 (改為正常文檔流，不再覆蓋畫面) ---
        const MiniKeypad = ({ onNumClick, color }) => {
            const btnColorClass = color === 'blue' 
                ? 'bg-blue-50 text-blue-700 hover:bg-blue-200 border-b-4 border-blue-300 active:border-b-0 active:translate-y-1' 
                : 'bg-purple-50 text-purple-700 hover:bg-purple-200 border-b-4 border-purple-300 active:border-b-0 active:translate-y-1';

            return (
                <div className="w-full max-w-[240px] mx-auto mt-4 animate-fade-in">
                    <div className="grid grid-cols-5 gap-1.5 md:gap-2">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, 0].map((num) => (
                            <button
                                key={num}
                                onClick={(e) => { e.stopPropagation(); onNumClick(num); }}
                                className={`h-10 md:h-12 text-xl font-bold rounded-lg shadow-sm transition-all ${btnColorClass}`}
                            >
                                {num}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 主程式元件 ---
        const MagicBattleMath = () => {
          // 遊戲常數
          const MAX_HP = 6; 
          const DELAY_MS = 600; 
          const GAME_TIME = 120; // 2分鐘
          
          // 狀態管理 - 選單
          const [gameState, setGameState] = useState('menu'); 
          const [leftModes, setLeftModes] = useState([MODES.ADD_1_1.id]);
          const [rightModes, setRightModes] = useState([MODES.ADD_1_1.id]);
          const [leftReady, setLeftReady] = useState(false);
          const [rightReady, setRightReady] = useState(false);
          
          // 狀態管理 - 對戰
          const [leftHp, setLeftHp] = useState(MAX_HP); 
          const [rightHp, setRightHp] = useState(MAX_HP); 
          const [winner, setWinner] = useState(null); 
          
          // 動畫狀態
          const [leftAttacking, setLeftAttacking] = useState(false);
          const [rightAttacking, setRightAttacking] = useState(false);
          const [leftHit, setLeftHit] = useState(false);
          const [rightHit, setRightHit] = useState(false);
          
          // 計時器狀態
          const [timeLeft, setTimeLeft] = useState(GAME_TIME);
          const [isTimerRunning, setIsTimerRunning] = useState(false);

          // 題目狀態
          const [leftProblem, setLeftProblem] = useState({ n1: 0, n2: 0, ans: 0, operator: '+', inputTen: '', inputUnit: '', isCorrect: false });
          const [rightProblem, setRightProblem] = useState({ n1: 0, n2: 0, ans: 0, operator: '+', inputTen: '', inputUnit: '', isCorrect: false });

          // 鍵盤控制狀態
          const [leftFocus, setLeftFocus] = useState(null);
          const [rightFocus, setRightFocus] = useState(null);

          // Timer Ref
          const leftTimerRef = useRef(null);
          const rightTimerRef = useRef(null);

          // 當雙方都準備好時，進入遊戲
          useEffect(() => {
              if (leftReady && rightReady && gameState === 'menu') {
                  const t = setTimeout(() => {
                      startGame();
                  }, 500);
                  return () => clearTimeout(t);
              }
          }, [leftReady, rightReady, gameState]);

          // 計時器 Effect
          useEffect(() => {
            let interval = null;
            if (gameState === 'playing' && isTimerRunning && timeLeft > 0 && !winner) {
                interval = setInterval(() => {
                    setTimeLeft((prev) => prev - 1);
                }, 1000);
            } else if (timeLeft === 0 && isTimerRunning) {
                setIsTimerRunning(false);
                handleTimeUp();
            }
            return () => clearInterval(interval);
          }, [isTimerRunning, timeLeft, winner, gameState]);

          const handleTimeUp = () => {
            if (leftHp > rightHp) {
                setWinner('left');
            } else if (rightHp > leftHp) {
                setWinner('right');
            } else {
                setWinner('draw');
            }
            setLeftFocus(null);
            setRightFocus(null);
          };

          const toggleTimer = () => {
            if (winner) return;
            setIsTimerRunning(!isTimerRunning);
          };

          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          // --- 題目生成邏輯 ---
          const generateProblem = (modes) => {
            if (modes.length === 0) return { n1: 0, n2: 0, ans: 0, operator: '+' }; 
            const modeId = modes[Math.floor(Math.random() * modes.length)];
            let n1, n2, operator, ans;

            switch (modeId) {
                case MODES.ADD_1_1.id:
                    n1 = Math.floor(Math.random() * 9) + 1; 
                    n2 = Math.floor(Math.random() * 9) + 1; 
                    operator = '+'; ans = n1 + n2; break;
                case MODES.ADD_2_1.id:
                    n1 = Math.floor(Math.random() * 90) + 10; 
                    n2 = Math.floor(Math.random() * 9) + 1;   
                    operator = '+'; ans = n1 + n2; break;
                case MODES.SUB_1_1.id:
                    n1 = Math.floor(Math.random() * 9) + 1; 
                    let subN2 = Math.floor(Math.random() * 9) + 1;
                    if (subN2 > n1) { n2 = n1; n1 = subN2; } else { n2 = subN2; }
                    operator = '-'; ans = n1 - n2; break;
                case MODES.SUB_2_1.id:
                    n1 = Math.floor(Math.random() * 90) + 10; 
                    n2 = Math.floor(Math.random() * 9) + 1;   
                    operator = '-'; ans = n1 - n2; break;
                case MODES.MUL_9_9.id:
                    n1 = Math.floor(Math.random() * 9) + 1; 
                    n2 = Math.floor(Math.random() * 9) + 1; 
                    operator = '×'; ans = n1 * n2; break;
                case MODES.DIV_2_1.id:
                    let divisor = Math.floor(Math.random() * 8) + 2; 
                    let minQ = Math.ceil(10 / divisor);
                    let maxQ = Math.floor(99 / divisor);
                    let quotient = Math.floor(Math.random() * (maxQ - minQ + 1)) + minQ;
                    n2 = divisor; n1 = quotient * divisor; 
                    operator = '÷'; ans = quotient; break;
                default:
                    n1 = 1; n2 = 1; operator = '+'; ans = 2;
            }
            return { n1, n2, ans, operator, inputTen: '', inputUnit: '', isCorrect: false };
          };

          const startGame = () => {
              initAudio(); // 初始化音效引擎
              setGameState('playing');
              resetGame();
          };

          const returnToMenu = () => {
              setGameState('menu');
              setWinner(null);
              setLeftReady(false);
              setRightReady(false);
          };

          const resetGame = () => {
            if (leftTimerRef.current) clearTimeout(leftTimerRef.current);
            if (rightTimerRef.current) clearTimeout(rightTimerRef.current);

            setLeftHp(MAX_HP);
            setRightHp(MAX_HP);
            setWinner(null);
            setTimeLeft(GAME_TIME);
            setIsTimerRunning(false); 
            setLeftProblem(generateProblem(leftModes));
            setRightProblem(generateProblem(rightModes));
            setLeftFocus(null);
            setRightFocus(null);
            setLeftAttacking(false);
            setRightAttacking(false);
            setLeftHit(false);
            setRightHit(false);
          };

          // 處理 Checkbox 變更
          const toggleMode = (side, modeId) => {
              if (side === 'left') {
                  if (leftReady) return; 
                  setLeftModes(prev => {
                      if (prev.includes(modeId)) return prev.length === 1 ? prev : prev.filter(id => id !== modeId);
                      return [...prev, modeId];
                  });
              } else {
                  if (rightReady) return;
                  setRightModes(prev => {
                      if (prev.includes(modeId)) return prev.length === 1 ? prev : prev.filter(id => id !== modeId);
                      return [...prev, modeId];
                  });
              }
          };

          const handleBackgroundClick = () => {
            setLeftFocus(null);
            setRightFocus(null);
          };

          const handleLeftNumClick = (num) => {
            initAudio(); // 確保使用者互動後音效可用
            if (!leftFocus || winner || leftProblem.isCorrect) return;
            const newProb = { ...leftProblem };
            if (leftFocus.digit === 'ten') newProb.inputTen = num;
            else newProb.inputUnit = num;
            setLeftProblem(newProb);
            setLeftFocus(null); 
            checkAnswer('left', newProb);
          };

          const handleRightNumClick = (num) => {
            initAudio(); // 確保使用者互動後音效可用
            if (!rightFocus || winner || rightProblem.isCorrect) return;
            const newProb = { ...rightProblem };
            if (rightFocus.digit === 'ten') newProb.inputTen = num;
            else newProb.inputUnit = num;
            setRightProblem(newProb);
            setRightFocus(null); 
            checkAnswer('right', newProb);
          };

          const checkAnswer = (side, problem) => {
            const { inputTen, inputUnit, ans } = problem;
            if (inputUnit === '') return;
            const tenStr = inputTen === '' ? '0' : inputTen;
            const userAnswer = parseInt(`${tenStr}${inputUnit}`);
            if (userAnswer === ans) {
              handleCorrectAnswer(side);
            }
          };

          const handleCorrectAnswer = (side) => {
            let isGameOver = false;

            if (side === 'left') {
              setLeftProblem(prev => ({ ...prev, isCorrect: true }));
              setLeftFocus(null); 
              
              // 觸發攻擊動畫與音效
              setLeftAttacking(true);
              playSound('shoot');
              
              setTimeout(() => {
                  setLeftAttacking(false);
                  setRightHit(true); // 右方被擊中
                  playSound('hit');
                  setTimeout(() => setRightHit(false), 400); // 擊中特效持續時間
                  
                  const newHp = rightHp - 1;
                  setRightHp(newHp);
                  if (newHp <= 0) {
                      setWinner('left');
                      setIsTimerRunning(false);
                      isGameOver = true;
                  }
              }, 500); // 魔法飛行時間
              
            } else {
              setRightProblem(prev => ({ ...prev, isCorrect: true }));
              setRightFocus(null); 
              
              // 觸發攻擊動畫與音效
              setRightAttacking(true);
              playSound('shoot');

              setTimeout(() => {
                  setRightAttacking(false);
                  setLeftHit(true); // 左方被擊中
                  playSound('hit');
                  setTimeout(() => setLeftHit(false), 400);

                  const newHp = leftHp - 1;
                  setLeftHp(newHp);
                  if (newHp <= 0) {
                      setWinner('right');
                      setIsTimerRunning(false);
                      isGameOver = true;
                  }
              }, 500); // 魔法飛行時間
            }

            // 準備下一題
            if (!isGameOver) {
              if (side === 'left') {
                if (leftTimerRef.current) clearTimeout(leftTimerRef.current);
                leftTimerRef.current = setTimeout(() => {
                  setLeftProblem(generateProblem(leftModes));
                }, DELAY_MS);
              } else {
                if (rightTimerRef.current) clearTimeout(rightTimerRef.current);
                rightTimerRef.current = setTimeout(() => {
                  setRightProblem(generateProblem(rightModes));
                }, DELAY_MS);
              }
            }
          };

          // 繪製血量條組件 (改為水平排列)
          const HealthBar = ({ hp, maxHp }) => (
              <div className="flex gap-1 md:gap-1.5 filter drop-shadow-md">
                  {Array.from({ length: maxHp }).map((_, idx) => (
                      <span key={idx} className="text-sm md:text-lg transition-all duration-300">
                          {idx < hp ? '❤️' : '🖤'}
                      </span>
                  ))}
              </div>
          );

          // --- 渲染部分 ---

          // 1. 選單畫面
          if (gameState === 'menu') {
              return (
                <div className="min-h-screen bg-slate-900 font-sans flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-4xl text-center mb-6 md:mb-8">
                        <h1 className="text-4xl md:text-5xl font-black text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] flex items-center justify-center gap-4">
                            <span>✨</span> 數學魔法對戰 <span>✨</span>
                        </h1>
                        <p className="text-slate-300 mt-3 text-sm md:text-lg">請雙方各自選擇題型，並按下準備按鈕！</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 w-full max-w-5xl">
                        
                        {/* 左方玩家選單 */}
                        <div className={`bg-white rounded-3xl shadow-2xl p-5 md:p-8 border-4 transition-all duration-300 ${leftReady ? 'border-blue-400 bg-blue-50 ring-4 ring-blue-300 ring-opacity-50' : 'border-slate-200'}`}>
                            <div className="flex items-center gap-3 mb-5 border-b-2 border-slate-50 pb-3">
                                <div className="text-5xl drop-shadow-md filter hue-rotate-0">🧙</div>
                                <div>
                                    <h2 className="text-2xl font-bold text-blue-600">星光法師</h2>
                                    <p className="text-gray-500 text-sm">左方玩家</p>
                                </div>
                            </div>
                            
                            <div className={`grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6 ${leftReady ? 'opacity-60 pointer-events-none' : ''}`}>
                                {Object.values(MODES).map((mode) => (
                                    <label key={`left-${mode.id}`} className={`flex items-center p-2.5 rounded-xl border-2 cursor-pointer transition-all ${leftModes.includes(mode.id) ? 'border-blue-400 bg-blue-50' : 'border-gray-100 hover:border-blue-200 hover:bg-gray-50'}`}>
                                        <input 
                                            type="checkbox" 
                                            className="w-5 h-5 accent-blue-500 mr-3 flex-shrink-0"
                                            checked={leftModes.includes(mode.id)}
                                            onChange={() => toggleMode('left', mode.id)}
                                        />
                                        <span className="text-gray-700 font-medium whitespace-nowrap text-sm">{mode.label}</span>
                                    </label>
                                ))}
                            </div>

                            <button 
                                onClick={() => { setLeftReady(!leftReady); initAudio(); }}
                                className={`w-full py-3 md:py-4 rounded-xl text-white font-bold text-lg md:text-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95
                                    ${leftReady 
                                        ? 'bg-green-500 hover:bg-green-600' 
                                        : 'bg-gradient-to-r from-blue-400 to-indigo-500 hover:from-blue-500 hover:to-indigo-600'
                                    }`}
                            >
                                {leftReady ? <><Check className="w-6 h-6" /> 已準備</> : '準備好囉！'}
                            </button>
                        </div>

                        {/* 右方玩家選單 */}
                        <div className={`bg-white rounded-3xl shadow-2xl p-5 md:p-8 border-4 transition-all duration-300 ${rightReady ? 'border-purple-400 bg-purple-50 ring-4 ring-purple-300 ring-opacity-50' : 'border-slate-200'}`}>
                            <div className="flex items-center gap-3 mb-5 border-b-2 border-slate-50 pb-3">
                                <div className="text-5xl drop-shadow-md filter hue-rotate-[260deg]">🧙</div>
                                <div>
                                    <h2 className="text-2xl font-bold text-purple-600">幻影法師</h2>
                                    <p className="text-gray-500 text-sm">右方玩家</p>
                                </div>
                            </div>
                            
                            <div className={`grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6 ${rightReady ? 'opacity-60 pointer-events-none' : ''}`}>
                                {Object.values(MODES).map((mode) => (
                                    <label key={`right-${mode.id}`} className={`flex items-center p-2.5 rounded-xl border-2 cursor-pointer transition-all ${rightModes.includes(mode.id) ? 'border-purple-400 bg-purple-50' : 'border-gray-100 hover:border-purple-200 hover:bg-gray-50'}`}>
                                        <input 
                                            type="checkbox" 
                                            className="w-5 h-5 accent-purple-500 mr-3 flex-shrink-0"
                                            checked={rightModes.includes(mode.id)}
                                            onChange={() => toggleMode('right', mode.id)}
                                        />
                                        <span className="text-gray-700 font-medium whitespace-nowrap text-sm">{mode.label}</span>
                                    </label>
                                ))}
                            </div>

                            <button 
                                onClick={() => { setRightReady(!rightReady); initAudio(); }}
                                className={`w-full py-3 md:py-4 rounded-xl text-white font-bold text-lg md:text-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95
                                    ${rightReady 
                                        ? 'bg-green-500 hover:bg-green-600' 
                                        : 'bg-gradient-to-r from-purple-400 to-fuchsia-500 hover:from-purple-500 hover:to-fuchsia-600'
                                    }`}
                            >
                                {rightReady ? <><Check className="w-6 h-6" /> 已準備</> : '準備好囉！'}
                            </button>
                        </div>
                    </div>
                </div>
              );
          }

          // 2. 遊戲畫面
          return (
            <div 
                className="min-h-screen bg-slate-50 font-sans select-none flex flex-col"
                onClick={handleBackgroundClick} 
            >
              
              {/* 標題列 */}
              <div className="bg-white shadow-sm p-2 md:p-3 relative z-20 shrink-0 flex items-center justify-between border-b border-slate-200">
                
                {/* 左側：計時器區域 */}
                <div className="flex-1 flex justify-start pl-2">
                    <button 
                        onClick={(e) => { e.stopPropagation(); toggleTimer(); }}
                        className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-xl border-2 shadow-sm transition-all hover:shadow-md
                            ${isTimerRunning 
                                ? 'bg-indigo-50 border-indigo-200 text-indigo-600' 
                                : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-white'
                            }
                            ${winner ? 'opacity-50 cursor-not-allowed' : ''}
                        `}
                        disabled={!!winner}
                    >
                        {isTimerRunning ? <Pause className="w-4 h-4 md:w-5 md:h-5" /> : <Play className="w-4 h-4 md:w-5 md:h-5" />}
                        <div className="flex items-center gap-1 font-mono text-lg md:text-xl font-bold">
                            <TimerIcon className="w-4 h-4 md:w-5 md:h-5 hidden sm:block" />
                            <span>{formatTime(timeLeft)}</span>
                        </div>
                    </button>
                </div>

                {/* 中間：標題 */}
                <div className="text-center shrink-0 px-2">
                    <h1 className="text-lg md:text-2xl font-bold text-slate-800 flex items-center justify-center gap-1 md:gap-2">
                    <span>✨</span> 數學魔法對戰 <span>✨</span>
                    </h1>
                </div>

                {/* 右側：回首頁按鈕 */}
                <div className="flex-1 flex justify-end pr-2">
                     <button 
                        onClick={returnToMenu}
                        className="p-1.5 md:p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"
                        title="回到選單"
                     >
                        <HomeIcon className="w-5 h-5 md:w-6 md:h-6" />
                     </button>
                </div>
              </div>

              {/* 魔法對戰動畫區 (高度縮減以顯示下方內容) */}
              <div className="h-32 md:h-40 relative w-full bg-slate-900 border-b-4 border-slate-700 overflow-hidden shrink-0 z-10 flex items-center justify-center">
                  
                  {/* 星空背景點綴 */}
                  <div className="absolute inset-0 opacity-40">
                      <div className="absolute top-4 left-10 w-1.5 h-1.5 bg-white rounded-full animate-ping"></div>
                      <div className="absolute top-12 right-20 w-1 h-1 bg-white rounded-full animate-ping" style={{animationDelay: '1s'}}></div>
                      <div className="absolute bottom-6 left-1/4 w-1.5 h-1.5 bg-white rounded-full animate-ping" style={{animationDelay: '0.5s'}}></div>
                      <div className="absolute top-6 left-1/2 w-1 h-1 bg-white rounded-full animate-ping" style={{animationDelay: '1.5s'}}></div>
                  </div>

                  {/* 雙方角色與血量 (改為左右排列，互不遮擋) */}
                  <div className="relative w-full max-w-4xl mx-auto h-full flex items-center justify-between px-6 md:px-12">
                      
                      {/* 左方星光法師 */}
                      <div className="relative z-10 flex flex-row items-center gap-2 md:gap-4">
                          <div className={leftHit ? 'animate-shake' : ''}>
                              <div className={`text-6xl md:text-7xl filter drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] ${leftAttacking ? 'scale-110 -rotate-12' : (leftHit ? '' : 'animate-bounce-slow')} transition-transform duration-200 hue-rotate-0`}>
                                  🧙
                              </div>
                          </div>
                          {/* 血量在右邊 */}
                          <div className="flex flex-col items-start gap-1">
                              <HealthBar hp={leftHp} maxHp={MAX_HP} />
                          </div>
                          
                          {/* 被擊中的爆破效果 */}
                          {leftHit && <div className="hit-effect bg-purple-400 left-8"></div>}
                      </div>

                      {/* 右方幻影法師 (鏡像反轉，血量在左邊) */}
                      <div className="relative z-10 flex flex-row-reverse items-center gap-2 md:gap-4">
                          <div className={rightHit ? 'animate-shake' : ''}>
                              <div className={`text-6xl md:text-7xl filter drop-shadow-[0_0_15px_rgba(192,38,211,0.6)] ${rightAttacking ? 'scale-110 rotate-12' : (rightHit ? '' : 'animate-bounce-slow')} transition-transform duration-200 hue-rotate-[260deg]`} style={{ transform: 'scaleX(-1)' }}>
                                  🧙
                              </div>
                          </div>
                          {/* 血量在左邊 */}
                          <div className="flex flex-col items-end gap-1">
                              <HealthBar hp={rightHp} maxHp={MAX_HP} />
                          </div>
                          
                          {/* 被擊中的爆破效果 */}
                          {rightHit && <div className="hit-effect bg-blue-400 right-8"></div>}
                      </div>

                      {/* 魔法球動畫容器 */}
                      {leftAttacking && (
                          <div className="absolute top-1/2 w-8 h-8 md:w-10 md:h-10 magic-ball-right -translate-y-1/2 z-20"></div>
                      )}
                      {rightAttacking && (
                          <div className="absolute top-1/2 w-8 h-8 md:w-10 md:h-10 magic-ball-left -translate-y-1/2 z-20"></div>
                      )}

                  </div>
              </div>

              {/* 主要遊戲區 (版面向上，使用 Flex 讓鍵盤佔據真實空間) */}
              <div className="flex-1 flex flex-row items-stretch bg-slate-100 relative">
                
                {/* 左邊玩家區塊 */}
                <div className={`flex-1 p-2 md:p-4 flex flex-col items-center justify-start pt-4 md:pt-6 transition-colors duration-300 ${winner === 'left' ? 'bg-blue-100' : 'bg-transparent'}`}>
                  <div className={`relative bg-white rounded-2xl md:rounded-3xl shadow-lg p-4 md:p-6 w-full border-4 transition-all duration-300 ${leftProblem.isCorrect ? 'border-green-400 ring-4 ring-green-200' : 'border-blue-200'}`}>
                    <h2 className="text-lg md:text-xl font-bold text-blue-600 mb-3 md:mb-5 text-center">星光法師出招</h2>
                    <div className="flex items-center justify-center gap-1 md:gap-2 text-3xl md:text-5xl font-bold text-slate-700 mb-4 md:mb-6">
                      <span>{leftProblem.n1}</span>
                      <span>{leftProblem.operator}</span>
                      <span>{leftProblem.n2}</span>
                      <span>=</span>
                    </div>
                    
                    <div className="flex gap-2 md:gap-3 justify-center">
                      <AnswerBox 
                        val={leftProblem.inputTen} 
                        onClick={(e) => { e.stopPropagation(); !leftProblem.isCorrect && setLeftFocus({ digit: 'ten' }); }}
                        active={leftFocus?.digit === 'ten'}
                        color="blue"
                        isCorrect={leftProblem.isCorrect}
                      />
                      <AnswerBox 
                        val={leftProblem.inputUnit} 
                        onClick={(e) => { e.stopPropagation(); !leftProblem.isCorrect && setLeftFocus({ digit: 'unit' }); }}
                        active={leftFocus?.digit === 'unit'}
                        color="blue"
                        isCorrect={leftProblem.isCorrect}
                      />
                    </div>

                    {/* 鍵盤放置於固定高度的容器中，確保不會切到 */}
                    <div className="h-[210px] w-full flex justify-center overflow-visible">
                        {leftFocus && <MiniKeypad onNumClick={handleLeftNumClick} color="blue" />}
                    </div>
                  </div>
                </div>

                {/* 分隔線 */}
                <div className="w-1 bg-slate-200/50 z-0 shadow-inner"></div>

                {/* 右邊玩家區塊 */}
                <div className={`flex-1 p-2 md:p-4 flex flex-col items-center justify-start pt-4 md:pt-6 transition-colors duration-300 ${winner === 'right' ? 'bg-purple-100' : 'bg-transparent'}`}>
                  <div className={`relative bg-white rounded-2xl md:rounded-3xl shadow-lg p-4 md:p-6 w-full border-4 transition-all duration-300 ${rightProblem.isCorrect ? 'border-green-400 ring-4 ring-green-200' : 'border-purple-200'}`}>
                    <h2 className="text-lg md:text-xl font-bold text-purple-600 mb-3 md:mb-5 text-center">幻影法師出招</h2>
                    <div className="flex items-center justify-center gap-1 md:gap-2 text-3xl md:text-5xl font-bold text-slate-700 mb-4 md:mb-6">
                      <span>{rightProblem.n1}</span>
                      <span>{rightProblem.operator}</span>
                      <span>{rightProblem.n2}</span>
                      <span>=</span>
                    </div>
                    
                    <div className="flex gap-2 md:gap-3 justify-center">
                      <AnswerBox 
                        val={rightProblem.inputTen} 
                        onClick={(e) => { e.stopPropagation(); !rightProblem.isCorrect && setRightFocus({ digit: 'ten' }); }}
                        active={rightFocus?.digit === 'ten'}
                        color="purple"
                        isCorrect={rightProblem.isCorrect}
                      />
                      <AnswerBox 
                        val={rightProblem.inputUnit} 
                        onClick={(e) => { e.stopPropagation(); !rightProblem.isCorrect && setRightFocus({ digit: 'unit' }); }}
                        active={rightFocus?.digit === 'unit'}
                        color="purple"
                        isCorrect={rightProblem.isCorrect}
                      />
                    </div>

                    {/* 鍵盤放置於固定高度的容器中，確保不會切到 */}
                    <div className="h-[210px] w-full flex justify-center overflow-visible">
                        {rightFocus && <MiniKeypad onNumClick={handleRightNumClick} color="purple" />}
                    </div>
                  </div>
                </div>
              </div>

              {/* 獲勝畫面 */}
              {winner && (
                <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 animate-fade-in backdrop-blur-sm">
                  <div className="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full text-center shadow-2xl transform scale-100 animate-pop-in border-4 border-slate-200">
                    
                    {winner === 'draw' ? (
                        <>
                            <div className="text-6xl mb-4 animate-bounce">🤝</div>
                            <h2 className="text-3xl md:text-4xl font-black mb-2 text-slate-800">時間到！平手！</h2>
                            <p className="text-slate-600 mb-8 text-lg">雙方勢均力敵，再來一場分勝負吧！</p>
                        </>
                    ) : (
                        <>
                            <div className={`text-7xl mb-4 animate-bounce filter drop-shadow-lg ${winner === 'left' ? 'hue-rotate-0' : 'hue-rotate-[260deg] scale-x-[-1]'}`}>🧙</div>
                            <h2 className={`text-3xl md:text-4xl font-black mb-2 ${winner === 'left' ? 'text-blue-600' : 'text-purple-600'}`}>
                            {winner === 'left' ? '星光法師' : '幻影法師'} 獲勝！
                            </h2>
                            {timeLeft === 0 && <p className="text-lg md:text-xl text-slate-500 font-bold mb-2">(時間到判定)</p>}
                            <div className="flex justify-center mb-6">
                            <Trophy className="w-16 h-16 text-yellow-400 drop-shadow-md" />
                            </div>
                            <p className="text-slate-600 mb-8 text-sm md:text-lg">
                                {timeLeft > 0 ? `魔法壓制！剩餘時間 ${formatTime(timeLeft)}` : '時間結束，恭喜獲勝！'}
                            </p>
                        </>
                    )}
                    
                    <div className="flex flex-col gap-3">
                        <button 
                        onClick={resetGame}
                        className="w-full py-3 bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold rounded-xl shadow-lg text-lg md:text-xl hover:from-yellow-500 hover:to-orange-600 transition-all flex items-center justify-center gap-2"
                        >
                        <RefreshCcw className="w-5 h-5 md:w-6 md:h-6" /> 再戰一場
                        </button>

                        <button 
                        onClick={returnToMenu}
                        className="w-full py-3 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-xl shadow-sm text-base md:text-lg hover:bg-slate-50 transition-all flex items-center justify-center gap-2"
                        >
                        <HomeIcon className="w-5 h-5" /> 重新設定魔法
                        </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // 輔助組件：輸入方塊
        const AnswerBox = ({ val, onClick, active, color, isCorrect }) => {
          let baseClass = "w-14 h-16 md:w-16 md:h-20 border-4 rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold cursor-pointer transition-all shadow-sm";
          
          if (isCorrect) {
            return (
              <div className={`${baseClass} border-green-500 bg-green-100 text-green-700`}>
                {val}
              </div>
            );
          }

          const colorClass = color === 'blue' 
            ? (active ? "border-blue-500 bg-blue-100 ring-4 ring-blue-200" : "border-blue-200 bg-white hover:bg-blue-50")
            : (active ? "border-purple-500 bg-purple-100 ring-4 ring-purple-200" : "border-purple-200 bg-white hover:bg-purple-50");
          
          return (
            <div className={`${baseClass} ${colorClass}`} onClick={onClick}>
              {val !== '' ? val : <span className="text-gray-300 text-xl md:text-2xl font-normal">?</span>}
            </div>
          );
        };

        // 渲染 App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MagicBattleMath />);
    </script>
</body>
</html>
