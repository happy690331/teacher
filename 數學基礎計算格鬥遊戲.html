<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學基礎計算格鬥遊戲</title>
    <style>
        :root {
            --primary: #4a90e2;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #2ecc71;
            --dark: #2c3e50;
            --bg: #1a1a1a;
        }
        * { box-sizing: border-box; font-family: '微軟正黑體', 'Courier New', Courier, monospace; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); overflow: hidden; touch-action: none; }
        
        /* 容器與畫面切換 */
        #app { width: 100%; height: 100%; position: relative; }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; }
        .screen.active { display: flex; }

        /* === 主選單畫面 === */
        #menu-screen { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; align-items: center; justify-content: center; overflow-y: auto; padding: 20px;}
        .menu-box { background: rgba(0,0,0,0.7); padding: 30px; border-radius: 15px; border: 2px solid var(--primary); max-width: 95%; width: 550px; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin: auto; }
        h1 { text-align: center; color: #f1c40f; text-shadow: 2px 2px #000; font-size: 26px; margin-top: 0; }
        .topic-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .topic-item { display: flex; align-items: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .topic-item:hover { background: rgba(255,255,255,0.2); }
        .topic-item input { transform: scale(1.5); margin-right: 12px; cursor: pointer; }
        .topic-item label { font-size: 16px; cursor: pointer; flex: 1; font-weight: bold; }
        
        /* 頭像上傳區塊 */
        .photo-upload-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px;}
        .btn-upload { cursor: pointer; background: var(--warning); padding: 10px 15px; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-upload:hover { background: #d68910; }
        .photo-preview { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #333; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-start { width: 100%; padding: 15px; font-size: 20px; font-weight: bold; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; text-shadow: 1px 1px #000; transition: 0.2s; margin-top: 10px;}
        .btn-start:hover { background: #27ae60; transform: scale(1.02); }
        .btn-start:active { transform: scale(0.98); }

        /* === 遊戲畫面 === */
        #game-screen { background-color: #000; }
        #game-canvas { width: 100%; height: 100%; display: block; object-fit: cover; }
        
        /* 遊戲內 UI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .top-bar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        
        .status-box { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 2px solid white; color: white; pointer-events: auto; }
        .hp-bar-bg { width: 150px; height: 15px; background: #555; border: 2px solid #fff; margin-bottom: 5px; }
        .hp-bar-fill { height: 100%; background: var(--success); width: 100%; transition: width 0.2s; }
        .stats-text { font-size: 14px; font-weight: bold; margin: 2px 0; }
        
        .top-bar-right { display: flex; gap: 10px; pointer-events: auto; }
        .btn-return { background: var(--danger); color: white; border: 2px solid white; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-shadow: 1px 1px #000; font-size: 14px; }
        .btn-return:active { background: #c0392b; }
        .btn-warning { background: var(--warning); color: white; border: 2px solid white; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-shadow: 1px 1px #000; font-size: 14px; }
        .btn-warning:active { background: #d68910; }

        /* 虛擬控制器 (手機/平板/桌機強制顯示) */
        .controls { position: absolute; bottom: 20px; left: 0; width: 100%; height: 150px; pointer-events: none; display: flex; justify-content: space-between; padding: 0 30px; align-items: center; }
        
        #joystick-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); position: relative; pointer-events: auto; touch-action: none; display: flex; justify-content: center; align-items: center; }
        #joystick-knob { width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; position: absolute; box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none; transition: transform 0.05s ease-out; }
        
        #btn-attack { width: 90px; height: 90px; background: rgba(231, 76, 60, 0.6); border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; font-weight: bold; font-size: 20px; pointer-events: auto; touch-action: none; display: flex; justify-content: center; align-items: center; user-select: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #btn-attack:active { background: rgba(231, 76, 60, 0.9); transform: scale(0.95); }

        /* === 答題彈窗 === */
        #math-modal-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; }
        #math-modal-container.active { display: flex; }
        .math-modal { background: #fff; padding: 25px; border-radius: 12px; border: 4px solid var(--primary); text-align: center; max-width: 95%; width: 450px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,100,255,0.5); }
        .math-title { color: var(--dark); font-size: 20px; font-weight: bold; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid #ccc; padding-bottom: 10px;}
        .math-question { font-size: 42px; font-weight: bold; color: #333; margin-bottom: 25px; line-height: 1.2; text-align: center; padding: 0 10px; letter-spacing: 5px;}
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .math-option { background: var(--primary); color: white; border: none; padding: 15px 5px; font-size: 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; letter-spacing: 2px;}
        .math-option:hover { background: #357abd; }
        .math-option:active { transform: scale(0.95); }
        .math-feedback { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 40px; font-weight: bold; text-shadow: 2px 2px 0 #000; opacity: 0; pointer-events: none; transition: opacity 0.3s, top 0.3s; z-index: 200; white-space: nowrap;}
        
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 50; color: white; font-size: 40px; font-weight: bold; text-shadow: 2px 2px 0 #000; letter-spacing: 5px; pointer-events: none;}

        /* === 遊戲過關/結束結算彈窗 === */
        #result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 300; pointer-events: auto; }
        #result-overlay.active { display: flex; }
        .result-box { background: var(--dark); padding: 40px; border-radius: 15px; border: 4px solid #f1c40f; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .result-box h1 { font-size: 48px; margin-bottom: 20px; }
        .result-box p { font-size: 32px; font-weight: bold; color: white; margin-bottom: 30px; }

        @media (max-width: 600px) {
            .topic-list { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; gap: 10px;}
            .top-bar-right { align-self: flex-end; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- === 第一頁：主選單與單元選擇 === -->
    <div id="menu-screen" class="screen active">
        <div class="menu-box">
            <h1>🥊 數學基礎計算格鬥 🥊</h1>
            <p style="text-align: center; margin-bottom: 5px;">請選擇要挑戰的數學單元 (可複選)</p>
            <p style="text-align: center; font-size: 14px; color: #ccc; margin-top: 0;">電腦版: 方向鍵或WASD移動, 滑鼠點擊畫面攻擊<br>手機/平板版: 左虛擬搖桿移動, 右鍵或點擊畫面攻擊</p>
            
            <div class="photo-upload-container">
                <label class="btn-upload">
                    📷 上傳大頭照 (角色用)
                    <input type="file" id="upload-photo" accept="image/*" style="display: none;">
                </label>
                <div class="photo-preview">
                    <img id="preview-photo" alt="預覽">
                </div>
            </div>

            <div class="topic-list">
                <label class="topic-item"><input type="checkbox" value="add_1_1" checked> <span>一位數加一位數</span></label>
                <label class="topic-item"><input type="checkbox" value="add_2_1" checked> <span>二位數加一位數</span></label>
                <label class="topic-item"><input type="checkbox" value="sub_1_1"> <span>一位數減一位數</span></label>
                <label class="topic-item"><input type="checkbox" value="sub_2_1"> <span>二位數減一位數</span></label>
                <label class="topic-item"><input type="checkbox" value="sub_2_2"> <span>二位數減二位數</span></label>
                <label class="topic-item"><input type="checkbox" value="mul_9x9"> <span>九九乘法</span></label>
                <label class="topic-item"><input type="checkbox" value="div_2_1"> <span>二位數除以一位數整除</span></label>
            </div>
            
            <button class="btn-start" onclick="startGame()">開始戰鬥</button>
        </div>
    </div>

    <!-- === 第二頁：遊戲畫面 === -->
    <div id="game-screen" class="screen">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-layer">
            <div class="top-bar">
                <div class="status-box">
                    <div class="stats-text">Player HP</div>
                    <div class="hp-bar-bg"><div id="ui-hp-fill" class="hp-bar-fill"></div></div>
                    <div id="ui-score" class="stats-text" style="color: #f1c40f;">分數: 0</div>
                    <div id="ui-level" class="stats-text">關卡: 1</div>
                    <div id="ui-kills" class="stats-text">擊倒敵人: 0 / 20</div>
                    <div id="ui-boss-warning" class="stats-text" style="color: #f1c40f; display: none;">⚠️ 擊敗所有敵人！ ⚠️</div>
                </div>
                <div class="top-bar-right">
                    <button class="btn-warning" id="btn-pause" onclick="togglePause()">暫停</button>
                    <button class="btn-return" onclick="returnToMenu()">重新選擇單元</button>
                </div>
            </div>
            
            <div class="controls">
                <div id="joystick-zone">
                    <div id="joystick-knob"></div>
                </div>
                <div id="btn-attack">攻擊</div>
            </div>
        </div>

        <div id="pause-overlay">遊戲暫停</div>

        <!-- 答題彈窗 -->
        <div id="math-modal-container">
            <div class="math-modal">
                <div class="math-title">破壞木箱！數學挑戰</div>
                <div style="color: #666; font-size: 16px; margin-bottom: 10px;">請計算出正確的答案：</div>
                <div id="math-question" class="math-question">...</div>
                <div class="options-grid" id="math-options">
                    <!-- 動態生成按鈕 -->
                </div>
            </div>
        </div>
        
        <div id="math-feedback" class="math-feedback">正確！HP +1</div>

        <!-- 過關與結算畫面 -->
        <div id="result-overlay">
            <div class="result-box">
                <h1 id="result-title">🌟 過關！🌟</h1>
                <p id="result-score">總分: 0</p>
                <button class="btn-start" style="width: 200px;" onclick="returnToMenu()">回到主選單</button>
            </div>
        </div>
    </div>
</div>

<script>
/** ==========================================
 * 大頭照上傳邏輯
 * ========================================== */
let playerFaceImg = null;
document.getElementById('upload-photo').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            playerFaceImg = new Image();
            playerFaceImg.src = event.target.result;
            const preview = document.getElementById('preview-photo');
            preview.src = event.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
    }
});

/** ==========================================
 * 數學題目生成邏輯 (MathGen)
 * ========================================== */
const MathGen = {
    topics: [],
    init(selected) { this.topics = selected; },
    shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    },
    rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
    generate() {
        if(this.topics.length === 0) return null;
        let type = this.topics[this.rand(0, this.topics.length - 1)];
        let q = "", ans = 0, wrong = [];

        switch(type) {
            case "add_1_1": {
                let a = this.rand(1, 9), b = this.rand(1, 9);
                ans = a + b; q = `${a} + ${b} = ?`;
                wrong = [ans+1, ans-1, ans+10];
                break;
            }
            case "add_2_1": {
                let a = this.rand(10, 99), b = this.rand(1, 9);
                ans = a + b; q = `${a} + ${b} = ?`;
                wrong = [ans+1, ans-1, ans+10];
                break;
            }
            case "sub_1_1": {
                let a = this.rand(1, 9), b = this.rand(1, a); // 確保不為負數
                ans = a - b; q = `${a} - ${b} = ?`;
                wrong = [ans+1, Math.abs(ans-1), ans+2];
                break;
            }
            case "sub_2_1": {
                let a = this.rand(10, 99), b = this.rand(1, 9);
                ans = a - b; q = `${a} - ${b} = ?`;
                wrong = [ans+1, ans-1, ans-10];
                break;
            }
            case "sub_2_2": {
                let a = this.rand(10, 99), b = this.rand(10, a); // 確保不為負數
                ans = a - b; q = `${a} - ${b} = ?`;
                wrong = [ans+1, ans-1, ans+10];
                break;
            }
            case "mul_9x9": {
                let a = this.rand(2, 9), b = this.rand(2, 9);
                ans = a * b; q = `${a} × ${b} = ?`;
                wrong = [a*(b+1), (a+1)*b, Math.abs(ans-2)];
                break;
            }
            case "div_2_1": {
                // 除數是一位數 (2~9)
                let b = this.rand(2, 9);
                // 確保被除數 a 是二位數 (10~99)，且能整除
                let minAns = Math.ceil(10 / b);
                let maxAns = Math.floor(99 / b);
                ans = this.rand(minAns, maxAns);
                let a = b * ans;
                q = `${a} ÷ ${b} = ?`;
                wrong = [ans+1, Math.abs(ans-1), ans+2];
                break;
            }
        }

        // 確保選項不重複且不為負數
        let optionsSet = new Set([ans.toString()]);
        for(let w of wrong) {
            if(optionsSet.size < 4 && w.toString() !== ans.toString() && w >= 0) {
                optionsSet.add(w.toString());
            }
        }
        while(optionsSet.size < 4) {
            optionsSet.add(this.rand(0, 100).toString());
        }

        return { question: q, options: this.shuffle(Array.from(optionsSet)), correct: ans.toString() };
    }
};

/** ==========================================
 * 音效安全初始化 (防止預覽模式崩潰)
 * ========================================== */
let audioCtx = null;
function initAudio() {
    if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.warn("無法初始化音效", e);
        }
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'hit') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'heal') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    } catch (e) {}
}

/** ==========================================
 * 遊戲引擎與實體物件
 * ========================================== */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const GAME_WIDTH = 800;
const GAME_HEIGHT = 450;
const GROUND_Y = 350; 
const Z_MIN = 300;    
const Z_MAX = 450;    

let isGameRunning = false;
let isPaused = false;
let isManualPaused = false; 
let lastTime = 0;

let cameraX = 0;
let lockX = 150; 
let waveState = 'cleared'; 
let showGoTimer = 0;

let level = 1;
let levelKills = 0;
let totalKills = 0;
let score = 0;
const KILLS_FOR_BOSS = 20;
let bossActive = false;
let screenShake = 0;

const keys = { w:false, a:false, s:false, d:false, space:false, arrowup:false, arrowdown:false, arrowleft:false, arrowright:false };
const joyInput = { x: 0, y: 0 };
let isAttacking = false;

let player = null;
let enemies = [];
let crates = [];
let particles = [];

class GameObject {
    constructor(x, z, w, h, color) {
        this.x = x; this.z = z; this.y = 0; 
        this.w = w; this.h = h; this.color = color;
        this.vx = 0; this.vz = 0; this.speed = 0;
        this.dir = 1; this.state = 'idle';
        this.hp = 10; this.maxHp = 10; this.hitStun = 0;
    }
    getDrawPos() { return { x: this.x - cameraX, y: this.z - this.h - this.y }; }
    drawShadow(ctx) {
        const pos = this.getDrawPos();
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(pos.x, this.z, this.w/2, this.w/4, 0, 0, Math.PI*2);
        ctx.fill();
    }
    draw(ctx) { this.drawShadow(ctx); }
}

class Character extends GameObject {
    constructor(x, z, w, h, color, isBoss = false) {
        super(x, z, w, h, color);
        this.isBoss = isBoss;
        this.isMoving = false;
        this.attackTimer = 0;
    }

    draw(ctx) {
        this.drawShadow(ctx);
        if (this.hitStun > 0 && Math.floor(Date.now() / 50) % 2 === 0) return; 

        const pos = this.getDrawPos();
        const cx = pos.x;
        
        const scale = this.isBoss ? 1.5 : 1;
        const headR = 15 * scale;
        const bodyH = 30 * scale;
        const legH = 35 * scale;
        
        const headY = pos.y + headR;
        const bodyY = headY + headR;
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 8 * scale;
        ctx.lineCap = 'round';
        ctx.beginPath();
        let walkCycle = 0;
        if (this.isMoving) {
            walkCycle = Math.sin(Date.now() / 100 * (this.speed / 100)); 
        }
        
        ctx.moveTo(cx, bodyY + bodyH);
        ctx.lineTo(cx - 10 * scale * walkCycle, bodyY + bodyH + legH);
        ctx.moveTo(cx, bodyY + bodyH);
        ctx.lineTo(cx + 10 * scale * walkCycle, bodyY + bodyH + legH);
        ctx.stroke();

        ctx.fillStyle = this.color;
        ctx.fillRect(cx - 15 * scale, bodyY, 30 * scale, bodyH);

        if (this === player && playerFaceImg) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx + (this.dir === 1 ? 5 : -5) * scale, headY, headR + 2, 0, Math.PI*2);
            ctx.clip();
            ctx.drawImage(playerFaceImg, cx - headR - 2 + (this.dir === 1 ? 5 : -5) * scale, headY - headR - 2, (headR+2)*2, (headR+2)*2);
            ctx.restore();
        } else {
            ctx.fillStyle = this.isBoss ? '#c0392b' : '#f1c40f';
            ctx.beginPath();
            ctx.arc(cx + (this.dir === 1 ? 5 : -5) * scale, headY, headR, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.beginPath();
        const punchThreshold = this.isBoss ? 1.0 : 0.15; 
        if (this.state === 'attack' && this.attackTimer > punchThreshold) {
            ctx.moveTo(cx, bodyY + 10 * scale);
            ctx.lineTo(cx + this.dir * 40 * scale, bodyY + 10 * scale);
            ctx.strokeStyle = this.isBoss ? '#e74c3c' : '#f1c40f'; 
            ctx.lineWidth = 10 * scale;
            ctx.stroke();
        } else {
            ctx.moveTo(cx, bodyY + 10 * scale);
            ctx.lineTo(cx + this.dir * 10 * scale * walkCycle, bodyY + 25 * scale);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 8 * scale;
            ctx.stroke();
        }
    }
}

class Player extends Character {
    constructor(x, z) {
        super(x, z, 40, 80, '#3498db', false);
        this.speed = 200;
        this.maxHp = 5; 
        this.hp = 5;    
    }

    update(dt) {
        if (this.hitStun > 0) {
            this.hitStun -= dt;
            this.isMoving = false;
            return;
        }

        let dx = 0; let dz = 0;
        if (keys.a || keys.arrowleft || joyInput.x < -0.2) dx = -1;
        if (keys.d || keys.arrowright || joyInput.x > 0.2) dx = 1;
        if (keys.w || keys.arrowup || joyInput.y < -0.2) dz = -1;
        if (keys.s || keys.arrowdown || joyInput.y > 0.2) dz = 1;

        if (dx !== 0 && dz !== 0) {
            const len = Math.sqrt(dx*dx + dz*dz);
            dx /= len; dz /= len;
        }

        this.isMoving = (dx !== 0 || dz !== 0);
        this.x += dx * this.speed * dt;
        this.z += dz * this.speed * dt;

        if (this.z < Z_MIN) this.z = Z_MIN;
        if (this.z > Z_MAX) this.z = Z_MAX;
        
        if (waveState === 'locked') {
            if (this.x < cameraX + 30) this.x = cameraX + 30;
            if (this.x > cameraX + GAME_WIDTH - 40) this.x = cameraX + GAME_WIDTH - 40;
        } else {
            if (this.x < cameraX + 30) this.x = cameraX + 30; 
        }

        if (dx > 0) this.dir = 1;
        if (dx < 0) this.dir = -1;

        if (this.attackTimer > 0) this.attackTimer -= dt;
        if ((keys.space || isAttacking) && this.attackTimer <= 0) {
            this.attack();
            this.attackTimer = 0.3; 
            isAttacking = false;
        }
    }

    attack() {
        this.state = 'attack';
        const hitBox = {
            x: this.dir === 1 ? this.x : this.x - 60,
            z: this.z - 15,
            w: 60,
            h: 30
        };

        enemies.forEach(e => {
            if (e.hp > 0 && Math.abs(e.z - this.z) < 20 && 
                e.x > hitBox.x - e.w/2 && e.x < hitBox.x + hitBox.w + e.w/2) {
                e.hp -= 10;
                e.hitStun = 0.2;
                e.x += this.dir * 15; 
                playSound('hit');
                screenShake = 5;
                createParticles(e.x, e.z - e.h/2, '#e74c3c');
            }
        });

        crates.forEach(c => {
            if (c.hp > 0 && Math.abs(c.z - this.z) < 20 && 
                c.x > hitBox.x - c.w/2 && c.x < hitBox.x + hitBox.w + c.w/2) {
                c.hp = 0;
                playSound('hit');
                createParticles(c.x, c.z - c.h/2, '#e67e22');
                triggerMathQuestion(); 
            }
        });
    }
}

class Enemy extends Character {
    constructor(x, z, isBoss = false) {
        super(x, z, isBoss ? 60 : 40, isBoss ? 120 : 80, isBoss ? '#8e44ad' : '#e74c3c', isBoss);
        this.hp = isBoss ? 25 : 10; 
        this.maxHp = this.hp;
        this.speed = isBoss ? 50 : 80; 
    }

    update(dt) {
        if (this.hitStun > 0) {
            this.hitStun -= dt;
            this.isMoving = false;
            return;
        }
        
        const dist = Math.hypot(player.x - this.x, player.z - this.z);
        this.isMoving = false;
        if (dist < 1200) { 
            let dx = player.x - this.x;
            let dz = player.z - this.z;
            
            this.dir = dx > 0 ? 1 : -1;

            if (Math.abs(dx) > 50) { this.x += Math.sign(dx) * this.speed * dt; this.isMoving = true; }
            if (Math.abs(dz) > 5) { this.z += Math.sign(dz) * this.speed * dt; this.isMoving = true; }

            if (this.attackTimer > 0) this.attackTimer -= dt;
            if (Math.abs(dx) <= 60 && Math.abs(dz) < 15 && this.attackTimer <= 0) {
                this.attackTimer = 1.5;
                this.state = 'attack';
                if (player.hitStun <= 0) {
                    player.hp -= this.isBoss ? 2 : 1; 
                    player.hitStun = 0.3;
                    screenShake = 10;
                    playSound('hit');
                }
            } else {
                this.state = 'idle';
            }
        }
    }
}

class Crate extends GameObject {
    constructor(x, z) {
        super(x, z, 40, 40, '#d35400');
        this.hp = 1;
    }
    draw(ctx) {
        this.drawShadow(ctx);
        const pos = this.getDrawPos();
        ctx.fillStyle = this.color;
        ctx.fillRect(pos.x - this.w/2, pos.y, this.w, this.h);
        ctx.strokeStyle = '#a04000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(pos.x - this.w/2, pos.y);
        ctx.lineTo(pos.x + this.w/2, pos.y + this.h);
        ctx.stroke();
    }
}

function createParticles(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*200, vy: (Math.random()-0.5)*200,
            life: 0.5, color: color
        });
    }
}

function spawnWave() {
    if (levelKills >= KILLS_FOR_BOSS) {
        bossActive = true;
        document.getElementById('ui-boss-warning').innerText = '⚠️ BOSS 出現！不能前進 ⚠️';
        document.getElementById('ui-boss-warning').style.color = '#f1c40f';
        enemies.push(new Enemy(cameraX + GAME_WIDTH - 100, (Z_MIN+Z_MAX)/2, true));
    } else {
        document.getElementById('ui-boss-warning').innerText = '⚠️ 擊敗所有敵人才能前進！ ⚠️';
        document.getElementById('ui-boss-warning').style.color = '#e67e22';
        
        let count = MathGen.rand(2, 4);
        for(let i=0; i<count; i++) {
            enemies.push(new Enemy(cameraX + GAME_WIDTH - 30 - Math.random()*80, MathGen.rand(Z_MIN, Z_MAX), false));
        }
    }

    let crateCount = MathGen.rand(1, 2);
    for(let i=0; i<crateCount; i++) {
        crates.push(new Crate(cameraX + GAME_WIDTH - 100 - Math.random()*150, MathGen.rand(Z_MIN, Z_MAX)));
    }
}

function updateUI() {
    const hpFill = document.getElementById('ui-hp-fill');
    hpFill.style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
    hpFill.style.background = player.hp > 2 ? 'var(--success)' : 'var(--danger)'; 
    
    document.getElementById('ui-score').innerText = `分數: ${score}`;
    document.getElementById('ui-level').innerText = `關卡: ${level}`;
    document.getElementById('ui-kills').innerText = `擊倒敵人: ${levelKills} / ${KILLS_FOR_BOSS}`;
}

function showResult(isWin) {
    isGameRunning = false;
    const overlay = document.getElementById('result-overlay');
    const title = document.getElementById('result-title');
    const scoreText = document.getElementById('result-score');
    
    overlay.classList.add('active');
    if (isWin) {
        title.innerText = "🌟 過關！打倒 Boss 🌟";
        title.style.color = "#2ecc71";
    } else {
        title.innerText = "💀 遊戲結束 💀";
        title.style.color = "#e74c3c";
    }
    scoreText.innerText = `最終分數: ${score}`;
}

function togglePause() {
    if (!isGameRunning) return;
    if (document.getElementById('math-modal-container').classList.contains('active')) return;
    
    isManualPaused = !isManualPaused;
    const btnPause = document.getElementById('btn-pause');
    const overlay = document.getElementById('pause-overlay');
    
    if (isManualPaused) {
        btnPause.innerText = "繼續";
        btnPause.style.background = "var(--success)";
        overlay.style.display = "flex";
    } else {
        btnPause.innerText = "暫停";
        btnPause.style.background = "var(--warning)";
        overlay.style.display = "none";
        lastTime = performance.now(); 
        requestAnimationFrame(gameLoop);
    }
}

function gameLoop(timestamp) {
    if (!isGameRunning || isManualPaused) return; 
    
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;

    if (!isPaused) {
        player.update(dt);
        
        if (waveState === 'cleared') {
            let targetCamX = player.x - GAME_WIDTH * 0.4;
            if (targetCamX > cameraX) {
                cameraX = targetCamX; 
            }

            if (cameraX >= lockX) {
                cameraX = lockX;
                waveState = 'locked'; 
                spawnWave();
                document.getElementById('ui-boss-warning').style.display = 'block';
            }
        }

        if (waveState === 'locked' && enemies.length === 0) {
            waveState = 'cleared';
            lockX = cameraX + 600; 
            showGoTimer = 3.0; 
            document.getElementById('ui-boss-warning').style.display = 'none';
        }

        if (bossActive) {
            if (Math.random() < 0.3 * dt && crates.length < 3) {
                let spawnX = cameraX + 50 + Math.random() * (GAME_WIDTH - 100);
                let spawnZ = MathGen.rand(Z_MIN, Z_MAX);
                crates.push(new Crate(spawnX, spawnZ));
                createParticles(spawnX, spawnZ - 20, '#f39c12'); 
            }
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.update(dt);
            if (e.hp <= 0) {
                enemies.splice(i, 1);
                score += e.isBoss ? 2000 : 100;
                totalKills++;
                levelKills++;

                if (e.isBoss) {
                    bossActive = false;
                    setTimeout(() => showResult(true), 500);
                }
            }
        }

        crates = crates.filter(c => c.hp > 0);
        
        particles.forEach(p => {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
        });
        particles = particles.filter(p => p.life > 0);

        if (showGoTimer > 0) showGoTimer -= dt;

        updateUI();

        if (player.hp <= 0) {
            showResult(false);
            return;
        }
    }

    drawGame();
    if (isGameRunning) {
        requestAnimationFrame(gameLoop);
    }
}

function drawGame() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const scale = Math.min(canvas.width / GAME_WIDTH, canvas.height / GAME_HEIGHT);
    
    ctx.save();
    ctx.translate(canvas.width/2 - (GAME_WIDTH*scale)/2, canvas.height/2 - (GAME_HEIGHT*scale)/2);
    ctx.scale(scale, scale);

    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        screenShake -= 1;
    }

    ctx.fillStyle = '#0b0f19';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    const bgOffset = -(cameraX * 0.1) % 400;
    for(let i=0; i<GAME_WIDTH/400 + 2; i++) {
        let bx = bgOffset + i*400;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(bx + 30, 100, 120, Z_MIN - 100);
        ctx.fillStyle = '#f1c40f';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(bx + 50, 130, 20, 30);
        ctx.fillRect(bx + 100, 130, 20, 30);
        ctx.fillRect(bx + 50, 180, 20, 30);
        ctx.globalAlpha = 1.0;
        
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(bx + 200, 50, 150, Z_MIN - 50);
        ctx.fillStyle = '#f1c40f';
        ctx.globalAlpha = 0.5;
        ctx.fillRect(bx + 220, 80, 30, 20);
        ctx.fillRect(bx + 280, 80, 30, 20);
        ctx.fillRect(bx + 250, 150, 30, 20);
        ctx.globalAlpha = 1.0;
    }
    
    ctx.fillStyle = '#475569';
    ctx.fillRect(0, Z_MIN - 25, GAME_WIDTH, 25);
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    const swOffset = -(cameraX) % 60;
    for(let i=0; i<GAME_WIDTH/60 + 2; i++) {
        ctx.beginPath();
        ctx.moveTo(swOffset + i*60, Z_MIN - 25);
        ctx.lineTo(swOffset + i*60 - 15, Z_MIN);
        ctx.stroke();
    }
    
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, Z_MIN, GAME_WIDTH, GAME_HEIGHT - Z_MIN);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 5;
    ctx.setLineDash([30, 30]);
    ctx.lineDashOffset = cameraX; 
    ctx.beginPath();
    ctx.moveTo(0, Z_MIN + (GAME_HEIGHT - Z_MIN)/2);
    ctx.lineTo(GAME_WIDTH, Z_MIN + (GAME_HEIGHT - Z_MIN)/2);
    ctx.stroke();
    ctx.setLineDash([]); 
    ctx.lineDashOffset = 0; 

    const renderList = [player, ...enemies, ...crates].sort((a, b) => a.z - b.z);
    renderList.forEach(obj => obj.draw(ctx));

    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life * 2;
        ctx.fillRect(p.x - cameraX, p.y, 5, 5);
    });
    ctx.globalAlpha = 1.0;

    if (showGoTimer > 0) {
        if (Math.floor(showGoTimer * 4) % 2 === 0) { 
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 50px 微軟正黑體';
            ctx.fillText('GO! 👉', GAME_WIDTH - 200, GAME_HEIGHT / 2);
        }
    }

    if (waveState === 'locked') {
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    }

    ctx.restore();
}

function triggerMathQuestion() {
    const qData = MathGen.generate();
    if (!qData) return;

    isPaused = true;
    document.getElementById('math-modal-container').classList.add('active');
    document.getElementById('math-question').innerText = qData.question;
    
    const optionsGrid = document.getElementById('math-options');
    optionsGrid.innerHTML = '';
    
    qData.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'math-option';
        btn.innerText = opt;
        btn.onclick = () => checkMathAnswer(opt === qData.correct);
        optionsGrid.appendChild(btn);
    });
}

function checkMathAnswer(isCorrect) {
    const feedback = document.getElementById('math-feedback');
    document.getElementById('math-modal-container').classList.remove('active');
    
    feedback.style.transition = 'none';
    feedback.style.opacity = '1';
    feedback.style.top = '20%';

    if (isCorrect) {
        playSound('heal');
        player.hp = Math.min(player.maxHp, player.hp + 1); 
        score += 500; 
        feedback.innerText = "正確！HP +1, 分數+500";
        feedback.style.color = "var(--success)";
        createParticles(player.x, player.z - player.h/2, '#2ecc71');
    } else {
        playSound('error');
        feedback.innerText = "答錯了！";
        feedback.style.color = "var(--danger)";
    }
    
    setTimeout(() => {
        feedback.style.transition = 'opacity 1s, top 1s';
        feedback.style.opacity = '0';
        feedback.style.top = '10%';
        isPaused = false;
    }, 100);
}

window.addEventListener('keydown', e => {
    let key = e.key.toLowerCase();
    if (key === ' ') keys.space = true;
    else if (keys.hasOwnProperty(key)) keys[key] = true;
});
window.addEventListener('keyup', e => {
    let key = e.key.toLowerCase();
    if (key === ' ') keys.space = false;
    else if (keys.hasOwnProperty(key)) keys[key] = false;
});

const joyZone = document.getElementById('joystick-zone');
const joyKnob = document.getElementById('joystick-knob');
let joyActive = false;
let joyBase = {x:0, y:0};
let joyR = 35; 

joyZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = joyZone.getBoundingClientRect();
    joyBase = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    joyActive = true;
    updateJoystick(e.touches[0]);
}, {passive: false});

joyZone.addEventListener('touchmove', e => {
    e.preventDefault();
    if(joyActive) updateJoystick(e.touches[0]);
}, {passive: false});

const endJoystick = () => {
    joyActive = false;
    joyInput.x = 0; joyInput.y = 0;
    joyKnob.style.transform = `translate(0px, 0px)`;
};
joyZone.addEventListener('touchend', endJoystick);
joyZone.addEventListener('touchcancel', endJoystick);

function updateJoystick(touch) {
    let dx = touch.clientX - joyBase.x;
    let dy = touch.clientY - joyBase.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > joyR) {
        dx = (dx/dist) * joyR;
        dy = (dy/dist) * joyR;
    }
    joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    joyInput.x = dx / joyR;
    joyInput.y = dy / joyR;
}

const btnAttack = document.getElementById('btn-attack');
btnAttack.addEventListener('touchstart', e => { e.preventDefault(); isAttacking = true; });
btnAttack.addEventListener('mousedown', e => { isAttacking = true; });

canvas.addEventListener('mousedown', e => {
    if (isGameRunning && !isPaused && !isManualPaused) isAttacking = true;
});
canvas.addEventListener('touchstart', e => {
    if (isGameRunning && !isPaused && !isManualPaused) isAttacking = true;
}, {passive: true});

function startGame() {
    const checkboxes = document.querySelectorAll('.topic-item input:checked');
    if (checkboxes.length === 0) {
        alert("請至少選擇一個單元！");
        return;
    }
    
    const selected = Array.from(checkboxes).map(cb => cb.value);
    MathGen.init(selected);

    document.getElementById('menu-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    document.getElementById('result-overlay').classList.remove('active'); 

    initAudio(); // 初始化音效 (放在按鈕觸發事件內最安全)

    player = new Player(100, (Z_MIN+Z_MAX)/2);
    enemies = [];
    crates = [];
    particles = [];
    
    cameraX = 0;
    lockX = 150; 
    waveState = 'cleared';
    showGoTimer = 0;
    
    level = 1;
    levelKills = 0;
    totalKills = 0;
    score = 0;
    bossActive = false;
    isPaused = false;
    isManualPaused = false;
    isGameRunning = true;
    
    document.getElementById('ui-boss-warning').style.display = 'none';
    document.getElementById('pause-overlay').style.display = 'none';
    
    const btnPause = document.getElementById('btn-pause');
    btnPause.innerText = "暫停";
    btnPause.style.background = "var(--warning)";

    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function returnToMenu() {
    isGameRunning = false;
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('result-overlay').classList.remove('active');
    document.getElementById('menu-screen').classList.add('active');
}

document.body.addEventListener('touchmove', function(e) {
    if(document.getElementById('game-screen').classList.contains('active')) {
        e.preventDefault();
    }
}, { passive: false });

</script>
