<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作打怪數學大賽</title>
    <!-- 引入 Tailwind CSS 用於樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 自定義動畫樣式 */
        .animate-bounce-slow {
          animation: bounce 2s infinite;
        }
        @keyframes bounce {
          0%, 100% {
            transform: translateY(0);
            animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
          }
          50% {
            transform: translateY(-15%);
            animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
          }
        }
        @keyframes fade-in {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        .animate-fade-in {
          animation: fade-in 0.2s ease-out forwards;
        }
        @keyframes pop-in {
          0% { transform: scale(0.8); opacity: 0; }
          100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
          animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 怪物攻擊時的畫面震動與紅光特效 */
        @keyframes monster-attack-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-10px, -2px) rotate(-1deg); }
            20% { transform: translate(-20px, 0px) rotate(1deg); }
            30% { transform: translate(20px, 10px) rotate(0deg); }
            40% { transform: translate(10px, -10px) rotate(1deg); }
            50% { transform: translate(-10px, 20px) rotate(-1deg); }
            60% { transform: translate(-20px, 10px) rotate(0deg); }
            70% { transform: translate(20px, 10px) rotate(-1deg); }
            80% { transform: translate(-10px, -10px) rotate(1deg); }
            90% { transform: translate(10px, 20px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .animate-monster-attack {
            animation: monster-attack-shake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        .attack-flash {
            position: fixed;
            inset: 0;
            background-color: rgba(239, 68, 68, 0.4); 
            z-index: 10000;
            pointer-events: none; /* 讓玩家即使在閃紅光也能觸控答題 */
            animation: attack-flash-anim 0.6s ease-out forwards;
        }
        @keyframes attack-flash-anim {
            0% { opacity: 0; background-color: rgba(239, 68, 68, 0.6); }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 移除預設的觸摸高亮，優化平板體驗 */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 常數定義 ---
        const MODES = {
            ADD_1_1: { id: 'add_1_1', label: '一位數 + 一位數' },
            ADD_2_1: { id: 'add_2_1', label: '二位數 + 一位數' },
            SUB_1_1: { id: 'sub_1_1', label: '一位數 - 一位數' },
            SUB_2_1: { id: 'sub_2_1', label: '二位數 - 一位數' },
            MUL_9_9: { id: 'mul_9_9', label: '九九乘法' },
            DIV_2_1: { id: 'div_2_1', label: '二位數 ÷ 一位數' },
        };

        // --- 圖示元件 ---
        const Trophy = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                <path d="M4 22h16" />
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 21" />
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 21" />
                <path d="M12 2a7 7 0 0 0-7 7v1h14v-1a7 7 0 0 0-7-7z" />
            </svg>
        );

        const RefreshCcw = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                <path d="M16 16h5v5" />
            </svg>
        );

        const Play = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
        );

        const Pause = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        );

        const TimerIcon = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );

        const HomeIcon = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        );

        // --- Canvas 合作打怪動畫元件 ---
        const CanvasMonsterCoop = ({ monsterHp, maxHp, isResetting, leftAttack, rightAttack, isMonsterAttacking }) => {
            const canvasRef = useRef(null);
            
            const drawState = useRef({
                monsterHp: monsterHp,
                targetHp: monsterHp,
                hpProgress: 1,
                bouncePhase: 0,
                monsterHitTimer: 0, 
                projectiles: [],
                defeatTimer: 0, 
                isMonsterAttacking: false 
            });

            useEffect(() => {
                drawState.current.isMonsterAttacking = isMonsterAttacking;
            }, [isMonsterAttacking]);

            useEffect(() => {
                if (isResetting) {
                    drawState.current.monsterHp = maxHp;
                    drawState.current.targetHp = maxHp;
                    drawState.current.hpProgress = 1;
                    drawState.current.projectiles = [];
                    drawState.current.monsterHitTimer = 0;
                    drawState.current.defeatTimer = 0;
                } else {
                    if (drawState.current.targetHp !== monsterHp) {
                        drawState.current.targetHp = monsterHp;
                        drawState.current.hpProgress = 0;
                    }
                }
            }, [monsterHp, maxHp, isResetting]);

            useEffect(() => {
                if (leftAttack > 0) {
                    drawState.current.projectiles.push({ x: 200, y: 120, targetX: 500, targetY: 100, speed: 15, active: true, emoji: '⚡' });
                }
            }, [leftAttack]);

            useEffect(() => {
                if (rightAttack > 0) {
                    drawState.current.projectiles.push({ x: 800, y: 120, targetX: 500, targetY: 100, speed: 15, active: true, emoji: '🔥' });
                }
            }, [rightAttack]);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let lastTime = performance.now();
                const BOUNCE_SPEED = 0.003;

                const render = (time) => {
                    const dt = time - lastTime;
                    lastTime = time;
                    const state = drawState.current;
                    
                    state.bouncePhase += dt * BOUNCE_SPEED;

                    if (state.hpProgress < 1) {
                        state.hpProgress += dt / 500;
                        if (state.hpProgress >= 1) {
                            state.hpProgress = 1;
                            state.monsterHp = state.targetHp;
                        } else {
                            const startHp = state.targetHp + 1; 
                            state.monsterHp = startHp - (1 * state.hpProgress);
                        }
                    }

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const centerY = canvas.height - 30;
                    const centerX = canvas.width / 2;

                    // 地板線
                    ctx.fillStyle = 'rgba(146, 64, 14, 0.2)'; 
                    ctx.fillRect(0, canvas.height - 16, canvas.width, 8);

                    // 處理並繪製投射物
                    state.projectiles.forEach(p => {
                        if (!p.active) return;
                        const dx = p.targetX - p.x;
                        const dy = p.targetY - p.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < p.speed) {
                            p.active = false;
                            state.monsterHitTimer = 300; 
                        } else {
                            p.x += (dx / dist) * p.speed;
                            p.y += (dy / dist) * p.speed;
                        }
                        
                        ctx.font = '30px "Apple Color Emoji", "Segoe UI Emoji", Arial, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(p.emoji, p.x, p.y);
                    });
                    state.projectiles = state.projectiles.filter(p => p.active);

                    if (state.monsterHitTimer > 0) {
                        state.monsterHitTimer -= dt;
                    }

                    // 繪製血量條 (HP Bar)
                    const hpBarWidth = 200;
                    const hpBarHeight = 16;
                    const hpRatio = Math.max(0, state.monsterHp / maxHp);
                    
                    ctx.fillStyle = '#f3f4f6';
                    ctx.fillRect(centerX - hpBarWidth/2, 20, hpBarWidth, hpBarHeight);
                    
                    ctx.fillStyle = hpRatio > 0.5 ? '#22c55e' : (hpRatio > 0.2 ? '#eab308' : '#ef4444');
                    ctx.fillRect(centerX - hpBarWidth/2, 20, hpBarWidth * hpRatio, hpBarHeight);
                    
                    ctx.strokeStyle = '#374151';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(centerX - hpBarWidth/2, 20, hpBarWidth, hpBarHeight);

                    ctx.font = 'bold 14px Arial, sans-serif';
                    ctx.fillStyle = '#1f2937';
                    ctx.fillText(`HP: ${Math.ceil(state.monsterHp)} / ${maxHp}`, centerX, 10);

                    const bounceY = Math.abs(Math.sin(state.bouncePhase)) * -10;
                    let monsterXOffset = 0;
                    if (state.monsterHitTimer > 0) {
                        monsterXOffset = (Math.random() - 0.5) * 15; 
                    }

                    ctx.font = '60px "Apple Color Emoji", "Segoe UI Emoji", Arial, sans-serif';

                    // 繪製左邊武士（劍 🗡️） 
                    ctx.save();
                    ctx.translate(200, centerY + bounceY);
                    ctx.fillText('🗡️', 0, 0);
                    ctx.restore();

                    // 繪製右邊騎士 🛡️
                    ctx.save();
                    ctx.translate(800, centerY + (Math.abs(Math.cos(state.bouncePhase)) * -10));
                    ctx.fillText('🛡️', 0, 0);
                    ctx.restore();

                    // 繪製中央怪物 👹
                    ctx.save();
                    if (state.targetHp <= 0) {
                        // 死亡逃跑動畫
                        state.defeatTimer += dt;
                        let runX = 0;
                        let runY = 0;
                        let currentAlpha = 1;

                        if (state.defeatTimer < 600) {
                            runX = (Math.random() - 0.5) * 40;
                            runY = (Math.random() - 0.5) * 40;
                            currentAlpha = 0.5 + Math.random() * 0.5;
                            ctx.translate(centerX + runX, centerY - 20 + runY);
                            ctx.scale(1.2, 1.2);
                        } else {
                            const dashTime = state.defeatTimer - 600;
                            runX = dashTime * 0.8; 
                            runY = -dashTime * 0.6 - Math.abs(Math.sin(dashTime * 0.02)) * 30; 
                            currentAlpha = Math.max(0, 1 - (dashTime / 1200));
                            
                            ctx.translate(centerX + runX, centerY - 20 + runY);
                            ctx.rotate((dashTime * 0.01) % (Math.PI * 2));
                            ctx.scale(1.5, 1.5);
                        }
                        ctx.globalAlpha = currentAlpha;
                    } else {
                        // 怪物定時撲擊效果
                        if (state.isMonsterAttacking) {
                            const attackShakeX = (Math.random() - 0.5) * 10;
                            ctx.translate(centerX + attackShakeX, centerY - 40);
                            ctx.scale(2.5, 2.5); // 怪物變巨大
                        } else {
                            // 正常存活狀態
                            state.defeatTimer = 0; 
                            ctx.translate(centerX + monsterXOffset, centerY - 20 + bounceY * 0.5);
                            ctx.scale(1.5, 1.5);
                            if (state.monsterHitTimer > 0) ctx.globalAlpha = 0.7;
                        }
                    }
                    ctx.fillText('👹', 0, 0);
                    ctx.restore();

                    animationFrameId = window.requestAnimationFrame(render);
                };
                
                render(performance.now());
                return () => window.cancelAnimationFrame(animationFrameId);
            }, [maxHp]); 

            return (
                <canvas 
                    ref={canvasRef} 
                    width={1000} 
                    height={160} 
                    className="w-full h-40 object-cover"
                />
            );
        };

        // --- 數字鍵盤元件 ---
        const MiniKeypad = ({ onNumClick, color, onClose }) => {
            const btnColorClass = color === 'blue' 
                ? 'bg-blue-100 text-blue-700 hover:bg-blue-200 border-b-4 border-blue-300 active:border-b-0 active:translate-y-1' 
                : 'bg-pink-100 text-pink-700 hover:bg-pink-200 border-b-4 border-pink-300 active:border-b-0 active:translate-y-1';

            return (
                <div 
                    className="absolute top-full left-1/2 transform -translate-x-1/2 mt-4 z-30 bg-white p-3 rounded-xl shadow-2xl border border-gray-100 w-64 animate-fade-in"
                    onPointerDown={(e) => e.stopPropagation()}
                >
                    <div className="grid grid-cols-5 gap-2">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, 0].map((num) => (
                            <button
                                key={num}
                                onPointerDown={(e) => { 
                                    e.preventDefault(); 
                                    e.stopPropagation(); 
                                    onNumClick(num); 
                                }}
                                className={`h-10 text-xl font-bold rounded-lg shadow-sm transition-all ${btnColorClass}`}
                            >
                                {num}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 主程式元件 ---
        const CoopMathGame = () => {
          const MAX_HP = 10; 
          const DELAY_MS = 500; 
          const GAME_TIME = 120; 
          
          const [gameState, setGameState] = useState('menu'); 
          
          const [leftModes, setLeftModes] = useState([MODES.ADD_1_1.id]);
          const [rightModes, setRightModes] = useState([MODES.ADD_1_1.id]);
          const [leftReady, setLeftReady] = useState(false);
          const [rightReady, setRightReady] = useState(false);
          
          const [monsterHp, setMonsterHp] = useState(MAX_HP); 
          const [winner, setWinner] = useState(null); 
          const [isResetting, setIsResetting] = useState(false); 
          const [isDefeating, setIsDefeating] = useState(false);
          
          const [isMonsterAttacking, setIsMonsterAttacking] = useState(false);

          const [leftAttack, setLeftAttack] = useState(0);
          const [rightAttack, setRightAttack] = useState(0);

          const [timeLeft, setTimeLeft] = useState(GAME_TIME);
          const [isTimerRunning, setIsTimerRunning] = useState(false);

          // 題目狀態更新：使用 inputs 陣列來動態支援多位數輸入
          const [leftProblem, setLeftProblem] = useState({ n1: 0, n2: 0, ans: 0, operator: '+', inputs: [''], isCorrect: false });
          const [rightProblem, setRightProblem] = useState({ n1: 0, n2: 0, ans: 0, operator: '+', inputs: [''], isCorrect: false });

          const [leftFocus, setLeftFocus] = useState(null);
          const [rightFocus, setRightFocus] = useState(null);

          const leftTimerRef = useRef(null);
          const rightTimerRef = useRef(null);

          useEffect(() => {
              if (leftReady && rightReady && gameState === 'menu') {
                  const timer = setTimeout(() => {
                      setGameState('playing');
                      resetGame();
                  }, 500); 
                  return () => clearTimeout(timer);
              }
          }, [leftReady, rightReady, gameState]);

          useEffect(() => {
            let interval = null;
            if (gameState === 'playing' && isTimerRunning && timeLeft > 0 && !winner && !isDefeating) {
                
                if (timeLeft < GAME_TIME && timeLeft % 20 === 0) {
                    setIsMonsterAttacking(true);
                    setTimeout(() => {
                        setIsMonsterAttacking(false);
                    }, 600); 
                }

                interval = setInterval(() => {
                    setTimeLeft((prev) => prev - 1);
                }, 1000);
            } else if (timeLeft === 0 && isTimerRunning) {
                setIsTimerRunning(false);
                handleTimeUp();
            }
            return () => clearInterval(interval);
          }, [isTimerRunning, timeLeft, winner, isDefeating, gameState]);

          const handleTimeUp = () => {
            if (monsterHp > 0) {
                setWinner('lose');
            } else {
                setWinner('win');
            }
            setLeftFocus(null);
            setRightFocus(null);
          };

          const toggleTimer = () => {
            if (winner || isDefeating) return;
            setIsTimerRunning(!isTimerRunning);
          };

          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          const generateProblem = (side) => {
            const modes = side === 'left' ? leftModes : rightModes;
            if (!modes || modes.length === 0) return { n1: 0, n2: 0, ans: 0, operator: '+' }; 

            const modeId = modes[Math.floor(Math.random() * modes.length)];
            let n1, n2, operator, ans;

            switch (modeId) {
                case MODES.ADD_1_1.id:
                    n1 = Math.floor(Math.random() * 9) + 1;
                    n2 = Math.floor(Math.random() * 9) + 1;
                    operator = '+';
                    ans = n1 + n2;
                    break;
                case MODES.ADD_2_1.id:
                    n1 = Math.floor(Math.random() * 90) + 10;
                    n2 = Math.floor(Math.random() * 9) + 1;
                    operator = '+';
                    ans = n1 + n2;
                    break;
                case MODES.SUB_1_1.id:
                    n1 = Math.floor(Math.random() * 9) + 1;
                    let subN2 = Math.floor(Math.random() * 9) + 1;
                    if (subN2 > n1) { n2 = n1; n1 = subN2; } else { n2 = subN2; }
                    operator = '-';
                    ans = n1 - n2;
                    break;
                case MODES.SUB_2_1.id:
                    n1 = Math.floor(Math.random() * 90) + 10;
                    n2 = Math.floor(Math.random() * 9) + 1;
                    operator = '-';
                    ans = n1 - n2;
                    break;
                case MODES.MUL_9_9.id:
                    n1 = Math.floor(Math.random() * 9) + 1;
                    n2 = Math.floor(Math.random() * 9) + 1;
                    operator = '×';
                    ans = n1 * n2;
                    break;
                case MODES.DIV_2_1.id:
                    let divisor = Math.floor(Math.random() * 8) + 2;
                    let minQ = Math.ceil(10 / divisor);
                    let maxQ = Math.floor(99 / divisor);
                    let quotient = Math.floor(Math.random() * (maxQ - minQ + 1)) + minQ;
                    
                    n2 = divisor;
                    n1 = quotient * divisor; 
                    operator = '÷';
                    ans = quotient;
                    break;
                default:
                    n1 = 1; n2 = 1; operator = '+'; ans = 2;
            }

            // 動態判斷答案字元長度，產生對應數量的空陣列（一格代表一位數）
            const digitCount = String(ans).length;

            return {
              n1, n2, ans, operator,
              inputs: Array(digitCount).fill(''), 
              isCorrect: false
            };
          };

          const returnToMenu = () => {
              setGameState('menu');
              setWinner(null);
              setIsDefeating(false);
              setIsMonsterAttacking(false);
              setLeftReady(false);
              setRightReady(false);
          };

          const resetGame = () => {
            setIsResetting(true);

            if (leftTimerRef.current) clearTimeout(leftTimerRef.current);
            if (rightTimerRef.current) clearTimeout(rightTimerRef.current);

            setMonsterHp(MAX_HP);
            setLeftAttack(0);
            setRightAttack(0);
            setWinner(null);
            setIsDefeating(false);
            setIsMonsterAttacking(false);
            setTimeLeft(GAME_TIME);
            setIsTimerRunning(true); 
            setLeftProblem(generateProblem('left'));
            setRightProblem(generateProblem('right'));
            setLeftFocus(null);
            setRightFocus(null);

            setTimeout(() => setIsResetting(false), 100); 
          };

          const toggleLeftMode = (modeId) => {
              if (leftReady) return; 
              setLeftModes(prev => {
                  if (prev.includes(modeId)) {
                      if (prev.length === 1) return prev; 
                      return prev.filter(id => id !== modeId);
                  } else return [...prev, modeId];
              });
          };

          const toggleRightMode = (modeId) => {
              if (rightReady) return;
              setRightModes(prev => {
                  if (prev.includes(modeId)) {
                      if (prev.length === 1) return prev; 
                      return prev.filter(id => id !== modeId);
                  } else return [...prev, modeId];
              });
          };

          const handleBackgroundClick = () => {
            setLeftFocus(null);
            setRightFocus(null);
          };

          // 點擊數字邏輯更新：寫入指定 index 的陣列位置
          const handleLeftNumClick = (num) => {
            if (!leftFocus || winner || isDefeating || leftProblem.isCorrect) return;
            
            const newInputs = [...leftProblem.inputs];
            newInputs[leftFocus.index] = num.toString();
            
            const newProb = { ...leftProblem, inputs: newInputs };
            setLeftProblem(newProb);
            setLeftFocus(null); 
            checkAnswer('left', newProb);
          };

          const handleRightNumClick = (num) => {
            if (!rightFocus || winner || isDefeating || rightProblem.isCorrect) return;

            const newInputs = [...rightProblem.inputs];
            newInputs[rightFocus.index] = num.toString();

            const newProb = { ...rightProblem, inputs: newInputs };
            setRightProblem(newProb);
            setRightFocus(null); 
            checkAnswer('right', newProb);
          };

          // 驗證答案邏輯更新：將所有輸入格陣列結合成字串判定
          const checkAnswer = (side, problem) => {
            const { inputs, ans } = problem;
            // 若為空值視為 0 進行檢查，防呆處理
            const userStr = inputs.map(v => v === '' ? '0' : v).join('');
            const userAnswer = parseInt(userStr, 10);
            
            if (userAnswer === ans) {
              handleCorrectAnswer(side);
            }
          };

          const handleCorrectAnswer = (side) => {
            if (winner || isDefeating) return;

            if (side === 'left') setLeftAttack(p => p + 1);
            else setRightAttack(p => p + 1);

            setMonsterHp(prev => {
                const newHp = prev - 1;
                if (newHp <= 0 && !isDefeating) {
                    setIsDefeating(true); 
                    setIsTimerRunning(false);
                    setIsMonsterAttacking(false); 
                    setTimeout(() => {
                        setWinner('win');
                    }, 2500); 
                }
                return newHp;
            });

            if (side === 'right') {
              setRightProblem(prev => ({ ...prev, isCorrect: true }));
              setRightFocus(null); 
              if (rightTimerRef.current) clearTimeout(rightTimerRef.current);
              rightTimerRef.current = setTimeout(() => {
                setRightProblem(generateProblem('right'));
              }, DELAY_MS);
            } else {
              setLeftProblem(prev => ({ ...prev, isCorrect: true }));
              setLeftFocus(null); 
              if (leftTimerRef.current) clearTimeout(leftTimerRef.current);
              leftTimerRef.current = setTimeout(() => {
                setLeftProblem(generateProblem('left'));
              }, DELAY_MS);
            }
          };

          if (gameState === 'menu') {
              return (
                <div className="min-h-screen bg-slate-50 font-sans flex flex-col items-center justify-center p-4 md:p-8">
                    <h1 className="text-3xl md:text-4xl font-bold text-gray-700 text-center mb-4 flex items-center justify-center gap-3">
                        <span>⚔️</span> 合作打怪數學大賽 <span>🛡️</span>
                    </h1>
                    <p className="text-center text-gray-500 mb-8 text-lg">請各自選擇要練習的題型，共同擊敗中間的怪物！</p>
                    
                    <div className="flex flex-col md:flex-row gap-6 w-full max-w-5xl">
                        <div className="flex-1 bg-white rounded-3xl shadow-xl p-6 border-4 border-blue-200 flex flex-col">
                            <h2 className="text-2xl font-bold text-blue-500 mb-6 text-center">左邊武士隊 🗡️</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                                {Object.values(MODES).map((mode) => (
                                    <label key={`left-${mode.id}`} className={`flex items-center p-3 rounded-xl border-2 transition-all ${leftReady ? 'opacity-60 cursor-not-allowed border-gray-100 bg-gray-50' : 'cursor-pointer border-gray-100 hover:border-blue-300 hover:bg-blue-50'}`}>
                                        <input 
                                            type="checkbox" 
                                            className="w-5 h-5 accent-blue-500 mr-3 flex-shrink-0"
                                            checked={leftModes.includes(mode.id)}
                                            onChange={() => toggleLeftMode(mode.id)}
                                            disabled={leftReady}
                                        />
                                        <span className="text-sm md:text-base text-gray-700 font-medium whitespace-nowrap">{mode.label}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="mt-auto pt-4">
                                <button 
                                    onClick={() => setLeftReady(!leftReady)}
                                    className={`w-full py-4 rounded-xl font-bold text-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2
                                        ${leftReady ? 'bg-green-500 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}
                                    `}
                                >
                                    {leftReady ? '✅ 已準備' : '準備好'}
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 bg-white rounded-3xl shadow-xl p-6 border-4 border-pink-200 flex flex-col">
                            <h2 className="text-2xl font-bold text-pink-500 mb-6 text-center">右邊騎士隊 🛡️</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                                {Object.values(MODES).map((mode) => (
                                    <label key={`right-${mode.id}`} className={`flex items-center p-3 rounded-xl border-2 transition-all ${rightReady ? 'opacity-60 cursor-not-allowed border-gray-100 bg-gray-50' : 'cursor-pointer border-gray-100 hover:border-pink-300 hover:bg-pink-50'}`}>
                                        <input 
                                            type="checkbox" 
                                            className="w-5 h-5 accent-pink-500 mr-3 flex-shrink-0"
                                            checked={rightModes.includes(mode.id)}
                                            onChange={() => toggleRightMode(mode.id)}
                                            disabled={rightReady}
                                        />
                                        <span className="text-sm md:text-base text-gray-700 font-medium whitespace-nowrap">{mode.label}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="mt-auto pt-4">
                                <button 
                                    onClick={() => setRightReady(!rightReady)}
                                    className={`w-full py-4 rounded-xl font-bold text-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2
                                        ${rightReady ? 'bg-green-500 text-white' : 'bg-pink-500 hover:bg-pink-600 text-white'}
                                    `}
                                >
                                    {rightReady ? '✅ 已準備' : '準備好'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
              );
          }

          return (
            <div 
                className={`min-h-screen bg-slate-50 font-sans select-none flex flex-col overflow-y-auto pb-40 ${isMonsterAttacking ? 'animate-monster-attack' : ''}`}
                onPointerDown={handleBackgroundClick} 
            >
              
              {isMonsterAttacking && <div className="attack-flash"></div>}

              <div className="bg-white shadow-sm p-3 relative z-20 shrink-0 flex items-center justify-between">
                <div className="flex-1 flex justify-start pl-2 md:pl-4">
                    <button 
                        onPointerDown={(e) => { e.stopPropagation(); toggleTimer(); }}
                        className={`flex items-center gap-2 px-3 py-2 rounded-xl border-2 shadow-sm transition-all hover:shadow-md
                            ${isTimerRunning ? 'bg-orange-50 border-orange-200 text-orange-600' : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-white'}
                            ${winner || isDefeating ? 'opacity-50 cursor-not-allowed' : ''}
                        `}
                        disabled={!!winner || isDefeating}
                    >
                        {isTimerRunning ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5" />}
                        <div className="flex items-center gap-1 font-mono text-xl font-bold">
                            <TimerIcon className="w-5 h-5" />
                            <span>{formatTime(timeLeft)}</span>
                        </div>
                    </button>
                </div>

                <div className="text-center">
                    <h1 className="text-xl md:text-2xl font-bold text-gray-700 flex items-center justify-center gap-2">
                    合作打怪大賽
                    </h1>
                    <div className="text-xs md:text-sm text-gray-500 mt-1">打倒血量 {MAX_HP} 滴的怪物！</div>
                </div>

                <div className="flex-1 flex justify-end pr-2 md:pr-4">
                     <button 
                        onPointerDown={(e) => { e.stopPropagation(); returnToMenu(); }}
                        className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"
                        title="回到選單"
                     >
                        <HomeIcon className="w-6 h-6" />
                     </button>
                </div>
              </div>

              <div className="h-40 w-full bg-slate-800 border-b-4 border-slate-900 shrink-0 z-10 flex justify-center overflow-hidden">
                 <div className="max-w-[1000px] w-full relative h-full">
                     <CanvasMonsterCoop 
                         monsterHp={monsterHp} 
                         maxHp={MAX_HP}
                         isResetting={isResetting} 
                         leftAttack={leftAttack}
                         rightAttack={rightAttack}
                         isMonsterAttacking={isMonsterAttacking} 
                     />
                 </div>
              </div>

              <div className="flex-1 flex flex-row relative items-stretch">
                <div className="flex-1 p-4 flex flex-col items-center justify-start pt-10 transition-colors duration-300 bg-blue-50">
                  <div className={`relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm border-4 transition-all duration-300 ${leftProblem.isCorrect ? 'border-green-400 ring-4 ring-green-200' : 'border-blue-200'}`}>
                    <h2 className="text-xl font-bold text-blue-500 mb-6 text-center">左邊武士隊 🗡️</h2>
                    <div className="flex items-center justify-center gap-2 text-4xl md:text-5xl font-bold text-gray-700 mb-8">
                      <span>{leftProblem.n1}</span>
                      <span>{leftProblem.operator}</span>
                      <span>{leftProblem.n2}</span>
                      <span>=</span>
                    </div>
                    
                    {/* 動態渲染答題框 */}
                    <div className="flex gap-3 justify-center relative">
                      {leftProblem.inputs.map((val, i) => (
                          <AnswerBox 
                            key={i}
                            val={val} 
                            onPointerDown={(e) => { 
                                e.preventDefault(); e.stopPropagation(); 
                                !leftProblem.isCorrect && !isDefeating && setLeftFocus({ index: i }); 
                            }}
                            active={leftFocus?.index === i}
                            color="blue"
                            isCorrect={leftProblem.isCorrect}
                          />
                      ))}
                    </div>

                    {leftFocus && !isDefeating && <MiniKeypad onNumClick={handleLeftNumClick} color="blue" />}
                  </div>
                </div>

                <div className="w-1 bg-gray-200 z-0"></div>

                <div className="flex-1 p-4 flex flex-col items-center justify-start pt-10 transition-colors duration-300 bg-pink-50">
                  <div className={`relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm border-4 transition-all duration-300 ${rightProblem.isCorrect ? 'border-green-400 ring-4 ring-green-200' : 'border-pink-200 relative z-10'}`}>
                    <h2 className="text-xl font-bold text-pink-500 mb-6 text-center">右邊騎士隊 🛡️</h2>
                    <div className="flex items-center justify-center gap-2 text-4xl md:text-5xl font-bold text-gray-700 mb-8">
                      <span>{rightProblem.n1}</span>
                      <span>{rightProblem.operator}</span>
                      <span>{rightProblem.n2}</span>
                      <span>=</span>
                    </div>
                    
                    {/* 動態渲染答題框 */}
                    <div className="flex gap-3 justify-center relative">
                      {rightProblem.inputs.map((val, i) => (
                          <AnswerBox 
                            key={i}
                            val={val} 
                            onPointerDown={(e) => { 
                                e.preventDefault(); e.stopPropagation(); 
                                !rightProblem.isCorrect && !isDefeating && setRightFocus({ index: i }); 
                            }}
                            active={rightFocus?.index === i}
                            color="pink"
                            isCorrect={rightProblem.isCorrect}
                          />
                      ))}
                    </div>

                    {rightFocus && !isDefeating && <MiniKeypad onNumClick={handleRightNumClick} color="pink" />}
                  </div>
                </div>
              </div>

              {winner && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in" onPointerDown={e => e.stopPropagation()}>
                  <div className="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl transform scale-100 animate-pop-in">
                    
                    {winner === 'lose' ? (
                        <>
                            <div className="text-6xl mb-4 animate-bounce">💨</div>
                            <h2 className="text-4xl font-black mb-2 text-gray-600">挑戰失敗！</h2>
                            <p className="text-gray-600 mb-8 text-lg">時間到了，怪物逃跑了，再試一次吧！</p>
                        </>
                    ) : (
                        <>
                            <div className="text-6xl mb-4 animate-bounce">✨</div>
                            <h2 className="text-4xl font-black mb-2 text-yellow-500">大獲全勝！</h2>
                            <div className="flex justify-center mb-6">
                            <Trophy className="w-16 h-16 text-yellow-400" />
                            </div>
                            <p className="text-gray-600 mb-8 text-lg">
                                你們成功打倒了怪物！剩餘時間 {formatTime(timeLeft)}
                            </p>
                        </>
                    )}
                    
                    <div className="flex flex-col gap-3">
                        <button 
                        onPointerDown={resetGame}
                        className="w-full py-3 bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold rounded-xl shadow-lg text-xl hover:from-yellow-500 hover:to-orange-600 transition-all flex items-center justify-center gap-2"
                        >
                        <RefreshCcw className="w-6 h-6" /> 再玩一次
                        </button>

                        <button 
                        onPointerDown={returnToMenu}
                        className="w-full py-3 bg-white border-2 border-gray-200 text-gray-600 font-bold rounded-xl shadow-sm text-lg hover:bg-gray-50 transition-all flex items-center justify-center gap-2"
                        >
                        <HomeIcon className="w-5 h-5" /> 回到選單
                        </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const AnswerBox = ({ val, onPointerDown, active, color, isCorrect }) => {
          let baseClass = "w-16 h-20 border-4 rounded-xl flex items-center justify-center text-3xl font-bold cursor-pointer transition-all";
          
          if (isCorrect) {
            return (
              <div className={`${baseClass} border-green-500 bg-green-100 text-green-700`}>
                {val}
              </div>
            );
          }

          const colorClass = color === 'blue' 
            ? (active ? "border-blue-500 bg-blue-100 ring-4 ring-blue-200" : "border-blue-300 bg-white hover:bg-blue-50")
            : (active ? "border-pink-500 bg-pink-100 ring-4 ring-pink-200" : "border-pink-300 bg-white hover:bg-pink-50");
          
          return (
            <div className={`${baseClass} ${colorClass}`} onPointerDown={onPointerDown}>
              {val !== '' ? val : <span className="text-gray-300 text-2xl">?</span>}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CoopMathGame />);
    </script>
</body>
</html>
