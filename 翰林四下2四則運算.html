<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運算大師：四則運算挑戰</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { touch-action: manipulation; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }
        .animate-wiggle { animation: wiggle 0.4s ease-in-out; }
        .math-font { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
    </style>
</head>
<body class="bg-amber-50 text-slate-800 select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Lucide) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const Calculator = (props) => <IconWrapper {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconWrapper>;
        const CheckCircle = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const Trophy = (props) => <IconWrapper {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconWrapper>;
        const RotateCcw = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
        const ListOrdered = (props) => <IconWrapper {...props}><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></IconWrapper>;
        const Brackets = (props) => <IconWrapper {...props}><path d="M8 3H5v18h3"/><path d="M16 21h3V3h-3"/></IconWrapper>;
        const Lightbulb = (props) => <IconWrapper {...props}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></IconWrapper>;

        // --- Main App Component ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('learn');
            const [score, setScore] = useState(0);
            const [animateScore, setAnimateScore] = useState(false);

            useEffect(() => {
                if (score > 0) {
                    setAnimateScore(true);
                    const timer = setTimeout(() => setAnimateScore(false), 300);
                    return () => clearTimeout(timer);
                }
            }, [score]);

            const renderTabContent = () => {
                switch (currentTab) {
                    case 'learn': return <LearnSection onComplete={() => setCurrentTab('practice_1')} />;
                    case 'practice_1': return <MathGameLevel1 score={score} setScore={setScore} onComplete={() => setCurrentTab('practice_2')} />;
                    case 'practice_2': return <MathGameLevel2 score={score} setScore={setScore} onComplete={() => setCurrentTab('quiz')} />;
                    case 'quiz': return <QuizMode score={score} setScore={setScore} onRestart={() => { setScore(0); setCurrentTab('learn'); }} />;
                    default: return <LearnSection />;
                }
            };

            return (
                <div className="h-screen flex flex-col bg-amber-50 font-sans text-slate-800 overflow-hidden select-none">
                    <header className="bg-white shadow-sm p-3 z-10 flex-none border-b border-orange-100">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <div className="bg-orange-500 p-2 rounded-xl text-white shadow-sm"><Calculator size={20} /></div>
                                <h1 className="text-lg font-bold text-orange-700 tracking-wide">四則運算大師</h1>
                            </div>
                            <div className={`flex items-center bg-yellow-100 px-3 py-1.5 rounded-full border border-yellow-400 transition-transform duration-200 ${animateScore ? 'scale-110 ring-4 ring-yellow-200' : ''}`}>
                                <Trophy className={`text-yellow-600 mr-1.5 ${animateScore ? 'animate-spin' : ''}`} size={16} />
                                <span className="font-bold text-yellow-700">{score} 分</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24 scroll-smooth">
                        <div className="max-w-2xl mx-auto bg-white/80 backdrop-blur-sm rounded-3xl shadow-lg border border-white p-5 min-h-[400px] animate-in fade-in slide-in-from-bottom-4 duration-500">
                            {renderTabContent()}
                        </div>
                    </main>

                    <nav className="bg-white border-t border-slate-200 pb-safe pt-2 px-2 fixed bottom-0 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                        <div className="max-w-2xl mx-auto flex justify-around items-end pb-2">
                            <NavButton active={currentTab === 'learn'} onClick={() => setCurrentTab('learn')} icon={<BookOpen size={22} />} label="學習" color="orange" />
                            <NavButton active={currentTab === 'practice_1'} onClick={() => setCurrentTab('practice_1')} icon={<ListOrdered size={22} />} label="乘除優先" color="teal" />
                            <NavButton active={currentTab === 'practice_2'} onClick={() => setCurrentTab('practice_2')} icon={<Brackets size={22} />} label="括號老大" color="blue" />
                            <NavButton active={currentTab === 'quiz'} onClick={() => setCurrentTab('quiz')} icon={<CheckCircle size={22} />} label="大挑戰" color="rose" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavButton = ({ active, onClick, icon, label, color }) => {
            const colorClasses = {
                orange: active ? 'text-orange-600 bg-orange-100' : 'text-slate-400 hover:text-slate-600',
                teal: active ? 'text-teal-600 bg-teal-100' : 'text-slate-400 hover:text-slate-600',
                blue: active ? 'text-blue-600 bg-blue-100' : 'text-slate-400 hover:text-slate-600',
                rose: active ? 'text-rose-600 bg-rose-100' : 'text-slate-400 hover:text-slate-600',
            };
            const dotColor = {
                orange: 'bg-orange-500', teal: 'bg-teal-500', blue: 'bg-blue-500', rose: 'bg-rose-500'
            };

            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center w-full py-2 px-1 transition-all duration-300 rounded-xl active:scale-95 touch-manipulation ${active ? '-translate-y-1' : ''}`}>
                    <div className={`p-2 rounded-2xl transition-all duration-300 ${colorClasses[color]} ${!active && 'bg-transparent'}`}>{icon}</div>
                    <span className={`text-[11px] font-bold mt-1 ${active ? colorClasses[color].split(' ')[0] : 'text-slate-400'}`}>{label}</span>
                    {active && <div className={`w-1.5 h-1.5 rounded-full mt-1 ${dotColor[color]}`}></div>}
                </button>
            );
        };

        // --- 1. Learning Section ---
        const LearnSection = ({ onComplete }) => (
            <div className="space-y-6">
                <div className="flex items-center justify-between">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center"><Play className="mr-2 text-orange-500" style={{fill: 'currentColor'}} size={24} /> 觀念學習</h2>
                    <span className="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-lg border border-orange-200 font-bold">四年級 CH2 四則運算</span>
                </div>
                
                {/* Video Container (黃琡懿老師 備課一點通) */}
                <div className="aspect-video w-full bg-slate-900 rounded-2xl overflow-hidden shadow-lg ring-4 ring-orange-50" style={{position:'relative', paddingBottom: '56.25%', height: 0}}>
                    <iframe src="https://www.youtube.com/embed/FxJGCRMVKj0" title="四則運算教學影片" style={{position:'absolute', top:0, left:0, width:'100%', height:'100%'}} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                </div>

                {/* Notes */}
                <div className="bg-gradient-to-br from-orange-50 to-amber-100 p-5 rounded-3xl border border-orange-200 mt-4 shadow-sm">
                    <h3 className="text-lg font-bold text-orange-800 mb-4 flex items-center"><BookOpen className="w-5 h-5 mr-2" />運算三大法寶</h3>
                    <div className="space-y-3 text-sm text-slate-700 font-medium">
                        <div className="flex bg-white p-4 rounded-2xl shadow-sm border border-orange-100 items-center">
                            <div className="bg-slate-100 text-slate-600 font-black rounded-xl w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-lg">1</div>
                            <div>
                                <span className="text-lg font-bold text-teal-600">由左而右算</span><br/>
                                <span className="text-slate-500 text-xs">只有加減，或只有乘除的時候。</span><br/>
                                <span className="text-slate-400 text-xs math-font">例：20 + 10 - 5 ➔ 先算左邊的 20+10</span>
                            </div>
                        </div>
                        <div className="flex bg-white p-4 rounded-2xl shadow-sm border border-orange-100 items-center">
                            <div className="bg-slate-100 text-slate-600 font-black rounded-xl w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-lg">2</div>
                            <div>
                                <span className="text-lg font-bold text-blue-600">先乘除，後加減</span><br/>
                                <span className="text-slate-500 text-xs">乘法和除法比較大，要先算！</span><br/>
                                <span className="text-slate-400 text-xs math-font">例：10 + 2 × 5 ➔ 先算 2×5</span>
                            </div>
                        </div>
                        <div className="flex bg-white p-4 rounded-2xl shadow-sm border border-orange-100 items-center">
                            <div className="bg-slate-100 text-slate-600 font-black rounded-xl w-10 h-10 flex items-center justify-center mr-3 flex-shrink-0 text-lg">3</div>
                            <div>
                                <span className="text-lg font-bold text-rose-600">括號 ( ) 是老大</span><br/>
                                <span className="text-slate-500 text-xs">不管裡面是什麼，有括號的要最先算！</span><br/>
                                <span className="text-slate-400 text-xs math-font">例：(10 + 5) × 2 ➔ 先算 (10+5)</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button onClick={onComplete} className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center shadow-lg shadow-orange-500/30 active:scale-95 transition-all">我記住了，開始挑戰！ <ArrowRight className="ml-2" /></button>
            </div>
        );

        // --- 2. Practice 1: 由左而右、先乘除 (6 questions) ---
        const MathGameLevel1 = ({ score, setScore, onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [feedback, setFeedback] = useState('');

            const questions = [
                { eq: "20 + 10 - 5", ans: "25", options: ["25", "15", "30"], tip: "只有加和減，要從左邊開始算喔！先算 20+10=30" },
                { eq: "10 × 2 ÷ 4", ans: "5", options: ["10", "8", "5"], tip: "只有乘和除，也要從左邊開始算！先算 10×2=20" },
                { eq: "10 + 2 × 5", ans: "20", options: ["60", "20", "17"], tip: "先乘除後加減！要先算後面的 2×5=10 喔！" },
                { eq: "30 - 15 ÷ 3", ans: "25", options: ["5", "15", "25"], tip: "遇到除法要先算！先算 15÷3=5" },
                { eq: "4 × 5 + 10", ans: "30", options: ["30", "60", "24"], tip: "遇到乘法要先算！先算 4×5=20" },
                { eq: "50 - 5 × 2", ans: "40", options: ["90", "40", "45"], tip: "先乘除後加減！要先算 5×2=10" }
            ];

            const handleAnswer = (opt) => {
                if (feedback) return;
                const correctAns = questions[progress].ans;
                if (opt === correctAns) {
                    setFeedback('correct');
                    setScore(s => s + 10);
                    setTimeout(() => {
                        setFeedback('');
                        setProgress(p => p + 1);
                    }, 1200);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 4000); // 留時間給孩子看提示
                }
            };

            if (progress >= 6) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-teal-100 rounded-full mb-4 ring-8 ring-teal-50"><ListOrdered className="text-teal-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">表現很好！</h2>
                    <p className="text-slate-600 mb-8 font-medium">你已經學會「先乘除後加減」的絕招了！</p>
                    <button onClick={onComplete} className="w-full bg-teal-500 text-white py-4 rounded-2xl font-bold text-xl shadow-lg shadow-teal-500/30 active:scale-95 transition-all">下一關：括號老大</button>
                </div>
            );

            const q = questions[progress];

            return (
                <div className="text-center space-y-5 animate-in fade-in">
                    <div className="flex justify-between items-center border-b border-teal-100 pb-3">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center">
                            <span className="bg-teal-100 text-teal-700 w-7 h-7 rounded-lg flex items-center justify-center mr-2 text-sm">關卡 1</span>
                            基礎：先乘除
                        </h2>
                        <div className="flex space-x-1">
                            {[...Array(6)].map((_, i) => <div key={i} className={`w-2.5 h-2.5 rounded-full ${i < progress ? 'bg-teal-500' : 'bg-slate-200'}`}></div>)}
                        </div>
                    </div>

                    <div className="bg-teal-50 py-8 px-4 rounded-3xl border-2 border-teal-100 relative mb-2 shadow-inner">
                        <div className="text-sm font-bold text-teal-600 mb-3 flex items-center justify-center">
                            請選出正確的答案
                        </div>
                        <div className="text-5xl font-black text-slate-800 math-font tracking-wider bg-white py-6 rounded-2xl shadow-sm border border-teal-100">
                            {q.eq}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-3">
                        {q.options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} 
                                className={`py-4 rounded-2xl text-2xl font-black math-font border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && opt === q.ans ? 'bg-green-100 border-green-500 text-green-700 shadow-sm' : 
                                feedback === 'incorrect' && opt !== q.ans ? 'opacity-50 bg-white border-slate-200 text-slate-400' : 
                                'bg-white border-slate-200 hover:border-teal-400 text-slate-700 shadow-sm'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    
                    <div className="h-14 flex flex-col justify-center items-center mt-2">
                        {feedback === 'correct' && <span className="text-green-600 font-bold text-lg flex items-center animate-in zoom-in"><CheckCircle className="mr-2" size={24}/> 答對了！好棒！</span>}
                        {feedback === 'incorrect' && <div className="text-red-600 font-bold text-sm bg-red-50 p-3 rounded-xl border border-red-200 animate-wiggle shadow-sm flex items-start text-left w-full"><Lightbulb className="mr-2 flex-shrink-0 mt-0.5 text-amber-500" size={18}/> <span>{q.tip}</span></div>}
                    </div>
                </div>
            );
        };

        // --- 3. Practice 2: 括號先算 (6 questions) ---
        const MathGameLevel2 = ({ score, setScore, onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [feedback, setFeedback] = useState('');

            const questions = [
                { eq: "(10 + 5) × 2", ans: "30", options: ["30", "20", "25"], tip: "括號是老大！一定要先算 (10+5)=15，再算 15×2" },
                { eq: "20 - (10 - 5)", ans: "15", options: ["5", "15", "25"], tip: "括號裡面的要先算！先算 (10-5)=5，再算 20-5" },
                { eq: "40 ÷ (2 + 6)", ans: "5", options: ["26", "14", "5"], tip: "括號先算！先算 (2+6)=8，再算 40÷8" },
                { eq: "(30 - 10) ÷ 5", ans: "4", options: ["4", "28", "10"], tip: "括號優先！先算 (30-10)=20，再算 20÷5" },
                { eq: "50 - (20 + 10)", ans: "(20 + 10)", options: ["50 - 20", "(20 + 10)", "都可以先算"], tip: "看到括號就要先算它！", qType: "觀念", text: "請問下面哪一個部分要最先算？" },
                { eq: "10 + 2 × 3", ans: "不一樣", options: ["一樣", "不一樣"], tip: "有括號的要先算括號，沒括號的要先算乘法，答案會不同喔！", qType: "比較", text: "和 (10 + 2) × 3 的答案一樣嗎？" }
            ];

            const handleAnswer = (opt) => {
                if (feedback) return;
                const correctAns = questions[progress].ans;
                if (opt === correctAns) {
                    setFeedback('correct');
                    setScore(s => s + 15);
                    setTimeout(() => {
                        setFeedback('');
                        setProgress(p => p + 1);
                    }, 1200);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(''), 4500);
                }
            };

            if (progress >= 6) return (
                <div className="text-center py-12 animate-in zoom-in">
                    <div className="inline-block p-4 bg-blue-100 rounded-full mb-4 ring-8 ring-blue-50"><Brackets className="text-blue-600" size={64} /></div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">太強了！</h2>
                    <p className="text-slate-600 mb-8 font-medium">你已經懂「括號是老大」的規則了！</p>
                    <button onClick={onComplete} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-xl shadow-lg shadow-blue-500/30 active:scale-95 transition-all">進入最終大挑戰</button>
                </div>
            );

            const q = questions[progress];

            return (
                <div className="text-center space-y-5 animate-in fade-in">
                    <div className="flex justify-between items-center border-b border-blue-100 pb-3">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center">
                            <span className="bg-blue-100 text-blue-700 w-7 h-7 rounded-lg flex items-center justify-center mr-2 text-sm">關卡 2</span>
                            進階：括號先算
                        </h2>
                        <div className="flex space-x-1">
                            {[...Array(6)].map((_, i) => <div key={i} className={`w-2.5 h-2.5 rounded-full ${i < progress ? 'bg-blue-500' : 'bg-slate-200'}`}></div>)}
                        </div>
                    </div>

                    <div className="bg-blue-50 py-6 px-4 rounded-3xl border-2 border-blue-100 relative mb-2 shadow-inner">
                        <div className="text-sm font-bold text-blue-600 mb-3 flex items-center justify-center">
                            <Brackets size={18} className="mr-1" /> 注意括號在哪裡喔！
                        </div>
                        {q.qType && <h3 className="text-lg font-bold text-slate-800 mb-2">{q.text}</h3>}
                        <div className={`font-black text-slate-800 math-font tracking-wider bg-white rounded-2xl shadow-sm border border-blue-100 flex items-center justify-center ${q.qType ? 'text-3xl py-4' : 'text-5xl py-6'}`}>
                            {q.eq}
                        </div>
                    </div>

                    <div className={`grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : 'grid-cols-1'}`}>
                        {q.options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} 
                                className={`py-4 rounded-2xl text-xl font-black math-font border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && opt === q.ans ? 'bg-green-100 border-green-500 text-green-700 shadow-sm' : 
                                feedback === 'incorrect' && opt !== q.ans ? 'opacity-50 bg-white border-slate-200 text-slate-400' : 
                                'bg-white border-slate-200 hover:border-blue-400 text-slate-700 shadow-sm'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    
                    <div className="h-16 flex flex-col justify-center items-center mt-2">
                        {feedback === 'correct' && <span className="text-green-600 font-bold text-lg flex items-center animate-in zoom-in"><CheckCircle className="mr-2" size={24}/> 答對了！括號最先算！</span>}
                        {feedback === 'incorrect' && <div className="text-red-600 font-bold text-sm bg-red-50 p-3 rounded-xl border border-red-200 animate-wiggle shadow-sm flex items-start text-left w-full"><Lightbulb className="mr-2 flex-shrink-0 mt-0.5 text-amber-500" size={18}/> <span>{q.tip}</span></div>}
                    </div>
                </div>
            );
        };

        // --- 4. Quiz Mode: 綜合應用題大挑戰 (6 questions) ---
        const QuizMode = ({ score, setScore, onRestart }) => {
            const [idx, setIdx] = useState(0);
            const [finished, setFinished] = useState(false);
            const [feedback, setFeedback] = useState(null);
            
            const questions = [
                { q: "一盒布丁賣 20 元，小明買了 3 盒，又買了一包 15 元的糖果，一共要付多少錢？", formula: "20 × 3 + 15 = ?", options: ["75元", "105元", "65元"], ans: 0, tip: "先算布丁的錢 (20×3=60)，再加糖果的錢 (60+15)" },
                { q: "哥哥有 50 元，買了 2 杯 15 元的飲料，還剩下多少錢？", formula: "50 - 15 × 2 = ?", options: ["20元", "35元", "5元"], ans: 0, tip: "先算飲料花多少錢 (15×2=30)，再用 50 元去減 (50-30)" },
                { q: "媽媽買了一盒 60 元的餅乾和 40 元的巧克力，平分給 2 個小朋友，每人可以分到多少錢的東西？", formula: "(60 + 40) ÷ 2 = ?", options: ["50元", "80元", "100元"], ans: 0, tip: "先把買東西的總錢數加起來 (60+40=100)，再平分除以2 (100÷2)" },
                { q: "請幫老師算出這題答案是多少？", formula: "100 - (30 + 20) = ?", options: ["50", "90", "10"], ans: 0, tip: "括號先算！ (30+20=50)，然後用 100 去減 50" },
                { q: "請挑戰這題雙括號題目！", formula: "(15 - 5) × (2 + 3) = ?", options: ["50", "25", "40"], ans: 0, tip: "兩邊的括號都先算出來：10 和 5，再把它們相乘 (10×5)" },
                { q: "【魔王題】老師買了 3 包色紙，每包 10 元，結帳時使用一張 5 元折價券。請問要付多少錢？", formula: "10 × 3 - 5 = ?", options: ["25元", "15元", "30元"], ans: 0, tip: "先算原本要付多少 (10×3=30)，再減掉折價券便宜的 5 元" }
            ];

            const handleAnswer = (optIdx) => {
                if (feedback) return;
                if (optIdx === questions[idx].ans) {
                    setFeedback('correct');
                    setScore(s => s + 20);
                } else {
                    setFeedback('incorrect');
                }
                setTimeout(() => {
                    if (idx + 1 < questions.length) {
                        setIdx(i => i + 1);
                        setFeedback(null);
                    } else {
                        setFinished(true);
                    }
                }, feedback === 'correct' ? 1500 : 5000); // 答錯停久一點讓孩子看提示
            };

            if (finished) return (
                <div className="text-center py-10 space-y-6 animate-in slide-in-from-bottom">
                    <div className="inline-block p-6 bg-rose-100 rounded-full mb-4 shadow-inner ring-8 ring-rose-50"><Trophy size={80} className="text-rose-600" /></div>
                    <h2 className="text-4xl font-black text-slate-800 tracking-wider">恭喜過關！</h2>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border-2 border-rose-100">
                        <p className="text-sm text-slate-400 font-bold mb-2">本次總得分</p>
                        <p className="text-7xl font-black text-rose-500 mb-4">{score}</p>
                        <p className="text-lg text-slate-600 font-bold">你是最強的「運算大師」！</p>
                    </div>
                    <button onClick={onRestart} className="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-xl hover:bg-slate-700 flex items-center justify-center shadow-xl active:scale-95 transition-all"><RotateCcw className="mr-2" size={24} /> 再玩一次</button>
                </div>
            );

            const q = questions[idx];

            return (
                <div className="py-2 animate-in fade-in flex flex-col h-full">
                    <div className="mb-4 flex justify-between items-center text-sm font-bold text-slate-400">
                        <span className="bg-rose-100 px-3 py-1 rounded-lg text-rose-700">最終挑戰 {idx + 1} / {questions.length}</span>
                    </div>
                    
                    <div className="bg-rose-50 p-5 rounded-3xl border border-rose-100 shadow-sm mb-5">
                        <h3 className="text-lg font-bold text-slate-800 leading-relaxed mb-4">{q.q}</h3>
                        <div className="bg-white py-3 px-4 rounded-xl border border-rose-200 text-center shadow-inner">
                            <span className="text-sm text-slate-400 block mb-1">提示算式</span>
                            <span className="text-3xl font-black text-rose-600 math-font tracking-widest">{q.formula}</span>
                        </div>
                    </div>

                    <div className="space-y-3 flex-1">
                        {q.options.map((opt, i) => (
                            <button key={i} onClick={() => handleAnswer(i)} disabled={!!feedback}
                                className={`w-full text-left p-4 rounded-2xl text-xl font-bold border-2 transition-all active:scale-95 
                                ${feedback === 'correct' && i === q.ans ? 'bg-green-100 border-green-500 text-green-800 shadow-sm' : 
                                feedback === 'incorrect' && i !== q.ans && feedback ? 'bg-red-50 border-red-200 text-red-800 opacity-50' : 
                                'bg-white border-slate-200 hover:border-rose-400 text-slate-700 shadow-sm'}`}>
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-black ${feedback === 'correct' && i === q.ans ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-500'}`}>{String.fromCharCode(65+i)}</div>
                                    {opt}
                                    {feedback === 'correct' && i === q.ans && <CheckCircle className="ml-auto text-green-600" size={28} />}
                                </div>
                            </button>
                        ))}
                    </div>

                    <div className="h-20 flex flex-col justify-center items-center mt-4">
                        {feedback === 'correct' && <span className="text-green-600 font-bold text-xl flex items-center animate-in zoom-in"><CheckCircle className="mr-2" size={28}/> 答對了！</span>}
                        {feedback === 'incorrect' && <div className="text-red-600 font-bold text-sm bg-red-50 p-3 rounded-xl border border-red-200 animate-wiggle shadow-sm flex items-start text-left w-full"><Lightbulb className="mr-2 flex-shrink-0 mt-0.5 text-amber-500" size={20}/> <span>{q.tip}</span></div>}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
