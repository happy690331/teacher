            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            color: white;

        }

            background: rgba(255,255,255,0.15);

            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);

            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;

            // Fisher-Yates 洗牌算法
            for (let i = shuffledIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];

            characters = lessonData[lessonNumber];
            
            // 更新標題
            document.getElementById('mainTitle').textContent = `🎯 康軒六下第${convertNumberToChinese(lessonNumber)}課生字猜謎`;
            
            // 更新按鈕狀態
            document.querySelectorAll('.lesson-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重置遊戲並初始化新課程
            resetGame();
            initializeRandomOrder();
        }

        function convertNumberToChinese(num) {
            const chinese = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
            return chinese[num];
        }

        function revealBlock(blockNumber) {
            if (revealedBlocks.has(blockNumber)) return;
            
            const block = document.querySelector(`.block-${blockNumber}`);
            block.classList.add('clicked');
            revealedBlocks.add(blockNumber);
            
            if (revealedBlocks.size === totalBlocks) {
                setTimeout(showCompletion, 500);
            }
        }

        function showCompletion() {
            document.getElementById('completionMessage').classList.add('show');
        }

        function resetGame() {
            revealedBlocks.clear();
            
            // 重置所有區塊
            for (let i = 1; i <= totalBlocks; i++) {
                const block = document.querySelector(`.block-${i}`);
                block.classList.remove('clicked');
            }
            
            document.getElementById('completionMessage').classList.remove('show');
        }

        function revealAll() {
            // 直接移除所有區塊，立即顯示答案
            for (let i = 1; i <= totalBlocks; i++) {
                const block = document.querySelector(`.block-${i}`);
                block.classList.add('clicked');
                revealedBlocks.add(i);
            }
            setTimeout(showCompletion, 300);
        }

        function updateDisplay() {
            const newChar = characters[currentCharacterIndex];
            
            // 更新字符顯示
            document.querySelector('.character-card').textContent = newChar.char;
            
            // 更新題目計數器
            document.getElementById('questionCounter').textContent = `(第 ${currentQuestionNumber + 1} 題 / 共 ${characters.length} 題)`;
            
            // 更新完成訊息中的字符和意思
            const completionMsg = document.getElementById('completionMessage');
            completionMsg.innerHTML = `
                <h2>🎉 恭喜完成！</h2>
                <p>你成功揭示了完整的字：<strong style="font-size: 2rem; color: #ffeaa7;">${newChar.char}</strong></p>
                <p>這個字的意思是「${newChar.meaning}」</p>
                <div style="margin-top: 15px;">
                    <button class="btn btn-primary" onclick="resetGame()" style="margin: 5px;">再玩一次</button>
                    <button class="btn btn-secondary" onclick="newCharacter()" style="margin: 5px;">下一題</button>
                </div>
            `;
        }

        function newCharacter() {
            // 先重置所有區塊，確保遮蔽住字符
            revealedBlocks.clear();
            document.getElementById('completionMessage').classList.remove('show');
            
            for (let i = 1; i <= totalBlocks; i++) {
                const block = document.querySelector(`.block-${i}`);
                block.classList.remove('clicked');
            }
            
            // 延遲0.5秒後再更新字符，確保區塊先完全顯示
            setTimeout(() => {
                // 切換到下一個字符（隨機順序）
                currentQuestionNumber++;
                if (currentQuestionNumber >= characters.length) {
                    // 如果所有題目都做完了，重新洗牌
                    initializeRandomOrder();
                } else {
                    currentCharacterIndex = shuffledIndices[currentQuestionNumber];
                    updateDisplay();
                }
            }, 500);
        }

        // 鍵盤快捷鍵
        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case '1': revealBlock(1); break;
                case '2': revealBlock(2); break;
                case '3': revealBlock(3); break;
                case '4': revealBlock(4); break;
                case '5': revealBlock(5); break;
                case '6': revealBlock(6); break;
                case '7': revealBlock(7); break;
                case '8': revealBlock(8); break;
                case '9': revealBlock(9); break;
                case 'r':
                case 'R':
                    resetGame();
                    break;
                case ' ':
                    event.preventDefault();
                    revealAll();
                    break;
                case 'n':
                case 'N':
                    newCharacter();
                    break;
            }
        });

        // 初始化
        initializeRandomOrder();
    </script>
</body>
</html>
