            color: #333;
        }
        
        html {
            height: 100%;
        }

        .game-container {
            max-width: 800px;

            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .title {
            font-size: 2.5rem;
            color: #4a5568;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 20px;
        }

        .stage-info {
            background: #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            color: #2d3748;
        }

        .game-area {
            background: #f7fafc;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 250px;
            position: relative;
            border: 3px dashed #cbd5e0;
        }

        .component {
            display: inline-block;
            font-size: 4rem;
            font-weight: bold;
            color: #2b6cb0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .component.rotating {
            animation: rotate 3s linear infinite;
        }

        .component:hover {
            transform: scale(1.1);
            color: #1a365d;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .answer-display {
            text-align: center;
            font-size: 6rem;
            font-weight: bold;
            color: #38a169;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .controls {
            text-align: center;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
        }

        .next-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }

        .question-counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a5568;
            margin: 0 20px 20px 20px;
            padding: 15px;
            background: #e2e8f0;
            border-radius: 10px;
            display: inline-block;
        }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
            border: 2px solid #38a169;
        }

        .feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
            border: 2px solid #e53e3e;
        }

        .feedback.hint {
            background: #fef5e7;
            color: #744210;
            border: 2px solid #ed8936;
        }

        /* Menu Screen Styles */
        .menu-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .menu-title {
            font-size: 2.8rem;
            color: #4a5568;

        .menu-subtitle {

            margin-bottom: 40px;
        }

        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .lesson-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

        let currentLesson = null;

        function initMenu() {
            const lessonGrid = document.getElementById('lessonGrid');
            lessonGrid.innerHTML = '';
            
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                btn.textContent = `第 ${i} 課`;
                btn.onclick = () => startLesson(i);
                lessonGrid.appendChild(btn);
            }
        }

        function startLesson(lessonNum) {
            currentLesson = lessonNum;
            const lessonData = lessonsData[lessonNum];
            
            // 使用已定義的問題
            questions = lessonData.questions.map(q => ({
                answer: q.answer,
                components: q.components,
                positions: [
                    generatePositions(q.components.length),
                    generatePositions(q.components.length, 0.6),
                    'complete'
                ]
            }));

            questions = shuffleArray(questions);
            
            document.getElementById('gameTitle').textContent = lessonData.title;
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            
            currentQuestion = 0;
            currentStage = 0;
            gameCompleted = false;
            initGame();
        }

        function generatePositions(componentCount, spread = 1) {
            const baseX = 150;
            const baseY = 80;
            const spacing = 150 * spread;
            
            return Array.from({ length: componentCount }, (_, i) => ({
                x: baseX + (i % 3) * spacing,
                y: baseY + Math.floor(i / 3) * spacing
            }));
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initGame() {
            currentStage = 0;
            gameCompleted = false;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('hintBtn').disabled = false;
            updateStageInfo();
            updateQuestionCounter();
            displayComponents();
        }

        function updateStageInfo() {
            const stageTexts = [
                '第一階段：觀察散落的部件，猜猜看是什麼字？',
                '第二階段：部件稍微靠近了一些，再猜猜看！',
                '第三階段：完整答案揭曉！'
            ];
            document.getElementById('stageInfo').textContent = stageTexts[currentStage];
        }

        function updateQuestionCounter() {
            document.getElementById('questionCounter').textContent = `第 ${currentQuestion + 1} 題 / 共 ${questions.length} 題`;
        }

        function displayComponents() {
            const gameArea = document.getElementById('gameArea');
            const question = questions[currentQuestion];
            
            gameArea.innerHTML = '';

            if (currentStage === 2) {
                gameArea.innerHTML = `<div class="answer-display">${question.answer}</div>`;
                return;
            }

            const positions = question.positions[currentStage];
            const componentsToShow = question.components;
            
            componentsToShow.forEach((component, index) => {
                const componentDiv = document.createElement('div');
                componentDiv.className = currentStage === 0 ? 'component rotating' : 'component';
                componentDiv.textContent = component;
                componentDiv.style.left = positions[index].x + 'px';
                componentDiv.style.top = positions[index].y + 'px';
                gameArea.appendChild(componentDiv);
            });
        }

        function nextHint() {
            if (gameCompleted) return;
            
            if (currentStage < 2) {
                currentStage++;
                updateStageInfo();
                displayComponents();
                
                if (currentStage === 2) {
                    showFeedback(`答案是：${questions[currentQuestion].answer}`, 'correct');
                    gameCompleted = true;
                    document.getElementById('hintBtn').disabled = true;
                }
            }
        }

        function nextQuestion() {
            currentQuestion = (currentQuestion + 1) % questions.length;
            initGame();
        }

        function prevQuestion() {
            currentQuestion = (currentQuestion - 1 + questions.length) % questions.length;
            initGame();
        }

        function backToMenu() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            currentLesson = null;
        }
