<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪食蛇數學遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050818; font-family: 'Noto Sans TC', sans-serif; user-select: none; -webkit-user-select: none; }
  canvas { display: block; cursor: crosshair; touch-action: none; -webkit-tap-highlight-color: transparent; }

  /* ---------- 開始畫面 ---------- */
  #menu {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255, 60, 180, 0.18), transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(60, 200, 255, 0.18), transparent 50%),
      linear-gradient(180deg, #050818 0%, #0a0a2a 100%);
    overflow: hidden;
  }
  #menu::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(80, 150, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(80, 150, 255, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .menu-card {
    position: relative; z-index: 2;
    background: rgba(10, 10, 30, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(120, 200, 255, 0.3);
    border-radius: 24px;
    padding: 50px 60px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 60px rgba(80, 200, 255, 0.15);
    text-align: center;
    max-width: 560px;
    width: calc(100% - 40px);
  }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(36px, 6vw, 56px);
    background: linear-gradient(135deg, #4cf 0%, #fc4 50%, #f4c 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(100, 200, 255, 0.5));
  }
  .subtitle {
    font-family: 'Orbitron', sans-serif;
    color: #88aacc; letter-spacing: 6px; font-size: 13px; margin-bottom: 35px;
  }
  #nameInput {
    width: 100%;
    font-size: 18px; font-family: 'Noto Sans TC', sans-serif;
    padding: 14px 22px; margin-bottom: 24px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(120, 200, 255, 0.4);
    border-radius: 999px;
    color: #fff; outline: none; text-align: center;
    transition: all 0.2s;
  }
  #nameInput:focus { border-color: #4cf; box-shadow: 0 0 20px rgba(80, 200, 255, 0.4); background: rgba(255, 255, 255, 0.08); }
  .start-btn {
    display: inline-block; cursor: pointer;
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 3px;
    padding: 16px 60px;
    color: #050818;
    background: linear-gradient(135deg, #4cf 0%, #f4c 100%);
    border: none; border-radius: 999px;
    box-shadow: 0 10px 30px rgba(80, 200, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(244, 80, 200, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.5); }
  .start-btn:active { transform: translateY(0); }
  .controls {
    margin-top: 34px; padding-top: 24px;
    border-top: 1px solid rgba(120, 200, 255, 0.15);
    color: #aac; font-size: 14px; line-height: 1.9;
  }
  .controls .key {
    display: inline-block; padding: 2px 10px; margin: 0 3px;
    background: rgba(120, 200, 255, 0.12); border: 1px solid rgba(120, 200, 255, 0.3);
    border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 12px; color: #cef;
  }

  /* ---------- 死亡畫面 ---------- */
  #gameover {
    display: none;
    position: fixed; inset: 0; z-index: 20;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(180, 30, 60, 0.4), rgba(5, 5, 20, 0.95));
    backdrop-filter: blur(8px);
    animation: fadeIn 0.4s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .gameover-card {
    background: rgba(15, 10, 30, 0.85);
    border: 1px solid rgba(255, 100, 150, 0.4);
    border-radius: 24px;
    padding: 50px 70px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 60px rgba(255, 80, 130, 0.25);
  }
  .gameover-card h2 {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: 48px; letter-spacing: 6px;
    background: linear-gradient(135deg, #f4c, #fc4);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .gameover-card .label { color: #aac; letter-spacing: 4px; font-size: 13px; margin-bottom: 30px; font-family: 'Orbitron', sans-serif; }
  .stats { display: flex; gap: 30px; justify-content: center; margin: 20px 0 30px; }
  .stat {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px; padding: 16px 28px; min-width: 110px;
  }
  .stat .num { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; color: #4cf; }
  .stat .lbl { font-size: 12px; color: #88a; letter-spacing: 2px; margin-top: 4px; }

  /* ---------- 遊戲中 HUD ---------- */
  #hud { display: none; }
  .hint-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.5); backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 200, 255, 0.2);
    border-radius: 999px;
    padding: 10px 24px;
    color: #aac; font-size: 13px;
    z-index: 5; pointer-events: none;
  }
  .hint-bar .key { display: inline-block; padding: 1px 8px; margin: 0 2px; background: rgba(120, 200, 255, 0.15); border-radius: 4px; font-family: 'Orbitron', sans-serif; color: #cef; }
  .hint-bar.touch-mode { display: none; }

  /* ---------- 題型選擇 ---------- */
  .qtype-label {
    color: #88aacc; letter-spacing: 4px; font-size: 12px; font-family: 'Orbitron', sans-serif;
    margin: 18px 0 10px; text-align: left;
  }
  .qtype-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 24px;
  }
  .qtype-card {
    position: relative;
    background: rgba(255, 255, 255, 0.03);
    border: 1.5px solid rgba(120, 200, 255, 0.18);
    border-radius: 14px; padding: 14px 8px;
    cursor: pointer; text-align: center;
    transition: all 0.18s; user-select: none;
  }
  .qtype-card::after {
    content: ''; position: absolute;
    top: 7px; right: 7px;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(120, 200, 255, 0.45);
    background: rgba(0, 0, 0, 0.2);
    transition: all 0.18s;
    line-height: 13px; font-size: 11px; font-weight: 900;
    color: transparent; text-align: center;
  }
  .qtype-card.selected::after {
    content: '✓';
    background: #4cf; border-color: #4cf;
    color: #050818;
    box-shadow: 0 0 8px rgba(80, 200, 255, 0.6);
  }
  .qtype-card:hover { background: rgba(120, 200, 255, 0.10); border-color: rgba(120, 200, 255, 0.45); transform: translateY(-2px); }
  .qtype-card.selected {
    background: linear-gradient(180deg, rgba(80, 200, 255, 0.22), rgba(80, 200, 255, 0.10));
    border-color: #4cf;
    box-shadow: 0 0 20px rgba(80, 200, 255, 0.35), inset 0 0 12px rgba(80, 200, 255, 0.15);
  }
  .qtype-card .op {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: 26px; color: #4cf; line-height: 1;
  }
  .qtype-card.selected .op { color: #fff; text-shadow: 0 0 10px #4cf; }
  .qtype-card .name { font-size: 13px; color: #cef; margin-top: 6px; font-weight: 700; }
  .qtype-card .ex { font-size: 11px; color: #88a; margin-top: 2px; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }

  /* ---------- 數學題彈窗 ---------- */
  #mathModal {
    display: none;
    position: fixed; inset: 0; z-index: 30;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(20, 30, 80, 0.55), rgba(5, 8, 24, 0.85));
    backdrop-filter: blur(8px);
    animation: fadeIn 0.25s ease-out;
  }
  .math-card {
    background: linear-gradient(180deg, #15183a 0%, #0a0d24 100%);
    border: 2px solid #4cf;
    border-radius: 28px;
    padding: 36px 50px 32px;
    text-align: center;
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.65), 0 0 80px rgba(80, 200, 255, 0.35);
    max-width: 92vw;
  }
  .math-title {
    font-family: 'Orbitron', sans-serif;
    color: #ffd84a; letter-spacing: 6px; font-size: 14px; font-weight: 700;
    margin-bottom: 18px;
  }
  .math-question {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(48px, 7vw, 72px); font-weight: 900;
    color: #fff; letter-spacing: 5px; margin-bottom: 28px;
    text-shadow: 0 0 30px rgba(80, 200, 255, 0.6), 0 0 60px rgba(80, 200, 255, 0.3);
  }
  .math-card input {
    width: 220px;
    font-size: 36px; font-family: 'Orbitron', sans-serif; font-weight: 900;
    text-align: center; padding: 14px 20px; margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 2px solid rgba(120, 200, 255, 0.4);
    border-radius: 14px;
    color: #fff; outline: none;
    -moz-appearance: textfield;
  }
  .math-card input::-webkit-outer-spin-button,
  .math-card input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .math-card input:focus { border-color: #4cf; box-shadow: 0 0 22px rgba(80, 200, 255, 0.45); }
  .math-submit {
    display: block; margin: 0 auto;
    padding: 12px 56px; font-size: 20px;
    font-family: 'Orbitron', sans-serif; letter-spacing: 6px; font-weight: 700;
    color: #050818;
    background: linear-gradient(135deg, #4cf 0%, #f4c 100%);
    border: none; border-radius: 999px; cursor: pointer;
    box-shadow: 0 10px 28px rgba(80, 200, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
    transition: transform 0.15s;
  }
  .math-submit:hover { transform: translateY(-2px); }
  .math-submit:active { transform: translateY(0); }
  .math-feedback {
    margin-top: 16px; min-height: 26px;
    font-weight: 700; font-size: 18px; letter-spacing: 3px;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .math-feedback.correct { color: #6f9; text-shadow: 0 0 15px rgba(80, 255, 140, 0.5); }
  .math-feedback.wrong   { color: #f88; text-shadow: 0 0 12px rgba(255, 120, 120, 0.5); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-14px); }
    40%, 80% { transform: translateX(14px); }
  }
  .math-card.shake { animation: shake 0.45s ease; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- 開始選單 -->
<div id="menu">
  <div class="menu-card">
    <h1>貪食蛇數學</h1>
    <div class="subtitle">M A T H · S N A K E · G A M E</div>
    <input id="nameInput" placeholder="輸入你的名字" maxlength="12" value="">

    <div class="qtype-label">⚙ 選擇題型 <span style="color:#cef; letter-spacing:0; font-family:'Noto Sans TC',sans-serif; font-weight:700;">（可複選）</span></div>
    <div class="qtype-grid">
      <div class="qtype-card selected" data-type="add1">
        <div class="op">＋</div><div class="name">一位數加法</div><div class="ex">5 + 3</div>
      </div>
      <div class="qtype-card" data-type="add2">
        <div class="op">＋</div><div class="name">二位數加法</div><div class="ex">25 + 7</div>
      </div>
      <div class="qtype-card" data-type="sub1">
        <div class="op">−</div><div class="name">一位數減法</div><div class="ex">9 − 4</div>
      </div>
      <div class="qtype-card" data-type="sub2">
        <div class="op">−</div><div class="name">二位數減法</div><div class="ex">38 − 5</div>
      </div>
      <div class="qtype-card" data-type="mul">
        <div class="op">×</div><div class="name">九九乘法</div><div class="ex">7 × 8</div>
      </div>
      <div class="qtype-card" data-type="div">
        <div class="op">÷</div><div class="name">二位數除法</div><div class="ex">56 ÷ 7</div>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">開 始 遊 戲</button>
    <div class="controls">
      🖱️ <strong style="color:#cef">電腦：</strong>移動<span class="key">滑鼠</span>控制方向，按住<span class="key">左鍵</span>或<span class="key">空白</span>衝刺<br>
      📱 <strong style="color:#cef">平板：</strong>左下角<span class="key">搖桿</span>控制方向，右下角<span class="key">⚡按鈕</span>衝刺<br>
      🧮 <strong style="color:#ffd84a">每吃 10 個食物會出題目</strong>，答對 +25 長度 +4 秒護盾
    </div>
  </div>
</div>

<!-- HUD（衝刺等提示） -->
<div id="hud">
  <div class="hint-bar">⚡ 按住 <span class="key">左鍵</span> / <span class="key">空白</span> 衝刺</div>
</div>

<!-- 死亡畫面 -->
<div id="gameover">
  <div class="gameover-card">
    <h2>YOU DIED</h2>
    <div class="label">G A M E   O V E R</div>
    <div class="stats">
      <div class="stat"><div class="num" id="finalLength">0</div><div class="lbl">長度</div></div>
      <div class="stat"><div class="num" id="finalRank">-</div><div class="lbl">名次</div></div>
      <div class="stat"><div class="num" id="finalKills">0</div><div class="lbl">擊殺</div></div>
    </div>
    <button class="start-btn" onclick="restart()">再 玩 一 次</button>
  </div>
</div>

<!-- 數學題彈窗 -->
<div id="mathModal">
  <div class="math-card" id="mathCard">
    <div class="math-title">🧮 數 學 題 時 間</div>
    <div class="math-question" id="mathQuestion">5 + 3 = ?</div>
    <input id="mathInput" type="number" inputmode="numeric" placeholder="？">
    <button class="math-submit" onclick="submitAnswer()">確 定</button>
    <div class="math-feedback" id="mathFeedback"></div>
  </div>
</div>

<script>
'use strict';

// ============== 畫布設定 ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============== 世界常數 ==============
const WORLD_SIZE = 4500;
const FOOD_COUNT = 500;
const BOT_COUNT  = 5;
const MIN_LENGTH = 60;
const BASE_SPEED = 2.6;
const BOOST_SPEED = 5.0;

// ============== 輸入 ==============
const mouse = { x: 0, y: 0, down: false };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

let spaceDown = false;
window.addEventListener('keydown', e => { if (e.code === 'Space') { spaceDown = true; e.preventDefault(); } });
window.addEventListener('keyup',   e => { if (e.code === 'Space') spaceDown = false; });

// ============== 觸控（平板）控制 ==============
let touchMode = false;
const JOY_BASE_R  = 75;   // 搖桿底座半徑
const JOY_STICK_R = 38;   // 搖桿頭半徑
const BOOST_BTN_R = 60;   // 衝刺按鈕半徑
const TOUCH_PAD   = 32;   // 距離邊緣

const touchState = {
  joyId: null,    // 搖桿目前由哪根手指控制
  joyDX: 0,       // 搖桿偏移（normalized -1~1）
  joyDY: 0,
  boostId: null,  // 衝刺按鈕由哪根手指按住
};

function joyCenter() { return { cx: TOUCH_PAD + JOY_BASE_R, cy: H - TOUCH_PAD - JOY_BASE_R }; }
function boostCenter() { return { cx: W - TOUCH_PAD - BOOST_BTN_R, cy: H - TOUCH_PAD - BOOST_BTN_R }; }

function inJoyZone(x, y) {
  const c = joyCenter();
  // 觸控區比視覺再寬一點，較好按
  return dist2(x, y, c.cx, c.cy) < (JOY_BASE_R * 1.6) ** 2;
}
function inBoostZone(x, y) {
  const c = boostCenter();
  return dist2(x, y, c.cx, c.cy) < (BOOST_BTN_R * 1.4) ** 2;
}

function setJoyFromPoint(x, y) {
  const c = joyCenter();
  let dx = x - c.cx, dy = y - c.cy;
  const d = Math.hypot(dx, dy);
  if (d > JOY_BASE_R) { dx = dx / d * JOY_BASE_R; dy = dy / d * JOY_BASE_R; }
  touchState.joyDX = dx / JOY_BASE_R;
  touchState.joyDY = dy / JOY_BASE_R;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchMode = true;
  document.querySelector('.hint-bar')?.classList.add('touch-mode');
  for (const t of e.changedTouches) {
    const x = t.clientX, y = t.clientY;
    if (touchState.joyId === null && inJoyZone(x, y)) {
      touchState.joyId = t.identifier;
      setJoyFromPoint(x, y);
    } else if (touchState.boostId === null && inBoostZone(x, y)) {
      touchState.boostId = t.identifier;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchState.joyId) setJoyFromPoint(t.clientX, t.clientY);
  }
}, { passive: false });

function endTouch(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchState.joyId) {
      touchState.joyId = null;
      touchState.joyDX = 0; touchState.joyDY = 0;
    } else if (t.identifier === touchState.boostId) {
      touchState.boostId = null;
    }
  }
}
canvas.addEventListener('touchend', endTouch, { passive: false });
canvas.addEventListener('touchcancel', endTouch, { passive: false });

// ============== 數學題系統 ==============
const selectedTypes = new Set(['add1']);
let foodsEatenSinceQuiz = 0;
let paused = false;
let currentQuestion = null;

// 題型選擇 — 點擊卡片切換（複選；至少要保留 1 種）
document.querySelectorAll('.qtype-card').forEach(card => {
  card.addEventListener('click', () => {
    const type = card.dataset.type;
    if (selectedTypes.has(type)) {
      if (selectedTypes.size > 1) {
        selectedTypes.delete(type);
        card.classList.remove('selected');
      } else {
        // 至少一種：閃一下提示
        card.animate(
          [{ transform: 'scale(1)' }, { transform: 'scale(0.95)' }, { transform: 'scale(1)' }],
          { duration: 220 }
        );
      }
    } else {
      selectedTypes.add(type);
      card.classList.add('selected');
    }
  });
});

function pickRandomType() {
  const arr = Array.from(selectedTypes);
  return arr[Math.floor(Math.random() * arr.length)];
}

function genQuestion(type) {
  const r = (lo, hi) => lo + Math.floor(Math.random() * (hi - lo + 1));
  let a, b, op, ans;
  switch (type) {
    case 'add1': a = r(1, 9);  b = r(1, 9);  op = '+'; ans = a + b; break;
    case 'add2': a = r(10, 99); b = r(1, 9); op = '+'; ans = a + b; break;
    case 'sub1': a = r(2, 9);  b = r(1, a); op = '−'; ans = a - b; break;
    case 'sub2': a = r(11, 99); b = r(1, 9); op = '−'; ans = a - b; break;
    case 'mul':  a = r(1, 9);  b = r(1, 9); op = '×'; ans = a * b; break;
    case 'div': {
      // 二位數整除一位數
      b = r(2, 9);
      const minQ = Math.ceil(10 / b);
      const maxQ = Math.floor(99 / b);
      const q = r(minQ, maxQ);
      a = b * q; op = '÷'; ans = q;
      break;
    }
  }
  return { a, b, op, answer: ans, text: `${a} ${op} ${b}` };
}

function showQuestion() {
  paused = true;
  currentQuestion = genQuestion(pickRandomType());
  document.getElementById('mathQuestion').textContent = currentQuestion.text + ' = ?';
  const inp = document.getElementById('mathInput');
  inp.value = '';
  const fb = document.getElementById('mathFeedback');
  fb.textContent = '';
  fb.className = 'math-feedback';
  document.getElementById('mathModal').style.display = 'flex';
  // 桌機自動聚焦；平板使用者可以自己點輸入框（避免不請自來的鍵盤遮畫面）
  if (!touchMode) {
    setTimeout(() => inp.focus(), 80);
  }
}

function submitAnswer() {
  if (!currentQuestion) return;
  const inp = document.getElementById('mathInput');
  const fb  = document.getElementById('mathFeedback');
  const card = document.getElementById('mathCard');
  const v = parseInt(inp.value, 10);

  if (isNaN(v)) {
    fb.textContent = '✏ 請輸入數字';
    fb.className = 'math-feedback wrong';
    return;
  }

  if (v === currentQuestion.answer) {
    fb.textContent = '✓ 答對了！+25 長度 + 護盾';
    fb.className = 'math-feedback correct';
    if (player && player.alive) {
      player.length += 25;
      player.shieldUntil = performance.now() + 4000;
    }
    currentQuestion = null;
    setTimeout(() => {
      document.getElementById('mathModal').style.display = 'none';
      paused = false;
    }, 1100);
  } else {
    fb.textContent = '✗ 再試試看！';
    fb.className = 'math-feedback wrong';
    inp.value = '';
    if (!touchMode) inp.focus();
    // 抖動動畫
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }
}

// ============== AI 機器人名字池 ==============
const BOT_NAMES = [
  '小白','大蟒','閃電','幻影','綠龍','黑貓','獵人','風暴','刺客',
  '王者','傳說','武士','忍者','流浪客','獨角獸','彩虹','黃金','藍寶石',
  'Cobra','Viper','Shadow','Blaze','Frost','Phantom','Neo','Zero','Ace'
];

// ============== 工具 ==============
function rand(min, max) { return min + Math.random() * (max - min); }
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx*dx + dy*dy; }

// ============== 食物類別 ==============
class Food {
  constructor(x, y, size, hue, value) {
    this.x = x;
    this.y = y;
    this.size = size !== undefined ? size : rand(3.5, 5.5);
    this.hue = hue !== undefined ? hue : Math.random() * 360;
    this.value = value || 1;
    this.pulse = Math.random() * Math.PI * 2;
  }
  render(time) {
    const sx = this.x - cam.x + W/2;
    const sy = this.y - cam.y + H/2;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) return;
    const ps = this.size + Math.sin(time * 0.005 + this.pulse) * 0.6;
    // 光暈
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, ps * 4);
    grad.addColorStop(0,    `hsla(${this.hue}, 100%, 65%, 0.85)`);
    grad.addColorStop(0.4,  `hsla(${this.hue}, 100%, 60%, 0.25)`);
    grad.addColorStop(1,    `hsla(${this.hue}, 100%, 60%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sx, sy, ps * 4, 0, Math.PI*2); ctx.fill();
    // 核心
    ctx.fillStyle = `hsl(${this.hue}, 100%, 75%)`;
    ctx.beginPath(); ctx.arc(sx, sy, ps, 0, Math.PI*2); ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(sx - ps * 0.3, sy - ps * 0.3, ps * 0.35, 0, Math.PI*2); ctx.fill();
  }
}

// ============== 蛇類別 ==============
class Snake {
  constructor(opts) {
    this.x = opts.x;
    this.y = opts.y;
    this.angle = opts.angle !== undefined ? opts.angle : Math.random() * Math.PI * 2;
    this.targetAngle = this.angle;
    this.isPlayer = !!opts.isPlayer;
    this.name = opts.name || 'Bot';
    this.hue = opts.hue !== undefined ? opts.hue : Math.random() * 360;
    this.alive = true;
    this.length = opts.length || MIN_LENGTH;
    this.boosting = false;
    this.boostCounter = 0;
    this.kills = 0;

    // 將段位初始化排在身後
    this.segments = [];
    for (let i = 0; i < this.length; i++) {
      this.segments.push({
        x: this.x - Math.cos(this.angle) * i * 4,
        y: this.y - Math.sin(this.angle) * i * 4
      });
    }

    // AI 狀態
    this.aiTurn = 0;
    this.aiBoostUntil = 0;
  }

  get radius() { return 6 + Math.min(16, this.length / 60); }
  get segSpacing() { return 3.2; }

  update() {
    if (!this.alive) return;

    // 1. 決定 targetAngle
    if (this.isPlayer) {
      if (touchMode) {
        // 搖桿啟用時才更新方向；放開時蛇繼續直行
        const dx = touchState.joyDX, dy = touchState.joyDY;
        if (dx * dx + dy * dy > 0.04) {  // 小死區
          this.targetAngle = Math.atan2(dy, dx);
        }
        this.boosting = (touchState.boostId !== null) && this.length > MIN_LENGTH;
      } else {
        this.targetAngle = Math.atan2(mouse.y - H/2, mouse.x - W/2);
        this.boosting = (mouse.down || spaceDown) && this.length > MIN_LENGTH;
      }
    } else {
      this.aiUpdate();
    }

    // 2. 平滑轉向
    let diff = this.targetAngle - this.angle;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    const turnRate = 0.085;
    this.angle += Math.max(-turnRate, Math.min(turnRate, diff));

    // 3. 衝刺消耗長度，掉落食物
    const useBoost = this.boosting && this.length > MIN_LENGTH;
    const speed = useBoost ? BOOST_SPEED : BASE_SPEED;
    if (useBoost) {
      this.boostCounter++;
      if (this.boostCounter >= 7) {
        this.boostCounter = 0;
        this.length = Math.max(MIN_LENGTH, this.length - 1);
        const tail = this.segments[this.segments.length - 1];
        if (tail) {
          foods.push(new Food(
            tail.x + rand(-8, 8),
            tail.y + rand(-8, 8),
            rand(4, 5.5), this.hue, 1
          ));
        }
      }
    }

    // 4. 蛇頭移動
    const head = this.segments[0];
    const nx = head.x + Math.cos(this.angle) * speed;
    const ny = head.y + Math.sin(this.angle) * speed;

    // 5. 撞牆 = 死
    if (nx < 0 || nx > WORLD_SIZE || ny < 0 || ny > WORLD_SIZE) {
      this.die(null);
      return;
    }

    // 6. 加新頭、修剪到 length
    this.segments.unshift({ x: nx, y: ny });
    while (this.segments.length > Math.floor(this.length)) {
      this.segments.pop();
    }

    // 7. 檢查吃食物
    const r = this.radius;
    for (let i = foods.length - 1; i >= 0; i--) {
      const f = foods[i];
      if (dist2(nx, ny, f.x, f.y) < (r + f.size + 4) ** 2) {
        this.length += f.value;
        foods.splice(i, 1);
        if (this.isPlayer) foodsEatenSinceQuiz++;
      }
    }
  }

  aiUpdate() {
    const head = this.segments[0];

    // 6.1 牆邊緊急轉向
    const margin = 250;
    if (head.x < margin || head.x > WORLD_SIZE - margin || head.y < margin || head.y > WORLD_SIZE - margin) {
      this.targetAngle = Math.atan2(WORLD_SIZE/2 - head.y, WORLD_SIZE/2 - head.x);
      this.boosting = false;
      return;
    }

    // 6.2 偵測前方危險（其他蛇身）
    const lookAhead = 90 + this.radius * 2;
    const fx = head.x + Math.cos(this.angle) * lookAhead;
    const fy = head.y + Math.sin(this.angle) * lookAhead;
    let danger = null, dangerD2 = (lookAhead) ** 2;
    for (const other of snakes) {
      if (other === this || !other.alive) continue;
      // 抽樣身體段
      for (let i = 0; i < other.segments.length; i += 4) {
        const seg = other.segments[i];
        const d2 = dist2(fx, fy, seg.x, seg.y);
        if (d2 < dangerD2) { dangerD2 = d2; danger = seg; }
      }
    }
    if (danger) {
      // 朝危險點的反方向轉
      this.targetAngle = Math.atan2(head.y - danger.y, head.x - danger.x) + (Math.random() - 0.5) * 0.5;
      this.boosting = false;
      return;
    }

    // 6.3 找最近食物
    let bestFood = null, bestD2 = 350 * 350;
    for (const f of foods) {
      const d2 = dist2(head.x, head.y, f.x, f.y);
      if (d2 < bestD2) { bestD2 = d2; bestFood = f; }
    }

    // 6.4 偶爾改變漫遊方向
    this.aiTurn--;
    if (bestFood) {
      this.targetAngle = Math.atan2(bestFood.y - head.y, bestFood.x - head.x);
    } else if (this.aiTurn <= 0) {
      this.targetAngle = Math.random() * Math.PI * 2;
      this.aiTurn = 80 + Math.random() * 160;
    }

    // 6.5 衝刺：偶爾隨機衝（且只有當夠長時）
    if (this.length > 70 && Math.random() < 0.003) {
      this.aiBoostUntil = performance.now() + 500 + Math.random() * 1500;
    }
    this.boosting = performance.now() < this.aiBoostUntil && this.length > MIN_LENGTH;
  }

  // 蛇頭與其他蛇身的碰撞檢測
  checkHeadCollision() {
    if (!this.alive) return;
    // 護盾期間免疫
    if (this.shieldUntil && performance.now() < this.shieldUntil) return;
    const head = this.segments[0];
    const r = this.radius;
    for (const other of snakes) {
      if (other === this || !other.alive) continue;
      const otherR = other.radius;
      const sumR2 = (r * 0.7 + otherR) ** 2;
      // 檢查蛇頭 vs 蛇身（從 segment 1 開始）
      for (let i = 1; i < other.segments.length; i++) {
        const seg = other.segments[i];
        if (dist2(head.x, head.y, seg.x, seg.y) < sumR2) {
          this.die(other);
          return;
        }
      }
    }
  }

  die(killer) {
    if (!this.alive) return;
    this.alive = false;
    if (killer) killer.kills++;

    // 把身體變成食物（沿著身體灑出，價值與長度相關）
    const totalFood = Math.min(80, Math.floor(this.length * 0.6));
    for (let i = 0; i < totalFood; i++) {
      const idx = Math.floor((i / totalFood) * this.segments.length);
      const seg = this.segments[idx];
      foods.push(new Food(
        seg.x + rand(-18, 18),
        seg.y + rand(-18, 18),
        rand(5, 7.5), this.hue,
        Math.random() < 0.15 ? 3 : 2
      ));
    }
    // 死亡爆炸粒子
    for (let i = 0; i < 40; i++) {
      particles.push(new Particle(
        this.segments[0].x, this.segments[0].y,
        rand(-4, 4), rand(-4, 4),
        this.hue, rand(40, 70)
      ));
    }
  }

  render(time) {
    if (!this.alive) return;
    const r = this.radius;
    const isShielded = this.shieldUntil && time < this.shieldUntil;

    // ── 護盾光暈（畫在身體下方，先畫底層）──
    if (isShielded) {
      const remain = (this.shieldUntil - time) / 4000;  // 0~1
      const pulse = 0.7 + Math.sin(time * 0.012) * 0.3;
      for (let i = 0; i < this.segments.length; i += 4) {
        const seg = this.segments[i];
        const sx = seg.x - cam.x + W/2;
        const sy = seg.y - cam.y + H/2;
        if (sx < -40 || sx > W + 40 || sy < -40 || sy > H + 40) continue;
        const sg = ctx.createRadialGradient(sx, sy, r, sx, sy, r * 2.5);
        sg.addColorStop(0, `rgba(255, 220, 80, ${0.55 * pulse * remain})`);
        sg.addColorStop(1, 'rgba(255, 220, 80, 0)');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(sx, sy, r * 2.5, 0, Math.PI*2); ctx.fill();
      }
    }

    // 畫尾到頭，每段在屏幕上的位置
    // 為了效率，過濾畫面外的段
    for (let i = this.segments.length - 1; i >= 0; i--) {
      const seg = this.segments[i];
      const sx = seg.x - cam.x + W/2;
      const sy = seg.y - cam.y + H/2;
      if (sx < -r * 2 || sx > W + r * 2 || sy < -r * 2 || sy > H + r * 2) continue;

      // 條紋
      const stripe = Math.floor(i / 5) % 2;
      const lightness = stripe ? 58 : 42;
      const sat = this.boosting ? 100 : 85;

      // 衝刺光暈
      if (this.boosting && i % 3 === 0) {
        const glowGrad = ctx.createRadialGradient(sx, sy, r, sx, sy, r * 2.5);
        glowGrad.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 0.4)`);
        glowGrad.addColorStop(1, `hsla(${this.hue}, 100%, 70%, 0)`);
        ctx.fillStyle = glowGrad;
        ctx.beginPath(); ctx.arc(sx, sy, r * 2.5, 0, Math.PI*2); ctx.fill();
      }

      // 主體
      ctx.fillStyle = `hsl(${this.hue}, ${sat}%, ${lightness}%)`;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();

      // 內部高光（讓蛇身有立體感）
      ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, 0.35)`;
      ctx.beginPath(); ctx.arc(sx - r*0.3, sy - r*0.3, r * 0.45, 0, Math.PI*2); ctx.fill();
    }

    // 蛇頭眼睛
    const head = this.segments[0];
    const hx = head.x - cam.x + W/2;
    const hy = head.y - cam.y + H/2;
    const eyeOff = r * 0.55;
    const eyeR = r * 0.42;
    const e1x = hx + Math.cos(this.angle - 0.65) * eyeOff;
    const e1y = hy + Math.sin(this.angle - 0.65) * eyeOff;
    const e2x = hx + Math.cos(this.angle + 0.65) * eyeOff;
    const e2y = hy + Math.sin(this.angle + 0.65) * eyeOff;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI*2); ctx.arc(e2x, e2y, eyeR, 0, Math.PI*2); ctx.fill();
    // 瞳孔朝目標方向
    const pOffX = Math.cos(this.targetAngle) * eyeR * 0.5;
    const pOffY = Math.sin(this.targetAngle) * eyeR * 0.5;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(e1x + pOffX, e1y + pOffY, eyeR * 0.55, 0, Math.PI*2);
    ctx.arc(e2x + pOffX, e2y + pOffY, eyeR * 0.55, 0, Math.PI*2);
    ctx.fill();

    // 名字
    ctx.font = `700 ${Math.max(13, r * 0.95)}px 'Noto Sans TC', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillText(this.name, hx + 1, hy - r - 9);
    ctx.fillStyle = this.isPlayer ? '#ffea66' : '#fff';
    ctx.fillText(this.name, hx, hy - r - 10);
  }
}

// ============== 粒子（死亡特效） ==============
class Particle {
  constructor(x, y, vx, vy, hue, life) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.hue = hue; this.life = life; this.maxLife = life;
    this.size = rand(2, 5);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.94; this.vy *= 0.94;
    this.life--;
  }
  render() {
    const sx = this.x - cam.x + W/2;
    const sy = this.y - cam.y + H/2;
    const a = this.life / this.maxLife;
    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${a})`;
    ctx.beginPath(); ctx.arc(sx, sy, this.size * a, 0, Math.PI*2); ctx.fill();
  }
}

// ============== 全域狀態 ==============
let snakes = [];
let foods = [];
let particles = [];
let cam = { x: WORLD_SIZE/2, y: WORLD_SIZE/2 };
let player = null;
let running = false;
let timeStarted = 0;

// ============== 生成 ==============
function spawnFoods() {
  while (foods.length < FOOD_COUNT) {
    foods.push(new Food(
      rand(20, WORLD_SIZE - 20),
      rand(20, WORLD_SIZE - 20)
    ));
  }
}

function spawnBots() {
  const aliveBots = snakes.filter(s => !s.isPlayer && s.alive).length;
  for (let i = aliveBots; i < BOT_COUNT; i++) {
    let x, y, tries = 0;
    do {
      // 在玩家視野外生成
      if (player && player.alive) {
        const ang = Math.random() * Math.PI * 2;
        const d = rand(900, 1700);
        x = player.segments[0].x + Math.cos(ang) * d;
        y = player.segments[0].y + Math.sin(ang) * d;
      } else {
        x = rand(200, WORLD_SIZE - 200);
        y = rand(200, WORLD_SIZE - 200);
      }
      x = Math.max(150, Math.min(WORLD_SIZE - 150, x));
      y = Math.max(150, Math.min(WORLD_SIZE - 150, y));
      tries++;
    } while (tries < 5 && false);

    const bot = new Snake({
      x, y,
      name: BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)],
      hue: Math.random() * 360,
      length: Math.floor(rand(60, 180))
    });
    snakes.push(bot);
  }
}

// ============== 渲染輔助 ==============
function renderBackground(time) {
  // 漸層底
  ctx.fillStyle = '#050818';
  ctx.fillRect(0, 0, W, H);

  // 細微星光
  // (省略以保持效能 — 用網格代替即可)

  // 網格
  const grid = 80;
  const startX = Math.floor((cam.x - W/2) / grid) * grid;
  const startY = Math.floor((cam.y - H/2) / grid) * grid;
  ctx.strokeStyle = 'rgba(80, 130, 220, 0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = startX; x < cam.x + W/2 + grid; x += grid) {
    const sx = x - cam.x + W/2;
    ctx.moveTo(sx, 0); ctx.lineTo(sx, H);
  }
  for (let y = startY; y < cam.y + H/2 + grid; y += grid) {
    const sy = y - cam.y + H/2;
    ctx.moveTo(0, sy); ctx.lineTo(W, sy);
  }
  ctx.stroke();
}

function renderBorder() {
  // 世界邊界（粉紅光圈）
  const x = -cam.x + W/2;
  const y = -cam.y + H/2;
  ctx.save();
  ctx.shadowColor = '#ff3b88';
  ctx.shadowBlur = 25;
  ctx.strokeStyle = '#ff3b88';
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, WORLD_SIZE, WORLD_SIZE);
  ctx.restore();
}

function renderHUD() {
  // 玩家長度（左上）
  if (player && player.alive) {
    ctx.font = '900 14px Orbitron, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#88aacc';
    ctx.fillText('LENGTH', 24, 38);
    ctx.font = '900 38px Orbitron, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(Math.floor(player.length), 24, 76);

    // 擊殺
    ctx.font = '900 14px Orbitron, sans-serif';
    ctx.fillStyle = '#88aacc';
    ctx.fillText('KILLS', 24, 108);
    ctx.font = '900 28px Orbitron, sans-serif';
    ctx.fillStyle = '#ff7caa';
    ctx.fillText(player.kills, 24, 140);
  }

  // 排行榜（右上）
  const top = [...snakes].filter(s => s.alive).sort((a, b) => b.length - a.length).slice(0, 10);
  const bx = W - 240, by = 24, bw = 220, bh = 40 + top.length * 24;
  ctx.fillStyle = 'rgba(8, 10, 28, 0.65)';
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.25)';
  ctx.lineWidth = 1;
  roundRect(bx, by, bw, bh, 12, true, true);
  ctx.fillStyle = '#4cf';
  ctx.font = '900 13px Orbitron, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🏆 LEADERBOARD', bx + 16, by + 24);
  ctx.font = '600 14px "Noto Sans TC", sans-serif';
  for (let i = 0; i < top.length; i++) {
    const s = top[i];
    const isPlayerRow = s === player;
    const yy = by + 48 + i * 24;
    // 名次
    ctx.fillStyle = i === 0 ? '#ffd84a' : (i === 1 ? '#cce0ff' : (i === 2 ? '#ffa570' : '#88a'));
    ctx.font = '900 12px Orbitron, sans-serif';
    ctx.fillText((i + 1).toString().padStart(2, '0'), bx + 16, yy);
    // 名字
    ctx.fillStyle = isPlayerRow ? '#ffea66' : '#dfe7f3';
    ctx.font = `${isPlayerRow ? '700' : '500'} 13px "Noto Sans TC", sans-serif`;
    ctx.fillText(s.name.length > 10 ? s.name.slice(0,10) + '…' : s.name, bx + 44, yy);
    // 長度
    ctx.fillStyle = isPlayerRow ? '#ffea66' : `hsl(${s.hue}, 70%, 70%)`;
    ctx.font = '900 13px Orbitron, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.floor(s.length), bx + bw - 16, yy);
    ctx.textAlign = 'left';
  }

  // 小地圖（左上，位於 KILLS 下方）
  const mapSize = 140;
  const mx = 24, my = 168;
  ctx.fillStyle = 'rgba(8, 10, 28, 0.7)';
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.3)';
  ctx.lineWidth = 1;
  roundRect(mx, my, mapSize, mapSize, 10, true, true);
  // 邊界（紅）
  ctx.strokeStyle = 'rgba(255, 80, 130, 0.4)';
  ctx.strokeRect(mx + 2, my + 2, mapSize - 4, mapSize - 4);
  // 蛇位置
  for (const s of snakes) {
    if (!s.alive) continue;
    const head = s.segments[0];
    const px = mx + (head.x / WORLD_SIZE) * mapSize;
    const py = my + (head.y / WORLD_SIZE) * mapSize;
    if (s === player) {
      ctx.fillStyle = '#ffea66';
      ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI*2); ctx.fill();
      // 玩家視野框
      const vw = (W / 1) / WORLD_SIZE * mapSize;
      const vh = (H / 1) / WORLD_SIZE * mapSize;
      ctx.strokeStyle = 'rgba(255, 234, 102, 0.4)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px - vw/2, py - vh/2, vw, vh);
    } else {
      ctx.fillStyle = `hsl(${s.hue}, 70%, 60%)`;
      ctx.beginPath(); ctx.arc(px, py, 2.2, 0, Math.PI*2); ctx.fill();
    }
  }
  // 小地圖標題
  ctx.fillStyle = '#88aacc';
  ctx.font = '900 10px Orbitron, sans-serif';
  ctx.fillText('MAP', mx + 8, my + 14);
}

// 圓角矩形
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// 繪製觸控搖桿與衝刺按鈕
function renderTouchControls() {
  if (!touchMode) return;

  // ── 搖桿底座 ──
  const j = joyCenter();
  // 外光暈
  const gOuter = ctx.createRadialGradient(j.cx, j.cy, JOY_BASE_R * 0.6, j.cx, j.cy, JOY_BASE_R * 1.4);
  gOuter.addColorStop(0, 'rgba(80, 180, 255, 0.18)');
  gOuter.addColorStop(1, 'rgba(80, 180, 255, 0)');
  ctx.fillStyle = gOuter;
  ctx.beginPath(); ctx.arc(j.cx, j.cy, JOY_BASE_R * 1.4, 0, Math.PI*2); ctx.fill();
  // 底座
  ctx.fillStyle = 'rgba(8, 14, 32, 0.55)';
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(j.cx, j.cy, JOY_BASE_R, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // 內圈刻度（裝飾）
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(j.cx, j.cy, JOY_BASE_R * 0.55, 0, Math.PI*2); ctx.stroke();

  // ── 搖桿頭 ──
  const sx = j.cx + touchState.joyDX * (JOY_BASE_R - JOY_STICK_R);
  const sy = j.cy + touchState.joyDY * (JOY_BASE_R - JOY_STICK_R);
  const sg = ctx.createRadialGradient(sx - JOY_STICK_R*0.3, sy - JOY_STICK_R*0.3, JOY_STICK_R*0.1, sx, sy, JOY_STICK_R);
  sg.addColorStop(0, 'rgba(180, 240, 255, 0.95)');
  sg.addColorStop(0.6, 'rgba(80, 180, 240, 0.95)');
  sg.addColorStop(1, 'rgba(40, 100, 180, 0.95)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(sx, sy, JOY_STICK_R, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── 衝刺按鈕 ──
  const b = boostCenter();
  const pressed = touchState.boostId !== null;
  // 光暈
  const bgOuter = ctx.createRadialGradient(b.cx, b.cy, BOOST_BTN_R * 0.6, b.cx, b.cy, BOOST_BTN_R * 1.4);
  if (pressed) {
    bgOuter.addColorStop(0, 'rgba(255, 200, 80, 0.4)');
  } else {
    bgOuter.addColorStop(0, 'rgba(255, 80, 130, 0.22)');
  }
  bgOuter.addColorStop(1, 'rgba(255, 80, 130, 0)');
  ctx.fillStyle = bgOuter;
  ctx.beginPath(); ctx.arc(b.cx, b.cy, BOOST_BTN_R * 1.4, 0, Math.PI*2); ctx.fill();
  // 按鈕主體
  const bg = ctx.createRadialGradient(b.cx - BOOST_BTN_R*0.3, b.cy - BOOST_BTN_R*0.3, 4, b.cx, b.cy, BOOST_BTN_R);
  if (pressed) {
    bg.addColorStop(0, 'rgba(255, 245, 150, 0.95)');
    bg.addColorStop(0.6, 'rgba(255, 180, 60, 0.95)');
    bg.addColorStop(1, 'rgba(220, 60, 100, 0.95)');
  } else {
    bg.addColorStop(0, 'rgba(255, 140, 180, 0.85)');
    bg.addColorStop(0.7, 'rgba(220, 60, 110, 0.85)');
    bg.addColorStop(1, 'rgba(140, 30, 70, 0.85)');
  }
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(b.cx, b.cy, BOOST_BTN_R, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 閃電圖示
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${pressed ? 44 : 40}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', b.cx, b.cy + 2);
  ctx.textBaseline = 'alphabetic';
}

// ============== 主迴圈 ==============
function loop() {
  if (!running) return;
  const time = performance.now();

  // 暫停期間（如出現數學題）— 跳過更新但仍渲染目前畫面
  if (!paused) {
    // 更新
    for (const s of snakes) s.update();
    for (const s of snakes) s.checkHeadCollision();

    // 移除死亡 bot（保留玩家供顯示死亡畫面用）
    snakes = snakes.filter(s => s.alive || s.isPlayer);

    // 補充
    spawnFoods();
    spawnBots();

    // 粒子
    for (const p of particles) p.update();
    particles = particles.filter(p => p.life > 0);

    // 攝影機跟隨玩家
    if (player) {
      const head = player.segments[0];
      cam.x += (head.x - cam.x) * 0.12;
      cam.y += (head.y - cam.y) * 0.12;
    }

    // 觸發數學題
    if (player && player.alive && foodsEatenSinceQuiz >= 10) {
      foodsEatenSinceQuiz = 0;
      showQuestion();
    }
  }

  // 渲染
  renderBackground(time);
  renderBorder();
  for (const f of foods) f.render(time);
  // 蛇按長度排序，較長畫在上層
  const sortedSnakes = [...snakes].filter(s => s.alive).sort((a, b) => a.length - b.length);
  for (const s of sortedSnakes) s.render(time);
  for (const p of particles) p.render();
  renderHUD();
  renderTouchControls();

  // 玩家死亡 → 顯示遊戲結束
  if (player && !player.alive) {
    running = false;
    showGameOver();
    return;
  }

  requestAnimationFrame(loop);
}

// ============== 開始 / 重啟 ==============
function startGame() {
  const nameInput = document.getElementById('nameInput');
  const name = (nameInput.value || '').trim() || '玩家';

  document.getElementById('menu').style.display = 'none';
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  snakes = [];
  foods = [];
  particles = [];
  foodsEatenSinceQuiz = 0;
  paused = false;
  document.getElementById('mathModal').style.display = 'none';

  player = new Snake({
    x: WORLD_SIZE / 2,
    y: WORLD_SIZE / 2,
    name: name,
    isPlayer: true,
    hue: 140,
    length: MIN_LENGTH
  });
  snakes.push(player);

  cam.x = player.x;
  cam.y = player.y;

  spawnFoods();
  spawnBots();
  timeStarted = performance.now();

  running = true;
  requestAnimationFrame(loop);
}

function restart() {
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

function showGameOver() {
  // 排行（含已死的玩家）
  const allRanked = [...snakes].sort((a, b) => b.length - a.length);
  let rank = allRanked.indexOf(player) + 1;
  if (rank <= 0) rank = allRanked.length || 1;

  document.getElementById('finalLength').textContent = Math.floor(player.length);
  document.getElementById('finalKills').textContent = player.kills;
  document.getElementById('finalRank').textContent = '#' + rank;
  document.getElementById('gameover').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
}

// 讓使用者按 Enter 直接開始
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});
</script>
