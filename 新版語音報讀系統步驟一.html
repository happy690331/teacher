<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 考卷題型標記系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            overflow: hidden; 
        }

        body[data-mode="page1"] #view-page1 { display: flex; }
        body[data-mode="page1"] #view-pdf-container { display: none; }
        body[data-mode="page1"] #toolbar-page2 { display: none; }

        body[data-mode="page2"] #view-page1 { display: none; }
        body[data-mode="page2"] #view-pdf-container { display: block; }
        body[data-mode="page2"] #toolbar-page2 { display: flex; }

        #view-pdf-container {
            height: calc(100vh - 64px); 
            overflow-y: auto;
            padding: 20px;
            background-color: #e5e7eb;
        }

        .pdf-page {
            position: relative;
            margin: 0 auto 30px auto;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .pdf-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .textLayer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            opacity: 0; 
            line-height: 1.0;
        }
        .textLayer > span {
            color: transparent;
            position: absolute;
            white-space: pre;
            transform-origin: 0% 0%;
        }

        .interaction-layer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            pointer-events: none; 
            z-index: 10;
        }

        .question-box {
            position: absolute;
            pointer-events: auto;
            border-radius: 4px;
            transition: background-color 0.2s;
            box-sizing: border-box;
            border: 1px solid rgba(239, 68, 68, 0.6); 
            background-color: rgba(239, 68, 68, 0.03); 
            cursor: move; 
            resize: both; 
            overflow: hidden;
        }

        .question-box:hover {
            background-color: rgba(239, 68, 68, 0.15);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .box-controls {
            display: none;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 20;
        }
        .question-box:hover .box-controls {
            display: flex;
        }
        .btn-copy, .btn-delete {
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            cursor: pointer;
        }
        .btn-copy { background: #3b82f6; border-bottom-left-radius: 4px; }
        .btn-copy:hover { background: #2563eb; }
        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #dc2626; }

        .question-box.selected {
            border: 3px solid #2563eb; 
            background-color: rgba(37, 99, 235, 0.1);
            z-index: 15;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body data-mode="page1" class="text-gray-800">

    <div id="view-page1" class="min-h-screen w-full flex-col items-center justify-center bg-white p-4 overflow-y-auto">
        <div class="max-w-4xl w-full text-center py-4">
            <div class="mb-5">
                <h1 class="text-2xl md:text-3xl font-bold text-blue-700 mb-2">PDF 考卷題型標記系統</h1>
                <p class="text-gray-500 text-sm md:text-base">請先選擇考卷排版樣式，再進行檔案上傳</p>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm text-left mb-4">
                <h2 class="text-base md:text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <span class="bg-blue-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs">1</span>
                    選擇考卷樣式
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 md:gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="exam-format" value="vertical-double" class="peer hidden">
                        <div class="border-2 border-gray-200 rounded-lg p-2 md:p-3 peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-100 transition text-center h-full flex flex-col justify-center">
                            <div class="font-bold text-gray-700 text-sm md:text-base mb-0.5">直式雙欄</div>
                            <div class="text-[10px] md:text-xs text-gray-500 hidden sm:block">(由左至右)</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="exam-format" value="horizontal-updown-double" class="peer hidden">
                        <div class="border-2 border-gray-200 rounded-lg p-2 md:p-3 peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-100 transition text-center h-full flex flex-col justify-center">
                            <div class="font-bold text-gray-700 text-sm md:text-base mb-0.5">橫式上下雙欄</div>
                            <div class="text-[10px] md:text-xs text-gray-500 hidden sm:block">(由右到左)</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="exam-format" value="horizontal-single" class="peer hidden">
                        <div class="border-2 border-gray-200 rounded-lg p-2 md:p-3 peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-100 transition text-center h-full flex flex-col justify-center">
                            <div class="font-bold text-gray-700 text-sm md:text-base mb-0.5">橫式單欄</div>
                            <div class="text-[10px] md:text-xs text-gray-500 hidden sm:block">(由右到左)</div>
                        </div>
                    </label>
                </div>
            </div>

            <div id="step2-container" class="bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm text-left mb-6 opacity-50 pointer-events-none transition-opacity duration-300">
                <h2 class="text-base md:text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <span class="bg-blue-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs">2</span>
                    選擇載入方式
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 md:gap-4">
                    <div class="bg-white border border-gray-200 rounded-xl p-2 md:p-3 hover:shadow-md transition flex flex-col items-center justify-center min-h-[120px]">
                        <label for="pdf-upload" class="cursor-pointer flex flex-col items-center justify-center gap-1 md:gap-2 w-full h-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <div class="text-center w-full">
                                <span class="block text-xs md:text-sm font-bold text-gray-700 mb-0.5">本機上傳</span>
                                <span id="file-name-display" class="block text-[10px] md:text-[11px] text-gray-500 truncate w-full px-1">選擇 PDF 檔案</span>
                            </div>
                            <input type="file" id="pdf-upload" accept="application/pdf" class="hidden" disabled>
                        </label>
                    </div>

                    <div class="bg-white border border-gray-200 rounded-xl p-2 md:p-3 hover:shadow-md transition flex flex-col items-center justify-center min-h-[120px]">
                        <div class="w-full flex flex-col items-center justify-center gap-1 md:gap-2 h-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8 text-gray-800" fill="currentColor" viewBox="0 0 24 24">
                                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
                            </svg>
                            <div class="text-center w-full flex flex-col items-center">
                                <span class="block text-xs md:text-sm font-bold text-gray-700 mb-1">線上題庫</span>
                                <select id="github-pdf-select" class="w-full max-w-[100%] md:max-w-[200px] p-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-[10px] md:text-xs text-gray-700 cursor-pointer" disabled>
                                    <option value="">載入中...</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white border border-gray-200 rounded-xl p-2 md:p-3 hover:shadow-md transition flex flex-col items-center justify-center min-h-[120px]">
                        <div class="w-full flex flex-col items-center justify-center gap-1 md:gap-2 h-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11v6m-3-3h6" />
                            </svg>
                            <div class="text-center w-full flex flex-col items-center">
                                <span class="block text-xs md:text-sm font-bold text-gray-700 mb-1">雲端題庫</span>
                                
                                <div id="gdrive-auth-block" class="flex flex-col gap-1 w-full items-center">
                                    <input type="password" id="api-key-input" placeholder="請貼上 API 金鑰" class="w-full max-w-[100%] md:max-w-[200px] p-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-[10px] md:text-xs text-gray-700" disabled>
                                    <button id="load-gdrive-btn" class="w-full max-w-[100%] md:max-w-[200px] bg-indigo-50 text-indigo-600 border border-indigo-200 hover:bg-indigo-100 font-bold py-1 px-2 rounded text-[10px] md:text-xs transition" disabled>
                                        驗證並載入
                                    </button>
                                </div>

                                <select id="shared-drive-select" class="w-full max-w-[100%] md:max-w-[200px] p-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-[10px] md:text-xs text-gray-700 cursor-pointer hidden">
                                    <option value="">請選擇雲端考卷</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg text-lg transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                開始標記
            </button>
        </div>
    </div>

    <div id="toolbar-page2" class="min-h-[64px] bg-white shadow-md w-full flex-wrap items-center px-4 py-2 justify-between shrink-0 gap-2 relative z-50">
        <div class="flex items-center gap-4">
            <button id="back-to-p1-btn" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-md font-medium transition whitespace-nowrap">
                🔙 回到第一頁
            </button>
            <span class="font-bold text-lg text-blue-800 hidden lg:block">題型標記模式</span>
            <span class="text-sm text-gray-500 hidden md:block">
                可拖曳、縮放，新增或刪除紅框 <span class="text-red-500 font-bold">【框之間一定要保留間隙】</span>
            </span>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4 flex-wrap justify-end">
            <button id="delete-selected-btn" class="px-3 py-2 bg-red-500 hover:bg-red-600 text-white font-bold rounded-md shadow transition hidden whitespace-nowrap">
                🗑️ 刪除選取
            </button>
            <button id="add-box-btn" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white font-bold rounded-md shadow transition whitespace-nowrap">
                ➕ 新增紅框
            </button>
            <button id="download-btn" class="px-4 py-2 bg-purple-500 hover:bg-purple-600 text-white font-bold rounded-md shadow transition whitespace-nowrap">
                📥 下載 PDF
            </button>
        </div>
    </div>

    <div id="view-pdf-container">
        <div id="loading-indicator" class="hidden flex-col items-center justify-center h-full text-blue-600">
            <svg class="animate-spin h-12 w-12 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-xl font-bold">正在解析考卷與自動標記題型...</p>
        </div>
        <div id="pdf-pages-wrapper" class="flex flex-col items-center"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const CMAP_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/';
        const CMAP_PACKED = true;

        let pdfSource = null; 
        let pdfDocument = null;
        let originalPdfBytes = null; 
        let selectedBox = null; 
        
        // 用來儲存使用者輸入的 API 金鑰，供下載 PDF 時使用
        let userApiKey = ''; 

        const body = document.body;
        const formatRadios = document.querySelectorAll('input[name="exam-format"]');
        const step2Container = document.getElementById('step2-container');
        
        const fileInput = document.getElementById('pdf-upload');
        const fileNameDisplay = document.getElementById('file-name-display');
        const githubPdfSelect = document.getElementById('github-pdf-select');
        
        const apiKeyInput = document.getElementById('api-key-input');
        const loadGdriveBtn = document.getElementById('load-gdrive-btn');
        const gdriveAuthBlock = document.getElementById('gdrive-auth-block');
        const sharedDriveSelect = document.getElementById('shared-drive-select');
        
        const startBtn = document.getElementById('start-btn');
        const pdfPagesWrapper = document.getElementById('pdf-pages-wrapper');
        const loadingIndicator = document.getElementById('loading-indicator');
        const deleteSelectedBtn = document.getElementById('delete-selected-btn');
        const downloadBtn = document.getElementById('download-btn'); 

        // --- 協助清除選項的功能 ---
        function clearOtherSelections(activeType) {
            if (activeType !== 'local') {
                fileInput.value = "";
                fileNameDisplay.textContent = "選擇 PDF 檔案";
                fileNameDisplay.classList.remove('text-blue-600');
            }
            if (activeType !== 'github') {
                githubPdfSelect.value = "";
            }
            if (activeType !== 'shared_gdrive') {
                if(!sharedDriveSelect.classList.contains('hidden')) {
                    sharedDriveSelect.value = "";
                }
            }
        }

        // 載入 GitHub 線上題庫
        async function loadGitHubPdfs() {
            try {
                const response = await fetch('https://api.github.com/repos/happy690331/teacher/contents/exam%20paper');
                if (!response.ok) throw new Error('無法讀取 GitHub 題庫');
                const data = await response.json();
                
                githubPdfSelect.innerHTML = '<option value="">-- 請選擇線上考卷 --</option>';
                data.forEach(item => {
                    if (item.name.endsWith('.pdf')) {
                        const option = document.createElement('option');
                        option.value = item.download_url; 
                        option.textContent = item.name;
                        githubPdfSelect.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('GitHub 題庫載入失敗:', error);
                githubPdfSelect.innerHTML = '<option value="">載入失敗</option>';
            }
        }
        
        loadGitHubPdfs();

        // 監聽第一步的版型選擇
        formatRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                step2Container.classList.remove('opacity-50', 'pointer-events-none');
                fileInput.disabled = false;
                githubPdfSelect.disabled = false;
                apiKeyInput.disabled = false;
                loadGdriveBtn.disabled = false;
            });
        });

        document.getElementById('back-to-p1-btn').addEventListener('click', () => switchMode('page1'));
        document.getElementById('add-box-btn').addEventListener('click', addNewBox);
        downloadBtn.addEventListener('click', downloadMarkedPdf); 
        
        deleteSelectedBtn.addEventListener('click', () => {
            if (selectedBox) {
                selectedBox.remove();
                selectedBox = null;
                deleteSelectedBtn.classList.add('hidden');
            }
        });

        document.getElementById('view-pdf-container').addEventListener('mousedown', (e) => {
            if (body.dataset.mode === 'page2') {
                if (e.target === document.getElementById('view-pdf-container') || e.target.classList.contains('pdf-page') || e.target.classList.contains('interaction-layer')) {
                    if (selectedBox) {
                        selectedBox.classList.remove('selected');
                        selectedBox = null;
                        deleteSelectedBtn.classList.add('hidden');
                    }
                }
            }
        });

        // ================= 各選項變更事件 =================
        
        // 1. 本機檔案變更
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                pdfSource = { type: 'local', file: file };
                fileNameDisplay.textContent = file.name;
                fileNameDisplay.classList.add('text-blue-600');
                
                clearOtherSelections('local');
                startBtn.disabled = false;
            } else {
                alert('請上傳有效的 PDF 檔案。');
                startBtn.disabled = true;
            }
        });

        // 2. GitHub 題庫變更
        githubPdfSelect.addEventListener('change', function(e) {
            const url = e.target.value;
            if (url) {
                const fileName = e.target.options[e.target.selectedIndex].text;
                pdfSource = { type: 'github', url: url, name: fileName };
                
                clearOtherSelections('github');
                startBtn.disabled = false;
            } else {
                checkIfEmpty();
            }
        });

        // 3. 雲端題庫：輸入金鑰並驗證載入
        loadGdriveBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert("請先輸入 API 金鑰！");
                return;
            }
            
            loadGdriveBtn.textContent = '載入中...';
            loadGdriveBtn.disabled = true;
            apiKeyInput.disabled = true;

            try {
                const folderId = '10EXVID5rb-7_T8OOjP_9KHAXmwigiExu';
                const query = `'${folderId}' in parents and trashed=false and mimeType='application/pdf'`;
                const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&key=${key}&fields=files(id,name)`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('金鑰無效或權限錯誤');
                
                const data = await response.json();
                
                sharedDriveSelect.innerHTML = '<option value="">-- 請選擇雲端考卷 --</option>';
                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const option = document.createElement('option');
                        option.value = file.id; 
                        option.textContent = file.name;
                        sharedDriveSelect.appendChild(option);
                    });
                    
                    userApiKey = key; // 記住正確的金鑰供後續下載 PDF 使用
                    
                    // 隱藏輸入框，顯示下拉選單
                    gdriveAuthBlock.classList.add('hidden');
                    sharedDriveSelect.classList.remove('hidden');
                } else {
                    alert('驗證成功，但資料夾內沒有 PDF 檔案。');
                    resetGdriveInput();
                }
            } catch (error) {
                console.error('雲端載入失敗:', error);
                alert('載入失敗：請確認 API 金鑰是否輸入正確。');
                resetGdriveInput();
            }
        });
        
        function resetGdriveInput() {
            loadGdriveBtn.textContent = '驗證並載入';
            loadGdriveBtn.disabled = false;
            apiKeyInput.disabled = false;
        }

        // 3.5 雲端題庫變更
        sharedDriveSelect.addEventListener('change', function(e) {
            const fileId = e.target.value;
            if (fileId) {
                const fileName = e.target.options[e.target.selectedIndex].text;
                pdfSource = { type: 'shared_gdrive', fileId: fileId, name: fileName };
                
                clearOtherSelections('shared_gdrive');
                startBtn.disabled = false;
            } else {
                checkIfEmpty();
            }
        });

        function checkIfEmpty() {
            if (!fileInput.files.length && !githubPdfSelect.value && (!sharedDriveSelect.value || sharedDriveSelect.classList.contains('hidden'))) {
                startBtn.disabled = true;
                pdfSource = null;
            }
        }

        // ================= 開始標記按鈕 =================
        startBtn.addEventListener('click', async () => {
            if (!pdfSource) return;
            switchMode('page2');
            pdfPagesWrapper.innerHTML = ''; 
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            
            try {
                let arrayBuffer;
                const loadText = loadingIndicator.querySelector('p');
                const originalText = loadText.textContent;
                
                if (pdfSource.type === 'local') {
                    arrayBuffer = await pdfSource.file.arrayBuffer();
                } else if (pdfSource.type === 'github') {
                    loadText.textContent = `正在從 GitHub 題庫下載：${pdfSource.name}...`;
                    const response = await fetch(pdfSource.url);
                    if (!response.ok) throw new Error('線上考卷下載失敗');
                    arrayBuffer = await response.arrayBuffer();
                } else if (pdfSource.type === 'shared_gdrive') {
                    // 使用使用者輸入的金鑰來下載檔案
                    loadText.textContent = `正在從雲端題庫下載：${pdfSource.name}...`;
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${pdfSource.fileId}?alt=media&key=${userApiKey}`);
                    if (!response.ok) throw new Error('雲端題庫檔案下載失敗');
                    arrayBuffer = await response.arrayBuffer();
                }
                
                loadText.textContent = originalText;
                originalPdfBytes = arrayBuffer.slice(0);

                pdfDocument = await pdfjsLib.getDocument({
                    data: arrayBuffer,
                    cMapUrl: CMAP_URL,
                    cMapPacked: CMAP_PACKED
                }).promise;

                for (let pageNum = 1; pageNum <= pdfDocument.numPages; pageNum++) {
                    await renderPage(pageNum);
                }
            } catch (error) {
                console.error("PDF 載入失敗:", error);
                alert("解析 PDF 時發生錯誤: " + error.message);
                switchMode('page1');
            } finally {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
            }
        });

        function switchMode(mode) {
            body.dataset.mode = mode;
            if (selectedBox) {
                selectedBox.classList.remove('selected');
                selectedBox = null;
                deleteSelectedBtn.classList.add('hidden');
            }
        }

        async function renderPage(pageNum) {
            const page = await pdfDocument.getPage(pageNum);
            const scale = 1.5; 
            const viewport = page.getViewport({ scale });

            const pageDiv = document.createElement('div');
            pageDiv.className = 'pdf-page';
            pageDiv.dataset.pageNum = pageNum;
            pageDiv.style.width = viewport.width + 'px';
            pageDiv.style.height = viewport.height + 'px';

            const canvas = document.createElement('canvas');
            canvas.className = 'pdf-canvas';
            const context = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            pageDiv.appendChild(canvas);
            await page.render({ canvasContext: context, viewport }).promise;

            const textLayerDiv = document.createElement('div');
            textLayerDiv.className = 'textLayer';
            pageDiv.appendChild(textLayerDiv);
            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({
                textContent, container: textLayerDiv, viewport, textDivs: []
            }).promise;

            const interactionLayer = document.createElement('div');
            interactionLayer.className = 'interaction-layer';
            pageDiv.appendChild(interactionLayer);

            pdfPagesWrapper.appendChild(pageDiv);

            autoDetectQuestions(textLayerDiv, interactionLayer, viewport.width, viewport.height, pageNum);
        }

        function autoDetectQuestions(textLayer, interactionLayer, pageWidth, pageHeight, pageNum) {
            const spans = Array.from(textLayer.querySelectorAll('span'));
            if (spans.length === 0) return;

            const format = document.querySelector('input[name="exam-format"]:checked')?.value || 'vertical-double';
            const midX = pageWidth / 2;
            const midY = pageHeight / 2;
            
            let leftSpans = [], rightSpans = [];
            let rightTopSpans = [], rightBottomSpans = [], leftTopSpans = [], leftBottomSpans = [];

            spans.forEach(span => {
                const top = span.offsetTop;
                const left = span.offsetLeft;
                const width = span.offsetWidth;
                const height = span.offsetHeight;
                const centerX = left + width / 2; 
                const centerY = top + height / 2;

                if (pageNum === 1) {
                    if (top < pageHeight * 0.1 || (left < midX - 50 && left + width > midX + 50)) return;
                }

                if (format === 'horizontal-updown-double') {
                    if (centerX < midX) {
                        if (centerY < midY) leftTopSpans.push(span);
                        else leftBottomSpans.push(span);
                    } else {
                        if (centerY < midY) rightTopSpans.push(span);
                        else rightBottomSpans.push(span);
                    }
                } else {
                    if (centerX < midX) leftSpans.push(span);
                    else rightSpans.push(span);
                }
            });

            if (format === 'vertical-double') {
                processRegion(leftSpans, interactionLayer, { type: 'left', midX: midX });
                processRegion(rightSpans, interactionLayer, { type: 'right', midX: midX });
            } else if (format === 'horizontal-updown-double') {
                processRegion(rightTopSpans, interactionLayer, { type: 'right-top', midX: midX, midY: midY });
                processRegion(rightBottomSpans, interactionLayer, { type: 'right-bottom', midX: midX, midY: midY });
                processRegion(leftTopSpans, interactionLayer, { type: 'left-top', midX: midX, midY: midY });
                processRegion(leftBottomSpans, interactionLayer, { type: 'left-bottom', midX: midX, midY: midY });
            } else if (format === 'horizontal-single') {
                processRegion(rightSpans, interactionLayer, { type: 'right', midX: midX });
                processRegion(leftSpans, interactionLayer, { type: 'left', midX: midX });
            }
        }

        function processRegion(regionSpans, interactionLayer, bounds) {
            if(regionSpans.length === 0) return;

            let lines = [];
            regionSpans.forEach(span => {
                const top = span.offsetTop;
                const height = span.offsetHeight;
                const left = span.offsetLeft;
                const width = span.offsetWidth;
                
                let line = lines.find(l => {
                    const overlapTop = Math.max(l.top, top);
                    const overlapBottom = Math.min(l.bottom, top + height);
                    return (overlapBottom - overlapTop) > (height * 0.3);
                });

                if (!line) {
                    line = { top, bottom: top + height, left, right: left + width, spans: [] };
                    lines.push(line);
                } else {
                    line.top = Math.min(line.top, top);
                    line.bottom = Math.max(line.bottom, top + height);
                }
                line.spans.push({ left, width, span });
            });

            lines.sort((a, b) => a.top - b.top);
            lines.forEach(line => {
                line.spans.sort((a, b) => a.left - b.left);
                line.text = line.spans.map(s => s.span.textContent).join('').trim();
                line.left = line.spans[0].left;
                line.right = line.spans[line.spans.length - 1].left + line.spans[line.spans.length - 1].width;
            });

            const sectionRegex = /^\s*(?:[一二三四五六七八九十]+\s*[、．\.：:]|第\s*[一二三四五六七八九十]+\s*[大部分題])/;
            const questionRegex = /^\s*(?:(?:[\(（\[□]\s*[\)）\]]?\s*)?[0-9０-９]+\s*[\.．、]|[\(（]\s*[一二三四五六七八九十]+\s*[\)）])/;
            
            let questions = [];
            let currentQ = null;

            lines.forEach(line => {
                if (!line.text) return;
                if (sectionRegex.test(line.text) || questionRegex.test(line.text) || !currentQ) {
                    if (currentQ) questions.push(currentQ);
                    currentQ = { top: line.top, bottom: line.bottom, left: line.left, right: line.right };
                } else {
                    currentQ.top = Math.min(currentQ.top, line.top);
                    currentQ.bottom = Math.max(currentQ.bottom, line.bottom);
                    currentQ.left = Math.min(currentQ.left, line.left);
                    currentQ.right = Math.max(currentQ.right, line.right);
                }
            });
            if (currentQ) questions.push(currentQ);

            const padding = 6;
            const minGap = 5; 

            questions.forEach(q => {
                if (bounds.type.includes('left')) {
                    q.right = Math.min(q.right, bounds.midX - 5 - padding); 
                } else if (bounds.type.includes('right')) {
                    q.left = Math.max(q.left, bounds.midX + 5 + padding);   
                }
                
                if (bounds.midY) {
                    if (bounds.type.includes('top')) q.bottom = Math.min(q.bottom, bounds.midY - 2.5 - padding);
                    else if (bounds.type.includes('bottom')) q.top = Math.max(q.top, bounds.midY + 2.5 + padding);
                }
            });

            questions.sort((a, b) => a.top - b.top);
            for (let i = 0; i < questions.length - 1; i++) {
                let curr = questions[i];
                let next = questions[i + 1];
                let actualCurrBottom = curr.bottom + padding;
                let actualNextTop = next.top - padding;
                if (actualNextTop - actualCurrBottom < minGap) {
                    let midY = (curr.bottom + next.top) / 2;
                    curr.bottom = midY - padding - (minGap / 2);
                    next.top = midY + padding + (minGap / 2);
                }
            }

            questions.forEach(q => {
                let boxHeight = q.bottom - q.top + padding * 2;
                let boxWidth = q.right - q.left + padding * 2;
                if (boxHeight < 15 || boxWidth < 15) return; 
                createBoxElement(interactionLayer, q.left - padding, q.top - padding, boxWidth, boxHeight);
            });
        }

        function createBoxElement(layer, left, top, width, height) {
            const box = document.createElement('div');
            box.className = 'question-box';
            box.style.left = left + 'px';
            box.style.top = top + 'px';
            box.style.width = width + 'px';
            box.style.height = height + 'px';

            const controls = document.createElement('div');
            controls.className = 'box-controls';

            const copyBtn = document.createElement('div');
            copyBtn.className = 'btn-copy';
            copyBtn.innerHTML = '📄';
            copyBtn.title = "複製此框";
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                if(body.dataset.mode === 'page2') {
                    const currentLeft = parseFloat(box.style.left) || 0;
                    const currentTop = parseFloat(box.style.top) || 0;
                    const currentWidth = box.offsetWidth;
                    const currentHeight = box.offsetHeight;
                    createBoxElement(layer, currentLeft + 20, currentTop + 20, currentWidth, currentHeight);
                }
            };

            const delBtn = document.createElement('div');
            delBtn.className = 'btn-delete';
            delBtn.innerHTML = '✖';
            delBtn.title = "刪除此框";
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if(body.dataset.mode === 'page2') {
                    if (selectedBox === box) {
                        selectedBox = null;
                        deleteSelectedBtn.classList.add('hidden');
                    }
                    box.remove();
                }
            };

            controls.appendChild(copyBtn);
            controls.appendChild(delBtn);
            box.appendChild(controls);

            layer.appendChild(box);
            setupBoxInteractions(box);
            return box;
        }

        function setupBoxInteractions(box) {
            let isDragging = false;
            let startX, startY, startLeft, startTop;

            box.addEventListener('mousedown', (e) => {
                if (body.dataset.mode !== 'page2') return;
                if (selectedBox) selectedBox.classList.remove('selected');
                selectedBox = box;
                box.classList.add('selected');
                deleteSelectedBtn.classList.remove('hidden');
                const rect = box.getBoundingClientRect();
                if (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseFloat(box.style.left) || 0;
                startTop = parseFloat(box.style.top) || 0;
                e.stopPropagation(); 
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                box.style.left = (startLeft + e.clientX - startX) + 'px';
                box.style.top = (startTop + e.clientY - startY) + 'px';
            });

            document.addEventListener('mouseup', () => isDragging = false);
            box.addEventListener('click', (e) => {
                if (body.dataset.mode !== 'page2') return;
                e.stopPropagation();
            });
        }

        function addNewBox() {
            const container = document.getElementById('view-pdf-container');
            const viewCenter = container.scrollTop + (container.clientHeight / 2);
            const pages = Array.from(document.querySelectorAll('.pdf-page'));
            if (pages.length === 0) return;
            let targetPage = pages[0];
            let targetTop = 100;
            for (let page of pages) {
                if (viewCenter >= page.offsetTop && viewCenter <= (page.offsetTop + page.offsetHeight)) {
                    targetPage = page;
                    targetTop = viewCenter - page.offsetTop - 50; 
                    break;
                }
            }
            createBoxElement(targetPage.querySelector('.interaction-layer'), (targetPage.offsetWidth / 2) - 100, targetTop, 200, 100);
        }

        async function downloadMarkedPdf() {
            if (!originalPdfBytes) return;
            const oldText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = "處理中...";
            downloadBtn.disabled = true;
            try {
                const { PDFDocument, rgb } = PDFLib;
                const pdfDoc = await PDFDocument.load(originalPdfBytes);
                const domPages = document.querySelectorAll('.pdf-page');
                for (let i = 0; i < domPages.length; i++) {
                    const domPage = domPages[i];
                    const pageNum = parseInt(domPage.dataset.pageNum, 10);
                    const pdfjsPage = await pdfDocument.getPage(pageNum);
                    const viewport = pdfjsPage.getViewport({ scale: 1.5 });
                    const pdfLibPage = pdfDoc.getPage(pageNum - 1);
                    domPage.querySelectorAll('.question-box').forEach(box => {
                        const [pdfX1, pdfY1] = viewport.convertToPdfPoint(parseFloat(box.style.left), parseFloat(box.style.top));
                        const [pdfX2, pdfY2] = viewport.convertToPdfPoint(parseFloat(box.style.left) + box.offsetWidth, parseFloat(box.style.top) + box.offsetHeight);
                        pdfLibPage.drawRectangle({
                            x: Math.min(pdfX1, pdfX2), y: Math.min(pdfY1, pdfY2),
                            width: Math.abs(pdfX2 - pdfX1), height: Math.abs(pdfY2 - pdfY1),
                            borderColor: rgb(0.93, 0.26, 0.26), borderWidth: 1, 
                            color: rgb(0.93, 0.26, 0.26), borderOpacity: 0.6, opacity: 0.05 
                        });
                    });
                }
                const pdfBytes = await pdfDoc.save();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
                a.download = (pdfSource.name || "考卷").replace(/\.[^/.]+$/, "") + "_已標記.pdf";
                a.click();
            } catch (err) { alert("生成失敗！"); } finally {
                downloadBtn.innerHTML = oldText; downloadBtn.disabled = false;
            }
        }
    </script>
