<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji 人臉替換器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    <!-- JSZip & FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 pb-12">

    <!-- Header -->
    <header class="bg-white shadow-sm mb-8">
        <div class="max-w-5xl mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎭</span>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Emoji 人臉替換器</h1>
                    <p class="text-sm text-gray-500 mt-1">自動辨識人臉、側臉、戴口罩，並替換為不重複的 Emoji！</p>
                </div>
            </div>
            <div id="model-status" class="mt-4 md:mt-0 flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-full text-sm font-medium">
                <div class="loader w-4 h-4 border-2 border-blue-200 border-top-blue-600"></div>
                載入 AI 模型中...
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4">
        <!-- Controls -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-wrap gap-4 items-center justify-between mb-8">
            <div class="flex items-center gap-4 flex-wrap">
                <label for="file-upload" class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2" id="upload-label" style="pointer-events: none; opacity: 0.6;">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                    上傳照片 (最多 10 張)
                </label>
                <input id="file-upload" type="file" multiple accept="image/*" class="hidden" disabled>
                
                <button id="clear-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg font-medium transition-colors hidden">
                    清空畫面
                </button>
            </div>

            <button id="download-all-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2 hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                下載全部照片
            </button>
        </div>

        <!-- Results Container -->
        <div id="results-container" class="space-y-8">
            <!-- 預覽項目將透過 JS 動態產生於此 -->
            <div id="empty-state" class="text-center py-20 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p>尚未上傳照片，請點擊上方按鈕選擇圖片。</p>
            </div>
        </div>
    </main>

    <script>
        // 豐富的 Emoji 清單
        const EMOJI_LIST = ['😀', '😂', '😎', '😍', '🥳', '🤩', '😜', '🤪', '🤬', '🤯', '🥶', '😱', '🤡', '👻', '👽', '🤖', '🎃', '🤠', '🥸', '🥺', '😈', '💩', '😺', '🙈', '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵'];
        
        let processedImagesData = []; // 儲存處理後的 Canvas 資料以供下載

        const elements = {
            status: document.getElementById('model-status'),
            uploadInput: document.getElementById('file-upload'),
            uploadLabel: document.getElementById('upload-label'),
            clearBtn: document.getElementById('clear-btn'),
            downloadAllBtn: document.getElementById('download-all-btn'),
            resultsContainer: document.getElementById('results-container'),
            emptyState: document.getElementById('empty-state')
        };

        // 載入 AI 模型 (使用穩定版本的 face-api CDN)
        async function initModel() {
            try {
                const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                
                // 模型載入完成
                elements.status.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg> 模型載入完成`;
                elements.status.className = "mt-4 md:mt-0 flex items-center gap-2 bg-emerald-50 text-emerald-700 px-4 py-2 rounded-full text-sm font-medium";
                
                elements.uploadInput.disabled = false;
                elements.uploadLabel.style.pointerEvents = 'auto';
                elements.uploadLabel.style.opacity = '1';
            } catch (error) {
                console.error("載入模型失敗:", error);
                elements.status.innerHTML = `模型載入失敗，請重新整理網頁`;
                elements.status.className = "mt-4 md:mt-0 flex items-center gap-2 bg-red-50 text-red-700 px-4 py-2 rounded-full text-sm font-medium";
            }
        }

        // 打亂陣列 (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 監聽檔案上傳
        elements.uploadInput.addEventListener('change', async (e) => {
            let files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 限制最多 10 張
            if (files.length > 10) {
                alert("最多只能一次處理 10 張照片，已為您自動截取前 10 張。");
                files = files.slice(0, 10);
            }

            elements.emptyState.style.display = 'none';
            elements.clearBtn.classList.remove('hidden');
            
            // 處理每一張照片
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                await processSingleImage(file, i);
            }

            // 清空 input，允許重複上傳相同檔案
            elements.uploadInput.value = '';
        });

        async function processSingleImage(file, index) {
            const imgUrl = URL.createObjectURL(file);
            const imageId = `img-block-${Date.now()}-${index}`;
            
            // 建立 UI 區塊
            const html = `
                <div id="${imageId}" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6 mb-6">
                    <h3 class="font-medium text-gray-700 mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        照片 ${file.name}
                        <span id="${imageId}-status" class="ml-auto text-sm text-blue-600 flex items-center gap-2">
                            <div class="loader w-3 h-3 border-[2px]"></div> 處理中...
                        </span>
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col items-center justify-center bg-gray-50 rounded-xl overflow-hidden border border-gray-100 relative min-h-[200px]">
                            <span class="absolute top-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm z-10">原始圖片</span>
                            <img id="${imageId}-original" src="${imgUrl}" class="max-w-full max-h-[500px] object-contain block" alt="Original">
                        </div>
                        <div class="flex flex-col items-center justify-center bg-gray-50 rounded-xl overflow-hidden border border-gray-100 relative min-h-[200px]">
                            <span class="absolute top-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm z-10">替換結果</span>
                            <div id="${imageId}-canvas-container" class="w-full h-full flex items-center justify-center">
                                <!-- Canvas 會插入在這裡 -->
                            </div>
                        </div>
                    </div>
                </div>
            `;
            elements.resultsContainer.insertAdjacentHTML('beforeend', html);

            try {
                // 載入 Image
                const imgElement = document.getElementById(`${imageId}-original`);
                await new Promise((resolve) => {
                    imgElement.onload = resolve;
                });

                // 進行人臉偵測 (minConfidence 設為 0.25 提高對側臉和口罩的捕捉率)
                const options = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.25 });
                const detections = await faceapi.detectAllFaces(imgElement, options);

                // 建立 Canvas 並繪製原圖
                const canvas = document.createElement('canvas');
                canvas.width = imgElement.naturalWidth;
                canvas.height = imgElement.naturalHeight;
                // 添加樣式以便於響應式顯示
                canvas.className = "max-w-full max-h-[500px] object-contain block";
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

                // 準備隨機 Emoji
                let availableEmojis = shuffleArray([...EMOJI_LIST]);

                // 畫上 Emoji
                detections.forEach((det, idx) => {
                    const box = det.box;
                    
                    // 如果人臉數量超過 emoji 清單，就重複使用
                    const emoji = availableEmojis[idx % availableEmojis.length];

                    // Emoji 大小與人臉框匹配 (稍微放大 1.2 倍以覆蓋完整頭部)
                    const size = Math.max(box.width, box.height) * 1.25;
                    
                    ctx.font = `${size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // 微調 Y 軸位置，讓 emoji 更貼近臉部中心
                    const centerX = box.x + box.width / 2;
                    const centerY = box.y + box.height / 2 + size * 0.05;

                    ctx.fillText(emoji, centerX, centerY);
                });

                // 將 Canvas 放入畫面
                document.getElementById(`${imageId}-canvas-container`).appendChild(canvas);
                
                // 更新狀態
                document.getElementById(`${imageId}-status`).innerHTML = `<span class="text-emerald-600">✔ 找到 ${detections.length} 個人臉</span>`;

                // 儲存 Canvas 以供後續打包下載
                processedImagesData.push({
                    name: `emoji_${file.name}`,
                    canvas: canvas
                });

                // 顯示全部下載按鈕
                if (processedImagesData.length > 0) {
                    elements.downloadAllBtn.classList.remove('hidden');
                }

            } catch (error) {
                console.error("處理圖片發生錯誤:", error);
                document.getElementById(`${imageId}-status`).innerHTML = `<span class="text-red-500">處理失敗</span>`;
            }
        }

        // 清空畫面
        elements.clearBtn.addEventListener('click', () => {
            elements.resultsContainer.innerHTML = '';
            elements.resultsContainer.appendChild(elements.emptyState);
            elements.emptyState.style.display = 'block';
            
            elements.clearBtn.classList.add('hidden');
            elements.downloadAllBtn.classList.add('hidden');
            
            processedImagesData = [];
        });

        // 下載全部 (逐張分開下載)
        elements.downloadAllBtn.addEventListener('click', async () => {
            if (processedImagesData.length === 0) return;

            const originalText = elements.downloadAllBtn.innerHTML;
            elements.downloadAllBtn.innerHTML = `<div class="loader w-4 h-4 border-[2px]"></div> 下載中...`;
            elements.downloadAllBtn.disabled = true;

            try {
                for (let i = 0; i < processedImagesData.length; i++) {
                    const item = processedImagesData[i];
                    
                    // 將 Canvas 轉為 Blob 並觸發下載
                    item.canvas.toBlob((blob) => {
                        saveAs(blob, item.name);
                    }, 'image/jpeg', 0.95);
                    
                    // 稍微延遲 (300毫秒)，避免瀏覽器將連續下載判定為惡意行為而阻擋
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
            } catch (error) {
                console.error("下載失敗:", error);
                alert("下載時發生錯誤！");
            } finally {
                elements.downloadAllBtn.innerHTML = originalText;
                elements.downloadAllBtn.disabled = false;
            }
        });

        // 啟動應用
        window.addEventListener('DOMContentLoaded', () => {
            initModel();
        });

    </script>
</body>
</html>
