<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音輔導紀錄系統(資源班版)</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-emerald-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // === SVG 圖示元件 ===
    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );
    const FileText = ({ size, className }) => <Icon size={size} className={className} path='<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/>' />;
    const Settings = ({ size, className }) => <Icon size={size} className={className} path='<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>' />;
    const Mic = ({ size, className }) => <Icon size={size} className={className} path='<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>' />;
    const MicOff = ({ size, className }) => <Icon size={size} className={className} path='<line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/>' />;
    const Trash2 = ({ size, className }) => <Icon size={size} className={className} path='<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>' />;
    const Loader2 = ({ size, className }) => <Icon size={size} className={className} path='<path d="M21 12a9 9 0 1 1-6.219-8.56"/>' />;
    const CloudUpload = ({ size, className }) => <Icon size={size} className={className} path='<path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/>' />;
    const CheckCircle = ({ size, className }) => <Icon size={size} className={className} path='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' />;
    const AlertCircle = ({ size, className }) => <Icon size={size} className={className} path='<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>' />;
    const Key = ({ size, className }) => <Icon size={size} className={className} path='<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>' />;
    const ExternalLink = ({ size, className }) => <Icon size={size} className={className} path='<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>' />;

    // 資源班學生名單
    const STUDENT_LIST = ["吳杰諾", "鍾芷語", "胡丞峰", "邱瀚毅", "陳蘋萱", "張帝暘"];

    const App = () => {
      const [isRecording, setIsRecording] = useState(false);
      const [rawText, setRawText] = useState('');
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [exportStatus, setExportStatus] = useState(null);
      
      const [analyzedData, setAnalyzedData] = useState({
        date: '', studentName: '', interviewee: '', counselingPoints: '', contactMatters: ''
      });

      const [showSettingsModal, setShowSettingsModal] = useState(false);
      
      // 已為您將網址直接寫死，不需再透過 localstorage 讀取
      const [appsScriptUrl, setAppsScriptUrl] = useState('https://script.google.com/macros/s/AKfycbzPvPNfwuE0EFFcKRUTPv3avUxsqoAyiFQFP1nzxwzeY85Cd3UbVjCySZsoOrnwL1di/exec');
      const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem('geminiApiKey') || '');
      
      // 試算表檢視網址
      const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/1ca-6j8jPLqerQo0wEOxyfEPQ-c38I1s6MmvpwNN_jG8/edit?usp=sharing';

      const [showClearModal, setShowClearModal] = useState(false);
      const [alertMessage, setAlertMessage] = useState('');

      const recognitionRef = useRef(null);

      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          const recognition = new SpeechRecognition();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = 'zh-TW';

          recognition.onresult = (event) => {
            let finalTranscript = '';
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
              else interimTranscript += event.results[i][0].transcript;
            }
            if (finalTranscript) setRawText((prev) => prev + finalTranscript + '，');
          };

          recognition.onerror = (event) => {
            console.error("Speech recognition error:", event.error);
            setIsRecording(false);
            if (event.error === 'network' && window.location.protocol === 'file:') {
               setAlertMessage("【語音無法使用】因為瀏覽器安全限制，直接點擊 HTML 檔 (file://) 時無法啟動麥克風（會被誤判為無網路連線）。請改用打字，或將此檔案上傳至網站空間才能使用語音功能喔！");
            } else if (event.error === 'not-allowed') {
               setAlertMessage("請允許瀏覽器使用麥克風權限！");
            }
          };

          recognition.onend = () => setIsRecording(false);
          recognitionRef.current = recognition;
        } else {
          console.warn("此瀏覽器不支援語音辨識 API，請使用 Google Chrome。");
        }
      }, []); 

      const toggleRecording = () => {
        if (isRecording) {
          recognitionRef.current?.stop();
          setIsRecording(false);
        } else {
          if (recognitionRef.current) {
            recognitionRef.current.start();
            setIsRecording(true);
          } else {
            setAlertMessage("您的瀏覽器不支援語音辨識功能，請嘗試使用最新版的 Google Chrome。");
          }
        }
      };

      const handleClear = () => setShowClearModal(true);

      const confirmClear = () => {
        setRawText('');
        setAnalyzedData({ date: '', studentName: '', interviewee: '', counselingPoints: '', contactMatters: '' });
        setExportStatus(null);
        setShowClearModal(false);
      };

      const analyzeContent = async () => {
        if (!geminiApiKey.trim()) {
          setAlertMessage("【缺少 API 金鑰】請先至右上角「系統設定」貼上您的 Gemini API Key 才能進行 AI 分析喔！");
          setShowSettingsModal(true);
          return;
        }
        if (!rawText.trim()) {
          setAlertMessage("請先輸入或語音錄製內容！");
          return;
        }

        setIsAnalyzing(true);
        setExportStatus(null);
        
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        
        // === 大幅強化校正提示詞 ===
        const prompt = `你是一個專業的國小老師輔導紀錄助手。請先判斷以下語音輸入的逐字稿是否與「學生輔導、班級經營、親師溝通、學校教育事務」相關。
如果內容完全無關（例如日常閒聊、無意義的字詞、天氣、買東西等非教育事務），請將 isRelevant 設為 false，其他欄位留白即可。
如果內容相關，請將 isRelevant 設為 true，並萃取/潤飾出以下五個欄位：
1. 日期：擷取逐字稿中提到的日期（格式 YYYY-MM-DD）。如果完全沒有提到日期，請使用今天的日期：${todayStr}。
2. 學生姓名：【強制校正】請從語音內容擷取學生姓名。務必優先比對此名單：[${STUDENT_LIST.join(', ')}]。只要語音中的名字與名單「發音相近」或有「同音錯字」（例如語音聽寫成「無結懦」，必須自動校正為「吳杰諾」；「張地楊」或「張帝楊」要校正為「張帝暘」），請絕對要輸出名單上【完全一致】的字。除非發音完全不在名單內，才輸出原始字詞。若沒提到則留白。
3. 訪談對象：判斷老師主要是跟誰進行訪談對話（例如：學生本人、家長、某老師）。如果無特別提及，預設為「學生本人」。
4. 輔導內容要點：針對學生訪談的原因，例如突發狀況事件經過以及行為表現問題進行紀錄。【請務必在敘述中完整呈現學生全名】
5. 聯絡事項：老師事後的通知對象（如家長、學務處等）以及後續的處理方式。【請務必在敘述中完整呈現學生全名】
【重要潤飾規則】：
- 必須自動潤飾語句和語氣，使其專業、客觀、通順。
- 必須將負面且具有貶低性的語詞轉換成中性或正向說法。例如：將「偷竊」、「小偷」轉換為「沒有經過他人同意就拿取物品」；將「打人」轉換為「發生肢體衝突」等。
- 【強制稱呼】在內文（輔導內容與聯絡事項）中提及學生時，請一律使用「學生全名」，絕對不要使用「他」、「該生」等代稱。
原始逐字稿內容：
"${rawText}"`;

        const apiKeyToUse = geminiApiKey || ""; 
        const modelName = "gemini-2.5-flash";

        try {
          let result = null;
          let retries = 0;
          const maxRetries = 5;
          const delays = [1000, 2000, 4000, 8000, 16000];

          while (retries < maxRetries && !result) {
            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKeyToUse}`,
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                      type: "OBJECT",
                      properties: {
                        isRelevant: { type: "BOOLEAN", description: "內容是否與輔導或學生事務相關" },
                        date: { type: "STRING", description: "日期 YYYY-MM-DD" },
                        studentName: { type: "STRING", description: "學生姓名(請務必依據提示詞比對名單進行校正)" },
                        interviewee: { type: "STRING", description: "訪談對象" },
                        counselingPoints: { type: "STRING", description: "輔導內容要點" },
                        contactMatters: { type: "STRING", description: "聯絡事項" }
                      }
                    }
                  }
                })
                }
              );

              if (!response.ok) {
                if (response.status === 400 && !geminiApiKey) throw new Error("MISSING_API_KEY");
                throw new Error(`HTTP error! status: ${response.status}`);
              }
              result = await response.json();
            } catch (err) {
              if (err.message === "MISSING_API_KEY" || (!geminiApiKey && err.name === "TypeError")) throw new Error("MISSING_API_KEY");
              retries++;
              if (retries >= maxRetries) throw err;
              await new Promise(resolve => setTimeout(resolve, delays[retries - 1]));
            }
          }

          if (result && result.candidates && result.candidates[0]) {
            const parsedData = JSON.parse(result.candidates[0].content.parts[0].text);
            if (parsedData.isRelevant === false) {
              setAlertMessage("無法執行：輸入內容似乎與學生輔導無關，請確認訊息正確！");
              return;
            }

            // 直接抓取 AI 回傳的名字，不再將中間替換為 0
            const finalName = parsedData.studentName ? parsedData.studentName.trim() : '';
            let finalCp = parsedData.counselingPoints || '';
            let finalCm = parsedData.contactMatters || '';

            setAnalyzedData({
              date: parsedData.date || todayStr,
              studentName: finalName,
              interviewee: parsedData.interviewee || '學生本人',
              counselingPoints: finalCp,
              contactMatters: finalCm
            });

            if (!parsedData.counselingPoints || !parsedData.contactMatters) {
              setTimeout(() => setAlertMessage("【系統提醒】AI 未能完整抓取到「輔導內容要點」或「聯絡事項」，請確認輸入內容是否包含這兩部分，或於右側直接手動補充修改。"), 500);
            }
          }
        } catch (error) {
          if (error.message === "MISSING_API_KEY") {
            setAlertMessage("【缺少 API 金鑰】請至右上角「系統設定」貼上您的 Gemini API Key 才能連線到 AI 喔！");
            setShowSettingsModal(true);
          } else {
            setAlertMessage("分析失敗，請檢查網路連線或確認您的 API Key 是否正確有效。");
          }
        } finally {
          setIsAnalyzing(false);
        }
      };

      const exportToCloud = async () => {
        if (!appsScriptUrl) {
          setAlertMessage("請先至右上角「系統設定」貼上您的【雲端試算表串接網址】才能匯出！");
          setShowSettingsModal(true);
          return;
        }

        if (!analyzedData.studentName || (!analyzedData.counselingPoints && !analyzedData.contactMatters)) {
          setAlertMessage("請確保有學生姓名，且至少填寫一項「輔導內容要點」或「聯絡事項」！");
          return;
        }

        setIsExporting(true);
        setExportStatus(null);

        try {
          await fetch(appsScriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(analyzedData)
          });
          setExportStatus('success');
        } catch (error) {
          console.error("Export failed:", error);
          setAlertMessage("【連線失敗】無法連線到雲端試算表。\n請至「系統設定」確認您的 Apps Script 網址是否正確。");
          setExportStatus('error');
        } finally {
          setIsExporting(false);
        }
      };

      return (
        <div className="min-h-screen bg-emerald-50 text-gray-800 font-sans">
          <header className="bg-emerald-600 text-white shadow-md p-4 flex justify-between items-center sticky top-0 z-10">
            <div className="flex items-center space-x-2">
              <FileText size={24} />
              <h1 className="text-xl font-bold tracking-wider">語音輔導紀錄系統(資源班版)</h1>
            </div>
            <button 
              onClick={() => setShowSettingsModal(true)}
              className="flex items-center space-x-1 bg-emerald-700 hover:bg-emerald-800 px-4 py-2 rounded-full text-sm font-medium transition-colors shadow-sm"
            >
              <Settings size={18} />
              <span>系統設定</span>
            </button>
          </header>

          <main className="max-w-5xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            {/* 左側：輸入區 */}
            <div className="bg-white rounded-2xl shadow-sm border border-emerald-100 p-5 flex flex-col h-full">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-semibold text-emerald-800 flex items-center">
                  <span className="bg-emerald-100 text-emerald-600 p-1.5 rounded-lg mr-2">1</span>
                  輸入內容
                </h2>
                <div className="flex items-center space-x-2">
                  <button onClick={handleClear} disabled={isRecording} className="flex items-center space-x-1 px-3 py-2 rounded-full font-medium transition-all shadow-sm bg-gray-100 text-gray-600 hover:bg-gray-200 disabled:opacity-50">
                    <Trash2 size={18} />
                    <span className="hidden sm:inline">一鍵清空</span>
                  </button>
                  <button onClick={toggleRecording} className={`flex items-center space-x-2 px-4 py-2 rounded-full font-medium transition-all shadow-sm ${isRecording ? 'bg-red-50 text-red-600 border border-red-200 animate-pulse' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`}>
                    {isRecording ? <MicOff size={18} /> : <Mic size={18} />}
                    <span>{isRecording ? '停止收音' : '點擊開始語音'}</span>
                  </button>
                </div>
              </div>
              <textarea
                className="flex-grow w-full border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-none text-gray-700 leading-relaxed"
                placeholder="建議直接打字輸入...&#10;&#10;【請包含以下兩部分】&#10;1. 輔導內容要點 (事發經過、行為表現)&#10;2. 聯絡事項 (通知對象、後續處理)&#10;&#10;例如：「今天下午吳杰諾跟同學發生爭執，未經同意拿取別人的文具。我跟他談過後... 已經聯絡家長說明情況，並請家長協助留意。」&#10;&#10;※ 系統會自動校正相近發音的學生姓名，並潤飾負面詞彙（如將「偷竊」轉換為「未經同意拿取物品」）。"
                rows="10" value={rawText} onChange={(e) => setRawText(e.target.value)}
              />
              <div className="mt-4 flex justify-center">
                <button onClick={analyzeContent} disabled={isAnalyzing || !rawText.trim()} className="w-full md:w-auto flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-md text-lg">
                  {isAnalyzing ? <Loader2 className="animate-spin" size={24} /> : <FileText size={24} />}
                  <span>{isAnalyzing ? 'AI 分析與潤飾中...' : '開始分析與潤飾'}</span>
                </button>
              </div>
            </div>

            {/* 右側：分析結果區 */}
            <div className="bg-white rounded-2xl shadow-sm border border-emerald-100 p-5 flex flex-col h-full">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-semibold text-emerald-800 flex items-center">
                  <span className="bg-emerald-100 text-emerald-600 p-1.5 rounded-lg mr-2">2</span>
                  分析結果與編輯
                </h2>
              </div>
              <div className="space-y-4 flex-grow flex flex-col">
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-600 mb-1">日期</label>
                    <input type="date" value={analyzedData.date} onChange={(e) => setAnalyzedData({...analyzedData, date: e.target.value})} className="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-600 mb-1">學生姓名</label>
                    <input type="text" list="student-list" value={analyzedData.studentName} onChange={(e) => setAnalyzedData({...analyzedData, studentName: e.target.value})} className="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 bg-white" placeholder="自動擷取或手動輸入" />
                    <datalist id="student-list">
                      {STUDENT_LIST.map(name => <option key={name} value={name} />)}
                    </datalist>
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">訪談對象</label>
                  <input type="text" value={analyzedData.interviewee} onChange={(e) => setAnalyzedData({...analyzedData, interviewee: e.target.value})} placeholder="例如：學生本人、家長、導師" className="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500" />
                </div>
                <div className="flex flex-col flex-grow gap-4">
                  <div className="flex flex-col flex-1">
                    <label className="block text-sm font-medium text-gray-600 mb-1">輔導內容要點 (事發經過與行為表現)</label>
                    <textarea value={analyzedData.counselingPoints} onChange={(e) => setAnalyzedData({...analyzedData, counselingPoints: e.target.value})} className="w-full flex-grow border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 resize-none text-gray-700 leading-relaxed min-h-[120px]" placeholder="AI 分析出的輔導原因、事發經過會顯示在這裡..." />
                  </div>
                  <div className="flex flex-col flex-1">
                    <label className="block text-sm font-medium text-gray-600 mb-1">聯絡事項 (通知對象與後續處理)</label>
                    <textarea value={analyzedData.contactMatters} onChange={(e) => setAnalyzedData({...analyzedData, contactMatters: e.target.value})} className="w-full flex-grow border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 resize-none text-gray-700 leading-relaxed min-h-[80px]" placeholder="AI 分析出的聯絡對象與後續處置會顯示在這裡..." />
                  </div>
                </div>
              </div>
              <div className="mt-6 pt-4 border-t border-gray-100">
                <div className="flex space-x-3">
                  <button onClick={exportToCloud} disabled={isExporting || !analyzedData.studentName || (!analyzedData.counselingPoints && !analyzedData.contactMatters)} className="flex-1 flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-300 text-white px-6 py-3.5 rounded-xl font-bold transition-colors shadow-md text-lg">
                    {isExporting ? <Loader2 className="animate-spin" size={20} /> : <CloudUpload size={20} />}
                    <span>{isExporting ? '匯出中...' : '匯出雲端試算表'}</span>
                  </button>
                  <button 
                    onClick={() => {
                      window.open(spreadsheetUrl, '_blank');
                    }}
                    className="flex items-center justify-center space-x-2 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-5 py-3.5 rounded-xl font-bold transition-colors shadow-sm text-lg whitespace-nowrap"
                    title="開啟 Google 試算表"
                  >
                    <ExternalLink size={20} />
                    <span className="hidden sm:inline">檢視試算表</span>
                  </button>
                </div>
                {exportStatus === 'success' && (
                  <div className="mt-3 p-3 bg-green-50 text-green-700 rounded-lg flex items-center justify-center space-x-2">
                    <CheckCircle size={18} />
                    <span>匯出請求已送出！（若資料未出現，請檢查 Apps Script 設定）</span>
                  </div>
                )}
                {exportStatus === 'error' && (
                  <div className="mt-3 p-3 bg-red-50 text-red-700 rounded-lg flex items-center justify-center space-x-2">
                    <AlertCircle size={18} />
                    <span>匯出失敗，請檢查網路或確認是否已正確設定「雲端串接」。</span>
                  </div>
                )}
              </div>
            </div>

          </main>

          {/* === 系統設定 Modal === */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-bold text-gray-800 flex items-center">
                      <Settings className="mr-2 text-emerald-600" />
                      系統設定
                    </h3>
                    <button onClick={() => setShowSettingsModal(false)} className="text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
                  </div>
                  <div className="space-y-8 text-gray-600">
                    <div className="bg-blue-50/50 p-5 rounded-xl border border-blue-100">
                      <h4 className="font-bold text-gray-800 mb-2 flex items-center text-lg">
                        <Key className="mr-2 text-blue-600" size={20} />
                        1. AI 分析金鑰 (Gemini API Key)
                      </h4>
                      <p className="text-sm text-gray-600 mb-4 leading-relaxed">
                        本機下載版必須填入 API Key 才能連線至 AI。<br/>
                        <span className="text-blue-700 font-medium">※ 此金鑰僅會保存在您當前使用的瀏覽器中，非常安全，且輸入一次後便會永久記住！</span>
                      </p>
                      <input type="password" placeholder="請貼上您的 Gemini API Key..." value={geminiApiKey} onChange={(e) => { setGeminiApiKey(e.target.value); localStorage.setItem('geminiApiKey', e.target.value); }} className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 font-mono text-sm bg-white" />
                    </div>
                    <div className="bg-emerald-50/50 p-5 rounded-xl border border-emerald-100">
                      <h4 className="font-bold text-gray-800 mb-2 flex items-center text-lg">
                        <CloudUpload className="mr-2 text-emerald-600" size={20} />
                        2. 雲端試算表串接網址 (Apps Script URL)
                      </h4>
                      <p className="text-sm text-gray-600 mb-4 leading-relaxed">
                        已經為您將專屬網址直接存入程式中，無須另外輸入。若有需要臨時更換網址可在此修改。
                      </p>
                      <input type="text" placeholder="https://script.google.com/macros/s/.../exec" value={appsScriptUrl} onChange={(e) => setAppsScriptUrl(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 font-mono text-sm bg-white" />
                    </div>
                  </div>
                  <div className="mt-8 flex justify-end">
                    <button onClick={() => setShowSettingsModal(false)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-2.5 rounded-lg font-bold transition-colors shadow-sm">
                      儲存並關閉
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* === 提示訊息 Modal === */}
          {alertMessage && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                  <AlertCircle className="h-6 w-6 text-red-600" />
                </div>
                <p className="text-gray-800 font-medium mb-6 leading-relaxed">{alertMessage}</p>
                <button onClick={() => setAlertMessage('')} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg font-bold transition-colors">
                  我知道了
                </button>
              </div>
            </div>
          )}

          {/* === 清空確認 Modal === */}
          {showClearModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-yellow-100 mb-4">
                  <AlertCircle className="h-6 w-6 text-yellow-600" />
                </div>
                <h3 className="text-lg font-bold text-gray-800 mb-2">確定要清空嗎？</h3>
                <p className="text-gray-500 text-sm mb-6">這將會清除所有語音輸入內容與分析結果，且無法復原。</p>
                <div className="flex space-x-3">
                  <button onClick={() => setShowClearModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-lg font-bold transition-colors">
                    取消
                  </button>
                  <button onClick={confirmClear} className="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm">
                    確定清空
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
